body:
  text: 少室山房筆叢卷六明胡應麟撰史書占畢二外篇創者羲農耶治者堯舜耶家者大禹耶征者湯武耶仙者廣成耶聖者尼父耶上古帝王兼總二三斯為極盛而軒轅氏六者具焉神哉其德乎異哉其時乎盛哉軒轅氏之時也而微有憾焉夫羲農欲治而未能堯舜能創而弗值也皆時也而有熊適當之而際榆罔之衰也蚩尤之暴也征伐之功大於湯武而揖遜之迹減於唐虞也亦時也葛洪曰古聖人有輕天下者有治天下者惟黃帝兼之而不知有熊所兼者衆也世知項槖八歲而師孔而不知蒲衣八嵗而師舜也甘羅十二上卿少矣而伯益五嵗掌火尤少也唐文十八創業少矣而放勳十六配天尤少也王融之豔鄧禹奚為哉三代而上享國之永者周也三代而下享國之永者漢也夫周積德纍仁逺矣漢除殘伐暴正矣夫夏商湯禹崛起周則二聖相承也唐宋隋周重臣漢則匹夫無位也而周重之周公也漢重之光武也是三文王而再髙祖也其享國之永宜也皇帝王霸古今升降之㑹也其世有隆汚故其號有等差其號係於世也其世弗係於號也稱而久焉熟焉於是乎號之等差為世之汚隆矣虞夏商周奉天革命代自為稱靡沿襲也三代而下惟漢得之魏晉六朝五季之君率緣舊號唐宋混一亦皆因之何耶夫漢之名猶地也昭代稱名近無所因逺無所襲厥體冠裳厥義鴻逺偉哉光絶百代矣三代而上之為帝王者視其德三代而下之為帝王者視其才漢髙之才髙光武之才密文皇之才俊項羽之才雄先主之才疏孟德之才俊三代而下儒之用世者得二人焉漢光武蜀忠武也光武儒而帝者也忠武儒而相者也且俱能將也儒之用斯其烈也唐文皇之文也能將矣能帝矣成康之治所自致也是又能相也然才人非儒者也帝王受命必有禎符芒碭之雲能文五彩近之矣蛇當道魚腹之文乎嫗夜哭叢祠之嘯乎至良一䇿士滄海黃石胡紛紛也世祖洞達光明赤伏致纍家法哉夫唐宋昭代之興也咸亦有聞矣而人無弗信者惟其足信也髙之輕士也武之雜霸也西漢之事功釀於此乎光之禮賢也明之養老也東京之節義釀于此乎唐文藝故唐一代鳴詩歌宋藝仁故宋一代言理學漢文短喪而魏文終喪梁武佞佛而周武剗佛二文二武皆英主也而得失天壤也夫拓跋宇文鈞夷狄也求王政於三代之後僅二事足徴焉能無為中國愧也人知漢武之表章六經而不知梁武之訓釋六經尤勤且力也二武帝才略同文藝同好方外同一仙一佛漢武窮兵一念悔而令終梁武寢兵一念渝而致亂漢夷狄亡君矣而南北有魏文也周武也唐夷狄亡君矣而金元有世宗也仁宗也其盛則宜丘明以尹氏為隱母公羊以尹氏為世卿史記以共和為相號竹書以共和為人名夫尹氏男子也而或謂婦人共和一人也而或謂二相史之至矛盾大可笑者若此而將安聽哉夫四書之文亡他籍可取證也其文義則順弗順昭昭也吾從其順者已矣胡安國羅泌各有辨楚莊秦穆眇矣宋襄亡之弗暇而霸云乎哉昆吾大彭豕韋異代也若存若亡也亡已則悼以易襄猶庶乎其可也班固以齊晉秦楚及吳闔廬為五霸桓文五主之霸皆尊主也而皆挾詐也故皆稱霸也然霸有二功與力也桓文功有餘而力未足也其蚩尤共工后羿秦政楚羽乎五者霸之盛也古今之力靡以尚也自楚之弱而吳始强吳之强也未幾而於越隨徑矣自遼之衰而金始橫金之橫也未幾而䝉古浸盛矣天道可畏也哉甚矣宋之可笑也襄圖霸於前而覆於楚偃圖霸於後而滅於齊襄曰王道偃亦曰王政祖也孫也其一揆夫春秋之世而真能柔楚者悼也桓文弗與也戰國之世而稍能抗秦者趙也齊楚無譏也晉岸賈之夷趙宗其罪專也其意則張公室也而後世以費無極班之魯行父之逐莒僕其詞正也其事則竊上權也而後世以臧孫辰匹之漢翟方進搆陷陳咸等亦執斯語當文仲之立言也豈以為奸雄地哉六國之世無君矣然弗盡爾也趙之武靈也惠文也燕之昭也楚之威也齊之宣也皆能振也武靈之强國惠文之用人昭之雪耻威之合從宣之禮賢其事可紀也而武靈殺身餘皆早世天有意於秦乎人乎奚與也戰國之世能與秦抗者趙而已主父微服入關有圖秦之心焉弗死沙丘六國之勢未可知也惠文任頗服齊任奢救韓任藺挫秦澠池之㑹即昭之强無少懦也戰國之令主也頗奢相如皆拔自微眇者也知而用用而弗疑而卒取效五霸之事弗過也孝成繼之衰焉惜夫戰國之凛然者吾得二人焉王蠋申包胥是矣非豫讓謂也戰國之超然者吾得二人焉魯連張孟談是已非范蠡謂也夫蠡之事越也非不久矣闔廬之强弗聞以其君輯也夫差之忿弗聞以其君釋也㑹稽之棲幸嚭在也弗爾計安出也以美色蠱人之國以隂謀剗人之社義仗言執者乎吳之求成也句踐猶有心焉從而贊之報曩日焉可也援桴隨之必滅乃已胡其忍也以烏喙目其君以貨財汚其身至齊復為田常篡其國甚矣人之好亂也蠡事與胥迥異吳弗可以釋越越弗可以弗釋吳仲連義不帝秦甘蹈東海孟談奮身救主超然五湖彼非有所畏也蠡之去越畏心耳三遷亡一善狀特以貨稱致子殺人而復救之其事汙其識悖晉之衰也萌於士丐乎楚之衰也萌於屈建乎晉卿大夫自衰而起亡非賢者丐為政而名義渝二鞅繼之皆亂人也餘斗筲亡足算矣建衷甲以求諸侯楚圍襲而甚之卒禍其國戰國四君孰不藐平原乎然秦人挾豺虎之勢握之乎掌股之上以索窮厄無歸之魏齊而卒弗豫者則疇其人也長平之役在任趙括不在受馮亭令亷頗相拒武安空國而出諸侯乘釁以入視函谷猶大􅑆也春申是辨士非俠士孟嘗是俠士非義士信陵是義士非曲士秦前後出兵惟長平最為竭力蓋攻趙之衆不下六十餘萬關中鋭士盡矣若王翦攻楚秦已得天下半不足言空國也起翦頗牧班乎良哉牧也扶弱趙却强秦材優三子矣至忠而被戮則宋之武穆弗加也勝歇文忌班乎偉哉忌也振殘魏驅暴秦才絶三子矣至信而見疑則魏之陳思一律也牧死豈直惟亡趙忌死豈直惟亡魏并亡六國矣鴟夷望諸皆舊臣也員留而戮毅去而生毅為得乎淮隂留侯皆功臣也信留而族良去而完良為得乎噫難言也員與光君臣之昵手足腹心弗喻也目吳之沼而恝然外國情乎非以死殉亡可者毅之去則善矣漢以羽視信信一日在漢一日憂乎即北走胡南走越其能免也善為信計者非文子之祈則文信之藥而已悲夫太史傳刺客五人其道皆亡足論也其志其事則得失難易差焉沫僨軍喪地罪弗免誅葵丘之㑹非盛有甲兵之陳也提劍劫之成則幸生敗不虛死蛇鼠之知壯夫弗為己政於嚴氏受恩非素而能終其母之年念其姊之戮殺身皮面志足矜也而倉卒一呼事猶易也軻也藏匕首入虎狼萬㦸九關聲色亡動至肢體分裂嘻笑自如非蓋世之勇孰與斯乎專諸所刺王僚所為吳光厥志厥事咸瑣瑣也非荆聶比也讓則余别論詳矣刺大亂之道也萬勿已而用之則視其刺之是非而已劫桓逆干順也弒僚下賊上也殺纍私害公也沫以亂逭刑諸以亂濟慝政以亂快仇皆亂之亂也且也桓可義奪遂出忿爭光非廢逐三子者之刺亦可以已乎哀哉丹也燕社稷旦暮墟矣丹思所以濟之而萬無䇿也僥幸於一刺詎得已哉政殛蘇嗣可以息黔黎延周脈燕亦未至遂亡軻之垂中而弗中也天也世人燭成敗弗燭是非故軻為笑資而沫為大勇悲夫項之覩秦曰彼可取而代也劉之覩秦曰大丈夫當如此矣劉項之志可知也立懷者梁非籍意羽破漢興懷即無恙漢能一日終北面之義乎曰漢雖勿臣未必為郴之舉也則秦之於赧魏之於獻亦有辭乎夫淮隂彭越君臣之分已定也漢未嘗置之地上也況義帝其素所君也髙帝戰勝攻取經國致治事不如文皇然而文皇弗能為髙祖也以髙神略懸斷平勃固其餘事歡也顧亦能焉侯景彭樂庫狄干斛律金慕容紹宗若鑑而燭也文皇智籠一世終以績失之知人豈曰易哉文皇之出績蓋有由焉英衛之才非遇文皇皆有以自立者文皇少於諸將其將終也一時征伐功臣盡矣績僅存而髙孱文皇蓋有所慮也故出之以探其衷而因循則殺之蓋文皇不能無慮績而又不欲為髙祖之殺韓彭績行而大宗之疑釋且殺之無名矣侯景之事其必至者也武氏則全未形也文皇之出績即景之慮非紹宗之慮也蓋欲髙以位結其心非冀其力也夫文皇豈區區趨步神武哉將之道曰智曰勇而已古今聖於勇其項籍乎聖於智其韓信乎勇而困於智雖萬鈞猶匹夫也羽之勇無所事謀而敵之謀亦無所施智而藉乎勇雖百勝猶恆技也信之智無所事力而敵之力亦無所用而漢髙者又能使籍失其勇信失其智才愈髙衷愈隱業愈盛德愈衰矣垓下之戰楚事去矣非信之智能覆羽也然漢不得信未可知也以全智遇全勇必其勢皆全優劣庶幾定也夫其勢全者又必其鬬確夫劉曜擒於石勒髙昻沒於宇文豈其勢有强弱哉鬭有確不確也宋義之鬭秦趙也實畏邯欲觀成敗耳邯舉趙義且棄軍走孰承其敝乎至不恤士卒置酒髙㑹大言凌羽蓋以口舌得禍妄庸豎子羽殺義羽刃汚矣凌敬規建德毋救鄭尤謬唐克鄭旦夕鄭克則夏望風靡矣項王喑嗚叱咤千人皆廢然東城之役灌嬰以五千追之雖殺傷過當卒自剄勢也垓下之戰漢兵亦六十萬非淮隂在軍鮮不為靈壁矣苐信亦非羽敵也楚之謀臣亞父而已然其謀得與失蓋相等焉其謀之失者一曰立義帝其謀之得者一曰圖沛公以陳涉之庸也大呼澤中從者百萬智如梁勇如籍乃使立楚懷而君之梁死籍苦戰以定天下於懷無尺寸假也雖然君之矣而弒之以成漢之名可乎其圖髙祖也識天下之大勢雖羽弗如也世之俚儒堅執以為笑端夫沛公死至今數千年無二沛公也當時可知也曰天將啓之矣其可廢與噫斯語也他人則可亞父則不可沙中一擊子房報韓之義盡矣祖龍死秦鹿失天下之勢非劉則項百韓成足輔乎以燒絶棧道為為韓者迂甚也則韓成而在奈何興漢而復韓故封良志也項滅信誅何辱良弗去將次及焉獨為韓乎哉良平皆䇿士之雄也夫三傑之目首留侯而六出之竒專曲逆何也良洞悉天下之幾平巧濟一時之變夫捐金草具雲夢僞遊良弗屑也非平也疇則能之昭烈伐吳孔明嘆曰孝直在不令主上及此達良平事者可與繹諸葛之言矣淮隂登壇髙密仗䇿武鄉分鼎懸斷未形毫髮不爽胡其異也髙答吕后亮屬後主歡屬文襄懸斷身後毫髮不爽又胡其異也髙舉平勃而吕后再問而髙弗答也亮舉褘琬而李福再問而亮弗答也夫終平勃而漢無事矣奚以答也終褘琬而蜀幾亡矣奚以答也智哉髙乎悲哉亮乎武鄉亟稱伯約論者以為失焉觀亮遺言第舉褘琬而不及維料之審矣然維於亮要不負所知也以禪之庸皓之佞非維蜀久亡矣艾云乎哉陳豨非黥布輩也征豨平陽絳灌之事而髙卒自將淮隂之死可知也彼其以吕自解哉淮隂墮其術可也而後世亦墮其術何哉章邯白起之亞也䘐於羽而名勿稱龍且黥布之徒也滅於信而勳勿立楚之可當一面者且耳破九江救田橫他弗任也且死濰水羽始大懼遣人說信及越反梁無可使者自往擊之卒失成臯楚以亡故吾嘗謂增去而楚無大臣且沒而楚無善將難為碌碌道也甚矣漢髙之智也斬丁公使天下戒其為臣是天下咸為所欺也斬丁公使後世豫其為君是後世咸為所欺也夫荀吳之殺鼓人也吾豫其義夫句踐之殺吳宰也吾與其公何也鼓人以城叛而吳未嘗受也嚭之存越也以貨其亡吳也以讒故嚭於越無親而於吳劇蠧也戮之宜也若丁公於漢髙也為利乎於項氏也為讒乎季之脫於厄也為德乎為仇乎律之荀吳句踐無一合者也夫髙之虐於刑也其浮於政矣夫仲尼曰以直報怨雍齒之侯直乎以德報德丁公之殺德乎夫假齒以示恩也假丁公以示法也假之而足以成其私則匿怨可也忍心可也夫髙之末年叛者蓋九起焉而卒斃於黥布之矢也視光武太宗何如哉則挾詐者信有時而窮也夫項伯以私漢封誅不忠乎夫鄭君以名籍逐誅不忠乎夫項失天下其故多矣謂由丁公俾籍也都三秦任亞父雖無事漢可也夫季布忠楚者而髠夫鍾離忠楚者而戮夫丁公胡足惜也惜後世欺於漢也百戰百勝而得天下者唐太宗也而項籍以勝而失之百戰百敗而得天下者漢髙祖也而昭烈以敗而失之固人也亦天也昭烈間關於袁紹吕布劉表曹操之間困矣而氣不衰也敗矣而望不挫也魏武以天下英雄推之魯肅以天下梟雄名之周瑜陸遜程昱郭嘉咸惴惴焉胡先聲之振如此也迹昭烈平生言論風㫖蓋猶有帝王之度焉逺非孫曹等也雖其才弗逮亦炎德之將終與魏武因弱為强不階尺土幾一海㝢其人不足論才足稱也孫權自守虜耳藉父兄之業亡能尺寸廣也使昭烈處權所就當止此乎蘇氏以劉不如孫非也甚矣眉山父子之勇於論也責昭烈不能死敵又謂棄荆州入巴蜀吾知其無能為也炎運灰人望絶曹氏之業已成非暴秦新莽比也而責以髙光之事可乎劉虞不受帝號乃心王室其伐公孫也但令取瓉幾於行一不義殺一不辜不為濟乎否也夫先主武侯人傑也而匹夫諒哉漢之末造操所憚者劉也不在權也權所憚者羽也不在操也故昭烈不能有荆於先而忠義不能保荆於後也赤壁一戰之後吳君臣不憂曹而憂劉矣襄陽既克之後吳君臣不惴操而惴羽矣而昭烈忘之關公忽之武侯亦姑置焉天乎一軍宛洛一軍秦川諸葛初議曷嘗棄荆州哉然而其地彈丸也其形四戰也進攻可也胡以守也必兼益部之饒挾漢川之險庶進而攻可以復中原退而守可以堅鼎足此豪傑萬全之識而後世顧紛紛焉司馬所以賤腐儒也荆天下重地豪傑所急也然未有以荆取天下者無論劉表蕭銑馬殷輩以楚成之強莊之霸靈之貪𤣥之橫友諒之桀而中原不能尺寸也夫蜀誠一隅然秦得之輕諸侯矣漢得之一四海矣孔明自昭烈崩出祁山六焉曷謂欲長守蜀也司馬徽所斥腐儒其吕溫蘇洵等哉而惜乎未有執余說以破之者自餘瑣瑣若薛能鄭如幾俞文龍輩吾何譏焉亂漢之賊吾不曰董卓李傕而曰賈詡亡漢之賊吾不曰曹操孫權而曰吕䝉當卓就誅也漢幾定矣詡䇿傕襲害王允而漢紐瓦解及操議遷也漢幾復矣䝉䇿權襲取荆州而漢社瓜分復漢關一人弗任也取襄樊扼操胸矣吳蜀兩臂夾而攻焉即操能守關中原非魏有也復宋嶽一人足任也搗汴洛褫金魄矣韓吳諸帥角而逐焉即金能絶塞中國非金有也而䝉也以詭襲之檜也以和尼之天乎酷哉亮之才勝羽十倍矣而由蜀攻魏則勢不便相萬也故六出而身殉之浚之才下飛數等矣而以宋圖金則力不敵相百也故三敗而國隨之荆州既破而吕䝉死天欲亡漢故生蒙而又為漢滅䝉也關公精忠大節而世有責之備者吕蒙鼠迹狐蹤而世有贊其能者吾所為廢書太息也姜維之討賊偉哉中原難復也夫人辨之矣維竭一身以殉之雖䘐猶勝也李訓之誅閹强哉中貴難鋤也夫人辨之矣訓出萬死以圖之雖私猶公也郁離子云六朝五季之君而遇漢祖不能與布越伍而況乎能南面也青田本色語哉然其中亦有等焉劉裕材力錚錚孟德仲達之亞處宋藝祖地弗為優乎齊梁陳氏下矣乃隋文之經國撫世未易忽也五代諸主鼠竊之餘氣象施為又齊梁陳氏下矣惟柴氏意度頗自可觀魏太武之力足以一天下而南之世非陳後主也爾朱榮之才足以一天下而北之世非隋文也以隋文而遇陳後主雖欲天下亡混一弗可得也秦堅之取晉以迫失之隋文之取陳以緩得之秦以六十萬而奔可謂拙於用多隋以兩八千而勝可謂巧於用寡其故何也隋有將秦無將晉有備陳無備秦苻堅之量也魏孝文之文也謂夷狄無君吾弗信也慕容恪之貞也斛律光之毅也謂夷狄無臣吾弗信也夫世之稱四子也以才吾之薦四子也以德江左諸人風流藉藉視北霄壤也乃廟堂之上有王景略乎帷幄之中有崔伯深乎景略升孔明之堂伯深入子房之室者也夫豈直六朝唐以後絶未覩也魏之有崔浩也豈直留侯哉其淹貫典墳研精翰墨曉暢星厯博習方書藝能之美幾諸葛矣然而超然之智弗若良廓然之量弗如葛也夫是以及也浩之備載國書也紀實也排擠佛教也崇儒也自六代至唐史有弗虛飾乎儒有弗異端乎齊史書崔孟軻闢墨百代瞻仰浩以直筆覆宗世但知其才藝緇流至謂釋氏之報燾亦旋死盜手刃出腹中快哉有天道焉邢巒魏之儒者而功名烜赫世但知其將也楊愔齊之文士而幹用優長世但知其相也巒不以將顯樊深劉焯等爾愔不以相顯邢劭魏收等爾卒魏良將無過巒者齊賢相無過愔者世以儒者鮮通文士爽實余獨惜二子以將相掩其平生也援於績弗得遺也雲臺外之以嫌乎武於班弗得録也麒麟殿之以節乎彼自以大公乎而咸未盡也次援於鄧吳次武於霍丙豈不亦廓然哉夫瀛洲而敬宗與也吾弗能愛其才也補孝孫十九矣黜許而仍十八後世必有韙余言者以秦之慝也然而不殺周赧也以政之殘也然而不戮六王也裕也於故君則再弒焉於降王則駢戮焉裕之慝也過於嬴而殘也烈於政矣古今殺降之甚者莫甚於唐髙而項羽白起勿與焉薛仁杲降則殺之王仁本降則殺之蕭銑降則又殺之其他蓋不勝數也項羽未嘗殺沛公白起未嘗再戮降卒也或謂出太宗意夫頡利擒而太宗弗殺也然胡以弗能救與劉文靜死且弗能而況數子也唐髙祖之謀之於李密勇之於竇建德詐之於王世充皆弗如也而以子勝之劉武周薛仁杲羣盜輩耳非建德輩也李密有英雄之度而一敗弗能振建德故匪太宗敵然當救鄭有必勝之勢何至如拾芥也帝王天命此可以觀焉文皇之於髙麗也未嘗不旦夕留意焉遼左之歸練兵勵士史不絶書遲以期嵗平壤必舉蓋蘇文必磔非若漢髙之困於冒頓置之度外弗校也而儒生類以為䘐何也夫自司馬氏通鑑出而人之讀史者希矣三代而下當大任而弗動者疇其人哉漢博陸也唐梁公也宋忠獻也若至公亡比盛德自然近於已正物正者吾必以汾陽亞武鄉焉司馬粹乎其衷也希文廓乎其度也用皆未究惜哉論相於唐虞之後伊尹周公諸葛至矣漢蕭曹丙魏唐房杜姚宋宋李王文富韓范司馬其庶也漢之相以質勝唐之相以才勝宋之相以體勝西漢將才東漢將德髙以才勝故將亡非才者光以德勝故將亡非德者聲氣之感捷桴鼓哉夫西漢諸將多羣盜髙之起亦三尺也東漢諸將多儒生光之起亦一經也德也才也咸有自也唐之將以才勝近西漢而弗如其雄也宋之將以德勝近東漢而弗如其雅也太宗之才過其德藝祖之德過其才甚矣下之從上也義兵不尚詐謀成安君死泜上矣諸葛氏之八陳一何堂堂正正也唐郭汾陽之御衆大而公宋嶽鄂國之行師義而肅論兵於三代之下三君子其上乘乎論將於三代之下三君子其至德乎唐之林甫宋之檜宇宙大姦之首乎姦之誤國也有柄而弗才者有才而弗柄者有柄且才而弗久者林甫檜兼之故其為禍烈也林甫擅於朝而祿山懾弗敢動張韓諸帥之兵一旦解於檜而曽弗知也其才百盧把什蔡京胡敢望也漢之有卓也梁之有景也唐之有溫也略同也亂同也惡同也報同也古今大憝之魁乎操懿裕堅國之害重而民之害輕安史巢勛民之害大而國之害小莽也兼之而始猶飾也惡之窮天地亘古今者誰乎而武曌是已吾求其庶幾萬一者於數千年史册之間而弗復覩也意者亘數千劫之前有之乎吾知其惟曌獨也合蚩尤商辛王莽董卓曹操朱溫蕭鸞趙髙林甫秦檜而為一足以當曌乎惡未也曌武所製字後人遵之非也魯之兩姜氏也人知之矣知唐之有武氏而弗知唐有兩武氏也知魏之有馮氏而弗知魏有兩馮氏也兩武氏俱殺子矣兩馮氏幾再弒君矣武則折而馮則誅故弗彰也甚矣女禍之易於襲也而繼之者皆非終焉天之道一已甚矣可再乎魯之兩姜氏也魏之兩馮氏也唐之兩武氏也姜之弒馮之淫武之殺子若一轍焉夫有所受之也然姜戮於齊馮誅於魏武折於唐鈞弗若前之成也夫馮之後有靈也武之後有韋也成矣而弗能享也信天道之勿可再也夫亡秦者胡秦以胸奴而不知為亥也亡唐者武唐以君羡而弗知為曌也則詎非天哉夫亥之事微而胸奴顯也固非始皇所能逆也夫君羡何能為而曌之為武為女昭昭也且淳風言在宫矣以太宗之英武明燭萬里而目睫弗能察也則詎非天哉漢之后賢者與不賢者半乎吕之惡也馬鄧足以當之唐之后若武若韋亡弗惡矣而長孫后弗臨朝也故其賢弗著也宋之后若髙若曹亡弗懿矣而楊后弗臨朝也故其慝弗著也宋之創業中興其君皆弗漢唐若也而母后之賢獨盛焉宣仁之懿其猶在和熹上乎杜之金匱幾一言喪邦矣宋人止稱髙曹向孟有以也戰國之士之立言者一何衆也而亡弗傳者彼曷嘗有意於言哉無論孟荀即莊列管商申韓韋翟彼所欲傳者其術也寄之乎言焉耳矣然而其術弗傳者術偏也其言傳者言古也春秋戰國齊魯晉鄭楚宋之間蔚乎其文也秦靡一焉卒以代周文勝極而質反也夫一李斯也文於逐客而弗文於嶧山噫可推矣叔度閔冉之流也而世少其立言焉仲淹游夏之匹也而世多其立言焉少者恨之多者惜之也夫漢末節義之區也即靡立言推者推矣挽者挽矣叔度雍容令譽其享則宜唐初功利之藪也房杜諸人其無能詡揚師德審也無中說有仲淹哉信言弗可已也操之略過孫吳矣而亮以倣佛孫吳白之才過庾鮑矣而甫以擬倫庾鮑古人虛心曩哲故其就益髙也後人蔑視前修故其造益下也文人無行信乎太史雪李陵少陵拯房琯戛戛乎難哉陳思之憂國韓愈之格君無論白從永王疏矣然而非逆也桞黨叔文躁矣然而非姦也少室山房筆叢卷六
