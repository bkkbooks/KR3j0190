body:
  text: 少室山房筆叢卷十九明胡應麟撰二酉綴遺上世率以二酉為藏書之府而不詳所出按洞天福地志第二十六大酉山洞周廻一百里名大酉華妙之天而不言藏書盛𢎞之荆州記小酉山上石穴中有書千卷秦人嘗於此學因留之湘東王賦訪酉陽之逸典是也據此則大小酉皆當在楚中一統志楚辰州有大酉山小酉山其說正據二書第洞天福地志既不言小酉荆州記又無大酉之文且秦方燒經籍坑儒生桃源避世至晉才通安得藏書小酉之穴耶葢楚中或别有兹山而好事者以藏書事傅之且地與武陵接壤故又傅之秦人而大酉華妙之文則又道家者流創撰其名而傅於小酉云耳太平御覧止録小酉而大酉不及其偽瞭然矣二酉語唐以前亦罕用僅皮日休以二酉對五丁郝天挺注引圖經云周穆王藏異書於小酉山大酉山圖經宋初李昉等篹輯其時古書多存必别有據然亦寄託之談若閬風𤣥圃之屬豈荆楚耳目間哉段成式酉陽雜爼所列目天咫玉格壺史貝編等宋人以下亡弗駭其異而未有得其説者盖必以出處求之而不知段氏本書謂之酉陽雜爼夫諸目之義吾未能詳至雜爼必係酉陽則五車之中斷可自信矣又如目中忠志禮異等詞皆文人口語曷嘗拘拘出處耶今考天咫所談七曜事則天闕之義也玉格所談二典事則玉檢之文也壺史悉紀道術非壺中之史耶貝編咸録釋文非貝葉之編耶即全語未見所出意義咸自可尋後人徒以虗名為其愚弄故拈及之成式子安節著樂府雜録今傳安節娶温庭筠女庭筠著甘􅍧子序謂語怪說賓猶甘􅍧說口與雜爼義正仝然前人無此說也非庭筠自序至今不知何謂亦以為天咫貝編矣雜爼篇末肉攫部皆鳥獸事本伊尹言水居者腥肉攫者臊草居者膻也見雜爼第七卷諾臯記有三說西溪叢語據巫臯事以駁晁氏非也抱朴子諾臯盖六甲神名之類必三說備乃盡之詳見陶氏說郛吳曾能改齋漫録云按姚寛西溪叢語云段成式酉陽雜爼有諾臯記又有支諾臯意義難解春秋左氏傳襄公八年秋齊侯伐我北鄙中行獻子時伐齊夢與厲公戰弗勝公以戈擊之首墜於前跪而戴之奉之以走見梗陽人巫臯他日見於道與之言同巫曰今若有事於東方則可以逞獻子許諾疑此事也晁伯道談助云靈竒祕要辟兵法正月上寅日禹步取寄生木三寸呪曰諾臯敢吿日月震雷令人無敢見我我為大帝使者急急如律令仍斷取五寸隂乾百日為簪置髻中可以隠形晁說非也以上皆叢語余以叢語未盡得之盖段氏所載皆鬼神事雖獻子所夢有巫名臯而獻子諾之亦自可證然葛洪抱朴子内篇載遁甲中經曰往山林中當以左手取青龍上草折半置天蓬星下歴明堂入太隂中禹步而行三呪曰諾臯太隂將星見甲者以為束薪不見甲者以為非人持草自蔽而行到六癸下閉氣而住人鬼不能見也以是知諾臯乃太隂之名太隂者乃隱形之神晁説非無所本合三書而觀之可也右具載説郛字句多脱落者因考姚氏叢語及他書節而録之三書惟叢語今有刻本而不見端臨通考通考有姚氏殘語六卷然亦此書也今殘語不復傳僅見類書所引一二云按前吳曾漫録解諾臯之義最為明了惟支諾臯不知何義考酉陽雜爼諸目止有諾臯記上下二卷所載事極詭誕殊無所謂支諾臯者續考陶九成説郛所採酉陽續爼乃有支諾臯之目又有支動支植二目因悟支者干支之支盖雜爼諾臯記之外更出此條猶今類書者多甲乙丙丁乾兌離㢲等分配此則借干支之支以别於前目之諾臯耳支動支植者雜爼有廣動植四卷此則為支動及支植觸類伸之支諾臯之義益明矣洪景盧夷堅志有甲之癸一百卷又有支甲至支癸一百卷三甲至三癸一百卷四甲至四癸二十卷所謂支甲支癸者即支諾臯之支洪段好竒相類故門目亦倣之近王長公作長短句以舊無此調因自謂小諾臯云洪景盧容齋四筆云黄魯直和王定國詩聞子由病臥績溪云湔祓瘴霧姿朝趨去天咫蜀士任淵注引天威不違顔咫尺予按國語楚靈築三城使子晳問范無宇無宇不可王曰是知天咫安知民則韋昭曰咫者少也言少知天道耳酉陽雜爼有天咫篇黄詩盖用此徐師川喜王秀才見過小酌玩月四言曰君家近市所見天咫庭户之間容光能幾菰蒲之中江湖之涘一碧萬頃長空千里正祖述黄所用云據洪說似得天咫字面段或本此未可知因竝録之又二筆十六卷云酉陽雜爼天咫篇載月星神異數事其命名之義取楚靈王曰是知天咫安知民則之説也按前二説則景盧已確據為國語所出第終覺牽強於他目不盡同云鄭漁仲通志畧寶貨類有玉格一卷似錢譜香譜之屬而下題段成式撰遍考諸家書目無所謂玉格者意非出段氏而别有撰人第注成式姓名甚確則謂雜爼目中所列審矣考雜爼玉格一門皆談二藏事絶非品玉之書盖亦因段氏門目而誤也山海經專以前人陳迹附會怪神而讀者往往不能察今略記數則以例其餘西南海之外黑水之南流沙之西有人珥兩青蛇乘兩龍名曰夏后開開上三嬪於天得九辯九歌以下此本離騷天問二章之説而譌者離騷曰啟九辯與九歌兮夏康縱以自娛九辯九歌皆禹樂也天問云啟棘嬪商九辯九歌註棘當作夢商當作天以古文相似而訛是也據天問之意但謂啟夢嬪於天得二樂而山海經乃以為上三嬪於天又以酉南海之外有人曰夏后開珥蛇乘龍詭誕如此豈足辯哉經雖怪誕而足證商為天字之誤始讀楚辭嘗疑紫陽不引及閲後語乃知夢天二字正得之此也大荒東經困民國有人曰王亥兩手操鳥方食其頭王亥託於有易河伯僕牛有易殺王亥取僕牛河念有易有易濳出為國于獸方食之名曰揺民按竹書紀年殷王子亥嬪於有易而淫有易之君綿臣殺而放之是故殷上甲徵師於河伯伐有易遂殺其君綿臣據此盖商上世之王子有嬪於他國者為其君所殺商侯因徵師河伯滅之其文甚明而山海經之言遽詭誕如此可發一大噱也凡山海經稱述古人事第以二者律之思過半矣中山經云洞庭之山帝之二女居之是在九江之間出必以飄風暴雨按二女之辨歴世紛紛景純獨謂天帝之女似為有見第云湘川不及四瀆堯女既為舜妻安得下降小水而為夫人此又首尾衡决之論夫堯女舜妻不當下降小水廼天帝之女不尤貴乎余意山海經第因舜葬九疑離騷九歌有湘君夫人遂曼衍為説而出入必以風兩則後人因始皇事附益之所言帝之二女實本堯女而又不指堯女也十二卷云舜妻癸比氏生霄明燭光處河大澤二女之靈能照此方百里則不惟舜妻曰二女而舜女亦自有二女也堯二女江神舜二女為河神亦豈死於水耶伏羲女為洛神何帝王之女皆為水神耶大荒南經云東南海之外有國曰羲和有女方浴日於甘淵羲和者帝俊之妻生十日大荒西經云有女子方浴月帝俊妻常羲生月十有二按此則羲和常羲皆女子又皆舜妻一生日十一生月十二絶可為捧腹之資漫爾筆之羲和者盖因堯典命官之誤而常羲則常儀占月之譌後世嫦娥之說所由本也山海經顓頊髙辛之類皆絶域殊稱與史傳全别惟黄帝堯舜等稍無異詞至稱葬於某山某地則什九詼妄也他如舜生三身顓頊生三面近於戲矣共工驩兜窮奇饕餮古之四凶實人類也經率以為怪鳥異獸按三皇伏羲神農女媧史傳類以獸面鳥身四兇之象或有所傳要以影響恍惚而已非真鳥獸也且其人已誅而以今在某國惷然一物當之非景純所謂寄託之㫖耶餘外夷奇産六合之大詎曰盡誣而浮夸泰甚世并疑之悲夫海内西經曰貳負之臣曰危危與貳負殺窫窳帝乃梏之疏屬之山桎右足反縛兩手與髮繫之山上木漢宣帝使人上郡發磐石石室中得一人徒裸被髮反縛械一足以問羣臣莫能知劉子政按此言對之然大荒北經又云北海之内有反縛盜械帶戈常倍之佐名曰相顧之尸據前貳負之臣本文但言帝梏之疏屬之山不言殺也但言繫之於樹不言石室也則子政之對當曰相顧之尸不當曰貳負之臣也然而上郡所得豈即斯人哉姑識此與中壘景純作小劇耳琴曲曰聶政刺韓王者聶政之所作也政父為韓王冶劒不成王殺之時政未生及壯問母父何在母吿之政欲殺王乃學塗入王宫㧞劒刺王不得踰城出去入太山遇仙人學鼓琴漆身為癘吞炭變其音七年而琴成欲入韓國道逢其妻妻對之泣政曰夫人何故泣妻曰聶政出遊七年不歸吾嘗夢見君對妾笑齒似政故悲而泣政曰天下人齒盡政若耳曷為泣乎即復入山中仰天嘆曰嗟乎變容易身欲報仇而為妻所知父讎當何時復援石擊落其齒留山中三年後入韓國人莫知政政鼔琴闕下觀者成行王乃召政政内刀琴中而見王王使之琴政援琴而歌於是左手持衣右手出刀以刺王殺之自知當及毋即自犁剥面皮斷其形體人莫能識乃梟磔政市懸金其側有知此人者賜金千斤一婦人往哭曰嗟乎為父報仇耶顧謂市人曰此聶政也為父報仇知當及母乃自犁面何愛一女子身而不揚吾子名哉乃抱政尸而哭絶行脈而死右見太平御覧琴類似合聶政豫讓高漸離事為一者附會審矣而其説亦僻可喜録之太平御覧引用書一千六百九十餘種非必宋初盡存大率晉宋以前得之修文御覧齊梁以後得之文思博要而唐人事蹟則得之本書者也廣記引用書几三百四十餘種前此靡所因襲當是采集衆小説為之盖小説本易傳中唐後稍稍知印刻而引用之書又僅得御覧五中之一足證本書具存然宋元間小說陶氏説郛尚數百種今全書存者第桯史筆談百餘家而已餘大半湮没矣御覧向行鈔本十年來始有刻而譌謬特甚非老宿師儒即一篇半簡莫能句讀至姓名顛舛世代魯魚初學士讀之或取入詩文用誤人不尠廣記稍前刻於錫山談中丞談於此書頗肆力讐挍又藏書家有宋本故雖間有舛訛視御覧則天淵苐中闕嗤鄙類二卷無賴類二卷輕薄類一卷而酷暴闕胡淛等五事婦女闕李誕等七事談謂遍閲諸藏書家悉然疑宋世已亾余讀新唐書尚有數事得之廣記者如宋之懸輩皆舊唐書所無盖或闕於元世或近代失之耳輕薄類劉祥許敬宗等皆見六朝諸史及唐書雜説談已考補餘目中有名姓者尚多互見諸書惟出小說中而其書今亾者難悉究矣宋之問父令文富文辭且工書有力絶人世稱三絶都下有牛善觸人莫敢嬰令文直徃㧞取角折其頸殺之既之問以文章起其弟之悌以蹻勇聞之愻精草隸世謂皆得父一絶之悌長八尺開元中歴劒南節度使太原尹嘗坐事流朱鳶㑹蠻陷驩州授總管擊之募壯士八人被重甲大呼薄賊曰獠動即死賊七百人皆伏不能興遂平賊之愻為連州參軍刺史聞其善歌使教婢日執笏立簾外唱吟自如按太平廣記無賴類有宋之愻而此事舊唐書不載惟新唐書有之盖宋人采廣記入傳者故灼然知為此事也古今文人以力聞者令文一人而已因并著之藝苑巵言云楚國王仲先聞潘章之美因願為友遂同衾枕篤於伉儷未幾偕没其家憫之合葬於羅浮山忽生一樹柯條枝葉無不相抱時人號曰共枕樹此事亦載太平廣記冢墓類人或未詳所出今附載於此知宇宙之大亾所不有也又吳陸東美夫婦合葬冢上生梓樹二身同根相抱為一有雙鴻常宿其上此事絶類韓馮第知者亦罕云陸夫婦跬步不相離人謂之比肩人孫權因封其墓曰比肩墓廣記又載令文嘗以五指撮碓觜壁上書得四十字詩為太學生以一手挾講堂柱起以同房生衣於柱下壓之許重設酒乃為之出又唐彭先覺叔祖博通膂力絶倫嘗於長安與壯士魏𢎞哲宋令文馮師本角力博通堅卧命三人奪其枕三人力極牀腳盡折而枕不動觀者踰主人垣牆屋宇盡壞名動京師又汪節者其母避瘧於村西福田寺金剛下因假寐感而生節節有神力入長安行到東渭橋橋邉有石獅子其重千斤節指而告人曰吾能提此而擲之衆無信者節遂提獅子投之丈餘衆人大駭後數十人不能動之遂以賂請節節又提而致之故地尋薦入禁軍補神策將軍常對御俯身負一石碾置二丈方木於碾上木上又置一牀牀上坐龜兹樂人一部奏曲終而下無壓重之色徳宗甚寵惜累有賞賜雖㧞山拽牛之力不能過也右三人皆唐世以勇聞者節之神力尤為驚絶而世罕知其名姓因讀巵言載前代力人事附識此然三人者或當太宗或當徳宗之世俱不聞武功顯信將有别材也文士之力者宋令文外元貫雲石亦驍悍然將家子也巵言所載元人鄧弼舞劒墮壯士馬首事見宋景濂傳中以稍僻世罕知因録此鄧弼身長七尺目有紫稜開合閃閃如電能以力雄人鄰牛方鬬不可擘拳其脊折仆地市門石皷十人舁弗能舉兩手持之行泰定末徳王執法西御史臺造書數千言袖謁之閽卒不為通弼曰若不知關中有鄧伯翊耶連擊踣數人聲聞於王王命入歴問其能顧左右曰姑試之問所須曰鐵鎧良馬各一雌雄劔二王即命給與隂戒善槊者五十人馳馬出東門外然後遣弼往王自臨觀空一府隨之暨弼至衆槊竝進弼虎吼而奔人馬辟易五十步面目無色已而烟塵漲天但見雙劔飛舞雲霧中連斬馬首墮地血涔涔滴王撫髀驩曰壯士壯士命勺酒勞弼弼立飲不拜由是名振一時按弼不特有力盖精劒術者觀雜爼所載黄冠叟及旅店老人等事可見又唐裴旻一日射虎三十六為吳道子舞劒擲劔空中數千丈以室承之萬衆辟易然旻為將又開寶亂離亦不聞戰功也此時高暉李日月達溪少俊並稱萬人敵亾一振者惟僕固懷恩差不負耳兄弟形貌同者史傳甚衆而夫婦相類者絶希廣記載一事竒甚今録此貞元末張頗自渭北入城止旅店見有一媪年可六十衣黄袖大裘烏幘跨門坐焉顧左衛李胄曹廣問其何官廣具荅之媪曰此四衛耳大好官廣曰何以言之媪曰吾年二十六嫁張詧為妻詧為人多力善騎射郭汾陽之總朔方詧為汾陽所任請給衣賜常在汾陽左右詧之貌酷相類吾詧卒汾陽傷之吾因偽丈夫衣冠投名為詧弟請事汾陽汾陽大喜令吾代詧職遂寡居二十五年自汾陽之薨吾已年七十二軍中累奏兼御史大夫忽思㷀獨遂嫁此店潘老為婦邇來復誕二子曰滔曰渠滔五十有四渠年五十有二是二兒也按此則此媪四十餘代夫任職至御史大夫七十餘復適人生二子皆五十餘其年殆百數十歲尚有六十之容皆古今未聞之異也楊用修歴記女子偽作男官者此最職任高顯乃不之及昔楚王念孫叔敖優孟抵掌學之王至欲以為相盖戲語耳今顧實有其人又夫婦酷類尤為怪也婦人掌兵者六朝洗氏唐李氏羣盜者東漢吕母稱将軍徵側徵貳反交趾宋李全妻楊妙真五代賊帥白項鴉偽男子有軍功者晉木蘭唐張詧妻醜而力而徳者梁鴻婦孟氏美而力而節者苻登后毛氏右諸人漫憶其赫奕餘未易更僕陳然總之未必皆勇力即勇力未必絶人也惟劇談録一婦人異甚而太平廣記勇力類不収因録之即此知唐人小説中竒事廣記固有不盡収者非以刋落大槩遺亾耳神策将張季𢎞以勇氣聞於時一日賫文牒往州郡暮投旅店覩其母子相對悲愁問之曰家有婦至惡恃其勇凌侮吾母子無不至季𢎞笑謂他非吾所辦此易耳即相為除之母子劇喜俄婦人自外至狀無異常人季𢎞取騾鞭置坐下呼語曰吾聞汝倚有勇力不伏姑壻使喚果有此否婦再拜曰新婦敢爾自是大家憎嫌過甚引季𢎞手至大石上歴數平日事輒曰如此事豈是新婦不是每陳一事以指於石上掐一畫每掐輒入寸餘季𢎞汗落神駭但稱道理不錯其夜不能寐翌日亟行枝山前所謂惡新婦即此其載王昌女盪舟事差足亞之孟賁見公孫丑所引世但名其勇而事不能詳按後漢書鄭太傅註引許慎云孟賁衛人說苑云孟賁水行不避蛟龍陸行不避虎狼發怒吐氣聲響動天吕氏春秋曰孟賁過河先於其伍船人怒以楫虓其頭中河孟賁瞋目視船人髮植目裂船中人盡播入河又慶忌吳王僚子也射之矢滿把不能中駟馬追之不能及右二事魏将楊大眼幾奄有之後魏楊大眼少有膽氣跳走如飛高祖南伐李沖典選征官大眼求焉沖不許大眼曰尚書不見知為尚書出一技以繩長三丈繫髻飛行繩直如矢見者莫不歎絶沖曰千載已來未有逸材若此者王肅初歸國謂大眼曰若旗皷相望瞋眸奮飛足使君亡䰟喪瞻何必車輪世以關張不過也五丁或謂五人或以一人名五丁紀載不一考之當是一人廣記稱五丁每遇蜀君卒輒獨立巨石十數丈墓前蜀王遣取金牛牛奔入岩穴五丁執其尾拽之山遂崩壓五丁死非五人明矣廣記又一說稱五人同以拽牛壓死互異天寳初安思順進五色玉帶又於左藏庫中得五色玉杯上怪近日西賨無五色玉令責安西諸蕃蕃言比當進皆為小勃律所刼不達上怒欲征之羣臣多諫獨李右座贊成上意具言武臣王天運謀勇可将乃命王天運将四萬人兼綂諸蕃兵伐之及逼勃律城下勃律君長恐懼請罪悉出寶玉願歲貢獻天運不許即屠城虜三千人及其珠璣而還勃律中有術者言将軍無義不祥天将大風雪矣行數百里忽颶風四起雪花如翼風激小海水成氷柱起而復摧經半日小海漲湧四萬人一時凍死唯蕃漢各一人得還具奏𤣥宗大驚異即令中使隨二人騐之至小海側氷猶崢嶸如山隔氷見兵士屍立者坐者瑩徹可數中使将返氷忽消釋衆屍亦不復見右事載酉陽雜爼盖附會之極可笑者考𤣥宗紀林甫傳天寳年間竝無王天運伐勃律事惟高仙芝傳云小勃律王為吐蕃所招及其旁二十餘國皆附吐蕃貢獻不通節度使田仁琬盖嘉運夫蒙靈詧累討不捷𤣥宗特勅仙芝将馬步萬人討之仙芝與中使邊令誠自西安行百餘日至連雲堡適婆勒川水漲仙芝以牲祭遂渡擊大破之𤣥宗使術士韓履氷徃視因懼不欲前仙芝畱同令誠城守自引餘兵進遣将軍席元慶将千騎前行謂曰小勃律聞大軍至其君臣百姓必走山谷第呼取出繒帛稱勅賜之大臣至盡縳之以待我元慶如其言仙芝至斬其附吐蕃者數人急遣元慶往斫婆夷藤橋甫畢而吐蕃救至婆夷即弱水不能勝草芥藤橋濶盡一矢力脩之朞年乃成仙芝虜小勃律王及吐蕃公主而還按此則征勃律乃仙芝是役固全軍返竝無屠城及氷雪等事盖以傳有術士韓履氷及婆勒川婆夷河遂詭以為虜中術士言天大風雪四萬人俱死於氷其荒忽誕妄絶與山海經所載夏啟王亥相類大可笑也夫窮山僻裔委巷之談無從考訂筆之可耳征伐朝廷大政乃爾傳訛世以成式博通而本朝故典迷昧若此他可信哉丹鉛録載文安縣水忽僵立遂凍為氷柱高五丈四圍如之中空而旁穴後數日流賊過鄉民入穴中避之頗賴以全此事考誤己辯之并附録為笑資云酉陽雜爼二十卷續十卷今世行本余常得二刻皆二十卷無所謂續者近於廣記中録出然不能十卷而前集漏軼殊多因併録續集中以完十卷之舊俟好事博雅者核之少室山房筆叢卷十九
