body:
  text: 少室山房筆叢卷十明胡應麟撰史書佔畢六雜篇下漢唐而下史籍所書有一事譌而二之者有二事混而一之者有一事傳而餘悉冺者有一事實而餘皆虛者有二事類而無一實者即更僕未易悉數漫舉數則以例其餘魏時殿前鐘忽大鳴震駭省署華曰此蜀銅山崩故鐘鳴應之也蜀尋上事果云銅山崩時日皆如華言又中朝時有人畜銅澡盤晨夕恒鳴如人扣以白張華華曰此盤與洛鐘宫商相諧宮中朝暮撞故聲相應可鑢令輕則韻乖鳴自止也依言即不復鳴按此必一事記者譌而二之吳東陽樵夫入山遇大龜作人言因縛之獻孫權龜路與老桑共語旣至權命烹之焚柴萬車如故諸葛恪曰當以老桑煮之如言立爛又張華斑貍事貍亦與華表共語雷煥識之遂得貍本形二事不應絶肖恪或近實華當由博識附會耶漢武遊上林見一好樹問東方朔曰名善哉帝隂使人識其樹後數嵗復問朔朔曰名為瞿所帝曰朔欺久矣名與前不同何也朔曰夫大為馬小為駒長為鷄小為鶵大為牛小為犢人生為兒長為老且昔為善哉今為瞿所長少死生萬物敗成豈有定哉帝乃大笑又武帝幸甘泉長平坂道中有蟲赤如肝頭目口齒悉具先驅馳還以報上使視之皆莫能識時東方朔在屬車中令往視焉朔曰此謂怪哉是必秦獄處也上使按圖果秦獄地上問朔何以知之朔曰夫積憂者得酒而解乃取蟲置酒中立消賜朔帛百疋按朔以蟲為怪哉即名樹為善哉意也滑稽之㫖即事可知即蟲或秦獄寃氣所結而怪哉之名則朔詭撰欺帝無疑使異時再遇此蟲不知易何名號矣又漢武故事東都獻短人名巨靈見朔曰王母種桃三千年一實此兒已三偷之而洞㝠記記一女人愛幸於帝名巨靈常出入唾壺中朔見之巨靈遂飛去二巨靈一男子一婦人迹俱詭異又並與朔狎或謂必有一偽余直以為皆烏有耳朝野僉載云唐初兵部尚書任環敕賜宮女二女皆國色妻妬爛二女頭髪秃盡太宗聞之令尚宮齎金缾酒賜之云飲之立死環三品合置姬媵爾後不妬不須飲之若妬即飲柳氏拜敕訖曰妾與環結髪夫妻俱出微賤更相輔翼遂致榮官今多内嬖誠不如死遂飲盡然非酖也旣睡醒帝謂環曰其性如此朕亦當畏之子其奈何因敕二姬令於别宅中安置又國史異篹云房𤣥齡夫人至妬大宗將賜美人屢辭不受乃令皇后召夫人語以媵妾之流令有常制且司空年近遲暮帝欲有優崇之意夫人執心不迴帝乃令謂曰寧不妬而生寧妬而死曰妾寧妬而死乃遣酌一巵酒與之曰若然可飲此一酖一舉便盡無所留難帝曰我尚畏見何况於𤣥齡右二事絶類不應太宗屢賜大臣侍姬又屢以藥酒恫喝其妻而其妻又俱飲之也𤣥齡妻盧氏當房病困嘗剔目以自誓而晩節至斯可謂生平盡廢若此事則余直以盧有妬聲好事遂因環婦嫁名房妻耳不然太宗之術弗效於柳而復試於盧何不憚煩哉後漢書云孝女叔先雄犍為人父泥和永建初為縣功曹縣長遣泥和拜檄謁巴郡太守乗船墮湍水尸䘮不歸雄感念號泣心不圖存常有自沈計家人毎防閑之經百許日稍懈雄因乗小船於父墜處慟哭自投水死弟賢其夕夢雄告之却後六日當共父同出至期伺之果與父相持浮於江上按此事與曹娥同出後漢范史同傳今曹娥以邯鄲蔡氏賞識盛傳而此事絶無知者故特詳之諒輔字漢儒仕郡為五官掾時夏大旱太守出祈禱山川連日無所降輔乃自暴庭中期日中不雨乞以身塞無狀於是積薪柴聚茭茅以自環搆火其傍將自焚焉未及日中時而天雲晦合須臾澍雨一郡沾潤此亦與戴封同世而人罕知并録之輔時為彖尤難也漢末劉平遇盜扶持其母奔走逃難兄仲遺腹女始一嵗平抱仲女而棄其子母欲還取之平不聽曰力不能兩活遂去不顧此事亦見後漢書列傳在鄧攸先其失則甚之矣天寳中漢州雒縣尉張涉自舉日試萬言詔中書省試涉令善書者二十人各操紙執筆就席環庭而坐但占題目身自巡歴依題口授言訖即過周而復始至午後詩成七千餘字仍請滿萬宰相云七千可謂多矣何必須萬具以狀聞勅賜縑帛拜太常丞直廣文館時號張萬言右見唐語林又唐詩紀事長沙王璘詞學富贍崔詹事亷問表薦於朝先試之使廨璘請十書吏皆給筆札璘口授十吏筆不停綴首題黄河賦三千字復為鳥散餘花落詩二十首授筆而就時忽風雨暴至數幅為回飇所卷泥滓沾漬璘曰勿取但將紙來縱筆一揮斯須復十餘篇矣未亭午巳七千餘言時路嵓當軸遣一介召之璘曰請俟見帝嵓大怒亟奏廢萬言科璘仗䇿歸放曠盃酒間恒自稱日試萬言王某云右唐二事絶類皆試萬言皆至七千而止璘未亭午已就較張尤速迺張竟獲官而璘徒步當事者固有洪隘然亦孰非命也王勮草五王冊文命五吏執筆分寫頃刻俱就與二事亦頗侔今所試不傳固宜第他什亦無存者信疾行無善迹也王長公巵言所載卧冰種玉射石望塵等事并其姓皆符合可謂至竒陳心叔名疑略仝余推此更得數事如漢張良稱三傑唐張說亦稱三傑見𤣥宗詩云赤帝收三傑蜀張飛敵萬人秦張蚝亦敵萬人苻秦鄧羌張蚝咸稱萬人敵見史書揚雄草太𤣥經而楊泉亦草太𤣥經見馬意林楊傑號無為子而楊繪亦號無為子見瀛奎律髓釋梵類瘞子之郭前有巨後有世通見南史孝友傳分身之葛前有𤣥後有從周葛仙公見神仙傳葛從周號分身將見清異録遇仙之王前有質後有積薪皆觀碁也去婦之王前有歡後有季友皆勤學也為婦所棄也歡事見顔平原判語季友事見杜工部歌行所謂河東女也采薪讀書之劉前貞素後仁軌閉户讀書之劉前孔昭後士元孔昭畫字士元焯字逃儒入釋者梁彦和逃釋入儒者唐希仁六用並行者宋穆之五事仝舉者隋光伯皆劉姓也而百藥藥師二李咸竊楊素之姬士衡士龍二陸互見王弼之鬼尤為可笑至武與臏並善兵著書並曰孫子而孫綽書亦曰孫子奭與衍並善辯著書並曰鄒子而鄒陽書亦曰鄒子此例頗衆若睢蠡仲淹三范並變姓名咸著聲績又千古異聞也晉書王歡傳與顔稍異彦和勰字希仁軻字也古今字號之仝尤有竒者並識之號浮休之張前有文成後有芸叟唐張鷟宋張舜民並號浮休子見史稱紫芝之俞前有秀老後有玉吾宋詩人俞秀老元文士俞琰並紫芝中山之劉前禹錫後子儀一唐一宋並名劉中山集東萊之呂前居仁後伯恭一祖一孫並以東萊名集少室山人之李有布衣有拾遺李荃隱居不仕李渤徵為拾遺並有斯號石林居士之葉有尚書有少保一吳縣人位至執政見宋史一松陽人官至尚書見一統志皆名夢得皆徙湖州皆博學著書集花蕚之李前尚正後子大唐李尚正兄弟三人宋李洪五人俱有花蕚集封花蕋之徐前衍母後昶妃俱為蜀人見郎瑛類稿或云後花蕋費姓俟考至李義府呼李猫李德柔亦呼李猫尤可笑也見南唐近事漢兩子夏兩子雲杜欽杜鄴俱字子夏揚雄谷永俱字子雲並能文兩子夏又同姓且同時也宋兩方叔兩功父一方叔李定孫一方叔李豸字一功父郭祥正一功父張南湖並能詩二方叔又同姓且仝時也宋又有兩張子厚其一闗中人號横渠者其一見呂居仁詩話是吳中人亦舉進士嘗為歐陽棐書六一廬山髙詩見石林詩話兩張子野俱名先俱天聖間進士俱能詩俱夀考一博州人號張三影一吳興人見齊東埜語韓文公有二一唐昌黎一南唐熙載熙載去宋近像傳於後世遂以為昌黎此與陳孟公事生前身後可作一確對也兩京房俱術士兩劉歆俱儒生兩龔遂俱郡守兩韓信俱武略俱封王俱亡國兩張禹俱文學俱封侯一安昌一安鄉俱享年造物之巧如此光武紀受尚書于許子威劉歆著五行傳二王喬皆得仙世知之二劉商皆得仙則人罕知也二王匡皆為將世知之二劉茂皆為將則人罕知也二王褒皆能文世知之二劉德皆能文則人罕知也然又有三王喬三劉商三王匡三劉茂五王褒三劉德異哉此例古今頗衆詳余仝姓名考中往讀路史十數人常以為駭近乃知其疎也向歆本父子然劉植傳子名向兄歆字細君則歆伯向姪也兩劉仲一髙祖兄一光武兄皆同胞皆不類王商有七漢四人王吉有五漢三人俱詳仝姓名考婦人事尤有酷類異常者弑君之姜前有文後有哀殺子之武前有曌後有惠淫亂之馮前有文明后後有孝文后皆同代二馮二姜又同族也春秋事人共知二武殺子俱見傳惠妃之惡不減驪姬非玉環可望以早夭人罕知二馮各見魏書然蜀有兩花蘂夫人一王衍母隨衍入唐一孟昶妃隨昶入宋皆徐姓皆能詩皆亡國皆不善終竅合乃若此哉花蘃詳郎瑛類稿一云費氏古今事酷類更有甚者漢兩嚴遵一字君平一字子陵皆髙士又皆易姓始皆莊姓避諱易嚴見傳皆二名君平一名尊子陵一名允亦見傳中兩樊崇俱賊帥一赤眉一尤來兩李育俱賊將一王郎一公孫又皆一歸附一滅亡唐兩李光進一光弼弟一光顔兄皆為將皆假節皆兄弟有戰功又皆名為兄弟所掩宋兩李定一彈子美一彈子瞻所害皆文士皆正人皆蘇姓又皆下獄幾死此數人者其世代同名姓同人品同事實同一至於是何其異哉李定劾蘇舜欽見朱子語録甚詳筆談又有夷將李定亦熙寧時又見劉備李通傳共五李定世知馮婦之男子而不知許負之婦人也見三國志劉焉傳末漢封明雌亭侯世知王聖之婦人而不知孟光之男子也王聖漢安乳母擅權當時宦官有王聖然不甚著孟光梁鴻妻外蜀孟光見三國志有傳三李平一婦人二男子俱貴顯一漢武帝婕妤一劉蜀大臣一元魏名將四巨靈二男子二婦人俱怪神一仙掌巨人一東都短人一漢武宮妃一九元真母見路史宋制科題有堯舜湯禹所舉如何乃漢時宫中謁者趙堯舉春李舜舉夏倪湯舉秋貢禹舉冬各職天子所服也又湯周福阼乃張湯杜周也當時士子以唐虞三代為對遂無一合者見沈氏寓簡又醫家有二扁鵲二雷公詳别則世知仲尼文宣王而蕭子良長孫稚亦皆文宣王也延岑號武安王在忠義前劉嘉封漢中王在昭烈前今但知𤣥德雲長劉仲諡魯哀公朱建稱平原君皆在後尤僻也文宣見路史餘並見兩漢書又李光弼岳飛俱諡武穆岳與諸葛又俱諡忠武先仲尼稱聖於魯者臧紇後仲尼稱聖於魯者展禽又楊震在漢稱夫子而李固弟子亦七十二人蕭潁士在唐稱夫子而權德輿門生亦七十二人展禽至孟始以聖稱西京雜記有杜陵杜夫子三十國春秋有舞陽杜孔子稱名之類一至於此記謂杜奕棋天下第一葢其徒尊之若抱朴子所稱棋聖之類然拾遺素稱詩聖又稱集大成又自稱杜陵曷若奪此稱還吾子美不尤稱情耶又莊忌稱夫子是字顔回為羌帥曽參為市人已見前載稱顔子者黄憲外謝尚徐陵周續之皆六代人也稱曾子者張覇外宗元卿蔡曇知滕曇恭皆一時人也南齊人俱見南史列傳又陸雲亦稱顔子兵家有十哲僧家亦有十哲皆能詩者畵家亦有十哲皆散見諸書人多不備録又唐舉塲有十哲又權德輿門生七十二中十人登輔相為十哲尤可笑也三傑有三漢諸人外唐吳少微富嘉謨谷倚皆文人張說源乾曜宋璟皆宰執三君亦三一即陳蕃等二見名疑三髙有二何㸃及范蠡等三少有四已見名疑四友有四周文王外吳太子孫登四友諸葛恪張休顧譚陳表晉王敦王澄庾􅢺胡母輔之唐李嶠杜審言崔融蘇味道四皓亦有二商山外六朝徐伯珍兄弟四人皓首相對號四皓四公子二一戰國一梁時四豪外有四英諸葛亮等四傑外有四俊員半千等見史及唐詩紀事五老有二唐曹松等五人登第皆年七十餘號五老榜在宋耆英前五侯二俱東漢一王氏一宦官七子不始建安鄭公孫黑强與六大夫盟謂之七子七賢不始竹林後漢書袁祕等七人以身扞刃救郡守皆死褒曰七賢又七賢過闗是李白張九齡王維鄭虔張說李華孟浩然又七貴亦二己見名疑唐虞八元八愷周八士晉八王外漢八俊八顧八及各二詳黨錮傳晉則八達有三並見名疑然晉又有八伯郄鑒為方伯阮放為宏伯卞壼為裁伯蔡謨為朗伯胡母輔之為達伯阮孚為誕伯劉綏為委伯羊曼為黠伯見曼傳顧厨俊及獨八厨不再見著書名姓相類如三孫子三鄒子皆世所共知又名各不同不足相亂然有不可不辯者二孔甲一黄帝史一仲尼孫俱著書俱名盤盂一載漢藝文志一附孔叢子中今藝文志之盤盂不傳而孔叢子之盤盂傳世遂以後之盤盂傳前之孔甲非也二牟融一漢大尉一漢布衣俱著書俱名牟子一載隋藝文志一附𢎞明集中今藝文志之牟子不傳意林所載尚百餘言而𢎞明集之牟子傳世遂以釋之牟子傳儒之牟融亦非也又夏帝名孔甲而唐詩人有牟融尤竒孔叢之盤盂疑崇文目誤而𢎞明牟子余疑為偽言俱有辯醫家二扁鵲一黄帝時人一戰國時人二雷公一黄帝時人一趙宋時人按戰國秦越人明洞醫道世以其與黄帝時扁鵲類因以為號今所傳難經乃秦越人作非扁鵲也宋雷斆撰炮炙三卷人多不知其名但以素問有雷公為黄帝弟子遂以炮炙即黄帝時雷公撰其人與事酷類有如此者今二書盛行黄帝時扁鵲宋之雷公殊没没因詳識此以例其餘按隋志有雷公注神農本草四卷此當是偽託黄帝時者非宋人也漢志經方類有秦始皇帝扁鵲俞附方三十卷此當是黄帝時扁鵲然亦依託未必真也世率以東漢無二名者亦不盡爾苐以不甚顯故人罕知余讀後漢書及通鑑得數十人識於後西門君惠王莽時勸劉秀反者見鑑丘靈舉字季知見王柔傳注餘二名者多字力子都亦莽時羣盜東海人劉文伯即盧芳也劉子輿即王郎也劉俠卿劉盆子嘗為俠卿牧羊鄧仲覽延岑將見鑑建武五年遲昭平平原女子見鑑王莽地節元年儲大伯光武大夫說鮑永者焦仲卿見樂府彭子厚彭寵姪彭蘭卿亦彭寵姪並見後漢寵傳劉盆子蘇不偉見後漢書與蘇章同傳費長房後漢書方術傳薊子訓謝夷吾樊志張計子勲王和平自費長房至此六人並見方術諸傳曹世叔曹大家夫劉長卿妻見列女陳文矩見列女類李氏夫衛仲道蔡琰先適夫見董祀妻傳劉騊駼見文苑劉珍傳卿仲遼見黄香傳叔孫無忌見方術趙彦傳魯女生附華陀傳末冷夀光附華陀傳末劉景宗見華陀别傳附後漢書陀傳注中東郭延年見甘始傳道術士也封君達仝上侯子道見嚴光傳注韓怡休韓伯休先名見侯傳謝季孝見戴良傳虞都尉漁陽大姓見馮魴傳韓仲伯見李熹傳李子春仝上曹破石節弟見傳李曼卿識命者見王郎傳董次仲檀鄉賊帥並下俱見光武紀注士師郎獲索賊帥梁安國統孫附傳梁伯玉冀子附傳梁不疑冀弟鄭居業衆之曽孫附傳謝曼卿見賈逵傳桓元卿見桓榮傳劉能卿見更始傳李子雲見逄萌傳馬伯濟武兄附傳成翊世見杜根傳尹不疑單超傳徐匡鈎吳良傳戴次公黄昌傳伏無忌見後漢書序董奉德任末傳令狐子伯王覇妻傳楊光憲鄭𢎞傳叔先泥和列女叔先雄父韓伯髙見儒林薛漢傳澹臺敬伯仝上孔長彦見孔僖傳又弟季彦任文公見方術傳又父文孫張伯路見左雄傳劉文松仝上甄子然見孔融傳臨孝存仝上郝孟節附方術王真傳蘇伯阿見光武紀紀末史論王君公避世牆東者樂羊子見列女傳羊子名也解奴辜方術有傳並下三人俱附見麯聖卿夀光侯注夀姓也則光侯當為名編肓意嚴彭祖見儒林董鈞傳顔安樂仝上王延夀文考賦靈光者馬日磾與蔡邕同時蔡少公鄧晨傳鄭安世來歙傳劉少公劉永弟見傳首樊巨公見劉縯傳駿馬少伯見盧芳傳夷人也常疑此類為字即此知其為名且謝夷吾等史皆載字甚明東漢諸王侯無表故宗室二名者無考紀傳附見者得數人劉延平見清河王傳又有常保虎威二人劉子張更始父見傳劉萬嵗廣宗殤王有傳劉元夀見明帝十四年劉德然以下並見先主傳劉𢎞世先主父劉子敬劉元起劉安國見濟北王傳婦人二名者曹豐生見曹大家傳劉賢得隂城公主見順帝五年注友通期梁冀妾見傳王伯榮王聖女見楊震傳陳心叔名疑考據殊精洽然亦謂東漢三國無二名者葢因襲前人之說余讀三國諸紀傳二名者頗不乏第多東漢末人至鼎足之後則誠罕覩而傳有周生烈朱建平等固不盡無也又陳夀多以字為名今録其灼然者周生烈朱建平並魏志有傳三國志傳中二名者惟此二人曹安民操姪征張繡亡婁子伯見魏武紀破馬超附裴注中張平世見先主傳吳子蘭仝上王子服同吳子蘭皆與先主謀誅操者劉子平附見先主傳注中崔州平石廣元附見先主傳注中蔣義渠見袁紹傳嚴白虎見孫䇿傳皇甫堅夀嵩子附傳馬元義張角將見嵩傳徐季龍字開明見􅃹輅傳劉奉林仝上單子春鮑子春王𢎞惠陳承祐華長駿管孝國以上俱見􅃹輅傳注楊阿若見閻温傳注祝公道仝上又孫賔碩自名嵩非字也趙君安龐烈婦父龐子夏並附魏龐涓傳注龐烈婦夫也龐娥英婦人即樂府龐烈婦名附注甚悉戲志材魏謀臣見荀彧傳大抵東漢三國帝王將相皆單名二名者百中無一故雖以王延夀之才名馬日磾之職位而思慮往往弗及若精心以求則紀傳之中此尚未能盡也巵言謂漢諸侯王同名甚衆而唐世尤繁聊撮大都於後但什之六七耳不能舉其詳也漢人以宗正失職故唐之宗正豈亦皆失職耶其與士庶同者計當數倍昭代宗室命名悉用竒字㫖哉至如兩李迨同行密邇而俱封延德郡王尤不可曉非史誤則傳刻之訛也羅泌云唐諸王義成日琮而奉天又名之鬱林曰恪而建王又名之此未熟唐史故以一二