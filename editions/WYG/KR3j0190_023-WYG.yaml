body:
  text: 少室山房筆叢卷二十三明胡應麟撰華陽博議下漢尚經術故學問之士在經術唐尚詞章故學問之士在詞章六朝兼斯二者而皆弗如也而名物之學興焉兩宋兼斯三者而皆弗屑也而義理之學出焉世之變也亦足觀矣兩漢以迄六朝所稱博洽之士於術數方技靡不淹通如東方中壘平子景純崔敏崔浩劉焯劉炫之屬凡三辰七曜四氣五行九章六律皆窮極奥眇彼以為學問中一事也唐宋以還詞章學盛此道頓微王子安劉原父諸子稍能旁及餘遂寥寥蓋技術雖非學問所急其業之難精殆有甚者信古人未易及也古人之學有中絶弗傳者譜牒是也其學六朝最盛如王𢎞日對千賔不犯一諱梁武書成千卷僅紀數朝至唐李守林寶皆擅業專門老宿師儒莫敢與抗五代以還不崇門閥譜牒之學遂絶不傳宋惟鄭樵羅泌號能究心然率蒐羅遼邈増益見聞而已非專門擅業者比也鄭以員半千為六朝大謬員唐人其父慕伍員之忠遂易此姓見本傳中凡譜系之學昉於漢衍於晉盛於齊極於梁唐稍左矣其學故不乏也鄭氏通志譜系凡六種一百七十部端臨通考存者不過數家勝國以還殆絶此門閥之變亦古今興廢一大端也漢之為經者仲舒康成為史者馬遷中壘為子者子雲淮南為賦者孟堅平子無非博極之士六朝尚浮誇故博之名在張王劉陸諸子然玩物之意勝矣三唐尚藻繪故博之名在王楊杜韓諸子然修詞之意勝矣漢以前其人其學實唐以後其人其學虛漢以前學者務博之實而忘其名唐以後學者先博之名而後其實此古今大較也至瓌偉絶特不羣之士則代各有之矣退之云爾雅注蟲魚定非磊落人似不屑屑兹途者廼唐之韻學韓獨為冠又屢以竒字取稱何也歐蘇雖不以學顯然歐於詩蘇於書易皆有傳注世共推之亦前代文人所無介甫元晦自是學士不得以所長没之韓韻學見呉棫韻補古今博洽之士有稱府者傅昭劉顯俱稱學府有稱庫者杜預號武庫房暉逺號五經庫谷那律號九經庫有稱厨者王儉稱陸澄書厨陳濟號兩腳書厨有稱簏者李善又傅廸有稱笥者許懋號經史笥任昉號五經笥有稱篋者柳璨號柳篋子有稱神者鄭康成號經神有稱師者曹曽弟子稱曽曰曹師為立祠有稱聖者劉臻精漢書稱漢聖有稱癖者杜預有稱淫者皇甫謐劉峻俱號書淫有稱癡者竇威有稱志者虞世南呼李守為人物志有稱譜者李守又號肉譜有稱秘書者虞世南行秘書有稱總龜者殷踐猷號五經總龜有稱海者何休號學海有稱苑者任末號經苑有稱倉者曹曽號書倉三事俱見拾遺記有稱樓者李磎號李書樓傅廸見御覽讀書類與李善竝譏誚之稱陸澄書厨亦此類古今績學之士靡弗以勤致者尼父韋編三絶亡論即賢如仲舒聰如劉向穎如子建㨗如孝標其勤咸百倍於世之學者盛名所集弗虛也厥有目下十行篇成萬字而終身没没草木共年毋亦此道未至與余生平駑劣世事懵然獨癖嗜青緗逾於飲食凡史傳叙稱有仝余好輙欣然領㑹踴躍於衷偶閲唐宋諸類書采摭前䂓漏遺泰甚因戲效昔人比事雥而録之衰病耗忘目睫之譏自分不免異時仝好尚或有當余衷哉中有一事數人或十數人者如不釋卷事百餘止録稍異者餘映雪隨月等不具録絶韋仲尼讀書韋編三絶鐵摘三折滅漆又漆文三滅亦仲尼讀書割席管寜絶華歆事下帷董仲舒崔祖虯鄭鮮之宋世景李密司馬光穿榻魏収讀書坐一木榻積乆榻板中穿結繩李充讀尚書腰係細繩十尋毎一遍作一結計數萬餘遍然穅顧懽屑豆朱倉代糧擁絮江革墜冠朱穆讀書墜冠負圖董藹又李充亦號負圖先生擔笈髙允劉晝閉户劉焯劉炫諸葛穎各十年馮偉節三十年餘陶𢎞景姚思亷裴行儉張袞魯恭劉晝韋陟孫敬杜門陸倕諸葛穎懸梁孫敬鑿壁匡衡寄廡劉峻少貧寄人廡下讀書居樓張建章所居有書樓掘坎游明根掘土坎為室讀書其中墮坑劉峻讀書失墮坑阱掌録董藹録書於掌世謂仲𤣥掌録見御覽掌鈔蘇秦張儀仝學見異書以掌題之見御覽舌畊黄安讀書畫地成池又賈逵事見拾遺記舌學董藹鈔書於掌以舌䑛之掌為爛號舌學等身賈黄中少聰悟父取書與身等令讀之號曰等身書刺股蘇秦折肢樊深讀書墜馬損目王錫讀書致損右目荷鋤孔安國常林張紘兒寛崔逞引杖沈峻以杖自擊輙讀鑄研桑維翰鑄鐵研據鞍樊深讀書據鞍不輟亡羊王育牧羊王蒙乘牛李密牧牛張悕棄豕承宫聽經棄豕不覺驅驢李固驅驢負書却鹿裴休聚螢車𦙍伐薪葛洪伐薪供書拾薪承宫拾薪聽經負薪劉貞素采薪劉仁軌又董藹然薪范任又畢諴㸑薪侯瑾㸑薪代燭賣薪朱買臣乞薪郭瓊乞薪照書仙鑑截蒲路温舒以代簡折蒲王育折蒲冩書熨瓜鄭灼心熱以瓜熨之種瓜步隲拾葉董藹拾葉冩書編柳孫敬編柳冩經䕃樹魏収坐床䕃樹讀書斷虀范仲淹流粟朱買臣見御覽漂麥髙鳯失稻顧懽讀書失稻不覺絶糧王歆絶糧讀書不輟燎麻劉峻畫荻歐陽修竊肉王劭閉目精思家人竊肉不復覺忘羮劉恕節燭郎茂讀書家為節燭减油沈約親為减油置燈范純仁藏火祖瑩藏火灰中廣鈔異書劉峻袁漢竊讀官書楊誠獄中受書黄霸崔瑗陌上懐書崔琦市肆閱書王充徐曠野地録書董藹負板挾書董遇採梠誦書隗禧借讀人書任孝恭劉焯劉恕張方平留讀人書鄭樵遇人書必留讀卧用警枕司馬光卧不蓄枕李銓凝塵滿席馮道韋愛落燼數升吕思禮為人傭書闞澤崔光劉芳為人傭作侯瑾王延衛颯為人都養孔安國為人厮役陳實為人僕隸王蒙為人僮奴游明根竝見傳誤入人家劉臻褚遂良不交人事薛瑞崔林不問家産崔𤣥伯譙周不啓家書胡瑗不觀伎樂王瞻不通權貴阮孝緒拒王晏不見不窺天子韋愛不對吏人狄仁傑日進三卷宋太宗夜盡十卷沈約東觀讀書黄香秘閣觀書張纘李邕十年不歸胡瑗七年忘返樂羊子門庭著紙左思户牖置筆王充厠上誦詞錢惟演厠上索文歐陽修寒暑不輟劉宣徐曠蔣乂晝夜不倦鍾會范雲沈峻李瑾樊深江總庾仲容温子昇盥櫛不御虞世南寢食不思郎茂劉恕譙周皇甫謐等慶弔不行荀爽徵辟不就褚陶徐苖目不窺園董仲舒三年一云十年桓榮十五年何休十七年手不釋卷馬懐素吕思禮于休烈李磎仕宦不釋卷劉昺魯肅崔林辛術軍旅不釋卷劉實王起趙逸崔元翰耄耋不釋卷司馬光童稚不釋卷裴皥亂離不釋卷皇甫謐裴漢疾病不釋卷餘不盡書讀巵言所記古今博物事偶憶史傳小説中有相類者并疏左方中固多博極士然或由神觧或以術推不專問學至偶中亦有之巵言大略同鄭公孫僑知實沈臺駘知黄熊晉平公夢魯展禽知爰居海鳥避風漢傅毅知西域金人胡僧知昆池刼灰蔡邕知焦尾琴柯亭竹魏嵇康知石髓晉荀朂知勞薪摯虞束晳竝知曲水二子各證舊文束事覺稍古耳張華知蛇化雉知洛鐘鳴知武庫火以積油故見太平御覽樂藹下郭璞知驢䑕大如水牛灰色見景純傳宋陸澄知崇禮門鼓齊徐之才知瘤骨作刀柄見御覽梁武帝知海濵巨黿趙昭儀所化見飛燕别集劉杳知張仲師長尺二寸知騫毘王杰公知蛇鶴二珠知火浣布知髙安國鹽知天竺國鏡知八風谷酒知扶桑繭絲杰公事竝見四公記後魏趙逸知晉時寺址知宋世浮圖見廣記異人類隋崔頥知藍田玉人漢文帝所造具冠幘見太平御覽中唐李百藥知瑯琊稻徐陵文語郝處俊知無脂羊張柬之知影蛾池上官儀詩唐𤣥宗知龍皮扇王維知霓裳第三拍葉法善知白蝙蝠精張果眞形青城王老知太元仙衣鄭欽悦知中山石銘賈耽知蝨癥知火尼知藏粟見雜俎及廣記江陵書生知息壤太平廣記建中時道者知脉望蠧魚蝕神仙字所化其形如規髮服之長生又春秋陳章知胡充折齒齊桓公得折齒方圓三尺陳章對曰此秦胡充齒也知鳴鵠嗉中人齊桓公得鳴鵠殺之嗉中有人長三寸三分陳章曰名李子敖見博物志公孫僑知浮游共工之卿化為朱熊晏嬰知盤庚長九尺餘大下小上知伊尹大上小下赤色而髯三神俱夢中所見出汲冢璅語今載御覽并陳章二事竝見御覽形體門内史過知莘縣神丹朱所化觀射父知重黎郯子知鳥官蔡墨知豢龍氏介葛盧知牛鳴師曠知絳縣老人年竝見國語左傳又知太子晉年汲冢周書漢東方朔知東都短人御覽賈逵知神雀漢書本傳張敞知宣帝時美陽偽鼎冊府元龜終軍知鼮䑕冊府元龜魏管輅知宋無忌妖知易中九事本傳王粲知漢時玉珮遺製元龜呉諸葛恪知桑熟老龜傳注六朝雷煥知枯木照妖知豐城劍氣續齊諧記劉杳知􅧕字偏旁知姓譜血脉竝見南史本傳劉顯知獅子何色南史本傳樂藹知積油為灰元龜王僧孺知古人以石為針南史本傳潘京知武陵郡名止戈為武髙阜曰陵見元龜范雲知白烏所由至齊髙帝時事見元龜裴子野知滑國即白題同貢者見南史子埜傳續咸知有新氏衡石元龜崔賾知羊腸坂本傳魏収知人日徐之才知蛤精竝見北史本傳杰公知六女國梁四公記唐許敬宗知濟水褚遂良知雄雉見秦元龜周焦君知古岳瀆經廣記元行冲知樂器名阮咸孔氏六帖楊収知姑洗角出處仝上張一行知帝車七曜文王勃文帝車南指遁七曜於中階華蓋西臨藏五雲於太甲張燕公不曉以問一行一行知其上句下句遂無知者段成式云劉禹錫知巨顙老拳詩杜甫義鶻行語老拳見石勒傳張率更知玉磬隋唐嘉話房叔道知湖目蓮子也此事本六朝人附酉陽雜俎陳倉童子知弗述秦時事也以上二事皆在唐前以載雜俎附此段成式知畫菩薩光以曽青和壁魚設色則近日有光此事在贊寜知畫牛前見雜俎廣知類五代陳陶知狼星直日江南主晨起於殿前得殘獸一足無知其故者以問陳陶陶對曰昨夜乃狼星直日也見詩話總龜陳崇實知鼉見葆光録江南士人知天雞有二説載爾雅江南士人因主司出題問此無能答者見談苑宋王介甫知玉樓銀海玉樓肩也銀海眼也蘇子瞻雪詩用二事出道書見詩話蘇子瞻知錦瑟詩李義山詩寓適怨清和意黄魯直不能觧眉山告之黄魯直知喚起催歸二鳥名也韓退之詩劉貢父知黄耳非犬也乃童僕名見詩話劉克知人日隂詩自元日至人日各有所屬某日隂則某物歉也又知烏鬼鸕鷀也説載圖經筆談云王貽孫知男女皆跪禮對太宗問也見玉壺清話李公麟知玉璽文見宣和畫譜及宋史本傳沈存中知棊局數共用五十二萬子而盡局之數胡旦知束帛詩話總龜黄常明知孟勞寳刀也王介甫詩用之見詩話總龜丁公言知唐酒價眞宗問唐酒價丁以杜詩對時稱敏㨗後人又舉王維新豐美酒斗十千駁之余戲謂價之多寡由酒有美惡耳工部貧客又蜀酒固不得埒價新豐也又仲尼知玉羊見髙氏緯略引韓詩外傳云魯哀公穿井得一玉羊焉孔子見之曰水之精為玉土之精為羊此羊得之井中在水土之際其身玉其肝土也公使殺視之果然此又與羵羊事異元萬頃知離合詩見舊唐書本傳郭侍封被圍作離合詩示李勣勣怒萬頃為觧之朱子奢知燒尾事新羊入羣為諸羊所觸火燒其尾乃定故士人登進遷除設燕謂之燒尾貞觀中太宗以此問朱子奢朱子以此事對一説虎變為人惟尾不變須燒乃似人見封氏見聞志張果知漢武時鹿唐𤣥宗時得鹿以問仙人張果果云此漢武上林鹿也騐之果然見神仙通鑑張果傳中張氳知海蝦蟇齒方圓二尺亦見仙鑑氳傳伊祁𤣥觧知龍虎玉見太平廣記唐憲宗時異人伊祁𤣥觧至時西域進方圓二玉舉朝莫能名憲宗以問𤣥觧𤣥觧對云圓者龍玉方者虎玉也詢諸貢者果云圓者漁人所得方者樵夫所致人始信服云尹拙知白馬祠舊典宋史本傳劉恕知五代别將行履本傳王介甫客知虹玉圍腰語見髙氏緯略虹玉圍腰唐人常袞語也王介甫作謝玉帶表而偶缺一故實作對一門下客曰何不用虹玉圍腰語介甫大喜即用之惜門客名氏竟不傳尤延之知河魨原起楊廷秀與尤延之食河魨楊問尤河魨原起何典尤因舉左太冲賦及劉淵材注答之楊檢騐二處信然始大服尤之博洽呼之為書厨云見説郛所鈔坦齋筆衡中王仲行知天呉字音見談藪云李大異為廣西帥嘗誦杜天呉紫鳯之句顧坐客云呉當音華見山海經未知復見何書客莫對王獨云後漢書戴就被収獄吏燒鋘斧使就挾之注引何承天篹文鋘音華又詩不呉不敖不呉不揚亦皆音華李公稱善衆咸服其該洽云今刻説海無此事非也葉寘知玉柙坦齋筆談湯思退知生婦人出處本三國志事見説郛又六朝王筠知霓字音五代張䇿知偽鼎見合璧事類中徐鉉知象膽宋竇儀知乾徳四年錢沈括知天禄元耶律楚材知角端竝見史及諸襍説凡巵言引者悉不録又説郛載宋某人知酋耳知肉芝古文竒字之難辨有甚於事物者别而録之於後李斯識周冢玉文八字叔孫通識周冢玉文二字嵇康識抱犢山神書束晳識汲冢竹書江淹識玉鏡竹簡古文劉顯識古文尚書斷篇又識魏人遺梁古器隱起文王僧䖍識科斗書周官闕文范雲識秦望銘韓愈識誅鮫雷文李協識漳泉界銘東平李生識石壁遺記兖州魯生識古銅盎篆文又張敞識美陽鼎文髙佑識玉印文李斯叔孫通不盡識周冢玉文凡八十字斯通共識十字郭璞束晳不盡識穆天子傳文郭又不識會稽鐘文景純本傳張華不識顯節陵科斗文即束晳所識者己見巵言任昉不識尚書古文王僧䖍識姚􅈯不識中山石銘鄭欽悦識鮑照徐爰蘇寶生不識青州墓銘賈希鏡識己見巵言王僧䖍不識玉鏡竹簡古文江淹識之王起不識門二字段成式不識鹿杯古文沈括不識漢東雷文扶疎類栢葉見筆談至秦漢子書謂泰山封禪文字萬家仲尼觀之不能盡識則謬談也埜客叢書云幽明録曰楚文王獵有人獻鷹得異物時有博物君子曰此鵬雛也文王厚賞之異類傳曰漢武帝時西域獻黑鷹得鵬雛衆莫識惟方朔識之二説不同尚書故實謂孝武時嘗有獻異鳥者莫識東方朔曰此畢鸞也問何以知之曰見山海經洽聞記曰後漢時有鳥頭長五尺雞首燕頷備五色而多青光武問百官咸以為鳯蔡衡獨曰多青者乃鸞也余歴考博識事自謂庶幾足補巵言之缺近讀此事遺數條學之難窮如是因續志之畢鸞疑即畢方事字之訛也叢書又云緗素襍記云永叔啓陸機閲史尚靡識於撐犁枚臯屬文徒自慚於骫骳沈元用啓讀撐犁而靡識敢謂知書問祈招而不知尚慙寡學撐犁事竟不知載何書僕謂此見𤣥晏春秋曰予讀匈奴傳不識撐犁事案傍有奚奴執燭顧而問之奴曰撐犁天子也言匈奴稱撐犁猶漢人稱天子也於是曠然發寤然則不識撐犁乃皇甫謐事歐公謂陸機者誤也按此書呉人王懋著當紹興淳熈間成而不見端臨通考蓋其時未行世也説郛亦引不見此古書中竒字難識者已備載巵言中自餘傳記所録字率不存即博雅所徵徒存故實而已獨玉磎編事所傳古鏡篆文十二字尚見太平廣記然其説甚詭誕不足信也六代文人之學有徵事有䇿事徵者共舉一物各疏見聞多者為勝如孝標對被王摛奪簟之類是也䇿者暗舉所知令人射覆中者為優如沈約得三劉顯失一之類是也齊梁之交此風特盛亦猶晉之清言大約徵者如把不足徵之徵䇿者即漢世射䇿之䇿然梁武與劉峻徵錦被事亦謂䇿者自上臨下之詞實非䇿也惟隸事與徵義同六朝䇿事唐宋挍士悉其遺風惟徵事絶不復覩僅段成式温庭筠以一物傳簡往來遂成卷軸又段嘗出獵得兔數十頭遺父寮屬毎頭疏事若干其下比僚屬傳觀無一重者又元陳剛中呂徽之徵驢事數十條皆或有之惟徐氏兄弟徵猫事非實録非段呂學過二徐以驢及兔事頗衆也徽之見輟畊録其人快士第匪陶氏幾弗傳小説尚爾著述其可廢哉南齊王儉自以博學多識過陸澄澄曰僕自少至老惟好讀書無他事以縈念今公少即鞅掌王家雖復一覽便諳然所見卷帙未必勝僕儉不謂然後與何憲輩徵事咸屈於澄廼服其説余毎讀澄言輙嘆其親切有味非身有之弗能道儉在齊亦稱好學聞澄語便當了然顧騐而信即此知儉徒豪舉為名髙耳儉卒時年未四旬方身柄齊國又少負一時重望諸名士咸出其門詎容有餘力廣讀異書今問崇禮門鼓事尚載澄傳云南部新書云大中好文嘗賦詩有金步搖未能對令温岐即温庭筠也續之岐乃以玉跳脱應大中喜命以甲科處之為令狐綯所沮除方城尉綯曽問其事於岐岐曰出南華眞經非僻書也冀相公燮理之暇時宜覽古綯怒甚後岐有詩曰悔讀南華第二篇為此也詩話總龜引宋某公謂南華經無玉跳脱事不知當時何據按唐詩紀事令狐綯嘗以舊事訪温對如前非問跳脱也宋人譌而一之可笑北夢瑣言跳作條亦非蓋跳脱乃與步搖相屬耳王懋云玉跳脱出眞誥當作華陽第二梁沈約䇿劉顯十事顯對其九約曰老夫昏忘不可受䇿聊試數事第毋至十顯問其五約對其二又韋載字徳基年十二見沛國劉顯顯問漢書十事隨問輙對按顯於十事尚不能全得而載獨舉對無餘者以漢書當時藝習者衆或載所專精且顯或以童子易之事非甚僻故也若劉沈五䇿則亷藺鬭於䑕穴各極所難勢自不能無得失凡評論古人文章學問務以此意求庶得其實不爾則韋之學乃過於劉而沈逺不及豈事實哉又六朝張綰受䇿百事得九十四苐失六事因呼百六公又韋篹仕齊為記室沈約嘗稱於梁武曰恨陛下不與此人仝時其學非臣輩也二韋一族載十二即受䇿劉顯穎敏固已絶人異時第以職任稱而不聞學問著固知業廢於半途者衆矣何憲傳稱其直閣日諸文士雜取四部書質之略無遺失可謂該矣然胡至一窘於陸而再奪於王也任昉不識尚書古文而王僧䖍識之王僧䖍不識竹簡古文而江文通識之然淹之該博實不逾昉大槩一事之短長耳必諸劉張陸輩斯無間然南唐徐鍇與兄鉉徵猫事至七十餘古今猫事有限即經史詩文單辭竝舉亦不應若此之繁蓋兄弟一時自相誇詡世不詳察狃為實然耳梁武沈約徵覈事僅十餘條則吾頗恨其寡却自實録蓋六朝前世代差近事迹尚稀故也二徐雖宋初然李昉宋白及諸學士編御覽廣記所収猫事不過十餘二書之輯鉉與其間胡不舉鍇七十事實之也蓋古今故實載籍具存歴世類書咸可挍覈或間有漏遺决非懸絶余斯議自謂老吏斷獄博洽君子幸更詳焉唐武宗製乃􅀢二字以試王起起言臣於三教書所不識者惟周穆王傳門二字耳此二字羣書未見武宗笑曰向試卿耳二字實吾所自製按起謂二字羣書未見可也謂三教書所不識者惟門二字則大誣也即穆天子傳中字不可識景純無注者不下十數况窮三教書寜止此乎蓋古文自有不可識者前人既無訓釋後世曷自推詳若偽撰之書目所未接博極之士固能辨之然亦必遍窺四部夙究三倉庶幾斯語政恐非起所辦倘逢劉顯之䇿立見其窮矣强記則博聞博聞必强記此常理而不盡然至博聞强記而不觧把筆者又比比也乃文章烜赫之士於載籍涉獵而已淹通該洽之任往往謙讓未遑豈人力固所難兼將造物隂為限制耶然漢唐以上諸大家則無不博涉也其弊自宋開之張安道過目不忘而在宋人中無聞該洽此强記而不博聞者也司馬君實㓜稱不慧而淹通經史世號大儒此博聞而不强記者也劉原父强記絶人博聞無比而歐誚其文章未工此博聞强記而短於文詞者也歐蘓俱以文章名世而安道訝子瞻再讀漢書原父惜歐九不甚讀書此文章烜赫而短於博聞强記者也然歐蘓皆有功經學亦前文士所無原父亦以文名宋此據前人論之或問蘇子瞻讀書之法蘇曰讀書如錢榖兵農及諸事物之類毎一事作一次理會可以終身不忘子瞻非强記者即此可見以余論之長公所言實讀書要法苐頗費工力耳子瞻嘗問一後進近讀何書其人答讀某書子瞻輙問其中有某好亭子其人愕然罔措不知子瞻所問即前意也餘冬序録云歐陽永叔為文雖至熟故事亦檢出處然後下筆蓋其愼也東坡即不如此觀洪景盧直院時所聞院卒之事可知隨筆摘東坡詩文與出處戾者數十事坡仙大才製作多出一時縱手信筆未嘗效人本子上尋行數墨古人事實固宜有誤用處後生可為法耶按右二事二公俱非强記者可見然得失大有歸也劉原父兄弟皆博學窮經傲睨歐蘇王氏間而製作不甚傳沈存中筆談持論精確然往往有輕發者正坐不檢出處故也江鄰幾雜志宋人極推今不傳略見説郛兩山墨談謂洪景盧深服蘇子瞻以老卒言不檢册子故然子瞻用事多誤病正坐此洪素以博洽自居其推服子瞻當别有謂苐洪所著隨筆事實矛舛處亦復不希古人所以嘆目睫也宋人王介甫在當時諸文士中號為究心問學者旉亦雋才假以年詎可量徒以新法流弊并終身所善没之歐好古於金石頗覩一班蘇赤壁二賦清空瀟洒大得盛唐景趣而詩反為事束兩失之云庚溪詩話云曽子固為太平州司户時張伯玉璪作守歐公荆公皆與伯玉書以子固屬之伯玉殊不禮一日就設㕔召子固作大排唯賔主二人不交一談既而召子固書室謂曰人皆謂公曽夫子必無所不學也子固辭避而退因請子固作六經閣記子固屢作終不可其意廼曰吾試為之即令子固書曰六經閣者諸子百家皆在焉不書尊經也其下文不能具載又令子固問書傳中隱晦事應答如流子固大服始有意廣讀異書晁丈以道言劉斯立跂初登科以賢稱就亳州見劉貢父談論皆劉所未知以道又言少年讀書時嘗鄙薄䕃補得官後從李徳叟游徳叟輕賤科名議論髙逺方有意眞為學也據右宋人所述則南豐似亦不甚讀書蓋文與歐王蘇氏等而學又不及伯玉非庚溪筆之殆同草木謂小説可廢乎又宋子京嘗與李邯鄲飲酒隸僻事不勝者輙飲之坐客遂皆潦倒而出宋人隸事僅見此張安道世推强記止劉貢父所紀黄巢一事然余以唐書較之殊不合則所謂强記安在并貢父亦失之不考也詳二酉綴遺中夢溪筆談云嘗有人自負才名後為進士狀首敭歴貴近曽謫官知海州有筆工善畫水召使畫便㕔掩障自為之記自書於壁間後人以其時名至今嚴䕶之其間叙畫水之因曰設於㕔事以代反坫人莫不怪之予竊意其心以謂邦君屏塞門管氏亦屏塞門邦君為兩君之好有反坫管氏亦有反坫其文相屬故謬以屏為反坫耳麟謂反坫事出論語不應其人疎陋至此按宋黄東發云反坫鄭注為坫在兩楹之間反爵其上坫字從土而云在兩楹間豈常設耶按郊特牲旅樹反坫内則曰士於坫明堂位曰反坫出尊崇坫康圭士虞禮僎於西坫土則累土而為之皆可名坫而坫亦有髙卑東西之不同非必反爵之處也鄭氏以坫之反異於經文矣汲冢書曰囬阿反坫注曰外向室也反主坫言非主爵言也據禮記反坫與臺門相連汲冢書反坫與囬阿相連論語反坫與樹塞門相連恐均為宫室僭侈之事若東發之言蓋亦以反坫為屏障之類筆談所載某人見或同此存中持論多覈然未免有輕發者兹類是也朱元晦云程泰之演繁露其零碎小議論亦多可取如辨罘罳之類某頃因看筆談中辯某人誤以屏為反坫後看説文坫字下乃注云屏也因疑存中所辯未審後舉以問泰之曰存中辯是然不是某人誤乃説文誤耳右見語類所記近續讀得玆説并識之然則文公固亦疑此蓋某公自本説文非誤憶也余所見竊謂不誣世人幼習傳注忽覩此大是駭聞沈博洽自信故勇於譏之苐某公有知又將以沈為不讀説文矣甚矣辯難不可不審而援引不必騖竒也段成式酉陽雜俎記事多誕妄如云一木五香根旃檀節沈香花雞舌葉藿膠薰陸此尤謬旃檀與沈香兩木元異雞舌即今丁香耳今藥品中所用者亦非藿香自是樟葉南方至多薰陸小木而大葉海南亦有薰陸乃其膠也今謂之乳頭香五物迥殊元非同類右筆談所論段氏專記異國所出欲無根柢可謂漢庭吏筆然此譏亦本山海經余考成式所引書多出前代諸小説及釋道二藏者今本書大半不傳故沈謂成式之誕其傳者十九可徵也惟唐本朝多誕則段為之夢溪筆談云江南陳彭年博學善史於禮文尤所詳練歸朝列於侍從朝廷郊廟禮儀多委彭年裁定援引故事頗為詳洽嘗攝太常卿𨗳駕誤行黄道上有司止之彭年正色回顧曰自有典故禮曹素畏其該洽不復敢詰按郎瑛類藁載武林張某者毎縱談古今人詰其所出則厲聲曰太平廣記蓋其書世所罕也夫廣記何秘之有楊用修亦頗用此譏如衝波傳之類司馬君實講經為村老難不介意眞仲尼徒也又明道雜志云楊大年奉詔修冊府元龜毎數卷成輒奏之比再降出眞宗常有簽貼有少差誤必見至有數十簽大年雖服上之精鑒而心頗自愧竊揣上萬幾少暇不應能如此稍訪問之乃毎進本到輒降付陳彭年彭年博洽不可欺毫髪故謬誤處皆簽貼以進大年乃大薦彭年文字請與同修自是進本降出不復簽矣較二説則彭年學問誠為當世所服世但知江南有徐氏兄弟彭年殊寡稱者因記此然冊府元龜以楊陳二君及諸博雅同修當無復遺恨余間讀之疎漏處亦不少益知學問無窮也彭年𨗳駕或果有典故不可知觀反坫一事知沈語難盡憑也蘇長公用事多誤由才髙意爽不屑屑檢冊子耳洪景盧隨筆指摘凡數十處大槩得之苐亦有不盡然者費袞梁溪漫志一則云東坡和潛師放魚詩况逢孟簡對盧仝不用校人欺子美或云校人乃欺子産非子美也豈少陵曽用校人事遂直以為子美耶予按左氏杜預注子産一字子美以上俱費氏説蓋事載六經語孟者人所童習通曉一出名公手一或牴牾必他有証佐不得視同諸書所出驟加誚議也苐坡亦應自注以免人疑王伯原曰演繁露摶黍為鶯不知何出蓋未考詩葛覃注也緗素襍記不知麥秋出月令熊改齋漫錄考古語所出詳且博矣然首如飛蓬出於詩乃以左思賦為始樹桃李者夏得休息見於説苑乃以狄梁公事為始若此非一是以君子無輕立論又引筆談云彼徂矣岐有夷之行朱浮傳疏作彼徂者岐有夷之行今按後漢書朱浮傳無此語而西南夷傳朱輔疏中有之蓋沈誤以輔為浮也噫程沈二氏宋世共稱博洽而猶若是考訂可不審哉髙似孫有繁露語見齊東埜語今不傳夢溪筆談云熈寜中嘗發地得大錢三十餘文皆順天得一錢當時朝廷咸疑古無得一年號莫知何代物余按唐書史思明僭號鑄順天得一錢順天乃其年號得一特以名鑄錢耳非年號也按此與竇儀乾徳事相類而沈所徵叛臣年號尤僻世絶無傳之者因錄此乾徳錢事石林燕語以為盧多遜與他傳記互異當考又云國史篹異載潤州曽得玉磬十二以獻張率更叩其一曰晉某歲所造也是歲閠月造磬者法月數當有十三宜於黄鍾東九尺掘必得焉從之果如其言此妄也法月律為磬當依節氣閠月自在其間閠月無中氣豈當月律此懵然者之為也叩其一安知是晉某年所造既淪陷在地中豈暇復按方隅尺寸埋之此欺誕之甚也按存中此辯甚精蓋記事者不能無溢詞耳程泰之當廷中對事必援古引今備極證據人主不悦而出之此又與梁武惡劉孝標異宋時人主直是懵然不觧耳然程他日著北邉備對尚以鄉日所對未詳為恨可謂不負所學矣困學紀聞云莊子楚狂之歌所謂迷陽人多不曉胡明仲云荆楚有草叢生修條四時發穎春夏之交花亦繁麗條之腴者大如巨臂剝而食之其味甘美野人呼為迷陽其膚多刺故曰無傷吾行以上俱紀聞語近王長公與余書云詞塲尺寸地迷陽罥足大可怪也余時不觧罥足之義讀此了然紀聞又云䇿扶老以流憩扶老藤名以為杖也見蔡順傳注按此可與迷陽作對扶老尤僻非伯厚不能知然亦讀漢書偶得之伯厚嘗引王徽之言謂讀書得一義如獲一眞珠船此意非眞好學者未易驟領㑹也又古今注秃鶖一名扶老扶老亦見太平御覽草木類夢溪筆談云崔融瓦松賦謂之木也訪山客而未詳謂之草也騐農皇而罕記段成式難之曰崔公博學無不通曉豈不知瓦松已有著説引梁簡文詩依簷映昔耶成式以昔耶為瓦松殊不知昔耶自是垣衣瓦松乃名昨葉何成式亦自不識豈得誚崔融耶然昨葉何草不見爾雅神農等書而第見陳藏器本草陳段俱唐人恐未足以難成式也清異録拆瓦松字為一元木公可笑楊用修藝林伐山云漢靈帝修南宫鑄天禄蝦蟆轉水入宫又作翻車渴烏灑路天禄即大蝦蟆伯樂之子按圖索駿以蝦蟆為馬即天禄也天禄之形漢人多刻石肖之於墓古詩所謂天禄辟邪眠莓苔也按用修毎證一事必令阿平絶倒而此以天禄為蝦蟆尤可笑陳晦伯但引瑞應圖以駁之似未明了余按沈氏筆談云至和中交趾獻麟如牛而大通身皆大鱗首有一角考之記傳與麟不類當時有謂之山犀者然犀不言有鱗今以予觀之殆天禄也後漢書中平三年鑄天禄蝦蟆於平津門外注云天禄獸名今鄧州南陽縣北宗資碑旁兩獸鐫其膊一曰天禄一曰辟邪元豐中予過鄧境聞此石獸尚在使人墨其所刻天禄辟邪字觀之似篆似隸其獸有角鬛大鱗如手掌甚類交趾所獻異獸知其必天禄也據此則此獸宋時固已入貢沈存中辯之甚明用修於筆談亦不㸃目耶夫天禄與蝦蟆竝言即為蝦蟆與辟邪竝言即為辟邪耶天禄辟邪眠莓苔乃黄庻咏假山詩以天禄辟邪譬怪石耳豈丘墓謂哉詩載韻語陽秋乃宋人絶句耳王性之鶯鶯傳䟦云僕性喜討論考合同異毎聞一事隱而未見及可見而不同如瓦礫之在懐必欲討閲歸於一説而後已嘗謂讀千載之書而探千載之迹必須盡見當時事理如身履其間絲分縷觧終始備盡乃可以置議論若略執一言一事未見其餘則事之相戾多矣又謂前世之事無不可考特學者觀書少而未見爾以上俱王語余毎為之擊節今去唐千餘載而微之事一經考訂萬口同然學者誠博閲古今漁獵既廣識見自融而加以精心綜核即前代之事信亡弗可考者至如身履其間數言尤為曲盡如宋洪景盧明楊用修非不旁蒐廣涉正以輕於立論遺誚後人讀王氏此䟦可謂良工苦心至於斯極而斯人在宋未嘗以博洽知名且徒得贋書之詆何耶余讀王所著樹萱録默記等大都小説家流其所論辯自鶯鶯一傳及魏泰碧雲騢外絶不復見豈其徒能空言未竟行事耶或因一事之得偶合立言耶余酷有考訂之癖視所稱瓦礫在懐等語不啻過之而證騐古今亦時時有自得者漫録其説以騐後之君子讀書大患在好詆訶昔人夫智者千慮必有一失昔人所見豈必皆長苐文字烟埃紀籍淵藪引用出處時或參商意義重輕各有權度加以魯魚亥豕訛謬萬端凡遇此類當博稽典故細繹旨歸統會殊文釐正脱簡務成曩美毋薄前修力求弗合各申巳見可也今偶覩一斑便為竒貨恐後視今猶今視昔矣昔人之説有當於吾心務著其出處而韙之亡當於吾心務審其是非而駁之毋先入毋遷怒毋作好毋徇名此稱物之衡而尚論之極也今明知其得而掩為已有未竟其失而輙恣譏彈壯夫不為大雅當爾耶少室山房筆叢卷二十三
