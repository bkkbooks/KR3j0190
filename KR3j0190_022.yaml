body:
  text: 少室山房筆叢卷二十二明胡應麟撰華陽博議上纍世不能窮其學當年不能䆒其禮仲尼之博也而以防風肅愼商羊萍實諸淺事當之則仲尼索隱之宗而語怪之首也秦漢以還家相沿襲荒唐悠謬此類實繁神異洞冥拾遺雜俎之屬率假託名流恣言六合要之莊列山海實始厲階浸淫大洞竺乾諸部極矣學問之途千岐萬軌約其大㫖四部盡之曰經曰史曰子曰集四者其綱也曰道曰事曰物曰文四者其撰也道多麗經事多麗史物多麗子文多麗集經難於精史難於核子難於洽集難於該四者之中各為門户古今鴻巨罕得二三大都上資天授下極人功纎毫弗備尚屬望洋咫尺未躋猶為止簣此其難也經之流别爰有小學史之流别爰有諸志子之流别爰有衆說集之流别爰有類書凡此數端蹊徑尤廣昔人專一往往終身間遇兼長要非世用若貫穿𤣥宗融鏡內典求之方外時有其人文士儒流涉獵而已六經之學廣大閎深歷世名儒第專其一有博於易者有博於書者有博於詩者有博於禮者有博於春秋者有博於爾雅者施孟梁京諸人博於易者也伏夏周劉諸人博於書者也齊魯毛韓諸人博於詩者也戴曹賀賈諸人博於禮者也公榖鄒夾諸人博於春秋者也劉郭張曹諸人博於爾雅者也若馬融鄭𤣥賈逵王肅劉炫崔浩潁逹德明數子諸經竝釋六籍兼該義或未精博斯稱極宋世巨儒精於析理博匪所先新安後出兼綜二家既精且博矣宋世博於經學亦不乏人此舉其重諸史之文汪洋浩瀚材質所詣咸自名家有博於正史者有博於雜史者有博於古史者有博於今史者左氏馬遷班固范曄諸人博於正史者也劉向崔鴻髙峻樂史諸人博於雜史者也譙周蘇轍劉恕羅泌諸人博於古史者也蔣乂蘇冕王圭李燾諸人博於今史者也治史則杜元凱之於春秋張守節之於史記顔師古之於漢書裴松之之於三國子𤣥之通君實之鑑伯恭之節元晦之綱綜兼諸史竝以博稱他如兩司馬彪貞劉氏父子顯臻弟兄敞攽歷世有人未易枚舉子則有博於儒者墨者法者名者辨者雜者兵者農者術者數者荀况揚雄諸人儒之博者也宋翟田俅諸人墨之博者也管仲韓非諸人法之博者也公孫魏牟諸人名之博者也鄒衍惠施諸人辨之博者也吕韋劉安諸人雜之博者也孫武尉繚諸人兵之博者也范勝賈協諸人農之博者也張衡郭璞諸人術之博者也京房管輅諸人數之博者也漆園之評道術太史之論六家班氏之列九流任宏之録四種稚川之纂仲容之鈔克構之林子原之辨皆博於子者與集則有博於騷者賦者詩者文者屈宋唐景諸人騷之博者也揚馬班張諸人賦之博者也曹陸杜韓諸人詩之博者也任沈王駱諸人文之博者也彼皆目下十行胸羅萬卷旁搜廣擷集厥大成名世之稱良非襲取若劉協之文心兼該體要鍾嶸之詩品歷遡淵源蕭統之銓擇鎔鑑古今李善之注釋詳備顚末以至虞世南之采輯詞章許敬宗之搜羅藝館李明逺之英華郭茂倩之樂府大溢千卷小逾百軸其皆博於集者與經之纎賾而難明者莫大於小學小學之中又有博於文者義者音者蹟者考者評者子雲叔重陽冰楚金博於文景純介甫農師元澤博於義野王德明休文才老博於音懷瓘永叔景伯明誠博於蹟元章長睿世昌順伯博於考嗣真䖍禮彥逺九成博於評總之楊許顧陸核字之源者也張李米黃研字之用者也楊許不明八法張李靡逹六書米黃罔㑹七音顧陸罕窺四體至徵竒辨怪若嵇康束晳又自名家即小學一端門徑十數古今博洽蔑能相兼其可易哉史之繁重而難悉者莫大於諸志諸志之中又有博於星歷者方輿者氏族者職官者禮樂者刑法者錢賦者藝文者張衡崔浩劉炫祖烜博於星歷郭璞陸澄賈耽李昉博於方輿王𢎞僧孺李守林寶博於氏族張說蔣乂楊侃李燾博於職官蔡雍徐堅荀朂陳暘博於禮樂杜預牛𢎞髙熲竇儀博於刑法桓寬劉晏田况洪遵博於錢賦劉向王儉任昉柳𧦬博於藝文總之又有博於古者博於今者如鄭樵五略苐述前朝張說六官特詳近典君卿貴與庶幾兼得之矣子之浮夸而難究者莫大於衆說衆說之中又有博於怪者妖者神者鬼者物者名者言者事者齊諧夷堅博於怪虞初璅語博於妖令升元亮博於神之推成式博於鬼曼倩茂先博於物湘東魯望博於名義慶孝標博於言夢得務觀博於事李昉曽慥禹錫宗儀之屬又皆博於衆說者也總之脞談隱迹巨細兼該廣見洽聞驚心奪目而淫俳間出詭誕錯陳張劉諸子世推博極此僅一班至郭憲王嘉全搆虛詞亡徵實學斯班氏所以致譏子𤣥因之絶倒者也集之靡冗而難周者莫大於類書類書之中又有博於名物者典故者經史者詞章者劉峻之類苑徐勉之華林博於名物楊億之元龜李昉之御覽博於典故樂天之六帖景盧之法語博於經史敬宗之玉彩李嶠之珠英博於詞章總之則玉彩珠英六帖法語之屬博於文御覽元龜類苑華林之屬博於事歐虞祝謝兼載事文杜鄭馬王獨詳經制大抵書以類稱體多沿襲創造之力劉徐實難考究之功馬鄭為大至纎微曲盡毫末咸該即陸澄王摛竝操觚翰未必亡憾也夫小學經也而子錯焉諸志史也而經錯焉衆說子也而實史且經集錯焉類書集也而稱子又經史錯焉故其學各有專門也總之史出於春秋禮樂史則經也子出於大易論語子亦經也集出於尚書毛詩集又經也百家之學亡弗本於經也一以貫之古今仲尼而已三代下儒術之顯有出荀况仲舒王通韓愈乎然荀述禮樂董究天人王擬六經韓起八代其學皆極博也文章之顯有出左氏屈原司馬杜甫乎然左窮九丘屈羅萬彚馬探千古杜總百家其學皆極博也至於宋文盛於辭儒一於道矣左氏或云非倚相然左傳國語之宏富春秋博學之士當為首稱老氏所貴虛無靜默然周室聃為藏史特富典墳至莊列諸篇恣談百氏抑何浩瀚亡際也釋氏掃除文字一切俱空而西天經教品目之繁不可億舉阿難獨以多聞為佛上首其人豈遂出唐宋諸儒下哉世恆以儒術寡要少功即今中國二藏之文總踰萬卷彼其所謂無所謂空顧安能離博也第吾儒所博者實二氏所博者虛弗可同年語矣道之博於經方且饒論述者漢河上公張道陵隂長生王方平于吉宫崇劉政茅盈司馬季主淳于叔通晉葛𤣥鮑靚宋陸修靜齊陳顯明梁章處𤣥魏寇謙之后秦王嘉唐司馬承禎張果張氤葉靜能羅公逺王逺知徐靈府成𤣥英文如海鍾離權胡慧超吕巖馬湘蜀杜光庭宋陳摶張伯端薛道光白玉蟾林靈素王中孚元馬珏談處端劉處𤣥丘處機王方平漢時孝亷顯於唐世釋之博於經典且富辨才者漢攝摩騰竺法蘭吳康僧㑹晉支道林道安惠逺法護法深世友宋惠通僧愍求那跋摩齊僧嵓梁寶志傳翕法暢四公惠皎僧祐惠敏寶唱法雲陳洪偃真觀秦鳩摩羅什曇無懴曇摩懴佛陀耶舍僧肇道融曇摩流支智猛僧伽提婆周靜靄衛元嵩隋智果彥琮唐𤣥奘法林惠琳𤣥琬𤣥禕一行宗密道宣道世慧忠智𧦬窺基流志𤣥覺志升澄觀神雍杜順法藏智顗法海義淨務靜慧旻五代義楚贊寧宋惟白道通宗杲了元克勤契嵩延壽道成慧邃正受道顯宗永智圓道濟元明本真覺如意念常諸方外士但據傳記中有著述或以博洽名者惠能希運從諗義𤣥等雖或有經解以禪故不列詩詞顯者亦載别條文士儒流博通二典者漢淮南王東方朔魏伯陽徐景休劉向王褒嚴遵襄楷魏何晏王肅徐邈任嘏晉羊祜鍾㑹向秀嵇康王弼王烈王衍王戎郭象郭璞孫綽孫澄張湛張憑謝安謝尚樂廣衛玠劉惔葛洪齊張融顧歡梁陶𢎞景周𢎞正唐孫思邈王方慶顔真卿張志和樊宗師陸希聲施肩吾王松年李泌李荃羅隱沈汾劉商王睿宋歐陽修王安石郭忠恕張君房蘇轍王敷曽慥彭曉樂史劉涇吕惠卿葉夢得林希逸程大昌諸人皆綜貫道書者也諸人多據史傳及著述行世者下倣此漢傅毅牟融桓談竺融晉許詢殷浩孫綽習鑿齒宋范泰羅含宗炳雷次宗何尚之何承天顔延之劉澄之王僧孺劉義宣齊張融周顒蕭子良明僧紹梁沈約劉協裴子野阮孝緒劉之遴徐孝克元魏崔敏北齊顔之推周甄鸞王巾陳徐陵江總隋盧思道虞世南唐禇亮蕭瑀王維王縉梁肅李蘩白居易柳宗元李通𤣥李師正裴休房融劉軻李儼宋楊億楊傑王古王隨朝迥井度蘇軾李邴王安石黃庭堅張方平李遵最張商英張九成諸人皆覃研釋教者也歷世文人學士有功經術者漢劉向劉歆杜欽杜鄴匡衡谷永班固蔡雍三國王粲劉楨何晏譙周韋昭陸績六代嵇康陸機戴逵孫綽千寶傅𤣥葛洪徐廣何承天裴松之顧野王蕭子顯唐王勃顔籒韓愈李翺盧同劉軻宋歐陽修司馬光三王安石回敷三蘇眉山二劉敞攽二葉夢得適李覯吳棫宋祁陸佃鄭樵董逌陳傅良楊萬里元吳澄吳萊劉因柳貫黃溍趙汸胡長孺吳師道等雖淺深純駁造詣各殊皆著述可徵有功經學者也漢唐宋世文士通經術者尚衆此但據其名字烜赫著述盛行者丘明仲舒輩雖文章名世而經術專門故不槩列他率倣此古今人主才美之盛蓋無如梁武者隂陽算歷奕射琴書靡不冠代而賦詩談道徵事綴文每出一長輒與專門名世竝驅至著述之饒尤為驚絶經則九經義疏二百餘卷三禮斷疑一千餘卷史則歷朝通史六百卷子則二氏經解數百卷集則自製詩文百二十卷其富皆古今未有而所命諸儒纂輯華林遍略六百卷弗與焉可謂學總三塗業兼七録而表章六籍有功聖門世但譏其事佛而閎才博識絶口無稱余惜而志之余嘗疑為諸臣代筆然梁武素稱忌前寧肯事此惟三禮斷疑出羣下帝析其疑今諸書無一傳者湘東之亡付煨燼矣歷朝諸史各有儒林文苑二傳儒林以紀經術文苑以畜藝文輕重本自較然然古今烜赫之士恆得之文苑至儒林所列類有不能舉名氏者蓋務華賤實今古共然政猶唐世用人進士顯列明經下僚耳則實學胡以弗衰而靡文胡以弗盛也唐制以明經為孝亷詞賦為進士凡仕宦清華率進士得之孝亷冗散而已以故唐人詩歌極盛而經學式微間有一二兼通蓋不數見唐初孔穎逹徐文逺等各為儒宗自是隋世之遺耳時繼起若三秦二蓋彬彬足數中髙嗣運尚聞祝郭諸人此後頓寥寥也唐語林云大歷已後學士蔡廣成周易强蒙論語啖助趙匡陸質春秋施士丐毛詩袁彝仲子陵韋彤裴􅉅講禮章庭圭薛伯髙徐閡通經地里則賈僕射兵賦則杜太保故事則蘇冕蔣乂歷算則董純天文則徐澤氏族則林寶此所載中唐後經術士皆史所略者中惟啖趙賈杜蘇蔣稍見唐書餘大抵沒沒也漢魏六朝諸人儒林自有傳此不録宋初邢昺等尚多以注疏顯至洛閩談理而經學迥别前代矣賈僕射耽也杜太保佑也隋劉炫遍直三省竟不得官縣司責其賦稅炫自陳於內史吏部尚書韋世康問其所能炫自為狀曰周禮禮記毛詩尚書公羊左傳孝經論語孔鄭王何服杜等注凡十三家雖義有精粗竝堪講授周禮儀禮榖梁用功差少史子文集嘉言故事咸誦於心天文律數窮核微妙至於公私文翰未嘗假手吏部竟不詳試然在朝知名之士十餘人保明炫所陳不謬於是除殿中將軍余讀史至此未嘗不嗟異其能也三代以下窮經之士兼該融貫有若是乎而且泛濫羣籍綜核九流撰造典墳修明法律自古經籍子史學問文章蔑能合一炫悉有之傳稱其眸子精明視日不瞬强記默識莫與為儔左畫圓右畫方目數耳聽口誦五事同舉無所遺失信異人也考之炫史學絶少發明文筆僅堪鼓吹要終以經術勝然亦豈易得哉同時劉焯亦博通五經算術九章周髀七曜推步星辰量度山海靡所不精二人俱生周時俱仕隋世俱劉姓俱北人非兄弟而名相類非邑里而同室讀書閉户十年宇宙竒事也二人同應隋召同得罪事尤可笑焯先卒炫以餒終惜哉文人以博雅名古今莫過劉氏蓋代不乏人矣録其尤灼灼者漢劉向劉歆魏劉劭晉劉沈劉實宋劉瓛劉璡劉湛齊劉虯梁劉顯劉逖劉峻劉杳劉敲劉訏劉霽劉祥劉昭劉繩劉臻劉諒劉之遴北朝劉芳劉晝劉蘭劉懋隋劉焯劉炫劉善經唐劉孝孫劉知幾劉仁軌劉允濟劉軻劉鄴劉蛻五代劉希古宋劉載劉琦劉易劉敞劉攽劉恕劉羲仲劉弇劉清之元劉因劉霖此外詩文之士如梁劉孝綽一時羣從七十餘人亦古今絶異而博雅不著二三殆各有天授也六代文人類耽載籍故該洽之士往往有聞晉則張華郭璞宋則袁豹陸澄齊則王摛何憲陳則虞荔姚察魏則崔浩髙允齊則邢劭魏收周則庾信王褒隋則劉炫蘇綽皆其著者餘人晉齊尚夥陳頗寥寥大都入北矣梁自武帝好學諸子彬彬繼之故博洽之士彌衆任昉沈約江淹顧協僧孺子野孝緒之遴二周𢎞正𢎞襄二張纘綰諸劉峻顯杳訏諸賀瑒琛肩摩轂接競爽一時殆古今所罕也此外淹通經術又十數人盛哉六代經學盛於梁以武帝究心儒術故也魏興和二年遣崔敏陽休之來聘敏字長謙清河武城人博學贍文當朝第一與太原王延業齊名加以天文歷律醫方藥品卜論既至帝選碩學沙門十人并百寮與談多屈於敏四公進曰敏學問疏淺不足上軫冲襟臣䁈敵之必死帝從之初江東論學有十二沙門論以條疏徵核有中觀論以乘寄蕭然言名理者宗仰其術北朝有如實論質定宗禮有回諍論借機破義敏總南北二業皆精又桑門所專唯在釋氏若儒之與道蔽於未聞敏兼三教擅之頗有德色䁈公嘗於五天竺國以梵語精理問論中分别論大無畏論因明論皆窮理盡妙其日䁈公與敏談論至苦三光四氣五行十二支十干八宿風雲氣候金丹玉液藥性針道六性五藴隂陽歷數韜略機權飛伏孤虛鬼神情狀始自經史終於老釋凡十餘日辨揚六藝百氏與敏互為主客立談絶倒觀者莫不忘歸然敏詞氣沮於䁈不自得輿疾北歸未逹而卒按敏之學業總兼三教咸極其精殆古今所未有雖廣記未足深信要不為盡誣也南北史儒林傳悉不録敏因記此自昔博學而擅文辭者公孫僑左丘明東方朔司馬遷劉向揚雄曹植王勃杜甫韓愈十數人耳陸澄李善輩咸負書簏之譏與作者幾絶轡矣漢桓談蔡雍魏王粲劉楨晉郭璞張華梁任昉沈約齊邢邵魏收周庾信劉炫隋許善心李德林唐虞世南許敬宗五代徐鉉徐鍇宋劉攽南渡洪邁尤袤元虞集吳萊參之前人蓋其次也魏略云潁川邯鄲淳博學有才章太祖常遣詣臨菑侯植植得淳甚喜延入坐不先與談時天暑熱植因呼常從取水自澡訖傅粉遂科頭拍袒胡舞五椎煆跳丸擊劔誦俳優小說數千言訖謂淳曰邯鄲生何如邪於是乃更著衣幘整儀容與淳評說混元造化之端品物區别之意然後論羲皇以來賢聖名臣烈士優劣之差次頌古今文章賦詩及當官政事宜所先後又論用武行兵倚伏之勢乃命厨宰酒炙交至坐席默然無與抗者及暮淳還對其所知歎植之材謂之天人按植本傳但稱少能誦文賦數十萬言不謂博洽若此且事尤俊爽可喜録之史稱植經籍未嘗去手世以敏捷類以為不讀書者故余特詳焉學問在賦中最為本色故屈宋司馬班張皆冠古今以其繁碩也而入詩最易誤人古今惟老杜能耳宋人不以學為賦而為詩六朝不以學為賦而為文故皆失之然賦中又自有本色學問不可不知陸澄著書力殫於經年文為學困也任昉屬辭才盡於晚歲詩為學困也束晳劉晝作賦竝見譏藝士蹭蹬詞場是又稟賦所拘非必學問之纍王儉何憲齊之博者也而每屈於陸澄沈約任昉梁之博者也而恆咨於劉杳此專門之說也至茂先得竹簡以問廣微世南談姓譜而畏李守乃一日之偶長或一曲之偏至執此以言張不如束李可竝虞豈篤論哉齊之有陸澄梁之有劉峻也鐵中錚錚矣然澄為左丞坐以糾劾免官澄上章自理詔內外詳核褚彥回檢宋興以來類例甚衆竟以膚見謏聞白衣領秩峻作山棲志序以黃初平為雨師蓋坐赤松子誤耳則劉於往事有所未詳而陸於近典憒憒甚矣博古通今儒名豈易稱哉子産臺駘中壘二負竇攸鼮鼠敬叔彭矦元遜傒囊賈逵神雀張華海鳬沈括天祿雖覩記殊常而簡籍具在按圖即事往往足徵多繇人不能讀不能詳耳苐非洞徹心胸安得逢原左右三冬萬卷良不可誣至東方命酒怪哉滅諸葛伐薪元緒烹未必盡屬見聞要當得諸觸類若夫敬宗姦徒贊寧詭釋間操一得曷槩他長假成式報時鐵不明出自何書亦難信也曹冲刻舟以稱巨象懸鏡以舞山雞此類皆性識所鍾靡關學習可名夙慧不屬多聞茂先燔枯木班貍現形元遜伐老桑巨龜潰體二事絶類四妖語同或有一訛非必皆實余謂貍既博識龜亦靈明張葛愛才何至相苦遂令二木并喪天年惜哉漫書發讀者一笑括地志載陳倉人獵得獸似彘遇二童子名之曰蝹亦名二童曰陳寶與此頗同楊修黃絹李彪金鐘雖捷冠一時而義非𤣥妙至賈淵之辨墟墓束晳之誦古文則又無假思維但憑考質而已惟鄭欽悅推繹銘記異哉淵思睿測一至是乎考之當時任昉沈約劉杳諸人世稱博洽積數十年不解何語而鄭以頃刻徵之真古今絶識也天寶中商洛隱者任升之貽右補闕鄭欽悅書曰升之五代祖仕梁為太常初任南陽王帳下於鍾山懸岸圯壙之中得古銘不言姓氏小篆文云龜言土蓍言水甸服黃鍾啓靈址瘞在三上庚墮遇七中己六千三百浹辰交二九重三四百圯文雖剝落仍且分明大雨之後才墮而獲即梁武大同四年數日遇盂蘭大㑹從駕同泰寺録示史官姚𧦬并諸學官詳議數月無能知者筐笥之內遺文尚在足下學乃生知前賢不及近古未聞願採其㫖要著之遺簡以成先志深所望焉數日欽悅即復書曰使至忽辱簡翰屬在途路無所披求據鞍運思頗有所得發壙者未知誰氏之子卜宅者實為絶代之賢藏往知來有若指掌契終論始不差錙銖也謹稽諸歷術測以微詞試一探言庶㑹微㫖當梁武帝大同四年歲次戊午言甸服者五百也黃鍾者十一也五百一十一年而圯從大同四年上求五百一十一年得漢光武帝建武四年戊子歲也三上庚三月上旬之庚也其年三月辛巳朔十日得庚寅是三月初葬於鍾山也七中己乃七月戊午朔十二日得己巳是初圯墮之日是日己巳可知矣浹辰十二也從建武四年三月至大同四年七月總六千三百一十二月每月一交故云六千三百浹辰交也二九為十八重三為六末言四百則六為千十八為萬可知從建武四年三月十日庚寅初葬至大同四年七月十二日己巳初圯計一十八萬六千四百日故云二九重三四百圯也其所言者但說年月日數耳據年則五百一十一㑹於甸服黃鍾言月則六千三百一十二㑹於六千三百浹辰交論日則一十八萬六千四百㑹於二九重三四百圯從三上庚至於七中己據歷計之無所差也所言年歲月日但差一數則不相照會原卜者之意當待僕言之吾子之問契使然也從吏已久藝業荒蕪古人之意復難逺測足下更詢能者報焉李吉甫曰欽悅精思通𤣥蓋僧一行所不逮方升之貽書欽悅適授駕於長樂驛得銘而繹之至三十里釋然而悟所云據鞍運思頗有所得者此也按欽悅舊唐書不載新唐書特列於傳蓋異其人而知者特寡故詳著焉酉陽雜俎云賈耽在滑州境內大旱秋稼甚損因召大將二人謂曰君可辱為健步乙日當有兩騎衣慘緋經市出城可踪之識其所滅處二將乃裹糧衣皂行尋之一如賈言映大冡而滅遂壘石標識而返賈大喜令軍健偕往發之得粟數十萬又芝田録云賈相公耽退歸急召上東門卒至戒之曰明日午有異色人入門必痛擊之死無妨門卒禀命至午果有二尼自東百步相序而至施朱傅粉如倡人婦其內服殷紅下飾亦紅卒計尼髠未之有也因以撾痛擊之傷腦流血返走疾如奔馬旋擊之又傷其足狼籍毁裂百步已上落草映樹更無蹤焉門卒報耽具述耽曰死否對傷腦折足痛楚殆極但不死而失所在無可尋之耽歎曰然不免有小災矣翌日東市奏失火延袤百千家又耽見一病者謂惟飲黃龍浴水可愈卒如其言亦見太平廣記唐三百年惟耽博識可方東方朔張茂先而世絶無知者傳但稱耽入相與王叔文韋執誼不合罷略不言其博物因叢輯其說於此又一小說載耽好地理學每外夷入朝輒延致訪其山川土俗歷三十年所得備盡因撰次為華夷圖夫小說誠不足盡信而說者輻輳如斯豈皆妄幻哉少室山房筆叢卷二十二
