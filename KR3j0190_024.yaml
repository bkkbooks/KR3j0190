body:
  text: 少室山房筆叢卷二十四明胡應麟撰莊嶽委談上大荒西經云西海之南流沙之濱赤水之後黑水之前有大山名曰崑崙有人戴勝虎齒豹尾穴處名曰西王母西山經云西玉山是王母所居其狀如人豹尾虎齒善嘯蓬髮戴勝是司天之屬主癘及五殘右山海經所述西王母與竹書紀年穆天子傳殊不類蓋因二書有王母之文而詭撰其狀以實之余别辨於二書詳矣集仙傳則曰虎齒豹尾乃王母之使非真形也是又因山海經而訛者經云三危之山青鳥居焉廣圓百里青鳥主為王母取食又云拒巫之山一曰龜其南有三青鳥為王母取食又言三足鳥主王母給使蓋豹尾虎齒自為王母本形而三青鳥自為王母使者集仙既以王母為女仙而不得於豹尾虎齒之說故以三青鳥事當之皆夢中說夢也集仙傳言王母生於神州姓侯氏而酉陽雜爼以王母姓楊名回字婉妗夫王母西華之氣所化而侯楊皆後世姓氏本無足辨聊識此當一噱云觀音大士絶不聞有婦人稱近王長公取楞嚴普門三章合刻為大士本紀而著論以闢元僧之妄要為不學者言耳初不足辨也余母宋宜人素善病中歲䖍精奉大士每困迫輒夢大士化身輒愈又余邑葉氏婦病不知人數日亦夢大士救之而愈此皆余所目擊其他顯化靈異往往聞之四方余嘗欲因長公本紀而彚集諸經中大士言行散見者及六朝以還諸雜記小說中大士應迹較著者合為一編蓋余母志云今大士像作善財其旁亦無謂華嚴載善財歷參諸善知識俱非觀音變相雖觀音在其中然度善財者文殊也今塑畫觀音像無不作婦人者蓋菩薩相端妍靚麗文殊普賢悉爾不特觀世音也至冠飾以婦人之服則前此未聞考宣和畫譜唐宋名手寫觀音像極多俱不云婦人服李豸董逌畫跋所載諸觀音像亦然則婦人之像當自近代始蓋因大士有化身之說而閨閣多崇奉者展轉流傳遂致稱謂皆訛若塑像勢不能久前代無從證訂然太平廣記載一仕宦妻為神攝因作觀音像其妻尋夢一僧救之得蘇則唐以前塑像固不作婦人也楊用修詞品記壽涯禪師詠魚籃觀音云深願宏慈無縫罅乘時走入衆生界窈窕丰姿都沒賽提魚賣堪笑馬郎來納敗清泠露濕金襴壞茜裙不把珠瓔蓋特地掀來呈揑怪牽人愛還盡許多菩薩債據此則宋元間觀音像亦有作婦人者然是變相未必如近時稱謂可笑也今世女子多崇事魚籃觀音蓋前代已有此像矣又宋人小說載南渡甄龍友題觀世音像云巧笑倩兮美目盼兮彼美人兮西方之人兮則宋時所塑大士像或已訛為婦人而觀世音之稱婦人亦當起於宋世元僧謭陋無識遂以為妙莊王女可一笑也今觀世音像率作婦人故人間顯迹夢兆無復男子相者俗遂真以觀世音為婦人不知夢生於心兆徵於目心目注瞻皆非男相則恍惚示現自當女身余考法苑珠林宣驗冥祥等記觀世音顯迹六朝至衆其相或菩薩或沙門或道流絶無一作婦人者使當時崇事類今婦人像則顯迹繁夥若斯詎容無一示現耶唐世亦然蓋誤起於宋無疑因類識數條以袪世俗之惑晉義熙十一年太原郭宣蜀郡文處茂先與梁州刺史楊收敬為友收敬有罪下獄宣與處茂同被桎梏念觀世音十日後夜夢一菩薩慰諭之告以大命無憂俄而鎖械自脫又宋張興妻繫獄晝夜祈念觀音經十日許夜夢一沙門以足躡之曰咄咄可起妻即驚起鉗鎖桎梏俱解然閉户警防無由得出乃却自械又夢向沙門曰鎖已開矣妻遂馳出又王球在獄至心念觀音夜夢升高座見一沙門以一卷經與之題名光明又見一車輪沙門曰此五道門也既覺鎖皆斷脫又苻秦畢覽東平人少奉法隨慕容垂北征沒敵單馬逃竄敵騎追將及覽至心誦念觀世音既得免脫入山迷惑失道又專心持念中夜見一道人法服持錫示以途徑安然至家又晉興寧中沙門法義得病惟歸誠觀世音如此數日晝眠夢見一道人來候其病因為治之刳出腸胃洗濯畢還納之夢覺衆患豁然經云或現沙門梵志之象意者義公夢其是乎又東魏孫敬德亦夢沙門令念觀音經臨刑刀折為三此類甚衆竟無一夢見婦人者當時像可推矣馮夷之為河伯其說逺矣好竒之士譸張眩惑紀載實繁即特立自信君子亦但斥言其妄而未嘗不以河伯為水神也乃余獨於竹書紀年而得其說焉紀年載帝芬十六年洛伯用與河伯馮夷鬬夫洛與河國名也伯爵也用與馮夷人名也謂河伯河神則洛伯洛神耶夫洛伯能與河伯鬭矣胡用之為神寥寥後世而馮夷獨盛稱耶觀泄十六年殷侯以河伯之師伐易則河伯為諸侯而馮夷非神鬼昭昭矣穆天子傳河宗柏夭為穆王乘副車導之極於西土而後返則當時柏夭亦造父奔戎之屬護從穆王者藉如後世所謂魚身人首何以周旋天子之側哉夫九歌屈氏之寓言而魚水莊生之幻說本未嘗謂實有且絶不道馮夷之名而茂先博物成式酉陽從而為說以實之吾不可以不辨亦幸而得之竹書也段氏所引河伯姓名頗衆并識於後以廣異聞酉陽雜俎云河伯人面乘兩龍一曰冰夷一曰馮夷又曰人面魚身又金匱言名馮循一作修河圖言姓吕名夷穆天子傳言無夷淮南子言馮遲聖賢記言服八石得水仙抱朴子曰八月上庚日溺河按首所引山海經河圖蓋緯書也今世繪八仙為圖不知起自何代蓋由杜陵有飲中八仙歌世俗不解何物語遂以道家者流當之要之起自元世王重陽教盛行以鍾離為正陽洞賓為純陽何仙姑為純陽弟子夤緣附㑹以成此目嘗觀前代書史若七賢過關四皓奕棋等圖淺誕不根者甚衆獨無聞此可知也考其出處亦各有所本張果在諸人最先進明皇時顯迹甚著葉法善以為混沌初分白蝙蝠精鍾離權吕嵓俱唐中晚人鍾有二絶吕有一律見唐諸選中藍采和亦唐人有踏踏歌見沈汾續神仙傳以常衣藍袍故名韓湘文公姪孫昌黎實贈以詩賈島亦有詩寄湘皆不言其道術獨酉陽雜俎記文公吏侍日偶江淮一族子訪之自云善幻文公令試其技頃刻開異花有雲橫秦嶺一聯乃録文公舊作非預兆且非湘也何仙姑見純陽文宋人雜說以為不飲食無漏而徐神翁宣和間海陵人見三仙傳頗詳其餘姓氏間有相同然不可深考總之不足深辨近閲元人慶壽詞有鍾吕二韓等八人信知起自元世人也元詞有曹國舅考諸仙傳曹姓無外戚而諸史曹姓外戚無得仙者據俗傳為宋人檢宋史惟曹佾為后弟見重於時年七十卒初不云得仙詞又有跛者李孔目蓋即圖中跛足拄杖者尤荒唐然必合此乃得八人之數考諸傳記惟神仙通鑑有劉跛子而非李姓與詞語殊不相蒙未審元人何據大都委巷之談耳劉跛子事出冷齊夜話雖詭異然不曰仙仙鑑何以引之韓湘說尤不一并鍾離亦無定論詳下條按通志有八仙圖又有八仙傳一卷注唐江積撰則此目唐時已似有之然徐神翁宋世甚明則唐時或他有其人如所謂五真之屬且太平廣記收神仙類事迹殆盡而鍾吕顯著若斯絶不見采并唐諸小說亦罕談及則唐人所謂八仙傳者决非鍾吕之儔明矣鍾吕傳道記稱唐施肩吾撰按肩吾晚唐詩人素不聞其有道術而宋初編太平御覽搜唐以前小說殆遍獨無所謂鍾吕傳道記者蓋必宋世方士訛撰託名唐人耳且吕一律見於鼓吹鍾二絶見於延之昌父所收而唐人所自選集皆無之恐俱不足憑也宣和書譜云神仙鍾離先生名權不知何時人而間出接物自謂生於漢吕洞賓於先生執弟子禮有問答語及詩成集狀其貌者作偉岸丈夫或峩冠紺衣或虯髯蓬鬢不冠巾而頂雙髻文身跣足頎然而立睥睨物表自稱天下都散漢又稱散人嘗草其為詩云得道高僧不易逢幾時歸去得相從字畫飄然有凌雲之氣非凡筆也元祐七年七月録詩四章贈王定國多論精勤志學長生金丹之事亹亹可讀終自論其書謂學龍蛇之狀識者信其不誣今御府所藏草書一觀此則鍾離之像虯髯蓬鬢雙髻跣足者與今所傳正同蓋宋時羽士假託鍾離權以誑王定國輩其詩實唐鍾離權所作而假託者不詳其世以為即漢鍾離昧故自稱生於漢後世因以漢鍾離目之蓋其來非一日矣定國為其所欺可耳而蔡元長輩於唐詩亦漫不考何耶宋人淳化帖博古圗二書每供識者談噱然宣和書畫譜誤處亦不在二書下楊用修嘗叙宣和譜而論鍾離乃以杜詩有近聞韋氏妹遠在漢鍾離之句世人遂贋作此名大可笑也仙傳拾遺云吏部侍郎韓愈甥忘其名姓弱冠往洛下省骨肉乃慕雲水不歸杳絶音信元和中忽還長安吏部與語甚竒之問其伎能云染花紅者可使碧或一朵具五色遂於吏部後堂前染白牡丹一叢云來春必作含稜碧色又四面合有一朵五色者無何濳去不知所之是歲上迎佛骨於鳳翔御樓觀之吏部上表直諫忤㫖出為潮州刺史至商山泥滑雪深忽見是甥迎馬首扶鐙接轡意甚殷勤至翌日雪霽抵鄧州乃白吏部曰某師在此不得遠去將入𤣥扈倚帝峰矣吏部驚異其言問其師即洪崖先生也吏部為五十六字詩以别之曰一封朝奏九重天云云與詩訖揮淚而别行入林谷其速如飛明年春牡丹花開數朵花色一如其說但每一葉花中有楷書十四字曰雲橫秦嶺家何在雪擁藍關馬不前書勢精能人工所不及非神仙得道卓見先知何以至斯據此傳則開頃刻花者又韓之甥然文公詩題甚明蓋江淮族子之說當得其實記者或因此詩而訛為韓湘又或因江淮而訛為外甥耳文公貶潮州歷歲始歸何得次歲仍覩長安牡丹故雜爼之說近之永州何仙姑不飲食無漏世傳其神異嶽州天慶觀柱以震折有倒書謝仙火字仙姑云雷部夫婦二人長濶各三尺銀色莫不傾信有熟於江湖間事者曰南方賈人各以火自名一火猶一部也此賈名仙刻木記已物耳是亦不可知也嘗有道人自言隋唐間人談黃巢事甚悉因曰黃大晚節至此張安道尚書云巢六兄弟而巢最小當第六由是推之則道人之言信然乎右見劉貢父詩話據吕純陽語則何仙姑當為唐末人據此說則當是宋初人也安道以强記絶一代其博識僅見此然舊唐書巢兄弟八人揆為巢弟則巢非最小明矣道人固不足憑安道亦未為得貢父該洽冠宋又從筆之甚矣綜核之難言也夢蕉詩話云廣之增城有何仙姑者相傳為邑民何泰之女生唐開耀間常欲絶俗去遊羅浮父母怪之將婚夕忽不知其所之惟研屏間遺題云麻姑怪我戀塵囂一隔仙凡道路遙去去滄洲㺯明月倒騎黃鶴聽鸞簫據此則何又當為唐人然他無可據恐好事者為之齊東野語亦載何及謝仙事當在慶厯間豈何顯於宋世自稱唐人耶世所盛傳張仙像張弓挾彈若貴逰公子以為即梓潼之神文昌之宿然梓潼自有像氅衣紗帽與張仙殊不類且道家言梓潼出處謂文昌尚近之祈嗣絶無干也偶閲陸文裕金臺紀聞云張仙像是蜀王孟昶挾彈圖初花蘂夫人入宋宫念其故主偶攜此圖遂縣於壁謹祀之一日太祖幸而見之詰焉花蘂跪答曰此蜀中張仙神也祀之能令人有子非實有所謂張仙也余按紀聞以此說得之蜀中一士夫或類近實蓋以張弓為張仙挾彈為誕子而梓潼之神本蜀人且張姓因謬相傳今又以梓潼化身傳文昌耳王長公勘書圖跋云宋初諸降王中獨孟昶有天人相見於花蘂夫人所供其童子為元哲武士為趙廷隱當時進御者以勝國故不敢具其實故目為文皇耳然則孟昶之像一訛而為梓潼又再訛而為太宗皆可笑也孟昶嘗刻石經於蜀又有與花蘂納涼詞世但知李重光昶文雅殊不減也唐末名畫皆入蜀故應屢見於圖世又謂張星之神為張仙按酉陽雜爼天翁姓張名堅又日姓張名表則天與日與星皆張姓宜海內張姓獨多也聞者莫不絶倒竈神亦姓張名單字子郭見雜爼梓潼神姓張名亞子見太平廣記俗傳灌口二郎漢唐前殊不經見偶閲朱氏語類云蜀中灌口二郎廟當時是李氷因開離堆有功立廟今來現許多靈怪乃是他第二兒子出來初間封為王後來徽宗好道謂他是甚麼真君遂改封為真君向張魏公用兵禱於其廟夜夢神語云我向來封為王有血食之奉故威福用得行令號為真君雖尊凡祭我以素食無血食之養故無威福之靈今須復我封為王當有威靈魏公遂乞復其封不知魏公是有此夢還是一時用兵託為此說今逐年人户賽祭殺數萬來頭羊廟前積骨如山州府亦得此一項稅錢利路又有梓潼君極靈今二箇神似乎割據了兩川矣見語類首鬼神類梓潼神事見太平廣記蓋唐以前有之今二祠香火遍海內不止蜀中矣世所祀天地水三官祠宇幾遍海內然其顯迹前代傳記殊未聞考通志惟三元醮儀一卷而不題撰者疑當起於宋世然宣和畫譜大歷中名畫周晦有三官像圖唐末范瓊孫位張素卿皆有之五代左禮朱繇曹仲元遂不可勝數推原實始漢末唐宋而盛至於今極矣張道陵教法凡祈禱服罪之人以三符授之一著山上一地下一水中詳載漢書今之戲具與古同而盛行於世者圍碁象戲握槊而已彈碁摴蒱打馬打彄采選葉子等俱不傳今圍碁十九行三百六十一路子亦如之宋世同此然漢製十七道唐局或十八道不可不知也按程氏演繁露云今碁方十九道合枰為碁子三百六十一案李善注韋昭博奕論枯碁三百引邯鄲淳藝經曰碁局縱橫各十七道合二百八十九道白黑碁子各一百五十枚則漢碁製可知唐栁子厚記石碁局自然成紋十有八道可奕然唐詩詠碁有十九條平路之句則唐製固應十九道其十八道者或碁局稍異間為之耳又胡宿詩又有三百枯碁之句則自引用漢人語不足據也今奕多以三六二四等起手然前此或不盡爾集異記王積薪避亂夜投一茅屋有姑婦暗中以口奕始云以東五南九置子次東五南十二至三十六而止其說雖極詭誕然可以知唐世起手不盡類今也今鄧艾開西蜀圖奕家不復傳而通志有王積薪金谷園九局圖又鳳池一卷尚載諸譜中神仙雖長生天地迥絶凡民至於伎倆藝能未必盡超人世余歷考傳記所載神仙家詩文及書畫要自有一種超然方外意然擬之當行作者終自不同止如奕棋自王質爛柯之後薛用弱又撰王積薪事以實之世遂以仙家奕棊人世無敵然傳記所載亦不盡然因憶唐人紀聞一事云段䂮幼慕清虗年十六辭父入名山遇一叟引之至一處有諸先生坐大磐石上對碁䂮為侍者覩先生碁皆不工因教其形勢諸先生曰汝亦曉碁可坐因與叟對奕亦不敵於是有老先生開户出召䂮對之其碁少劣於䂮因笑謂曰欲習何藝乎䂮言願受周易老先生召孟叟授之後䂮布卦言事若神據此則仙家之碁反受教於人世正與王積薪事相反二書皆唐人撰總之俱不足信然仙家者流蕩意平心遊於大化不以淺機小數疲神則此說或反近之聞余言者當失笑云老先生者云即晉郗鑒也又廣記載唐待詔滑能棊品最高偶遇一人求與奕遂為敵手其人垂别謂滑曰吾天人帝命取公棊耳滑尋卒然則天人之奕固亦不加國手矣并識博笑今戲具圍碁最古當是周時遺製或以為戰國者徒據奕秋不知仲尼已先道矣象戲稍為後出北周武帝有象經二十卷楊用修疑非今象戲謂其卷數太多然今金鵬等譜往往有數十卷者何足異也第其序見御覽者絶不與今同而唐以後殊無可考惟元怪録岑順一事可據戲録之寶應元年汝南岑順夢一人被甲報曰金象將軍傳語與天那賊㑹戰順明燭以觀之夜半後東壁鼠穴化為城門有兩軍列陳相對部伍既定軍師進曰天馬斜飛度三止上將橫行擊四方輜車直入無迥回翔六甲次第不乖行於是鼓之兩軍俱有一馬斜去三尺止又鼓之各有一步卒橫行一尺又鼓之車進須臾炮石亂下云云後家人覺其顔色慘悴因發掘東壁乃古冢有象戲局車馬具焉按此或文士寓談然唐人象戲之製賴此可考馬斜行三路卒橫行一路正與今同獨車直進不回則類於今之卒恐其他不盡合也又不云有象按司馬溫公七國碁圖亦無象云象不可用於中國故名有實無也續考通志周武象經止一卷王褒何妥各有注則云二十卷者又丹鉛録之誤也象戲亦有十九路者宋朝無咎廣象棋圖局十九路子九十八今溫公七國譜傳朝譜鮮知因録其序云象戲戲兵也黃帝之戰驅猛獸以為陳象獸之雄也故戲兵而以象戲名之余為兒時無他㺯見設局布棋為此戲者縱橫出竒愕然莫測以為小道可喜也稍長觀諸家陳法雖畫地而守規矩有截而變化舒卷出入無倪其說亦可喜暇時因求所謂象戲者欲按之以消永日蓋局縱橫路十一棊三十二為兩軍耳意苦而狹也嘗試以局縱橫路十九棊九十八廣之意少放焉然按圖置物計步而使終亦膠柱而已矣而智者用之則十九者之間盡强弱之形九十八者之間盡死生之勢而十九九十八之外死生强弱可循環無窮飽食終日得五說而為之則涿鹿之縱橫猶目前矣右序載馬端臨文獻通考譜録琴棋類據朝則宋時象棋縱橫皆十一路而今縱十路橫九路與宋時頗不合又宋人事物紀原亦載岑順事以為與今正同則唐宋固無異而國朝或未盡同也今之雙陸即古握槊也事始以為陳思王製而無明證晉世稍稍有為此者六朝唐宋相沿洪遵譜尚行世其製正與今同而唐製不可考惟宣室志一事足徵洪氏譜雙不載因戲録之雖其說詭誕不必論也東都陶化里空宅張秀才者居之夜深欹枕乃見道士與僧徒各十五人從堂中出形容長短皆相似排作六行秀才以為靈仙所集不敢愓息因佯寢以窺之良久别有二物展轉於地每一物各有二十一眼內四眼剡如火色相馳逐而目光眩轉砉剨有聲逡巡間僧道三十人或馳或走或東或西或南或北道士一人獨立一處則被一僧擊而去之其二物周流於僧道之中未嘗暫息如此爭相擊搏或分或聚一人忽呌云卓絶矣言竟僧道皆默然而息秀才乃知必妖也明日搜尋之於壁角中得長行子三十骰子一雙按此製正與今同但今雙陸始列必八行而唐六行稍異然洪譜有三梁雙陸每半三梁正得六梁唐製或同此也或謂六行者以六梁言恐未然凡握槊終乃六梁無先列六梁者國朝某侯家多姬妾嘗賓客對局命姬妾三十衣緋緑代長行蓋真有之今投子六面二十一㸃正與唐同或笑投子既方安得無六面者是不知外國投子有四面而無么六者見洪氏譜又有二面者古五木皆投子類也但今投子么四皆緋宣室志張某所見物二十一眼中止四眼閃爍如火則第四為緋耳么不爾也又今投子製甚小大者不過三數分無至寸者而唐人投子凡四㸃當加緋者或嵌相思子其中溫庭筠詩云玲瓏投子安紅豆入骨相思知也無相思子即今紅豆并四枚嵌一面則唐投子將近方寸矣投子六面者不知起於何時余意正當與握槊先後以其數皆限於六耳或謂列言投瓊孔稱博奕當起此時不知穆天子傳王兩與隱士井公博又在孔列之先然是五木之類非六面者投當如上字從瓊者以玉從骰者以骨皆后之變也五木之戲盛行六朝幼嘗讀劉毅等傳邈不知為何物嘗閲他書稍稍得其要領後讀程泰之演繁露證據精詳可謂毫髮無憾矣其文多不載獨謂骰子即五木而六面者起於唐時恐未然蓋握槊晉世已行五木非握槊所用故當起於六代也國史補云今之博戲有長行最盛其具有局有子子黑黃各十五擲采之骰有二其法生於握槊變於雙陸天后嘗夢雙陸不勝狄梁公言宫中無子是也後人新意長行出焉又有小雙陸圍透大㸃小㸃遊談鳯翼之名然無如長行也監險易者喻時事焉適變通者方易象焉王公大人頗或耽玩至於廢慶弔忘寢食及博徒用之於是彊各爭勝謂之撩零假借分畫謂之囊家囊家什一而取謂之乞頭有通宵而戰者有破産而輸者其工者近有談鎬崔師本首出圍碁次於長行其工者近有韋延祐楊芃首出如彈棊之戲甚古法雖設鮮有為之其工者近有吉達高越首出焉按右李肇所言則唐之長行正與今雙陸合而李以為生於握槊變於雙陸則唐之雙陸或反與今不同而洪氏譜雙合而為一尚似未妥總之三者亦小在同異之間非必相懸絶也至史補所言博徒囊家乞頭通宵破産等俗絶與今類蓋古昔共然矣乃唐人長行之戲至盛於圍碁則理之不可喻者彈碁第聞漢晉間據此知唐人亦能之栁子厚彈碁說今載圍碁譜中非也巵言謂前導為伍伯所引賈充及崔豹語當矣然晉唐間官中行鞭杖者亦謂伍伯南北史多載尚未明審唐書蘇世長為刺史因民不率教責躬引咎自撻於都街伍伯疾其詭鞭之見血世長不勝痛大呼走觀者無不笑之又太平廣記某人欲知未來或曰公部中伍伯判冥者也立召問之答曰某非能知未來但某在冥中亦為伍伯能以杖之多寡驗人吉凶耳蓋冥中考掠生人杖至十數已上者其人多死或預言之人遂謂之判冥而實非也據二事則伍伯固有兩義按世長唐名臣而此事絶可供笑因志之酉陽雜爼載伍伯三四處如語資類載某公欲題名岩石偶無筆以伍伯杖畫之則伍伯或前導而兼行杖者正猶今之皂人行則呵辟罰則用刑耳又按宋程氏演繁露載後漢虞詡傳注續漢志伍伯公八人中二千石六人千石六百石皆四人自百石以下皆二人黃綬武官伍伯六官辟車鈴下侍閣門闌部署衙走卒皆有程品多少隨所典領率皆赤幘絳褠即今行鞭杖者然則伍伯之名漢世已有矣續考後漢曹節傳節弟見越騎營五百妻有色從求之五百不敢違注引韋昭云五百字本伍伯伍當也伯道也使之導引當道也按今俗呼行杖人為五百右皆注中語據此說最為明了余所謂二義兼者信矣又禰衡傳黃祖怒衡不遜令五百將出杖之亦見後漢書則知二字漢世通用也今俗稱皂隸亦有所本皂人蓋古司牧者隸則輿隸本不並言考張湛列子注已見則疑起於晉然義未必同今俗以新娶男稱新郎女稱新婦又婦之事公姑者例呼新婦按新婦之稱蓋六代已然而唐最為通行見諸小說稗官家不可勝舉然自主翁姑言非主新嫁也新郎君唐人自稱新獲第者不聞主新娶者言惟宋世詞有賀新郎或當起於此時大抵國朝世俗稱謂率循習宋元世近故也娘子已見六朝祖珽傳又唐初有娘子軍婦人纒足謂唐以前無之余歷考未得其說古人風俗流傳如墮馬愁眉等史傳尚未絶書此獨不著太白至以素足咏女子信或起於唐末至宋元而盛矣又古言婦人弓腰而不言弓鞋言纖指而不言纖足則陶宗儀之說未為無見晉木蘭歌述婦人改服但稱雲鬢花黃略不言足誠似可疑第六朝前婦人之履不知與男子竟有别否此雖閨閣靡關涉然是古今變革之大者尚俟詳考定之郎瑛謂纒足起李後主宫人窅娘見類稿少室山房筆叢卷二十四
