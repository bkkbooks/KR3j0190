body:
  text: 少室山房筆叢卷十二明胡應麟撰九流緒論中漢子書見於七略者儒家則陸賈二十三篇劉敬三篇賈山八篇太常蓼侯孔臧十篇賈誼五十八篇董仲舒百二十篇兒寬九篇公孫𢎞十篇終軍八篇吾丘壽王六篇虞丘説一篇莊助四篇鈎盾冗從李步昌八篇桓寬鹽鐵論六十篇劉向六十七篇揚雄三十八篇道家則捷子二篇注云漢武帝時人曹羽二篇同武帝時陰陽則張蒼一十六篇公孫渾邪一十五篇于長天忠臣傳九篇法家則朝錯三十一篇縱橫則主父偃二十八篇徐樂一篇莊安一篇蒯通五篇聊蒼三篇雜家則淮南內二十一篇淮南外三十三篇東方朔二十篇解子三十五篇司馬相如等荆軻論共五篇農家則董安國十六篇泛勝之十八篇蔡癸氏一篇小説家則虞初周説九百四十三篇自餘無名姓者槩不著録右漢世子書之盛如此然大槩非戰國比也今惟陸賈賈誼十餘家傳而公孫主父等往往以文辭見餘或不知其時代爵里因録其略焉春秋繁露十七卷稱漢董仲舒撰自宋以來讀者咸以為疑而莫能定其真偽按劉氏七略春秋類惟公羊治獄十六篇稱仲舒而絶無繁露之目隋經籍志始有之或以即公羊治獄十六篇非也余讀漢藝文志儒家有仲舒百二十三篇而東漢志不可考隋志西京諸子凡賈誼桓寬揚雄劉向篇帙往往具存獨仲舒百二十三篇略不著録而春秋類特出繁露一十七篇今讀其書為春秋發者僅僅十之四五自餘王道天道天容天辨等章率泛論性術治體至其他陰陽五行沴勝生克之談尤衆皆與春秋大不相蒙蓋不特繁露冠篇為可疑併所命春秋之名亦匪實録也余意此八十二篇之文即漢志儒家百二十篇者仲舒之學究極天人且好明災異據諸篇見解其為董氏居然必東京而後章次殘缺好事因以公羊治獄十六篇合於此書又妄取班氏所記繁露之稱繫之而儒家之董子世遂無知者後人既不察百二十篇所以亡又不深究八十二篇所從出徒紛紛聚訟篇目間故咸失之當析其論春秋者復其名曰董子可也孔叢子稱孔鮒撰非也孔氏子孫雜記先世言行其文詞類東京及間有魏晉手筆如孔臧與安國書是已宋咸嘗為注訓景濂遂以即咸偽撰而體不甚類宋人或未必盡然也書七卷所記子思子上子高子順子魚及漢孔臧子琳十餘世至季彥與楊伯起皇甫威明同時政東漢之末則此書當是季彥輩裒集先世遺言軼行而成而宋人從潤飾之其小爾雅詰墨等篇皆鮒撰者為多遂通謂鮒作其書雖不事竒詭而一循規矩不稍涉於異端固吾夫子家法也漢藝文志及隋唐俱無孔叢子至宋中興書目始著録故前輩往往疑之苐其間詞義有非宋咸輩所辦者且其所敘家世孔臧後孔琳以逮季彥十餘傳不應全屬烏有考漢志儒家有太常孔臧十篇梁有太常孔臧集二卷至隋已亡而唐書藝文志仍有之蓋梁所謂孔臧集即漢志儒家十篇亡於隋而復出於唐宋咸因取其中雜記先代者傅以六經諸子所載厥宗言行綴緝而成此書孔琳迄季彥十餘世要皆臧原書集末所附若文中家傳例耳余此辨竊謂得之與前説并存以俟精識之士漢世記事之博莫過太史公立言之博亡出淮南子故揚雄以淮南太史並論又以為淮南之用弗如太史公知言哉淮南蓋效吕覽而作者其文詞竒麗宏放瑰目璨心謂挾風霜之氣良自不誣而詭辭邪説坌溢篇中自戰國莊列二鄒縱談宇宙茅靡瀾倒舉世若狂漢興董賈諸人漸趨醇朴一代文章垂復古始淮南又羣集浮華網羅淫僻淵渟澤滙萃為此編自以極天下之觀而不知好大喜夸之弊不亡國殺身有不已者余讀淮南既竒其才悲其遇又重惜其未聞君子之大道也因題簡末云淮南王招集竒士傾動四方説者咸以此書雜出賓客之手非也左吳雷被諸人著作絶無可見特附淮南而顯豈梁苑鄒枚鄴中劉阮等哉惟招隱士詞絶竒古雖稱小山卒不傳其名姓惜也漢藝文志淮南所撰又有兵家一種又天文雜子星一十九篇又六藝有易訓二篇又賦類有淮南王賦八十二篇漢賦之盛莫加於此計其才當與子建上下以弗傳世罕知者附識此漢志無小山賦疑在淮南作八十二篇之中者揚子雲撰太玄惟桓談以絶倫必傳爾後玄學中微儒者動資笑噱然晉唐間注此書者殆至數十家故不甚落莫也今據諸家書目備録此宋衷太玄經注九卷陸績太玄經注十二卷虞翻太玄經注十四卷范望太玄經注十二卷章察太玄經講疏四十六卷又太玄經發隱三卷王涯説玄一卷又太玄經注六卷宋維翰太玄經注十卷林瑀太玄經注十卷又太玄經釋文一卷徐庸玄頥一卷又太玄經解十卷杜元穎太玄經傳三卷郭元亨太玄經疏十八卷陳漸演玄十卷范諤昌補正太玄經十卷程賁太玄經手音一卷馮玄太玄音訓一卷林共太玄圖一卷孫胄太玄正義一卷又太玄叩鍵一卷王長文通玄十卷張揆太玄淵旨一卷吳祕太玄釋文一卷許翰玄解四卷玄厯一卷司馬光太玄經集注十卷朝氏星紀圖一卷又陸凱太玄經注王肅太玄經注並見隋志中又邵雍太玄準易圖見通考朝氏論中今傳者尚十餘家凡玄之得失自前人論之已詳第此書本名太玄其稱經者班氏文致之詞後世因遂尊之非實也參同契東漢魏伯陽撰朝公武云神仙傳伯陽會稽上虞人通貫詩律文詞博贍修真養志約周易為此書凡九十篇徐氏箋注桓帝時以授淳于叔通因行於世隋唐書皆不載考唐陸德明解易字云虞翻注參同言字從日下月今有日月為易之文古書也余按漢志東京文章猥弱已甚世傳論衡潛夫之類可見此書雖言養生而詞極古奧即東京諸子難之非後人能偽作也隋書本名大易參同契蓋東漢緯書之名多此類亡論隋唐志不載即驟出於今吾豈以為偽哉世傳龍虎上經朱文公云偽書也因參同有此語故方士贋作之余讀之信然又朝疑隋志不載參同契亦失考按隋志倣漢書道家列於九流而神仙符籙列於二藏其名悉不著録參同契神仙家蓋總之道藏故不列其名耳此書當在太平黃庭等經之前張平叔詩叔通受學魏伯陽留為萬古丹經王誠實録云舊唐書無釋道二藏之目新書志雖列神仙三十五家而有不著録者六十二家蓋是書唐以前世寡知者故汩沒道藏中凡考諸志此又當詳察云王充氏論衡八十四篇其文猥冗薾沓世所共輕而東漢晉唐之間特為貴重蔡雍祕弗視人葛洪贊弗容口劉子玄槌提班馬不遺餘力而獨尊信是書三子皆鴻生碩彥目無今古乃昌歜羊棗異代同心何哉秦漢以還聖道陸沉淫詞日熾莊周列禦鄒衍劉安之屬揑怪興妖不可勝紀充生茅靡瀾倒之辰而獨岋然自信攘臂其間剗虛黜增訂訛斫偽詖淫之旨遏截弗行俾後世人人咸得藉為口實不可謂非特立之士也故伯喈尚其新竒稚川大其宏洽子玄高其辨才特其偏愎自是放言不倫稍不當心上聖大賢咸在訶斥至於問孔刺孟等篇而闢邪之功不足以贖其橫議之罪矣近世誚充太甚若何氏沈氏諸説或未足以大服其衷故余稍為次其功罪以折衷後之君子中郎以論衡為談助蓋目為稗官野史之流且此編驟出未行而新竒可喜故祕之帳中如今人收録異書文固非所論也自論衡不甚稱後世究竟舉主多歸咎中郎者余特為一灑之論衡之問孔序意自明以仲尼大聖其語言應接有絶出常情者當時門弟子不能極問故談疑發難以待後人之答藉在孔門固好學之一事第詞間傷直旨或過求此充罪也劉子玄輩不能詳察遽從而效之以譏詆聖人至堯舜禹湯咸弗能免猶李斯之學荀況矣讀王氏論衡煩猥瑣屑之狀溢乎楮素之間辨乎其所弗必辨疑乎其所弗當疑允矣其詞之費也至精見越識足以破戰國以來浮詭不根之習則東西京前邈焉罕覩當時以新特而過稱之近世以冗庸而劇詆之匪充書異昔也驟出於秦漢之間習聞於伊洛之後遇則殊哉而宋人窮理之功昭代上儒之效亦著矣論衡謂仲尼為素王桓談為素相又謂仲尼之道傳桓君山君山傳周長生何太僕劇罪之是也第秦漢間聖賢稱謂與後世殊不同臧紇聖於春秋韓非聖於戰國揚雄張衡聖於東西京彼何人哉推此則知孟稱夷惠未足盡憑韓非仲尼並稱見孔叢子武臣問世但知老子同傳此更駭聞吳越春秋東漢趙曄撰曄會稽山陰人范史云曄少為縣吏恥於厮役遂棄車馬去到犍為資中詣杜撫受韓詩究竟其術積二十年絶問不還家為發喪制服曄卒業乃歸古人於學其精勤一至於此而世鮮知者故具載之曄所著又有詩細歷神淵蔡雍至會稽讀詩細而嘆息以為長於論衡雍還京師傳之學者咸誦習焉今人但知論衡為中郎所賞絶不聞所謂詩細等按曹娥碑亦蔡至會稽賞識世遂盛傳此正其同時事信有幸不幸也中郎虛懷樂善自非後世忌忮者所及然論衡祕之而詩細傳於學者蓋趙主説經故也歷神淵似亦倣緯候為名其所言不可考矣論衡云會稽周長生作洞歷十篇上自皇帝下至漢朝鋒芒毛髮之事莫不紀載與太史公表紀相似類也上通下達故曰洞歷然則長生非徒文人所謂鴻儒者也按長生為充所推轂如此而世絶不知其人洞歷名甚新竒爾時越中才士故自不乏第東京末紀事之文大槩多不能工存其名以慰作者太玄經十四卷晉楊泉撰鄭氏通志略作太玄蓋泉以子雲同姓故此書亦擬太玄而作也今苐馬氏意林所鈔百餘言存馬氏注云望國楊泉字德淵而不言何時鄭藝文略及隋藝文志俱云晉人惟舊唐書作唐人然唐人諱淵泉字德淵其為晉人無疑舊唐書字誤也馬氏意林又有物理論十六卷所采頗衆而不題名氏按隋志亦泉所撰其云張蒼除肉刑每歲所殺萬計鍾繇復肉刑歲生二千人又以漢文除肉刑為匹夫之仁蓋韓非鄧析流也子書篇帙至曼衍者吕覽淮南論衡抱朴止矣大都卷不過數十餘馬氏意林乃有傅子百二十卷隋志云晉傅玄撰玄在晉以文名一時今製作尚載諸選此書當唐馬氏世必首末具存故意林仍其原數然所録不過百數十言獨裴松之三國注楊泉物理論多掇之據其文義殊非高邈嘗臠一胔全鼎可知鄭志僅存五卷通考卷同蓋末世所餘僅十之一耳夫子書槩論理道卷曰數十已極繁侈而玄至百餘安能遠哉王仲淹之著中説也唐宋以還知之者十而三罪之者十而七疑之者十而九甚至以河汾有穢行史削之夫仲淹生隋季世遁迹閭巖一時與遊董常數子而外亡論房李魏王若風馬牛絶不相及即薛收杜淹識者疑焉而隋史成於武德貞觀之間計中説當時潤飾於王氏諸子者尚未行世未必知隋有若人史置弗録胡怪也余讀仲淹書獨慨夫士之生於三代之下者一壞於管商載靡於釐翟三汩於申韓四湛於黃老五淫於莊列六殉於曇摩下逮六朝南北即瑰偉絶特蓋世之英亦將望是數者趨焉息焉其於周公仲尼之道蓋邈不知其何物矣仲淹勃興衰運直欲懸揭而日月之今繹其遺言源流洞如規模廓如詞義秩如溫如豁如即性命天人之極彼或未窺是非大謬聖人者固已鮮矣藉令面命杏壇詎出端木顓孫之下若之何後世之知之者弗勝夫罪之者之衆也至刻畫顔曽步趨鄒魯福郊福畤之為固無事辨特其肩任太𢎞論建太廣志意太驟稍似有以啓其端者紫陽所為三嘆而致惜歟莊氏稱寓言十九重言十七文中子與莊絶不同然其中所列諸弟子及老儒宿將問答之言要皆當以莊之重言觀之取其議論而弗計其人有亡可也朝公武讀書志考諸人與河汾絶不相值甚詳苐亦無庸事此讀中説即瞭然李密李靖皆英雄氣吞一代劉炫生徒遍四方薛道衡李德林之才名楊處道賀若弼之幹略當時聲譽烜焃俱遠出河汾上矧詩書禮樂槩非六朝所急一處士談周公仲尼諸人日僕僕候其門乎仲尼大聖微生畝直斥其名葉公太宰之問率孫詞以對以炫之矜弼之愎素之巨姦道衡之輕薄彼其於文中奚有甚矣阮逸輩之過勞其心也房杜王魏尤無謂河汾諸子以乃公明王道述禮樂卒不一試歷舉顯者文之故論文中者此類皆當置一邊其中傅會可笑如董常比顏子竟死文中子前王魏房杜人固多悉其妄余恐董常之死亦是後人橫加陳同甫氏槩以阮龔增益然劉蕡在唐已峻斥擬經之罪則知出福郊二子為多崔銑子鍾嘗考定中説分內外雜篇序之曰內篇九篇義美文馴外篇九篇文若誇張義亦錯雜其餘放言不倫疑出後人所附潤為雜篇然內篇所采楊素李密劉炫諸人問答文既爽實義亦非精凡此類仍當刪入雜篇可也文中子不特房杜諸人可疑仲淹子福畤福畤六子勃勔勮勸劼助皆盛有文名而勮勔位皆公輔乃迄無能為厥祖闡揚潛懿者殊自難曉又按勃傳稱祖通隋末大儒後世謂史全不載亦非元子十卷唐元結次山撰高似孫極稱其文英崛過栁栁州唐文惟二公似不省昌黎何代者大槩六代以還文尚俳偶至唐李華蕭頴士及次山輩始解散為古文蕭李文尚平典元獨矯峻艱澀近於怪且迂矣一變而樊宗師諸人皆結之倡也元自號琦玕子以山名琦玕中興頌世推大體然安史叛臣臨文所當切齒而頌曰邊將騁兵殊失輕重至非老於文學其誰宜為不惟矜誇靡當豈穆如清風之致哉因論元子漫及若其人則卓卓矣玄真子唐張志和撰志和吾婺人行誼甚高卓自號煙波釣徒所著有太易等書及西塞山詩詞一二尚見雜説中蓋高才遠識而皭然塵壒之表者即此書雖不越莊列餘言而恢譎跌宕想見其人非元次山皮襲美下也説者以唐一代無史才以余較觀三百年子書亦寥寥焉昌黎原道諸作名理偉然出秦漢諸儒上至堯以是傳之舜數十言直接之孟軻氏然子書體一變矣自餘浮猥瑣尾亡論西京求潛夫中論比不易得子有别才非耶唐又有劉崇遠著書號金華子猥淺不足言然非婺人也吾郡宋元二季詞章學術冠天下獨子書蔑聞國朝郁離外有蘇伯衡之瞽説焉凝道外有宋景濓之燕書焉瞽説幾亞郁離燕書大過凝道皆婺中子書有秦漢風者足為明興正始而世罕稱述因附識云蘇亦號空同子在獻吉前少室山房筆叢卷十二
