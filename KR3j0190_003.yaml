body:
  text: 少室山房筆叢卷三明胡應麟撰經籍會通三古書歴世兵革洊更間有殘編裂簡僅以空名寓於載籍緝錄之家存而不論博雅之流論而不議釣竒之士顧有取焉編摩之暇辨駁誣謬聨絡遺亡與癖古者共之述遺軼第三甚矣秦火之烈也皇王帝霸之道聖神賢哲之謨蕩為烟埃所存占卜術數而已漢興六藝始出於屋壁冢墓之中劉向父子掇拾七略孔氏之外無復他編其餘儒墨兵農班史藝文所志大抵春秋戰國之作夏商以前僅數十種率皆誕幻不經當時具悉其偽今俱摘錄類列篇中即不耳目其書大都可槩見矣至於占卜術數動稱黄農以上反闕秦漢之文蓋以嬴熖所遺故盛相依託其為誣矯尤不可言世所洞曉不復贅疣云班藝文志所錄次序頗淆今稍據時代列之漢以兵取天下故論兵書特盛楊㒒任宏所輯一百八十二家固取不過數十家其目尚多依託自餘可知神農二十篇農家又兵法一篇兵家黄帝十六篇兵家又經四篇又銘六篇又君臣十篇又襍五十八篇俱道家又說四十篇小說家蚩尤二篇兵形勢家太乙兵法一篇天乙兵法三十五篇封胡五篇風后十三篇力牧十五篇鵊治子一篇鬼容區三篇俱兵隂陽大禹二十七篇農家天乙三篇謂即成湯非前太乙也小說家務成子十一篇小說伊尹五十一篇道家又二十七篇小說辛甲二十九篇鬻熊二十二篇太公二百三十七篇俱道家尹佚二篇墨家師曠八篇萇𢎞十五篇俱兵隂陽家孔甲盤盂二十六篇雜家凡依託不經之甚者莫如黄帝三王房中二十卷堯舜房中二十三卷湯盤庚房中二十卷皆極野俚䙝誕可誅班氏自謂芟除猥雜猥雜孰加此者筆之正史何也第劉氏亦不應收醫方等錄雖亦稱述黄岐然文字古奥語致𤣥眇蓋周秦之際上士哲人之作其徒欲以驚世竊附黄岐耳今醫方但知内經等考班志有黄帝外經十八卷又扁鵲有内經九卷外經十二卷或即難經也三皇惟伏羲差免誣衊而亦有按摩一家大是笑資王伯厚困學紀聞云漢初去古未逺帝王遺書猶有存者賈誼書修政語引黄帝曰道若川谷之水其出無已其行無止顓頊曰至道不可過也至義不可易也功莫美於去惡而為善罪莫大於去善而為惡故非吾善善而已也善緣善也非吾惡惡而已也惡縁惡也吾日愼一日帝嚳曰緣巧者之事而學為巧行仁者之操而與為仁也故節仁之噐以修其材而身專其美矣徳莫高於博愛人政莫高於博利人故政莫大於信治莫大於仁吾愼此而已矣帝堯曰吾存心於先古凡十餘語多録與史記同不帝舜曰吾盡吾敬而以事吾上故見謂忠焉吾盡吾敬以接吾敵故見謂信焉吾盡吾敬以使吾下故見謂仁焉吾取之以敬也得之以敬也大禹諸侯㑹則問於諸侯曰諸侯以寡人為驕乎朔日朝則問於士曰大夫以寡人為汰乎又曰民無食也則我弗能使也功成而不利於民我弗能勸也湯曰學聖王之道者其辟如日静思而獨居其譬若火舍學聖之道而静思獨居其譬若去日之明於庭而就火之光於室也可以小見而不可以大知得賢而舉之得賢而與之其譬若登山乎得不肖而舉之得不肖而與之其辟若下淵乎是以君子愼其與而聖主愼其舉又曰藥食嘗於卑然後至於貴藥言獻於貴然後聞於卑求道者不以目而以心取道者不以目而以耳致道者以言入道者以忠積道者以信樹道者以人又引周文王武王問鬻子武王問王子旦師尚父淮南人間訓引堯戒曰戰戰栗栗日愼一日人莫蹪於山而蹪於垤此帝王大訓之存於漢者若髙帝能除挾書之律蕭相能收博士之書則倚相所讀者必不墜矣幸而緒言尚在知者鮮焉好古之士尚其盡心於斯按紀聞所載今見賈誼新書中意古必尚有其書紀錄帝王格言者或散見雜家如鬻子之類今其名不可得矣紀聞又云漢七略所錄若齊論之問王知道孟子之外書四篇今皆亡傳莊子逸篇十有九淮南鴻烈多襲其語唐世司馬彪注猶存後漢書文選世說注藝文類聚太平御覽間見之斷圭碎璧足為匣櫝之珍博識君子或有取焉六經之後擬作者世但知揚王一二然不止是也書亡逸故後無述焉今稍類列於篇擬易者揚雄太𤣥經關朗洞極眞經衞元嵩元包張志和太易張弧素履子司馬光濳虛又楊泉太𤣥經擬書者孔衍漢尚書後漢尚書魏尚書王通續書陳正卿續尚書漢至唐十二世崔良佐尚書演範宋韓氏續尚書擬詩者束晳補亡王通續詩擬春秋者王通元經之類擬論語者揚雄法言張融家語梁武帝孔子正言王通中說王勃次論語宋薛據孔子集語蓋亦正言之類擬孝經者馬融忠經徐浩廣孝經張上儒演孝經兵書往往有擬六經者郭良輔有武孝經員半千有臨戎孝經無名氏有兵春秋兵家論語農家又有賈充道大農孝經又劉炫酒孝經皆溷䙝聖典可罪也職官類又有宋百官春秋五卷王道秀百官春秋五十卷無名氏百官春秋二十卷蓋皆紀傳之屬又包諝河洛春秋李荃閫外春秋俱非編年體其他效編年者詳見下條考其義例如王仲淹元經鄭如幾魏春秋皆以魏為綂聖人誅叛臣攘夷狄之義安在哉六經惟春秋纉述尤盛李槩戰國春秋二十卷趙曄呉越春秋十二卷皇甫遵呉越春秋傳十卷楊方呉越春秋削繁五卷孔衍春秋國語十卷春秋後國語十卷劉允濟魯後春秋十卷何承天春秋前傳十卷春秋後傳三十卷春秋雜語十卷陸賈楚漢春秋九卷司馬彪九州春秋十卷劉孝標九州春秋抄一卷胡旦漢春秋一百卷漢春秋問荅一卷袁曄漢獻春秋十卷孔衍後漢春秋六卷孔舒元漢魏春秋九卷孫盛魏氏春秋二十五卷孫壽魏陽秋異同八卷習鑿齒漢晉陽秋五十四卷孫盛晉陽秋三十卷檀道鸞續晉陽秋二十卷杜延壽晉春秋略二十卷崔鴻十六國春秋一百二十卷十六國春秋略二卷蕭方三十國春秋三十卷三十國春秋鈔二卷武敏之三十國春秋一百卷皇甫謐𤣥晏春秋三卷王琰宋春秋二十卷魏衡卿宋春秋二十卷呉均齊春秋三十卷臧嚴棲鳳春秋五卷蔡允恭後梁春秋十卷呉競唐春秋三十卷韋述唐春秋二十卷陸長源唐春秋六十卷尹洙五代春秋一卷總之皆漢紀唐歴之類今傳者百無一二而偏記小史若越絶陽説等書輙十傳六七聖神經典即其名不易當如此况其實哉又如晏子春秋虞氏春秋吕氏春秋李氏春秋之類今惟晏呂氏傳蓋子書雜家非紀載褒貶也虞李二書當亦此類至如杜嵩有任子春秋辛邕之有博楊春秋俱俳諧文葛立方韻語陽秋是詩話明崔氏文苑春秋是文選竝取義而已六朝人棲鳳春秋蓋以配獲麟可笑宋史無𤣥晏春秋而有皇甫帝王世紀曹大家有女孝經宋尚宫有女論語今傳女孝經乃唐人借名大家然前志竝有曹書今亡逸矣孔鮒有小爾雅劉伯莊有續爾雅張楫有廣雅曹憲有博雅李商隱有蜀爾雅羌爾雅陸佃有埤雅羅願有爾雅翼林愼思有續孟馮休有刪孟劉軻陸筠並有翼孟司馬光有疑孟余允文有尊孟辨陳方之有削荀呉申有非荀劉李二爾雅今不傳蓋宋末已亡疑孟尊孟二書見朱文公集餘竝未覩二荀亦亡又宋人有蕃爾雅陸賈有新語顧譚亦有新語賈誼有新書虞喜亦有新書桓譚有新論夏侯湛華譚劉晝各有新論崔寔有政論王肅亦有政論仲長綂有昌言王滂亦有昌言賈山有至言崔靈亦有至言六朝好學漢類如此仲尼諸弟子著述傳於漢者漆雕子十三篇漆雕開之後七略至通志皆仝元龜以即開著誤也王史氏二十一篇六國時人芈子十八篇名嬰齊人芈姓音彌皆七十子之後也世子十六篇名碩陳人李克七篇子夏弟子景子十三篇宓子弟子公孫尼子二十八篇皆七十子之徒也受業仲尼者曾子外宓子十六篇宋景濓諸子辨有言子二卷宋以前目錄皆無元王爚裒集遺言為此書然猶勝偽撰者余近得顏子三卷亦國朝人裒集雖謂有功聖門可也孟子史稱七篇明甚而漢志十一篇蓋七字誤分為二也吾夫子世以文事顯而漢高世蓼侯聚特以軍功封世以經術傳而漢武世太常臧特以詞賦著太常有儒家十篇賦二十篇先孔氏而著書者黄帝史孔甲盤盂二十六篇漢志居雜家首非陳孔甲也陳博士鮒亦名甲故孔叢子後出宋人以即黄帝孔甲而又謂一名盤盂蓋盤盂宋世已亡而編目者誤記漢書有此因附會也唐志無孔叢子景濓太史以注者宋咸所篹大槩得之吾夫子裔傳尚書者安國注尚書者穎達然梁孔衍有漢尚書魏尚書則續書不始文中子也衍所著又有春秋數種夫子二十四世孫也戰國諸子往往有姓存名缺者西京諸子又往往有名在姓亡者今皆不可考因錄左方該洽之士或旁參曲証得其姓名以慰作者則不啻遇之旦暮矣景子三篇儒家兵家又十三篇羊子四篇儒家侔子一篇仝上宫孫子二篇道家鄭公九篇名家呉子一篇雜家尹都尉十四篇農家王氏六篇仝上李子十篇丁子一篇鮑子十篇苖子五篇魏氏六篇以上俱兵家白氏三十八篇醫家臣彭四篇儒家郎中嬰齊十二篇秦零陵令信一篇伯象先生一篇臣說三篇又賦九篇臣賢一篇以上雜家臣饒二十五篇臣安成一篇臣壽七篇以上小説家倕一篇兵家臣吾十八篇孺子冰四篇臣昌市六篇臣義二篇俱詞賦家臣瓚見漢書注先秦兩漢間子書名仝者甚衆蓋皆以姓為稱故爾然其書傳者甚希又非文義所急故往往知其一不知其二雖博雅之士或知其二未必知其三四也今據劉氏七略鄭氏通志及御覽元龜等類書條載十數類於左自備忘忽云爾非示諸大方也兩孟子一鄒人孟軻七篇一隂陽家一篇又易孟氏十一篇兩荀子一趙人荀况三十三篇一荀悅申鑒亦號荀子兩董子一戰國董無心一篇一漢董仲舒百二十篇三賈子一賈誼五十八篇一賈山八篇一唐藍田尉賈某撰見通志一志兩莊子一莊周五十二篇一莊助四篇又莊安一篇兩景子一宓子弟子三篇一兵家十三篇五孫子一道家十六篇一孫武八十二篇一孫臏八十九篇一孫軫九篇又晉孫綽十卷二吳子一呉起四十八篇一雜家一篇四李子一李克七篇一李恢三十三篇一李良三篇一兵家十篇二商子一商鞅二十九篇一商子逸書亦號商子四鄒子一鄒衍四十九篇五十六篇一鄒奭十二篇一鄒陽七篇二田子一田駢二十五篇一田俅三篇二鬻子一道家二十二篇一小說十九篇俱稱熊未必一人也兩兒子一兒寛九篇儒家一兒良一篇兵家兩劉子一劉敬三篇儒家一梁劉勰三卷二桓子一桓寛六十篇鹽鐵論一桓譚新論十七卷二蘇子一蘇秦縱横三十一篇兵家十一篇一蘇彥晉參軍見通志道家二張子一張儀十篇縱横一張蒼十六篇隂陽家二韓子一韓非五十五篇一韓信三篇兵權謀家二徐子一儒家匹十二篇宋人一徐樂一篇二墨子一墨家十五卷翟一兵家班志所省卷數未詳二毛公一毛萇詩訓故三十卷一道家九篇即趙隠博徒者七公孫子一公孫尼一公孫固一公孫𢎞一公孫龍一公孫發一公孫渾邪又汲冢有公孫段二王孫子一王孫巧心一篇儒家一兵形勢家十六篇二容成子一隂陽家十四篇一房中二十六卷二鶡冠子一道家一篇一兵家任宏所錄班氏省之三務成子一小說十篇一一五行十四卷一房中三十六卷二尉繚子一雜家三十九篇一兵家三十一篇二淮南子一雜家五十四篇一兵家班氏芟自容成至此疑皆一人二平原君一儒家七篇漢朱建撰一戰國趙公子勝二太𤣥經一揚雄十九篇一楊泉撰見唐書及通志略隋藝文志作太元經先秦子書之名有甚竒怪者其書什九不傳因錄此為好事談柄後世以竒怪稱者間附焉我子一篇墨家處子九篇趙人法家世子二十二篇儒家兒子一篇名良兵家蜎子十三篇名淵楚人道家尸子二十篇名佼商鞅師雜家闕子一篇縱横家梁武有補闕子當補此捷子二篇齊人道家楚子三篇道家宋子十八篇小説家芉子十八篇儒家髪子見楊用修集朝子見御覽又纒子見意林蹇子道家見藝文略少子齊張融道家臣君子二篇蜀人道家將詎子五篇陰陽家六國國筮子十七篇兵隂陽家乗丘子五篇隂陽家六國人宮孫子二篇道家長盧子九篇道家楚人鵊治子一篇兵隂陽家游棣子一篇法家鄭長者一篇道家六國時鄭人衛侯官十二篇隂陽家杜文公五篇隂陽家魁紀公三十卷唐樊宗師猗玕子三卷雜家元結撰炙轂子五卷唐王叡墨希子唐徐靈府道家甘􅍧子唐温庭筠小説家幽求子二十卷杜夷道家贅隅子宋王晞史記處子作劇子捷子作接子弭子作吁子蜎淵作環淵并識庾仲容子鈔今世不傳僅馬總意林行世按宋晁氏讀書志凡百七家三卷余所得本卷五而所引僅六十餘家蓋又亡其半矣其書多裁割前人言語洪景盧據所引疑古孟子與今不仝非也按景盧稱世不傳書三十餘家今意林亦僅存半其書名則諸史藝文諸家目錄往往可徵因錄景盧語而考列其下作者大都亦因槩見云容齋隨筆云唐世未知尊孟子故意林亦列其書而有差不同者如伊尹不以一介與人亦不取一介於人之類其他所引書如胡非子隨巢子纒子王孫子公孫尼子阮子正部姚信士緯殷興通語牟子周生烈子秦菁子梅子任奕子魏朗子唐滂子鄒子孫氏成敗志蔣子譙子鍾子張儼默記裴氏新書袁準正書袁子正論蘇子陸子張顯析言干子顧子諸葛子陳子要言苻子諸書今皆不傳於世亦有不知其名者矣考見下條隨巢子六篇胡非子三篇竝見漢藝文志注皆云墨翟弟子也纏子不載漢志而意林引用二條皆與董無心論難語無心戰國人著書闢墨子纏子蓋亦戰國墨之徒也王孫子一篇見漢志儒家注名巧心劉勰雕龍末所稱王孫巧心即此公孫尼七十子門人其書兩見漢志一儒家二十八篇一雜家一篇今意林所引但有公孫文子而無公孫尼不知其儒家雜家也阮子正部政論魏清河太守阮武撰姚信書名士緯梁人信又有新書二卷竝見鄭氏通志藝文略阮法家姚名家也通語十卷晉尚書左丞殷興撰正部論八卷後漢侍中王逸撰竝見隋志儒家注中凡注皆梁時目錄有者隋世已亡故囚類附之牟子二卷後漢太尉牟融撰鄭志仝列儒家今載𢎞明集者非也周生烈魏人三國志有傳隋志作周生子要論亦見儒家濳夫論注中秦子三卷呉秦菁撰見隋志雜家傅子注中梅子一卷中言阮歩兵意林以為晉人或近之隋志作梅子新論附桓譚下魏朗三卷後漢會稽人見隋志儒家唐子十卷呉唐滂撰見隋志道家鄒子漢志有三戰國衍奭漢鄒陽據意林所引百餘言不類戰國或當是陽書也孫氏成敗志三卷呉孫毓撰見隋志儒家正論下蔣子者魏蔣濟萬機論八卷見雜家譙子者蜀譙周法訓八卷見儒家鍾會芻蕘論五卷附蔣濟萬機論下黙記三卷呉大鴻臚張儼撰新言五卷呉大鴻臚裴元撰析言論三十卷晉議郎張顯撰並見隋志雜家傅子注下顯又有古今訓十二卷亦見雜家正論十九卷正書二十五卷竝袁凖撰見儒家蘇子者七卷晉征北參軍蘇彥撰陸子者十卷晉清河守陸雲撰竝附道家唐滂子下然雜家又有蘇道立言六卷陸澄政論十三卷不知意林所引果道家雜家也干子十八卷晉干寶撰顧子十卷晉揚州主簿顧夷撰竝附見儒家志林下然呉太常顧譚有新語十二卷亦稱顧子諸葛子五卷呉太傅諸葛恪撰見雜家然儒家又有武侯集誡二卷亦諸葛也陳子要言十二卷呉豫章太守陳融撰見法家苻子二十卷東晉員外郎苻朗撰見道家惟任奕子未得考而道家有魏河東太守任嘏撰道論十二卷或字之訛也漢志外竝見隋志唐史鄭志俱仝按景盧謂諸書今皆不傳於世此殊失考諸書非至宋始不傳自隋世已湮没考隋經籍志洪所列三十餘家存者惟魏朗唐滂蔣濟譙周袁凖苻朗顧譚任嘏十餘家隋巢一卷胡非公孫尼亦各一卷蓋不過十之三自餘皆梁世所有隋一不存修史者附見其目列注自明鄭漁仲一槩鈔入不復辨其有亡大誤後學若馬氏意林所錄自是從仲容子鈔篹出諸子本書雖亡其引用干子鈔者唐世故在洪雅名博洽然於諸史藝文志不甚究心故有此誤政與論太平御覽書目同科今意林六十家洪所列外尚有一二僻者化清經十卷蔡洪撰篤論四卷杜恕撰物理論十六卷楊泉撰竝隋世已亡附見諸子注中又體論四卷亦杜恕撰傅子百二十卷傅𤣥撰竝隋世尚存者此外有湘東王鴻烈十卷楊偉桑丘先生書二卷陸澄缺文十三卷張顯古今訓十一卷盧辯稱謂五卷桓子一卷何子五卷郭子三卷隋世或存或亡今率湮没無考大抵唐以前子書僻者略盡此矣藝文志儒家有董無心一卷注稱難墨子厯朝諸志咸有其目宋呉秘嘗為注釋見通考晁氏所紀蓋南渡尚存而今不甚傳其言行亦不少槩覩獨馬總意林引纏子云纏子修墨子之業以教於世儒有董無心者其言修而謬其行缺一字而庸言謬則難通行庸則無主欲事纏子纏子曰文言華世不中利民傾危繳繞之辭者竝不為墨子所修勸善兼愛子重之右皆纏子中語蓋二人同時纏墨者衊董自尊其敎固不足憑余獨慨夫戰國之世釐翟之教大行聲稱積漸至與儒竝以莊周之恣横其敘道術特冠墨於諸家之首而三致意焉自餘咸可例見無心生戰國世獨奮然起闢之計其度越當時詎在漢世仲舒之下蓋孟子輿氏後一人而已而後之儒者絶口不道其功鄭漁仲精覈藝文至謂無心為墨氏弟子寃哉余曷能弗詳為辯也班氏藝文於戰國諸子亦有不能盡錄者如墨家無纏子而見於意林蓋或出於後世而實戰國之書非偽撰也第今亦亡從考矣原夫藝文之為志也雖義例仍乎前史實紀述咸本當時往代之書存没非此無以考今代之蓄多寡非此無以徴故魏晉迭興盛衰迥絶齊梁接踵貯積懸殊且前人製作世日以寡後人著述世日以增遍讀厯朝諸志卷軸簡編靡有同者粤自晉唐而下懿君賢弼亡弗究心考文大典意在斯乎劉知幾史通以為附贅懸疣雷同一律而大譏隋史之非此疎鹵之譚匪綜核之論即後漢一書藝文無志而東京一代典籍茫然他可槩矣劉史通論史諸體甚覈獨論表志甚疎鄭漁仲所以譏范曄也甚矣前代之留神典籍也華嶠漢書軼矣然隋得一十七卷存焉唐得三十一卷存焉即殘闕僻緩之書弗忍棄也隋十七卷蓋重購所致唐顧倍之則承平日久屋壁之下岩石之中有時而出也蕭子雲晉書一百二卷至唐僅得九卷王智深宋書六十一卷至唐僅三十卷干寶晉書止二十卷朱鳳晉書止十四卷皆不知原數寶則散逸亡緒鳳則編緝未成亦錄之弗忍棄也前代于典籍如此後世非直殘缺者不可得見即全帙以飽蠧魚可勝嘆哉陸子淵云宋王景文有詩總聞嘗借鈔於李伯華家其說詩頗與文公異按景文名質蘇子瞻仝時人而此書端臨通考亦載苐卷數不同恐贋作也一友人云嘉靖中籍没分宜有晏元獻集一部二十餘帙鈔本也主其事者亦博雅之士當時深欲借鈔慮生謗議遂止余聞深為惜之因記里中有元人育嬰圖摹本載元獻跋語幾七百言其文甚莊雅而書法殊有晉唐風世但名元獻詩詞罕知其文翰者張文濳柯山集一百卷余所得卷僅十三蓋鈔合類書以刻非其舊也余嘗於臨安僻巷中見鈔本書一十六帙閱之乃文濳集卷數正仝書紙半已漶滅而印記竒古裝飾都雅蓋必名流所藏子孫以鬻市人余目之驚喜時方報謁臬長不持一錢顧奚囊有綠羅二匹代羔鴈者私計不足償并解所衣烏絲直綴青蜀錦半臂罄歸之其人亦苦於書之不售得直慨然適官中以他事勾喚因約明旦余返寓通夕不寐黎明不巾櫛訪之則夜來鄰火延燒此書倐煨燼矣余大悵惋彌月因識此冀博雅君子共訪或更遇云南渡以還書多端臨通考所未載者余所見小說家如西溪叢語癸辛雜識等不下數十種蓋馬氏所據大率本晁陳二家自餘宋末諸人所著或末及行世通考雖成於元世其時兵革劻勸無緣掇拾今承平日久故漸出人間不得以為偽也永樂中命胡廣王洪等輯大典二萬二千八百七十七卷一萬一千九十五冊目錄六十卷其表文載蟫精集中蓋古今創見書也惜卷帙繁重未傳云見七脩類稿少室山房筆叢卷三
