body:
  text: 少室山房筆叢卷十六明胡應麟撰四部正訛下黃帝內傳一卷朝公武云稱籛鏗得之衡山石室中陳振孫曰誕妄不經方士輩依託也余按神仙丹汞之籍大都依託上古帝王漢志方技中紛紛可見第秦漢人書即僞撰猶倍蓰後世真者如素問靈樞之類咸假軒岐亡論其術百代尊守其文辭稚川貞白能萬一乎惜二書外餘絶不傳而唐宋以還怪談陋說坌布域中若此書今尚行世漫識以例其餘穆天子傳六卷其文典則淳古宛然三代型範蓋周穆史官所記雖與竹書紀年逸周書竝出汲冢第二書所載皆訖周末蓋不無戰國語參之獨此書東遷前故奇字特多缺文特甚近或以為僞書殊可笑也晉乘疑即竹書余詳記之矣元人有僞作晉史乘楚檮杌者吾衍子行序謂一日併得之其書乃雜取左傳國語新序說苑中論文莊二伯事節約成編宋景濂王子充謂即衍撰蓋眇人作此玩世而元士之淺陋亦可見矣近又有妄人僞作黃叔度書者尤極大可笑本無可辨以二書陋頗相近漫及之列子稱穆王駕八駿之乘右服􅢒驑而左騄耳右驂赤驥而左白􅀈王車則造父為御􅀢為右次車之乘右服渠黃而左踰輪左驂盜驪而右山子柏夭主車參百為御奔戎為右馳驅千里至於巨搜氏之國巨搜氏乃獻白鵠之血以飲王具牛馬之湩以洗王之足及二乘之人已飲而行遂宿於崑崙之阿赤水之陽别日升崑崙之丘以觀黃帝之宫而封之以詔後世遂賔於西王母觴於瑤池之上西王母為王謠王和之其辭哀焉乃觀日之所入一日行萬里王乃歎曰於乎豫一人不盈於德而諧於樂後世其追數吾過乎按列子此段全録穆天子傳文足證列子所稱黃帝等書咸有所本昔人謂楊朱篇即古楊朱之書此篇引穆天子傳即以周穆王名篇則楊朱之說信矣或曰鶡冠子庚桑子咸據莊周賈誼足成以欺後世穆天子傳庸知非此類耶曰彼二書自莊賈引外絶不足觀穆天子傳與列子體制不同各極古雅此篇奇字皆列本書所無信知列子引穆傳非穆傳本列子也斯又辨贋書者所當知山海經古今語怪之祖劉歆謂夏后伯翳撰無論其事即其文與典謨禹貢迥不類也余嘗疑戰國好竒之士本穆天子傳之文與事而侈大博極之雜傅以汲冢紀年之異聞周書王會之詭物離騷天問之遐㫖南華鄭圃之寓言以成此書而其叙述高簡詞義淳質名號倬絶自成一家故雖本會萃諸書而讀之反若諸書之取證乎此者而實弗然也穆天子傳至晉始出而此書漢世獨完緣是前代文人率未能定其先後余首發之於此俟大雅君子商焉山海經本書不言禹益撰劉歆校定以為禹任土作貢而益等類物善惡著山海經蓋億度疑似之言趙曄吳越春秋因禹登會稽遂撰為金簡玉字之說曄東漢人在劉歆後其僞無疑讀者但以禹益治水不當至海外而怪誕之詞聖人所不道以破之而不據其本書按經稱夏后啓事者三又言殷王子亥又言文王墓凡商周之事不一而足朝氏但疑長沙桂陵數郡名及鯀湮息壤等文夫鯀事固禹益所覩商周曷從知之哉此書蓋周末文人因禹鑄九鼎圖象百物使民入山林川澤備知神姦之說故所記多魑魅魍魎之類而於禹為特詳始余讀山海經而疑其本穆天子傳雜録離騷莊列傅會以成者然以出于先秦未敢自信載讀楚辭辨證云古今說天問者皆本山海經淮南子今以文意考之疑此二書皆緣天問而作則紫陽已先得矣然經所紀山川神鬼凡離騷九歌遠遊二招中稍涉竒怪者悉為說以實之不獨天問也而其文體特類穆天子傳故余斷以為戰國好竒之士取穆王傳雜録莊列離騷周書晉乘以成者自非熟讀諸書及此經本末不易信也後世必有以余為知言者經載叔均方耕歡兜方捕魚長臂人兩手各操一魚竪亥右手把算羿執弓矢鑿齒執盾此類皆與紀事之詞大異近世坊間戲取山海經怪物為圖意古先有斯圖撰者因而紀之故其文義應爾及讀王伯厚王會補傳引朱子曰山海經記諸異物飛走之類多云東向或云東首疑本依圖畫而述之古有此學如九歌天問皆其類余意頓爾釋然甚矣紫陽之善讀書也即此文義之間古今博雅所未究而獨能察之况平生精力萃於經傳者可淺窺乎陶泛覽周王傳流觀山海圖則知此經古有圖也宋刻稱張僧繇畫古人著書即幻設必有所本山海經之稱禹也名山大川遐方絶域固本治水作貢之文至異禽詭獸鬼蜮之狀充斥簡編雖戰國浮誇之習乃禹貢則亡一焉而胡以傅合也偶讀左傳王孫滿之對楚子曰昔夏之方有德也遠方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林魑魅魍魎莫能逢之不覺灑然擊節曰此山海經所由作乎蓋是書也其用意一根於怪所載人物靈祗非一而其形則若魑魅魍魎之屬也考王孫之對雖一時辨給之談若其所稱圖象百物之說必有所本至於周末離騷莊列輩其流遂不可底極而一時能文之士因假穆天子傳之體縱橫附會勒成此書以傅於圖象百物之說意將以禹益欺天下後世而適以誣之也自此書之行古今學士但謂非出大禹而已而未有辨其本於穆滿之文者尤未有察其本於王孫之對者區區名義之末誠非大體所關然亦可見古仐事理第殫精索之即千載以上無弗可窮也作者有靈其將為余絶倒於九京也哉古嶽瀆經第八卷李公佐元和九年泛洞庭登包山入靈洞得之奇字蠧毁不能解其後周焦君詳之云禹治淮水三至桐柏山驚風迅雷水號木鳴土伯擁川天老肅兵功不能興禹怒召百靈授命䕫龍桐柏等山君長稽首請命禹因囚鴻蒙氏彰商氏兜氏盧氏犂婁氏乃獲淮渦水神名無支祈善應對言語辨江淮之深淺原隰之遠近形若猿猱縮鼻高額青軀白面金目䨮牙頸伸百尺力逾九象搏擊騰趠疾利倐忽視不可久禹授之童律童律不能制授之烏木由烏木由不能制授之庚辰庚辰能制鴟脾桓胡木魅水靈山妖石怪奔號叢繞者以千數庚辰以戰遂去頸瑣大械鼻穿金鈴徙之淮隂龜山之足俾淮水永安按此文出唐小說蓋即六朝人踵山海經體而贋作者或唐文士滑稽玩世之文命名嶽瀆可見以其說頗詭異故後世或喜道之宋太史景濂亦稍穩括集中總之以文為戲耳羅泌路史辨有無支祈世又訛禹事為泗洲大聖皆可笑近衡嶽禹碑盛傳其文體稍古然與虞夏諸書迥不類恐亦好事所遺也燕丹子三卷當是古今小說雜傳之祖然漢藝文志無之周氏涉筆謂太史荆軻傳本此宋承㫖亦以决秦漢人所作余讀之其文彩誠有足觀而詞氣頗與東京類蓋漢末文士因太史慶卿傳增益怪誕為此書正如越絶等編掇拾前人遺軼而託於子胥子貢云耳周氏謂烏頭白馬生角膾千里馬肝截美人手皆太史削之非也惟首二事出遷贊語自餘雖應劭王充嘗言悉不可信吾景濂亦似未深考且書果太史事本漢藝文志乃遺之乎漢志有荆軻論五篇燕丹必據此增損成書者隋志有宋玉子一卷亦列小說家並燕丹子皆漢志所無二書必一時同出僞無疑也唐尚存今不傳神異經十洲記俱題東方朔撰悉假託也其事實詭誕亡論即西漢人文章有此類乎漢志有東方朔二十篇列雜家今不傳而二書傳甚矣世好奇者衆也趙飛燕外傳稱河東都尉伶𤣥撰宋人或謂為僞書以史無所見也然文體頗渾朴不類六朝禍水滅火事司馬公載之通鑑誠怪如以詩文士引用為疑則非懸解語也𤣥本傳自言見詘史氏當是後人所加越絶書十五卷稱子貢亦曰子胥竝依託也楊用修據後序以去為姓得衣乃成等語謂東漢人袁康作按魏伯陽參同契後序鄶國鄙夫等句亦寓㑹稽魏某姓名而孔文舉漁父屈節十六言亦離合魯國孔融四字蓋東漢末盛為此體用修之論或不誣也第書稱越絶昔人以終不可解余按前代書名往往有鄙拙可笑者如常璩記漢事而名漢之書杜預彚集古文而名善文謝靈運采輯衆詩而直云詩集又釋典維摩詰所說經雖書竝不刋其名總之不可法也劉炫魯史記今不傳炫經術冠絶史筆或非其任而博學强識時莫與倫且隋世古書存者尚夥炫所采録必多可補前史之缺惜亡從見之矣西京雜記世以葛洪僞撰余詳辨之矣或又以為吳均者無他據止酉陽雜俎記六朝人欲用西京雜記事既而中止曰此吳均語恐不足用然洪序篇末甚明安知非雜俎誤又述異記朝公武謂任昉作而唐志稱祖同朝以為非然隋志無昉書而有祖冲之撰者十卷竟未知孰是也列仙傳三卷陳振孫云傳凡七十二人每傳有贊似非向撰西漢人文章不爾也余按漢書藝文志劉向所敘六十七篇止新序說苑世說列女傳而無此書七略劉歆所定果向有此書班氏决弗遺蓋僞撰也當是六朝間人因向傳列女又好神仙家言遂僞撰託之其書既不得為真則所傳之人恐亦未必皆實考此傳孫綽及郭元祖各為贊非六朝則三國無疑也𢎞明集有牟子論三十七篇題漢末牟融撰按隋志儒家有牟子二卷稱漢太尉牟融考後漢書有融傳在漢明前其時佛法固未入中國今其書已亡而𢎞明牟子論序稱靈帝時遭世亂離著書不仕精研佛道撰理惑論三十七篇其非儒家牟子明甚且隋唐諸志竝無此書嘗疑六朝晉宋間文士因儒家有牟子僞撰此論以左右浮屠讀其文雖猥淺而詞頗近東京意原録釋藏中故隋志不載若參同契之屬然伯陽姓名唐以前傳記昭灼而融諸論絶不聞援引可疑也洞真記四卷題郭憲子橫亦恐贋也憲事世祖以直諫聞忍描飾漢武東方事以𨗳後世人君之欲且子橫生西京末其文字未應遽爾蓋六朝假託若漢武故事之類耳後漢書憲列方技類後人蓋緣是託之漢武內傳不著名氏詳其文體是六朝人作蓋齊梁間好事者為之也所載諸仙女名詩家多用上元夫人蓋本此阿環者上元名介甫雪詩瑤池渺漫阿環家方萬里謂阿環王母名王方二子俱誤子瞻玉樓銀海句格自佳而據道書玉樓為肩銀海為眼以起粟生花襯之遂墮千古惡道學詩者不可不知拾遺記稱王嘉子年蕭綺傳録蓋即綺撰而託之王嘉中所記無一事實者皇娥等歌浮豔淺薄然詞人往往用之以境界相近故又名山記亦贋作今不傳梁四公記今載太平廣記中撰人或曰沈約或曰張說又稱梁載言余考隋志無此書蓋唐人僞撰託之沈約張說者也按名疑據姓譜以梁為七國之梁四公子皆公族也四公記似皆沙門隋遺録一名南部烟花録文絶鄙俗而稱顔師古殊可笑也傳者蓋僅十二三云開元天寶遺事稱王仁裕容齊隨筆辨之詳矣余按仁裕為僞蜀學士所著有玉堂閒話今尚載廣記中而開元遺事絶不經見其書淺俗鄙陋蓋效陶氏清異録而愈不足觀者仁裕能詩西江集至萬首今一二散見閒話中雖卑弱尚可吟諷書事亦清婉但乏氣骨不應至是以淺陋故世或好之今尚傳云廣陵妖亂志陳振孫云唐鄭廷誨撰余記一雜說云羅隱昭諌嘗謁高千里不得志故極言詆毁與駢始末太不相倫此言或自有謂駢釋賊不擊誠可誅志中述其惑於諸吕若喪心之極者未必盡爾也溫公通鑑全據此書蓋宋世用事羣小以史事謗涑水故唐末五代不及致詳耶又唐人評隱以落魄故好訕謗之詞此說蓋有自來瀟湘録唐人志怪中最鄙誕者諸家或以為李隱或以為柳詳其書本諧謔不必辨牛羊日厯諸家悉以劉軻撰其書記牛僧孺楊虞卿等事故以此命名按軻本浮屠中歲慕孟軻為人遂長髮以文鳴一時即紀載時事命名詎應乃爾必贊皇之黨且惡軻者為之也按通鑑注引作皇甫嵩嵩恨僧孺見傳或當近之龍城録宋王銍性之撰嫁名柳河東銍本意假重行其書耳今其書竟行而子厚受誣千載余嘗笑河東生平抉駁僞書如鬼谷鶡冠等千百載上無遁情真漢庭老吏日後乃身為宋人誣衊不能辨大是笑資然亦亡足欺識者也銍又有續樹萱録凡三事曰元撰曰全若虛曰賈博諭據洪氏隨筆元撰一事全録秦少游詩則二事可例推銍所自撰又有默記等略載陶氏說郛銍能力辨魏泰碧雲騢之誑不可謂非端士而躬自蹈之然游戲筆端差彼善也朱紫陽曰王銍性之姚寬令威多作贋書見文公子華子辨按姚氏贋書今不可見惟西溪藂語尚行樹萱録本見唐志宋世不存而劉燾無言者補之蓋亦僞書也白猿傳唐人以謗歐陽詢者詢狀頗瘦削類猿猱故當時無名子造言以謗之此書本題補江總白猿傳蓋僞撰者託總為名不惟誣詢兼以誣總噫亦巧矣率更世但貴其書而不知其忠孝節義學問文章皆唐初冠冕至今瞭然史策豈此輩能汚哉率更子通亦矯矯父風而皆為書名所掩余所惜歐氏不在彼也周秦行紀李德裕門人僞撰以搆牛奇章者也中有沈婆兒作天子等語所為根蒂者不淺獨怪思黯罹此巨謗不亟自明何也牛李二黨曲直大都魯衛間牛撰𤣥怪等録亡隻詞搆李李之徒顧作此以危之於戲二子者用心可覩矣牛迄功名終而子孫纍葉貴盛李挾高世之才振代之績卒淪海島非忌克忮害之報耶輒因是書播告夫世之工譖訴者周秦行紀韋瓘撰碧雲騢撰稱梅堯臣實魏泰也朝公武云泰襄陽人無行有口元祐中紀其少時聞見成此編心信章惇數稱其長則大槩見矣又王銍云魏泰場屋不得志喜僞作他人著書如志怪集括異志倦游録盡假名武人張師正又不能自抑出姓名作東軒筆録皆私喜怒誣衊前人最後作碧雲騢議及范仲淹而天下駭然不服矣余嘗笑唐人作僞書而其名隱宋人作僞書而其名彰然無益於僞則一也宋人好作僞經者阮逸僞子者宋咸僞說者惠洪諸人皆無害於名教世猶以僞訾之而以泰之顚倒白黑而碧雲騢迄今傳何也雲仙散録題馮贄撰共八卷昔人皆以為僞洪景盧尤斥之余讀其前六卷所引諸雜說無一實者蓋僞撰其事又僞撰書名實之至末二卷所引則諸書大半尚存於今胡以云悉誕也第二卷外書名雖誕所記率俊事雅談於朝廷政事人士品流一無干預創撰書名亦皆以文為戲如修竹大蘭杜康毛穎耳非有害於世及誑誤後學若碧雲騢老杜事實等書也清異録二卷陶榖撰或以文不類宋初者恐未然此書命名造語皆頗入工恐非榖不能但雲仙間有紀事志怪處此則全主滑稽耳擬諸李商隱之雜纂亦何減也近時文章大家間亦用之若髭聖之號王長公以題哀册文矣艾子世傳蘇長公作子瞻生平善俳謔故此類率附之宋人贊坡嘻笑怒罵皆成文章豈筆之於書淺俚若是乎然此書已見文獻通考蓋亦出於宋世非後人所託也何語林記坡調劉貢父避孔子塔語不若大風起兮睂飛揚安得猛士兮守鼻梁語尤劇而何不收以論艾子漫及之鍾吕傳道集稱唐施肩吾撰按肩吾唐中晚間詩人而純陽呂渭之孫視肩吾為晚出不應預記其事又太平廣記載神仙最衆獨無所謂鍾呂者而所引小說數百家即五代杜光庭仙傳拾遺之類亡弗收采獨亡所謂傳道集者而至宋始有之蓋鍾呂雖自稱唐人而其迹皆顯於宋一時方士神其說遂託唐人姓名以紀之或疑此書别有一施肩吾果爾亦當見於廣記不應宋世驟出并今所傳純陽集俱僞作無疑也唐人最喜述神怪而鍾之事一亡傳者其至宋始著可見香奩集沈存中尤延之竝以和凝作凝少日為此詩後貴盛故嫁名韓偓又不欲自沒故於他文中見之今其詞與韓不類蓋或然也方氏律髓以偓同時吳融有此題為訛不知此正凝假託之故不然胡以弗託之溫韋諸子而託之偓葉少藴以為韓熙載則姓與事皆近之總之俱五代耳葉以不當見唐志為疑此不然唐志如羅隱韋莊劉昭禹真皆五代人也詩話僞者尤衆魏文詩格而述沈約李嶠詩評而引昌齡皆不足辨今惟樂天聖俞二金針傳盡假託也詩解若歐蘇杜注等尤僞前人詳核不復贅陳云僞書出於唐後而名理可味者關尹也而齊丘近之僞書出於宋後而文采可觀者子華也而亢倉逾之文子真而時有僞者鶡冠僞而時有真者以二書全僞非也素問精深隂符奇奧雖非軒后非秦後書僞書多怪字者亢倉元命包乾坤鑿度而穆天子多怪字而弗害其為古書僞書多傅文者洞極子華三墳黃石而列禦寇多傅文而弗害其為古書惟其非僞則愈遠愈近愈離愈合惟其僞則愈近愈遠愈合愈離王長公云僞者多援少倍多拘少鐬元經出阮逸世以即阮逸也孔叢出宋咸人以即宋咸也朱紫陽以麻衣出戴師愈黃東發以文子出徐靈府宋景濓以關尹子出孫定王元美以元命包出張升獨三墳亡謂出毛漸者余知其漸出無疑也漸所作三墳序其詞實淺陋與書合故核僞書者核所出之人思過半矣或曰若子言世得論衡將益為中郎之祕獨奈何令人好古也噫尚書出孔壁世以僞詆安國乎竹書出汲冢世以僞訕束晳乎列子過江始傳世以為張湛僞乎惟其是而已凡核僞書之道核之七略以觀其源核之羣志以觀其緒核之竝世之言以觀其稱核之異世之言以觀其述核之文以觀其體核之事以觀其時核之撰者以觀其託核之傳者以觀其人核茲八者而古今贋籍亡隱情矣凡四部書之僞者子為盛經次之史又次之集差寡凡經之僞易為盛緯候次之凡史之僞雜傳記為盛璅說次之凡子之僞道為盛兵及諸家次之凡集全僞者寡而單篇列什借名竄匿甚衆於别編詳之大率秦漢以還書若三易連山歸藏子夏三墳六韜七緯關尹子華素書洞極李靖問答麻衣心法武侯諸策王氏諸經全僞者也列禦寇司馬法通𤣥經真錯以僞者也黃石公鶡冠子燕丹子僞錯以真者也管仲晏嬰文中真僞錯者也元命包孔叢潜虛真僞疑者也鬻䏸殘也亢倉補也繁露訛也皆不得言僞也素問握竒隂符山海其名訛也其書非僞也穆天子傳周書紀年其出晚也其書非僞也即以僞乎非戰國後也餘亡足辨矣黃石鶡冠燕丹蓋後人雜取戰國他書之丈易其名號為此非謂真三子作也宋黃長睿辨閣帖僞者幾半於真余讀秦漢諸古書核其僞幾十七焉世之論書者或以長睿為刻而不能不服其精余為此辨後世得無以罪長睿者罪豫也然余率本前人遺議稍加詳密間折其衷耳且夫人之始撰也慮其書弗傳也而託焉託而傳矣而其名竟沒沒有不悔其始之託焉者乎余㑹萃諸家暴而顯之託者固以亡沒其實所託者亦以亡受其疑皆未為不厚幸也至有舛而弗經謬而亡徵而儼然藉是行其說於天下後世則余之喋喋詎得已哉右余讀諸子辨少室山房筆叢卷十六
