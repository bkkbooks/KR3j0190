body:
  text: 少室山房筆叢雜家類六雜編之屬提要臣等謹案少室山房筆叢正集三十二卷續集十六卷明胡應麟撰應麟字元瑞蘭溪人萬厯丙子舉人以依附王世貞得名故明史文苑傳附載世貞傳中此其生平考据雜說也分正續二集為書十六種曰經籍㑹通四卷皆論古來藏書存亡聚散之迹曰史書占筆六卷皆論史事曰九流緒論三卷皆論子部諸家得失曰四部正訛三卷皆考證古來僞書曰三墳補遺二卷専論竹書紀年逸周書穆天子傳三種以補三墳之缺曰二酉綴遺三卷皆採托小說家言曰華陽博議二卷皆雜述古來博聞强記之事曰莊嶽委談二卷皆正俗說之附㑹曰玉壺遐覽四卷皆論道書曰雙樹幻鈔三卷皆論內典曰丹鉛新録八卷曰藝林學山八卷則専駁楊慎而作其中徴引典籍極為宏富頗以辨博自矜而舛訛處多不能免如沈德符敝帚軒剩語摘其以峩嵋為佛經金剛山之非辨婦人弓足之前後兩岐王士禎香祖筆記摘其誤以秦宜祿妻為吕布妻唐人長安女兒踏春陽一絶止據博異志而不引沈亞之為疏漏近時張文檒螺江日記以為竹書實出于晋太康年而應麟以為咸寧反糾楊慎為非是今核其所說如經籍㑹通謂崇文總目但經史有所論列子集闕如蓋據六一集所載然六一集中亦尚存子部之半非竟闕也又謂廣川書跋惟以說經為主自餘諸家僅存卷數蓋據書録解題然書録解題所言乃廣川藏書志非廣川書跋也又謂孟子七篇而漢志十一篇蓋七字誤分為二然前已引困學紀聞稱孟子外篇四篇以四合七非十一而何何隔兩頁而自矛盾也又謂先孔子而著書者黃帝史孔甲盤盂二十六篇然漢志注明云依托何以謂書在孔子前又謂漢志兵家兒子一篇書名竒怪然兒古倪字故倪寬史亦作兒寬倪子名書亦猶孫子吳子何竒怪之有也又云刋板當始于隋引開皇十三年敕廢像遺經悉令雕板為證然史文乃廢像遺經悉令雕造非雕版也史書占畢大抵掉弄筆端無所考證至云世知項槖八嵗而師孔子不知蒲衣八嵗而師堯甘羅十二上卿少矣而伯益五嵗掌火尤少以小說委談入之史論殊為可怪至以曹沫劫盟為葵邱之㑹以素問之雷公為黃帝弟子更不知出何典記矣九流緒論謂史佚為墨家之祖不知吕氏春秋有史角之明文謂隋志不載孔叢不知隋志孔叢七卷在論語類中不在儒家類中謂孔傳續六帖鄭樵通志所無不知傳與樵俱建炎紹興間人同時之書樵安能著録四部正訛謂憚于自名者魏秦筆録然東軒筆録實泰自署名其託名梅堯臣者乃碧雲騢謂衛元嵩元命包襲春秋孝經緯之名然元嵩書名元包不名元命包且春秋有元命苞苞字從草孝經并無元命包也至謂子華子之程本即僞撰者之姓名益無稽矣姑約舉其一二尚不止沈德符等之所糾蓋捃托既博又復不自檢㸃抵牾橫生勢固有所不免然明自萬厯以後心學橫流儒風大壞不復以稽古為事應麟獨研索舊文恭校疑義以成是編雖利鈍互陳而可資考證者亦不少朱彛尊稱其不失讀書種子誠公論也楊慎陳耀文焦竑諸家之後録此一書猶所謂差强人意者矣乾隆四十年六月十二日恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
