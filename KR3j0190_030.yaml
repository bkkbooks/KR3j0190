body:
  text: 少室山房筆叢卷三十明胡應麟撰雙樹幻鈔上隋經籍志曰佛經者天竺之迦維衛國淨飯王太子釋迦牟尼所説釋迦當周莊王之九年四月八日自母右脅而生資貌竒異有三十二相八十種好捨太子位出家學道勤行精進覺悟一切種智而謂之佛亦曰佛陀亦曰浮屠皆梵語也華言譯之為淨覺其所説曰人身雖有生死之異至於精神則常不滅此身之前則經無量身矣積而修習則成佛道天地之外四維上下更有天地亦無終窮然皆有成敗每一成敗謂之一劫自此天地已前則有無量劫矣每劫必有諸佛得道出世教化其數不同今此劫中當有千佛自初劫至釋迦已七佛矣其次當有彌勒出世必經三會演説法藏開度衆生由是道者有四等之果一曰須陀洹二曰斯陀含三曰阿那含四曰阿羅漢至羅漢者則出入生死去來隱顯而不為纍阿羅漢已上至菩薩者深見佛性以至成道每佛滅度遺法相傳有正象末三等醇醨之異年嵗逺近亦各不同末法已後衆生愚鈍無復佛教而業行轉惡年壽促短經數百千載間乃至朝生夕死然後有大火大水大風之災一切除去之而更立生人又歸淳朴謂之小劫每一小劫則一佛出世初天竺中多諸外道並事水火毒龍而善諸變幻釋迦之苦行也是諸邪道並來嬲惱以亂其心而不能得及佛道成盡皆摧伏並為弟子弟子男曰桑門譯言息心而總曰僧譯言行乞女曰比丘尼皆剃落髮鬚釋纍辭家相與和居治心修淨行乞以自資而防心攝行僧至二百五十戒尼五百戒俗人信馮佛法者男曰優婆塞女曰優婆夷皆去殺盜淫妄言飲酒是為五戒釋迦在世教化四十九年乃至天龍神鬼並來聰法弟子得道以百千萬億數然後於拘尸那城娑羅雙樹間以二月十五日入般涅槃涅槃亦曰泥洹譯言滅度亦言常樂我淨初釋迦説法以人之性識根業各差故有大乘小乘之説至是謝世弟子大迦葉與阿難等五百人追共撰述綴以文字載為十二部後數百年有羅漢菩薩相繼著論贊明其義此佛經教所自始也又云推尋典籍自漢已上中國未傳或云久已流布遭秦之世所以湮滅其後張騫使西域蓋聞有浮屠之教哀帝時博士弟子秦景使伊存口授浮屠經中國人未之信也後漢明帝夜夢金神飛行殿庭以問於朝而傅毅以佛對帝遣郎中蔡愔及秦景使天竺求之得佛經四十二章及釋迦立像并與沙門攝摩騰竺法蘭東還愔之來也以白馬負經因立白馬寺於洛城雍門西以處之其經緘於蘭臺石室而又畫像於清源臺及顯節陵上章帝時楚王英以崇敬佛法聞西域沙門齎佛經而至者甚衆永平中法蘭又譯十住經其餘傳譯多未能通至桓帝時有安息國沙門安靜齎經至洛翻譯最為通解靈帝時有月支沙門支讖天竺沙門竺佛朔等並翻佛經而支讖所譯泥洹經二卷學者以為大得本旨漢太守竺融亦崇佛法三國時有西域沙門康僧會齎佛經至吳譯之吳主孫權甚大敬信魏黃初中國人始依佛戒剃髮為僧先是西域沙門來此譯小品經首尾乖舛未能通解甘露中有朱仕行者往西域至于闐國得經九十章晉元康中至鄴譯之題曰放光般若經太始中有月支沙門竺法護西遊諸國大得佛經至洛翻譯部數甚多佛教東流自此而盛石勒時常山沙門衛道安性聰敏誦經日至萬餘言以胡僧所譯維摩法華未盡深旨精思十年心了神悟乃正其乖舛宣揚解釋時中國紛擾四方隔絶道安乃率門徒南遊新野欲令玄宗所在流布分遣弟子各趨諸方法性詣揚州法和入蜀道安與惠逺之襄陽後至長安苻堅甚敬之道安素聞天竺沙門鳩摩羅什思通法門勸堅致之什亦聞安令問遙拜致敬姚萇𢎞始二年羅什至長安時道安卒後已二十載矣什深慨恨什之來也大譯經論道安所正與什所譯辭義如一初無乖舛初晉元熙中新豐沙門智猛䇿杖西行到華氏城得泥洹經及僧祇律東至高昌譯泥洹為二十卷後有天竺沙門曇摩羅讖復齎胡本來至河西沮渠蒙遜遣使至高昌取猛本欲相參驗未還而蒙遜破滅姚萇𢎞始十年猛本始至長安譯為三十卷曇摩羅讖又譯金光明等經時胡僧至長安者數十輩惟鳩摩羅什才德最優其所譯金光明曇摩懺所譯泥洹等經並為大乘之學而什又譯十誦律天竺沙門佛陀耶舍譯長阿含經及四方律兜法勒沙門曇摩難提譯增一阿含經曇摩耶含譯阿毗曇論並為小乘之學其餘經論不可勝紀自是佛法通極於四海矣東晉隆安中又有罽賔沙門僧伽提婆譯增一阿含經及中阿含經義熙中沙門支法領從于闐國得華嚴經三萬六千偈至金陵宣譯又有沙門法顯自長安遊天竺經三十餘國隨有經律之處學其書語譯而寫之還至金陵與天竺禪師跋羅辨定謂僧祇律學者傳之齊梁及陳並有外國沙門然所宣譯無大名部可謂法門者梁武帝大崇佛法於華林園中總集釋氏經典凡五千四百卷沙門寶唱撰經目録又後魏時太武帝西征長安以沙門多違佛律羣聚穢亂乃詔有司盡坑殺之焚破佛像長安僧徒一時殲滅自餘征鎮豫聞盡亡匿得免者十一二文成之世又更修復熙平中遣沙門慧生使西域采諸經律得一百七十部永平中又有天竺沙門菩提留支大譯佛經與羅什相埒其地持十地論並為大乘學者所重後齊遷鄴佛法不改至周武帝時蜀郡沙門衛元嵩上書稱僧徒猥濫武帝出詔一切廢毁開皇元年高祖普詔天下任聽出家仍令計口出錢營造經像而京師及并州相州洛州等諸大都邑之處並官寫一切經置於寺內又别寫藏於祕閣天下之人從風而靡競相景慕民間佛經多於六經十百倍大業時又令沙門智果於東都內道場撰諸經目分别條貫以佛所説經為三部一曰大乘二曰小乘三曰雜經其餘自後人假託為之者别為一部謂之疑經右隋志敘浮屠源流經教顛末最為詳備因録之按梁武世玄奘未至西域而華林結集已五千四百餘卷貞觀中所取諸經六百餘部宋至五季禪學系興復代有增益乃今藏卷帙亦相去不逺何耶蓋梁武後罹湘東周武等變兵火蕩焚至唐存失幾且相半隋志雖唐初纂修苐存其目故纍代增益僅少加於舊而已前言張騫蓋漢武時者漢明時又有張騫使西域取佛經而返二張騫同漢人同使西域絶竒事貞觀七年法師玄奘遊天竺求法達於王舍城奘生洛州偃師陳氏隋季出家具戒博貫經籍每慨前代譯經多所訛略志遊西土訪求異本以參訂焉以三年冬抗表辭帝制不許即私遁自原州出玉關抵高昌高昌王麴丈秦奉奘行資護送達於罽賔從僧伽論師夫俱舍因明大毗婆娑等論至大林國從婆羅門學中論及異道典藉時婆羅門七百餘嵗至㒒底國從伏光法師學對法宗顯理門等論至那伽羅國從月胃論師學衆事分毗婆娑至祿勒那國從闍那屈多三藏學經部毗婆娑及薩婆多部辨真等論至麴闍國從毗邪屖那三藏學二毗婆娑王有勝兵十萬雄冠西域奘與胡商八十許人渡殑伽河彼俗以人祀天奘與諸商被執以奘風度特異將戮以祭俄大風作塵沙漲天晝日晦冥彼衆震懼以奘為聖人遂釋之至中天竺遇大乘居士為奘開瑜伽師地即入王舍城彼預聞奘至具禮郊迎之安置那蘭陀寺寺七寶所成僧以萬數奘見上方戒賢論師時春秋一百有六道德為西土宗師號正法藏國主以十城租賦奉之奘啓以求法意賢咨嗟流涕曰吾頃疾病且死忽夢文殊大師謂吾曰女未應厭世後三年震旦有大沙門從女受道自爾已來今三稔矣於是慰喜交集有同宿契焉奘見王王給象車從者三十輩日供上饌饌有龍腦香乳蘇蜜及大人米米香聞百步然國産不多唯君長與后及主法上德與焉奘寓其國從正法藏窮探大乘祕奧日益智證云至貞觀十六年三藏玄奘法師發王舍城入祗羅國國主郊迎之已而問曰而國有聖人出世作小秦王破陳樂為我言其為人奘粗陳帝神武削平天下躬行堯舜之治其王大驚即以青象名馬助奘馱經而還以貞觀十九年至長安文皇驚喜手詔飛騎迎之親為經文作序名聖教序云按奘師繭足大荒所厯西域數十國冒險犯艱屢濵死地卒羅致諸經返於中夏可謂曠劫之竒惜所撰大唐西域記今不復傳於世王司寇元美跋聖教序云文皇手定中原志得而無所事事興盡而感慨隨之不之於長生則之於因果亡惑也旨哉斯言并録諸此云按奘初入西域遇異僧授以心經見廣記浮屠學不出教與禪二端宋太史敘之極詳其文云西方聖人以一大事因緣出現於世自從鹿野苑中直至於跋提河演説苦空無我無量妙義隨機鈍利分為頓漸無小無大盡皆攝入薩婆苦海既滅度後其弟子阿難陀多聞總持有大智慧結集為修多羅藏而諸尊者或後或先各闡化源優婆離集四部律謂之毗尼金剛薩埵於毗盧遮那前親受瑜伽五部謂之祕密章句無著天親頻升知足天宫咨參慈氏相與造論發明大乘謂之唯識宗旨西竺龍勝以所得毗羅之法𢎞其綱要謂之中觀論燉煌杜法順深入華嚴不思議境大宣玄旨謂之華嚴法界觀毗尼之法魏嘉平初曇阿羅始持僧祇戒本至洛陽而曇無德曇諦等繼之立羯磨法唐南山澄照律師道宣作疏明之四分律遂大行是為行事防非止惡之宗薩埵以瑜伽授龍猛猛授龍智智授金剛智唐開元中智始來中國大建曼茶羅法事大智道氣大慧一行及不空三藏咸師尊之是為瑜伽微妙祕密之宗唐貞觀三年三藏玄奘往西域諸國會戒賢於那蘭他寺因受唯識宗旨以歸授慈恩窺基基乃網羅舊説廣制疏論是為三乘法相顯理之宗梁陳之間比丘惠聞因讀中觀論悟旨遂遙禮龍勝為師開空假中三觀正觀法門以法華宗旨授慧思思授天台國師智顗顗授灌頂頂授智威智威授惠威惠威授玄朗朗授湛然是為四教法性觀行之宗隋末順以法界觀授智儼儼授賢首法藏至清涼大統國師澄觀追宗其學著華嚴疏論數百萬言圭峰宗密繼之而其化廣被四方是為一念圓融具德之宗瑜伽久亡南山亦僅存其盛行於今者唯天台慈恩賢首而已此則世之所謂教者也世尊大法自迦葉二十八傳至菩提達摩達摩悲學佛者纒蔽於竹帛間乃𢎞教外别傳之旨不立文字而見性成佛達摩傳慧可可傳僧璨璨傳道信信傳𢎞忍忍傳曹溪大鑑禪師慧能而其法特盛能之二弟子懷讓行思皆深入其閫奧讓傳道一一之學江西宗之其傳為懷海海傳希運運傳臨濟慧照大師義玄玄立三玄門䇿厲學徒是為臨濟之宗海之旁出為溈山大圓禪師靈祐祐傳仰山智通大師慧寂父唱子和微妙玄機不可湊泊是為溈仰之宗思傳希遷遷之學湖南主之其傳為道悟悟傳崇信信傳宣鑑鑑傳義存存傳雲門匡真大師文偃偃之氣宇如王三句之設如青天震雷聞者掩耳是為雲門之宗玄沙師備偃之同門友也其傳為桂琛琛傳法眼大師文益益雖依華嚴六相唱明宗旨迥然獨立不涉九情是為法眼之宗遷之旁出為藥山惟儼儼以寶鏡三昧五位顯訣三種滲漏傳曇晟晟傳洞山悟本大師良價價傳曹山元證大師本寂而復大振是為曹洞之宗法眼再傳至延壽流入高句驪仰山三傳至芭蕉徹當石晉開運中遂亡弗繼雲門曹洞僅不絶如線唯臨濟一宗大用大機震蕩無際若聖若凡無不宗仰此則世之所謂禪者也嗚呼教之與禪本無二門依教修行蓋不出於六度等行而禪定特居其一由衆生根有不齊故先佛示化亦不免於異耳奈何後世各建門户互相盾矛教則譏禪滯乎空寂禪則譏教泥乎名相藉藉紛紛莫克有定是果何為者耶此則教禪異塗猶可説也自禪一宗言之佛大勝多與達摩同學禪觀達摩則逺契真宗勝多所見一差遂分為有相無相定慧戒行無得寂靜六門非達摩闢之安能至今廓如也慧能與神秀同受法於𢎞忍能則為頓宗秀則别為漸宗荆吳秦洛各行其教道一神會又同出於能者也道一則密受心印神會則復流於知解一去弗返而其末流若大珠明教慈受輩何以議為自教一宗言之慈恩立三教天台則分四教賢首則又分五教粗妙各見漸圓互指終不能歸之一致可勝嘆哉此雖通名為教各自立宗猶可説也自夫本教之內言之律學均以南山為宗真悟智圓律師允堪著會正記等文識者謂其超出六十家釋義之外至大智律師元照復别以法華開顯圓意作資持記又與會正之記殊指矣四明法智尊者知禮孤山法慧大師智圓同祖天台同學心觀真妄之異觀三諦之異説既已抵牾之甚霅川仁嶽以禮之弟子又操戈入室略不相容諫書辨謗之作逮今猶使人凜然也其他尚可以一二數哉雖然適長安者南北異塗東西殊轍及其所至未嘗不同要在善學者慎夫所趨而已比丘永壽嘗以閩僧一源所著護教編示豫自大迦葉至於近代諸師皆有傳贊文辭簡古誠竒作也夀獨惜其不著教禪承傳同異之詳請豫為記以補其闕略豫因以所聞疏之如右右厯敘禪教二宗本末粲然指掌非綜練釋門者不易至斯第以雲門法眼並出青原亦仍傳燈諸録之誤蓋道悟有二人同居荆南同示寂於元和間一居天皇寺一居天王寺居天皇寺者婺州張氏子符載為塔碑謂與藥山並為石頭上足一傳為惠真再傳為幽間三傳為文賁遂止不傳居天王寺者渚宫人崔氏子玉之後初參馬祖後謁石頭得法傳龍潭崇信信傳德山宣鑒鑒傳雪峰義存存傳雲門文偃為雲門宗存又傳羅漢桂琛琛傳清涼文益為法眼宗其顛末見丘玄素所撰塔碑甚詳景濂蓋但據五燈會元等書敘録而不及深考也然則禪之五宗僅洞山出石頭下而洞山師雲巖雲巖師藥山藥山馬祖亦從悟入者也六祖謂馬駒踏殺天下人信矣夾山臨遷化謂洛浦曰石頭一枝看看即滅矣洛浦曰他家自有青山在夾山曰如是吾復何憂按夾山師德誠德誠師藥山考其世次正與龍潭德山同時又洛浦本出臨濟門歸夾山日巖頭雪峰浸顯安得有一枝即滅之嘆即此足徴道悟之有二而龍潭德山雲門法眼皆南嶽派矣今混淆為一南嶽宗派既不明而天皇之道悟及其徒三世皆湮沒無可徴致足慨也其説詳林間録佛祖通載甚明王子充叢録所敘禪宗悉抄節宋太史亦未之詳考也禪宗正脈亦然溈山法眼二宗皆迄於唐末五代間是時曹洞雲門亦寂寥無卓見者獨臨濟一傳為興化興化再傳為南院南院三傳為風穴風穴四傳為首山首山五傳為汾陽汾陽六傳為石霜石霜七傳而為黃龍南楊岐會臨濟一宗至是大振南下出晦堂真淨晦堂下出悟新真淨下出從悅而張無盡師之會下出法演法演下出圓悟圓悟下出宗杲而張無垢師之自宗杲出而學徒遍天下縉紳儒流茅靡麟集無論雲門曹洞即黃龍一派亦寂寥矣禪家五宗獨臨濟為盛倡自黃蘗陸州皆大機逸格而臨濟自一悟後縱橫揮霍迥出常情厯世五傳知識不乏至宋初而石霜再振黃龍楊岐二派遂遍海宇南渡而後徑山復出舉代趨風宋太史所謂若聖若凡無不瞻仰自臨濟一宗觀之非虛語也然大慧後嗣者式微而紫陽廣漢金溪四明輩出儒術復大盛於當時諸緇流又落莫矣考智邵談道伊洛日正黃龍楊岐後而大慧前是時釋門亦稍式微足徴吾道與異端相為盛衰若符契也當宋之南渡禪門宗匠皆萃於南北方遂無一有聞者金人索浮屠大慧幾在行而復不果正猶六朝文士畢集荆吳間蓋氣運使然也是時道教稍衰替而王重陽以全真崛起中土學徒談馬丘劉輩從者數十百人其説時有合於釋氏又為道門之别傳矣蒙古世雖極崇釋氏而禪學為教門所排不絶如縷蓋盛衰之理勢必致然乃元之教門亦迄無顯著者而劉文貞特以事功顯帕克思巴位帝師號皇天之下一人之上則前古未有也元禪門達者印簡於臨濟為十六世趙承旨撰臨濟正宗碑謂五祖演演傳天目齊齊傳懶牛和和傳竹林寶寶傳竹枝安安傳西堂容容傳中和璋璋傳簡公號海雲大士禪學至此蓋中興焉印簡弟子二人曰可菴朗曰賾菴儇朗傳蓽菴滿及太傅劉文貞公即秉忠也儇傳雨雲安住天都慶壽寺元之諸主皆崇奉之賜以玉印曰臨濟正宗按天目齊以下不見五燈會元恐非當時高足當續考之存其源派於左海雲之後有法雲即中峰明本也趙承旨極重之事以師禮虞奎章撰塔碑本自作厯代祖師像讃始少林至臨濟臨濟至石霜石霜傳楊岐楊岐至五祖演昭覺勤虎丘隆天童華密菴傑密印先佛鑑範雪巖欽欽傳高峰妙凡距臨濟一十八世而妙傳明本總之楊岐派也元世之顯者僅數人自餘皆其子弟云按右所傳禪派自天童傑以上並見五燈會元蓋南嶽下十七世也密印而下會元所不列故詳著之以補宋太史之缺文雲門弟子特盛幾溢臨濟逮至宋遂無特起者僅雪竇天衣數家曹洞則投子芙蓉差著元皆寥寥蓋自唐後禪流顛末大槩具此矣近日禪學之弊以覺識依通為悟明以穿鑿機緣傳授為參學以險怪竒語為提唱以破壞律儀為解脫以交結貴達夤緣據位為出世方便其弊不可勝言右虞奎章法雲塔碑所舉五種禪學之弊可謂真切然自宋已有此風矣密宗春也天台賢首慈恩等宗夏也南山律宗秋也少林單傳之宗冬也就理言之但知禪為諸宗之别傳而不知諸宗亦禪之别傳也會而歸之密宗乃宣一佛大悲拔濟之心也教宗乃闡一佛大智開示之心也律宗乃持一佛大行莊嚴之心也禪宗乃傳一佛大覺圓滿之心也猶四序之不可混既不可混非别而何或者謂彼三宗皆不言别傳惟禪宗顯言别傳者何耶對曰理使然也諸宗皆從問而後入由學而後成惟禪內不涉思惟計度之情外不加學問修證之功窮劫逮今不曽欠少才云領荷早涉途程脫體承當翻成鈍置誠别中之别也昧者烏足以知之哉右明本和尚統論教禪宗旨蓋亦調停之説而陰為禪學地者其本宗也元世尊教抑禪故云或問今五宗宗嗣自臨濟而外餘皆無聞者豈授受之際失於囑纍耶抑宿緣之使然耶答曰聖人之道雖隱顯隨時亦由定分不能加損於其間當青原南嶽未著之時其五家已有定分矣當五家方盛之頃其修短之數安得無定分焉特彼此昧略而不自知耳或謂臨濟道出常情為人痛切機圓語活其煅煉人物速如反掌以故家聲久逺不墜自餘反是宜乎不永於世也右見中峰夜話據此則元世禪宗僅臨濟一支餘皆湮沒然宋太史當元末作序又謂雲門曹洞不絶如線者豈太史但據傳燈諸録不細考當時耶少室山房筆叢卷三十
