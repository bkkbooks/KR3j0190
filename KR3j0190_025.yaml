body:
  text: 少室山房筆叢卷二十五明胡應麟撰莊嶽委談下世所盛行宋元調曲咸以昉於唐末然實陳隋始之蓋齊梁月露之體矜華角麗固已兆端至陳隋二主竝富才情俱湎聲色所為長短歌行率宋人詞中語也煬之春江玉樹等篇尤近至望江南諸闋唐宋元人沿襲至今詞曲濫觴實始斯際自文皇以鴻裁碩藻撥六朝餘習而力反之子昂太白相望竝興逮少陵氏作出經入史剗絶淫靡有唐三百年之詩遂屹然羽翼商周驅駕漢魏藉令非數君子砥柱其間則花間草堂將踵接於武德開元之世詎宋元而後顯哉蓋六朝五代一也障其瀾而上則詩盛而為唐襲其流而下則詞盛而為宋余因是知陳李少陵厥功於藝苑甚偉而歐陽王蘇黃秦諸君子弗能弗為三嘆而致惜也宋諸君自秦外不稱當行然扶裒反正之責在焉而亦屬意斯道故他無譏也六朝五季始若不侔而末極相類陳隋二主固魯衛之政乃南唐孟蜀二後主於詞曲皆致工蜀則韋莊在昶前唐則馮韓諸人唱酬煜世竝宋元濫觴也今詩餘名望江南外菩薩蠻憶秦娥稱最古以草堂二詞出太白也近世文人學士或以為實然余謂太白在當時直以風雅自任即近體盛行七言律鄙不肯為寧屑事此且二詞雖工麗而氣衰颯於太白超然之致不啻穹壤藉令真出青蓮必不作如是語詳其意調絶類溫方城輩蓋晚唐人詞嫁名太白若懷素草書李赤姑熟耳原二詞嫁名太白有故草堂詞宋末人編青蓮詩亦稱草堂集後世以二詞出唐人而無名氏故僞題太白以冠斯編也楊用修詞品又有清平樂詞二闋尤淺俚俱贋作也唐妓女歌曲酒樓恍惚與今俗類薛用弱所記王昌齡之渙高適豪飲事詞人或間用之考其故實極可笑適五十始作詩藉令酣燕狹斜必當年少何緣得以詩句與二王決賭一也又令適學詩後則是時龍標業為閭丘曉害無緣復與高狎二也樂天鄭臚墓志第言昌齡之渙更唱迭和絶不及高高集亦無與之渙詩三也舉此一端即他悉誣妄可見往嘗讀薛記鬱輪袍竊謂右丞不至是天幸得此逗漏為干載詞場雪寃不覺浮三大白自快恨不呼右丞慶之菩薩蠻之名當起於晚唐世按杜陽雜編云大中初女蠻國貢雙龍犀明霞錦其國人危鬢金冠瓔珞被體故謂之菩薩蠻當時倡優遂製菩薩蠻曲文士亦往往效其詞南部新書亦載此事則太白之世唐尚未有斯題何得預製其曲耶又北夢瑣言云宣宗愛唱菩薩蠻詞令狐相國假溫飛卿新撰密進之戒以勿泄而遽言於人由是疏之按大中即宣宗年號此詞新播故人君喜歌之余屢疑近飛卿至是釋然自信具隻眼也即草堂稱太白詞傳竒之名不知起自何代陶宗儀謂唐為傳竒宋為戲諢元為雜劇非也唐所謂傳竒自是小說書名裴鉶所撰中如藍橋等記詩詞家至今用之然什九誕妄寓言也裴晚唐人高駢幕客以駢好神仙故撰此以惑之其書頗事藻繪而體氣俳弱蓋晚唐文類爾然中絶無歌曲樂府若今所謂戲劇者何得以傳竒為唐名或以中事迹相類後人取為戲劇張本因展轉為此稱不可知范文正記嶽陽樓宋人譏曰傳竒體則固以為文也今世俗搬演戲文蓋元人雜劇之變而元人雜劇之類戲文者又金人詞說之變也雜劇自唐宋金元迄明皆有之獨戲文西廂作祖西廂出金董解元然實絃唱小說之類至元王關所撰乃可登場搬演高氏一變而為南曲承平日久作者迭興古昔所謂雜劇院本幾於盡廢僅教坊中存什二三耳諸野史稗官紀載率不能詳薦紳先生置而弗論暇嘗綜核諸家頗得其槩漫識於後好事雅流或亡譏焉優伶戲文自優孟抵掌孫叔實始濫觴漢宦者傅脂粉侍中亦後世􅋔旦之漸也魏陳思傅粉墨堆髻胡舞誦俳優小說雖假以逞其豪俊爽邁之氣然當時優家者流糚束因可槩見而後世所為副淨等色有自來矣唐制如霓裳等舞度數至多而名號糚束不可深考樂府雜録開元中黃幡綽張野狐善弄參軍參軍即後世副淨也見輟耕録范傳康上官唐卿吕敬遷三人弄假婦人假婦人即後世裝旦也至後唐莊宗自傅粉墨稱李天下大率與近世同特所搬演多是雜劇短套非必如近日戲文也觀安節樂府雜録稱假婦人則知唐時無旦名也古教坊有雜劇而無戲文者每公家開宴則百樂具陳兩京六代不可備知唐宋小說如樂府雜録教坊記東京夢華武林舊事等編録頗詳唐制自歌人之外特重舞隊歌舞之外又有精樂器者若琵琶羯鼓之屬此外俳優雜劇不過以供一笑其用蓋與傀儡不甚相逺非雅士所留意也宋世亦然南渡稍見淨旦之目其用無以大異前朝浸淫勝國崔蔡二傳竒迭出才情既富節奏彌工演習梨園幾半天下上距都邑下迄閭閻每奏一劇窮夕徹旦雖有衆樂亡暇雜陳此亦古今一大變革人不深考耳凡傳竒以戲文為稱也亡往而非戲也故其事欲謬悠而亡根也其名欲顛倒而亡實也反是而求其當焉非戲也故曲欲熟而命以生也婦宜夜而命以旦也開場始事而命以末也塗汚不潔而命以淨也凡此咸以顛倒其名也中郎之耳順而壻牛也相國之絶交而娶崔也荆叉之詭而夫也香囊之幻而弟也凡此咸以謬悠其事也繇勝國而迄國初一轍近為傳竒者若良史焉古意微矣古無外與丑蓋丑即副淨外即副末也今優伶輩呼子弟大率八人為朋生旦淨丑副亦如之外即副末丑即副淨元院本止五人故有五花之目一曰副淨即古之參軍也一曰副末又名蒼鶻蒼鶻可擊羣鳥猶副末可打副淨一曰末泥一曰孤裝見陶氏輟耕録而無所謂生旦者蓋院本與雜劇不同也元雜劇旦有數色所謂裝旦即今正旦也小旦即今副旦也以墨㸃破其面謂之花旦今惟淨丑為之而元時名妓咸以此取稱如荆堅堅孔千金顧山山天然秀珠簾秀李嬌兒類又妓李嬌兒為溫柔旦張奔兒為風流旦蓋勝國雜劇裝旦多婦人為之也元花旦必與今淨丑迥别故妓人多為之末泥孤裝未知類今何色當續考之宋世雜劇名號惟武林舊事足徴每一甲有八人者有五人者八人者有戲頭有引戲有次淨有副末有裝旦五人者苐有前四色而無裝旦蓋旦之色目自宋已有之而未盛至元雜劇多用妓樂而變態紛紛矣以今億之所謂戲頭即生也引戲即末也副末即外也副淨裝旦即與今淨旦同蓋雜戲即傳竒具體但短局未舒耳元院本無生旦者院本僅供調笑如唐㺯參軍之類與歌曲無大相關也樂府雜録云蘇中郎後周士人蘇葩嗜酒落魄自號中郎每有歌場輒入獨舞今為戲者著緋戴帽面正赤蓋狀其醉也又有踏搖娘羊頭渾脫九頭獅子㺯白馬益錢以至循橦跳丸吐火吞刀旋槃筋斗悉屬此部又教坊記云踏搖娘者北齊有人姓蘇䶌鼻實不仕而自號為中郎嗜飲酗酒每醉輒毆其妻妻銜悲訴於鄰里時人㺯之丈夫著婦人衣徐步入場行歌每一疊旁人齊聲和之云踏搖和來踏搖娘苦和來以其且步且歌故謂之踏搖以其稱寃故言苦及其夫至則作毆鬬之狀以為笑樂今則婦人為之按此二事絶類豈本一事耶然雜録又有踏搖娘等不可深曉觀此唐世所謂優伶雜劇糚服節套大略可見宋之雜劇蓋亦若斯元院本但有詞無曲故詞第屬之歌人此類以供戲弄而已至元人曲調大興凡諸雜劇皆名曲寓焉而教坊名妓亦多習之清歌妙舞悉𨽻是中唐宋諸詞殆於盡廢又一變而贍縟遂為南之戲文而唐宋所謂雜劇至元而流為院本今教坊尚遺習僅足一笑云梨園字面見樂府雜録楊用修云漢郊祀志優人為假飾妓女蓋後世裝旦之始也然未必如後世雜劇戲文之為緣其時郊祀皆奏樂章未有歌曲耳元雜劇中末即今戲文中生也考鄭德輝倩女關漢卿竇娥皆以末為生此外又有中末蓋即今之外耳然則青樓集所稱末泥即生無疑今西廂記以張珙為生當是國初所改或元末琵琶等南戲出而易此名觀關氏所撰諸雜劇緋衣夢等悉不立生名他可例矣青樓集又有駕頭恐即引戲之稱俟考世謂秀才為措大元人以秀才為細酸倩女離魂首摺末扮細酸為王文舉是也細酸字面僅見此今俗尚有此稱武林舊事所記社㑹甚夥以雜劇為緋緑社唱贈為遏雲社耍詞為同文社清樂為清音社小說為雄辨社影戲為繪革社撮㺯為雲機社吟呌為律華社右八種皆駢集一處者然當時唱贈之外又有吟呌耍詞之外又有小說不知何以别之撮㺯蓋元人院本所從出也今自戲文外惟小說影戲社㑹尚有之勝國詞人王實甫高則誠聲價本出關鄭白馬下而今世盛行元曲僅西廂琵琶而已西廂本元微之前人辨論甚核獨蔡為牛壻絶無謂而莫知所本一日偶閲太平廣記四百九十八卷雜録末引玉泉子云鄧敞初比隨計以孤寒不中第牛蔚兄弟僧孺子有氣力且富於財謂敞曰吾有女弟子能婚當相為展力寧一第耶時敞已壻李氏矣其父嘗為福建從事有女二人皆善書敞行卷多其筆跡顧已寒賤未必能致騰踔私利其言許之既登第就牛氏親不日敞挈牛氏歸將及家紿之曰吾久不至家請先往俟卿洎到家不敢泄其事明日牛氏奴驅輜槖直入即出牛氏居常玩好幕帳雜物列庭廡間李氏驚曰此何為者奴曰夫人將到令某陳之李氏曰吾敞妻也又何夫人焉即撫膺大哭牛氏至知其賣己也請見曰吾父為宰相兄弟皆在郎省縱嫌不能富貴豈無一嫁處耶其不幸豈唯夫人今願一與共之李感其言卒同處終身乃知則誠所謂牛相即僧孺而鄧生登第再昏事皆符合姓氏稍異耳敞後官至祕書職位恍惚類雍余嘗笑中郎有三不幸漢史垂成陷身縲紲一也生止一女復沒虜庭二也頭白齒落制命凶渠千年後橫遭風流案誣衊日為里婦唾譏三也聞者輒大噱不能已或謂中郎流離逃竄愁苦一生設有此誣致足樂耳藝苑巵言云高則誠琵琶記其意欲以譏當時一士大夫而託名蔡伯喈不知其說偶閲說郛所載唐人小說牛相國僧孺之子繁與同人蔡生邂逅文字交尋同舉進士才蔡生欲以女弟適之蔡已有妻趙矣力辭不得後牛氏與趙處能卑順自將蔡氏至節度副使其姓事相同一至於此則誠何不直舉其人而顧誣衊賢者耶按巵言所引二姓悉合高氏或據此第僧孺之女則未審竟適何人耳僧孺二子曰蔚曰叢俱節度至尚書蔚子徽叢子嶠亦顯而絶無所謂繁者恐說郛所載未必如廣記之實也西廂事唐人自有鶯鶯傳而㑹真記侯鯖録尤詳其為微之無疑然則西廂琵琶二記一本微之中表一假思黯女夫二人在唐先後入相當時事業寥寥不知千載後得元人力閙熱百倍生前也西廂記雖出唐人鶯鶯傳實本金董解元董曲今尚行世精工巧麗備極才情而字字本色言言古意當是古今傳竒鼻祖金人一代文獻盡此矣然其曲乃優人絃索彈唱者非搬演雜劇也董氏傳竒稱崔氏孀婦寓僧寺河中兵亂杜確弭之張生紅娘等於鶯傳悉合獨鄭恆不可曉蓋崔後與張絶再醮無所謂中表爭姻之說乃微之自寓耳然疑董所撰或他有所本一日偶閲唐雜說栁參軍傳栁春日遊曲江邂逅崔氏女目成焉崔母王姓舅為執金吾他日金吾訪崔母欲令子娶崔女女不樂潜遣青衣輕紅往薦福寺僧院達意於生生喜即納聘私挈歸金吾不知以為子盜之笞之數十既崔母亡栁夫婦來赴金吾子見之因訟於官崔女卒歸王氏按此不知與微之孰先女皆崔姓婢皆紅皆期僧寺中可笑乃有如此特王栁二姓差異至鄭恆之爭則斷因此事附㑹無疑崔女後事甚怪不備録倩女離魂事亦出唐人小說雖怪甚然六朝此類甚多鄭德耀雜劇尚傳神俊不若王高古弗如董也董解元見輟耕録明謂金章宗時人去元世較逺決不能與馬鄭輩相及而涵虛子記元詞手乃有董解元等豈别一人或即金人以其北調之祖故引之耶惜其名字州里皆不可得且陶著書元末已謂董曲雖傳能習者少則金元腔調亦自迥不侔矣王實甫關漢卿大槩同時第不詳元何帝代要皆世祖時人陶氏輟耕録云大名王和卿滑稽挑達播四方中統初燕市有一蝴蝶其大異常王賦醉中天云挣破莊周夢兩翅駕東風三百處名園一采一箇空難道風流種唬殺尋芳蜜蜂輕輕的飛動賣花人搧遇橋東由是名益著同時關漢卿亦高才風流人王嘗以譏謔加之關極意酬答終不能勝王忽坐逝鼻垂雙涕尺餘人皆歎駭關來唁詢其由衆對此玉筯也關曰是嗓耳何玉筯為衆大笑曰若被王和卿輕薄半世死後方還得一籌耳凡六畜勞傷鼻中流膿則謂之嗓也觀此關之為人可見王所賦詞亦佳又以滑稽挑達與關善得非即所謂實甫者以先關卒故西廂記未成而關續之耶此事理極易推惜無他據今王實甫西廂記為傳竒冠北人以竝司馬子長固可笑不妨作詞曲中思王太白也關漢卿自有城南栁緋衣夢竇娥寃諸雜劇聲調絶與鄭恆問答語類郵亭夢後或當是其所補雖字字本色藻麗神俊大不及王然元世習尚頗殊所推關下即鄭何元朗亟稱第一今倩女離魂四摺大槩與關出入豈元人以此當行耶要之公論百年後定若顧陸之畫耳元曲傳於今者崔蔡二家外散套間得三數佳篇如王長公所稱暗想當年羅帕上把新詩寫沈深逸宕而字字本色真妙絶古今矣百嵗光陰意勝覺筋骨稍露長空萬里辭勝覺肌肉太豐俱讓一籌也漢文唐詩宋詞元曲雖愈趨愈下要為各極其工然勝國詩文絶不足言而虞楊范揭輩皆烜赫史書至樂府絶出古今如王關諸子無論生平履厯即字里若存若亡故知詞曲游藝之末途非不朽之前著也涵虛子記元詞手百八十餘中能旁及詩文者貫雲石高則誠二三子耳自餘馬致逺輩樂府外他伎倆不展一籌信天授有定也滕玉霄元好問薩天錫趙子昂馮海粟盧疏齊姚牧菴輩工詩文旁及詞耳高則誠在勝國詞人中似能以詩文見者徒以傳竒故并沒之同時盧摰處道亦東甌人樂府聲價政與高埒而製作弗傳世遂以盧為文士而高為詞人信有幸有不幸也元文人詞名者趙子昂貫雲石楊廉夫皆浙東西人元詞手與中原抗衡惟越而已高詩律尚散見元人選中如題嶽墳采蓮曲等篇雖格不甚超要非傳竒中語文則烏寶一傳見輟耕録小詞若琵琶諸引亦多近宋蓋勝國才士涉學者近時左袒琵琶者或至品王關上余以琵琶雖極天工人巧終是傳竒一家語當今家喻户習故易於動人異時俗尚懸殊戲劇一變後世徒據紙上以文義摸索之不幾於齊東下里乎西廂雖饒本色然才情逸發處自是盧駱豔歌溫韋麗句恐將來永傳竟在彼不在此金董解元世幾不聞而花間草堂人口膾炙是其驗也或謂戲曲無可廢理夫唐宋優伶所習今絶不省何狀元北戲自西廂外亦殊少傳者矣西廂主韻度風神太白之詩也琵琶主名理倫教少陵之作也西廂本金元世習而琵琶特創規矱無古無今似尤難至才情雖琵琶大備故當讓彼一籌也俳優戲文始於王魁永嘉人作之識者曰若見永嘉人作相宋當亡及宋將亡乃永嘉陳宜中作相其後元朝南戲尚盛行及當亂北院本特盛南戲遂絶右見葉氏草木子葉元末人據此則傳奇始自永嘉人作之今王魁本不傳而傳琵琶琵琶亦永嘉人作遂為今南曲首二事極相類大可笑也然葉當國初著書而云南戲遂絶當是時琵琶尚未行世耶王魁事當在宋初今唐人小說載王魁事說者以為宋人勦入之云琵琶記崑山有良璧詩王允何其愚說者以漢末有二王允一誅董卓一乃棄妻再娶者非也按後漢書黨錮傳黃允字子艾濟陰人也以雋才知名郭林宗見而謂曰卿有絶人之才足成偉器然恐守道不篤將失之矣後司徒袁隗欲為從女求婚見允嘆曰得壻當如此允聞而黜遣其妻蓋黃姓非王允也今本多誤刻故録之汪司馬頗取此詩謂西廂詩無一成語者琵琶此首差可觀然瑜字與姿古韻絶不通又宋𢎞二語大似村學究聲口僅勝王關可耳王實父晚風寒峭詞末句不想跳龍門到來學騙馬今俗說但以騙為竊盜之義而實非也程泰之演繁露所載甚明實父蓋用其意今録於後云嘗見藥肆鬻腳藥者榜曰騙馬丹歸檢字書其音為匹轉且曰躍而上馬已又見唐人武懿宗將兵遇敵而遁人為之語曰長弓度短箭蜀馬臨階騙言蜀馬既已短小而又臨階為高乃能躍上始悟騙之為義通典曰武舉制土木馬於里閭間教人習騙以上俱繁露說據此則騙本非盜竊之義與今俗說全不同實父用之於詞者緣張踰牆樓崔故以騙馬對龍門皆主跳躍之意益見措意之工程所引唐人譏武懿宗語乃張元一所作見孟棨本事詩又東京夢華録載百戲中有騙馬等戲字義悉與前同乃知宋元間騙字音義如此今率以為盜竊舉世一辭殊可笑也今琵琶戲中有用此字者俗流妄增琵琶記正是此曲才堪聽又被風吹别調間用高駢詩話昨夜筝聲響碧空宫商信任往來風依稀似曲才堪聽又被吹將别調中發語曰正是者明謂引用古人也今傳竒有所謂董永者詞極鄙陋而其事實本搜神記非杜撰也記稱永父亡亡以葬乃自賣為奴主知其賢與錢千萬遣之永行三年喪畢欲還詣主供奴職道逢一婦人曰願為君妻遂與俱至主家曰永雖小人蒙君恩德誓當服勤以報主曰婦人何能曰能織主曰必爾者但令君婦為我織縑百匹於是永妻織十日而百匹具焉據此則永夫婦當在六代前或晉或魏不可知也李德武妻裴氏亦載隋史中古今傳聞訛謬率不足欺有識惟關壯繆明燭一端則大可笑乃讀書之士亦什九信之何也蓋繇勝國末村學究編魏吳蜀演義因傳有羽守邳見執曹氏之文撰為斯說而俚儒潘氏又不考而贊其大節遂致談者紛紛按三國志羽傳及裴松之注及通鑑綱目竝無此文演義何所據哉元詞人關漢卿撰單刀㑹雜劇雖幻妄然魯肅傳實有單刀俱㑹之文猶實於明燭也斬貂蟬事不經見自是委巷之談然羽傳注稱羽欲娶布妻啓曹公公疑布妻有殊色因自留之則非全無所自也吳志魯肅傳先主使關羽爭三郡肅住益陽與羽相拒肅邀羽相見各駐兵馬百步上但諸將軍單刀俱㑹肅因責數羽曰國家區區本以土地借卿家者卿家軍敗逺來無以為資故也今已得益州既無奉還之意但求三郡又不從命語未究竟坐有一人曰夫土地者惟德所在耳何常之有肅厲聲呵之辭色甚切羽操刀起謂曰皆國家事是人何知目使之去按今元人所撰單刀㑹雜劇本此蓋肅傳本實録而司馬氏通鑑據吳書修輯以肅欲與羽㑹語諸將疑有變肅不從而往而所記羽語殊俚陋不類雲長蓋吳書乃自尊其國非實録也本肅邀羽相見故羽操刀起豈得云肅欲往疑羽有變乎裴松之辨駁最明獨此注引吳書而略無是正亦大憒憒司馬據之尤為疏也赤壁破曹𤣥德功最大考昭烈傳與曹公戰於赤壁大破之操傳公至赤壁與劉戰不利而不言周瑜及魯肅傳俱言與劉并力陳壽書諸葛傳後亦言權遣兵三萬助劉劉得用與曹公交戰大破其軍則當日戰功可見今率歸重周瑜與陳壽志不甚合余别詳之楊用修云世傳馮商還妾余觀氏族言行録馮京之父名式京生而雋邁不羣式一日取其所誦書題其後曰將作監丞通判荆南軍府事馮京式既退官十一年京舉進士第一為將作監丞通判荆南如式之言時人謂式為知子氏族録宋人所編當得其實世傳馮商還妾事以為京父考之此文京父未嘗為商又不名商也右見談苑醍醐余考宋史京傳不載父名亦無還妾事惟稱京常過外兄見其侍妾詢知同年某人女亟請嫁之蓋因此附㑹也楊本氏族録謂為正史亦非用修又云吕蒙正父龜圖多內寵與其母劉氏不協并蒙正出之頗淪躓窘乏劉誓不嫁及蒙正登仕乃迎二親同堂異室奉養之近世傳竒饐瓜亭亦緣此附㑹也陳晦伯駁云邵氏聞見録載吕蒙正微時於洛陽龍門利涉院土室中與溫仲舒讀書一日行伊水上見賣瓜者意欲得之無錢可買其人偶遺一枚於地公悵然取食之後作相買園洛城東南下臨伊水起亭以饐瓜名焉麟考宋史吕實起寒素土室饐瓜當有之惟楊所引頗關涉而史不載恐未確也連環亦本元曲或稱李長吉詩榼銀龜騎白馬傅粉美人大旗下以為即吕布美人殊不知傅粉自說吕貌非姬妾也陶穀秦弱蘭事見宋士人供狀當不誣繡襦記事出唐人李娃傳皆據舊文第傳止稱其父滎陽公而鄭子無名字後人增益之耳娃晚收李子僅足贖其棄背之罪傳者亟稱其賢大可哂也王仙客亦唐人小說事大竒而不情蓋潤飾之過或烏有無是類不可知霍小玉事據李益傳或有所本紅拂紅綃紅線三女子皆唐人皆見小說又皆將家皆姬媵皆兼氣俠然實無一信者衛公雖韓柱國甥絶不聞處道相值緣李百藥嘗盜素侍女素執將斬之覩百藥倮體俊秀因畀侍兒歸豪異祕纂遂嫁此事衛公而虬髯客之誕又不必辨者也紅線事冷朝陽有詩其本末不可考甘澤謠未足憑據紅綃尤謬悠蓋以汾陽多妓樂詭為此談又本紅拂而崑崙則又附㑹虬髯耳第所狀一品殊不類汾陽余嘗疑他有其人大都不必深辨今諸傳奇盛行駸駸欲追勝國矣章臺栁事或有之唐人詩可證也輟耕録記元人雜劇有唐三藏一段今其曲尚傳第不知即陶所記本否世俗以為陳姓且演為戲文極可笑然亦不甚虛也三藏即唐僧𤣥奘余辨見前續考獨異志云沙門𤣥奘俗姓陳偃師縣人也幼聰慧有操行唐武德初往西域取經行至罽賔國道險虎豹不可過奘不知為計乃鎖房門而坐至夕開門見一老僧頭面瘡痍身體膿血牀上獨坐莫知來由奘乃禮拜勤求僧口授多心經一卷令奘誦之遂得山川平易道路開闢虎豹藏形魔鬼潜跡至佛國取經六百餘部而歸其多心經至今誦之據此皆與今頗合又元人散套亦有西域取經等事蓋附㑹起於勝國不始於今而三藏之名則又始於宋時不始勝國東坡艾子小說云艾子好飲少醒日忽一日大飲而噦門人密抽彘腸致噦中持以示曰凡人具五臟方能活今公因飲而出一臟止四臟矣何以生耶艾子熟視而笑曰唐三臟猶可活況有四耶此雖戲語然宋世所稱可見蓋因唐僧不空號無畏三藏訛為𤣥奘耳艾子疑非東坡然其目已見通考要亦出宋人聖教序雖有三藏要文等語匪𤣥奘號也自花間草堂之流也而極於西廂琵琶自𤣥怪樹萱之流也而極於剪燈秉燭然西廂琵琶雖詞場最下伎倆在厥體中要為絶到若今所傳新餘二話則鄙陋之甚者也二書驟讀之類村學究小知聲律者不足當大雅一噱夷考其人實皆國朝名士手筆新話則瞿廣文宗吉餘話則李方伯昌祺也瞿國初錢塘人所著詩集詩話今傳格律卑弱亡論而才情縹眇工語絶多詞尤婉縟今詩詞附見新話者乃無復字句可觀李詩律殊精詣宣成間亶稱作手今皇明風雅所選十數篇氣骨錚錚儕流罕及而詩見餘話者亦絶不足言昔唐人嘗以南柯得名黃粱擅譽二書律之慚沮甚矣嶺南詩人孫蕡有朝雲集句亦此類新餘二話本皆幻設然亦有一二實者秋香亭記乃宗吉自寓見田叔禾西湖志餘至正妓人行則昌祺目擊事以擬樂天商婦者也緣他多虛妄并二事實厯廢之李名德顯著坐是不得入賢祠效二書而益下者有秉燭清談等言之則㸃牙頰而撰人周禮嘗著綱目發明楊用修喜道之始余讀李方伯近體而善之以同時曽子啓不能過既復閲瞿詩詞每疑新餘話非二君筆及讀孤樹裒談得李不入鄉賢事又西湖志餘云宗吉嘗著剪燈新話一編粉飾閨情假託冥報雖屬情妖麗遊戲翰墨之間而勸百諷一間有可采秋香亭記乃其自寓桂孟平有題新話歌始知信二君作蓋一時游戲筆端不復經意耳田叔禾所摘瞿語西湖詞及妓鞋等曲皆多工語又和楊廉夫睂顰黛色云恨從張敞毫端起春向梁鴻案上生殊不減勝國也七修類藁云剪燈新話乃楊廉夫所著惟後秋香亭記則瞿宗吉撰也其詞氣不類可知香奩集鄙䙝者非廉夫乃韓致光詩三者非欲借重於人則一時刋誤惜至今未有知者按瞿是編與所著詩話語絶類特加以俳謔又詩詞不工為生平蛇足耳楊廉夫以文名元末今其遺集皆崛强怪奇筆端寧當有此都緣此老耽嗜聲色故好事遂舉歸之郎曲儒不辨詩文面目無怪其然第或致誤後世若龍城録至今以為栁也香奩是和魯公嫁名韓渥楊自有續奩等作逺出其后郎說尤誤江湖紀聞載一士人狎倡供狀四六札通篇用故事成語頗極餖飣之工惜不知其名姓并事之始末大槩是南渡時人耳惟荆叉布裙自說鄭玉之非倡女屢求其出處俱疑似間偶閲說郛録撫青雜說一事乃知邢氏女先與單氏子議婚後邢父母遭亂皆遇害遂失身樂籍為楊玉而單氏子以蔭為其州司户因間狎之詢其所生父母知為幼所議妻遂告其父母娶之蓋誤邢字為鄭耳布裙短衾即邢女告單子之言詳陶氏所録中唐人初登第絶句云楚潤相看别有情注但以楚潤為妓之尤者而不詳所出按孫棨北里志楚兒者素為三曲之尤晚以色衰嫁捕盜官郭鍛以挑鄭光業為郭曳箠數十因貽鄭詩云蛾睂常被巨靈掌雞肋難勝子路拳良可笑也潤娘字子美本名小潤王團兒女少時聲譽藉藉崔垂休狎之題記於潤髀上為同年某人見之因戲贈一絶慈恩塔上新泥壁滑膩光華玉不如何事博陵崔十四金陵腿上逞歐書俱可資笑云今世傳街談巷語有所謂演義者蓋尤在傳竒雜劇下然元人武林施某所編水滸傳特為盛行世率以其鑿空無據要不盡爾也余偶閲一小說序稱施某嘗入市肆紬閲故書於敝楮中得宋張叔夜禽賊招語一通備悉其一百八人所由起因潤飾成此編其門人羅某亦效之為三國志絶淺陋可嗤也楊用修詞品云甕天脞語載宋江潜至李師師家題一詞於壁云天南地北問乾坤何處可容狂客借得山東烟水寨來買鳯城春色翠袖圍香鮫綃籠玉一笑千金值神仙體態薄幸如何銷得想蘆葉灘頭蓼花汀畔皓月空凝碧六六雁行連八九只待金雞消息義膽包天忠肝蓋地四海無人識閒愁萬種醉鄉一夜頭白小辭盛於宋而劇賊亦工如此按此即水滸詞楊謂甕天或有别據第以江嘗入洛則太憒憒也水滸余嘗戲以擬琵琶謂皆不事文飾而曲盡人情耳然琵琶自本色外長空萬里等篇即詞人中不妨翹舉而水滸所撰語稍涉聲偶者輒嘔噦不足觀信其伎倆易盡第述情叙事針工密緻亦滑稽之雄也今世人耽嗜水滸傳至搢紳文士亦間有好之者第此書中間用意非倉卒可窺世但知其形容曲盡而已至其排比一百八人分量重輕纖毫不爽而中間抑揚映帶回護咏嘆之工真有超出語言之外者余每惜斯人以如是心用於至下之技然自是其偏長政使讀書執筆未必成章也此書所載四六語甚厭觀蓋主為俗人說不得不爾余二十年前所見水滸傳本尚極足尋味十數載來為閩中坊賈刋落止録事實中間遊詞餘韻神情寄寓處一槩刪之遂幾不堪覆瓿復數十年無原本印證此書將永廢余因嘆是編初出之日不知當更何如也宋鄭叔厚以孫武子配論語易傳明韓苑洛以關漢卿配司馬子長皆大是詞埸猛諢因論水滸得二事絶可作對嘉隆間一巨公案頭無他書僅左置南華經右置水滸傳各一部又近一名士聽人說水滸作歌謂奄有丘明太史之長二語本滑稽與前意稍不同然詞若符節信宇宙間未當無對也世所傳宣和遺事極鄙俚然亦是勝國時閭閻俗說中有南儒及省元等字面又所記宋江三十六人盧俊義作李俊義楊雄作王雄關勝作關必勝自餘俱小不同并花石綱等事皆似是水滸事本倘出水滸後必不更創新名又郎瑛類稿記㸃鬼簿中亦具有諸人事迹是元人鍾繼先所編然則施氏此書所謂三十六人者大槩各本前人獨此外則附㑹耳郎謂此書及三國竝羅貫中撰大謬二書淺深工拙若霄壤之懸詎有出一手理世傳施號耐菴名字竟不可考友人王承父嘗戲謂是編南華太史合成余以非猾胥之魁則劇盜之靡耳施某事見田叔禾西湖志餘少室山房筆叢卷二十五
