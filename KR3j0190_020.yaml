body:
  text: 少室山房筆叢卷二十明胡應麟撰二酉綴遺中古今志怪小説率以祖夷堅齊諧然齊諧即莊夷堅即列耳二書固極詼詭第寓言為近紀事為逺汲冢璅語十一篇當在莊列前束晳傳云諸國夢卜妖怪相書蓋古今小説之祖惜今不傳太平廣記有其目而引用殊寡余嘗欲雜托左國國語國䇿紀年周穆等書之語怪者及南華沖虗離騷山海之近實者燕丹墨翟鄒衍韓非之逺誣者及太史淮南新序説苑之載戰國者凡瓌異之事彚為一編以補汲冢之舊雖非學者所急其文與事之可喜當百倍於後世小説家云今璅語文惟劉氏史通可見疑古篇引其説云舜放堯於平陽其地有城曰囚堯又云益為啓所誅太甲殺伊尹文丁殺季歷以上劉通稱汲冢書今考惟太甲殺伊尹與紀年合餘並諸書所無蓋皆璅語中事也其説詭誕不根固不待辨至所記諸國怪事得諸耳目或匪盡誣且文出汲冢必竒古惜無從備見之太平御覽第三百七十七卷形體類引璅語一則云齊景公伐宋至曲陵夢見大君子甚長而大大下而小上其言甚怒好仰晏子曰若是則盤庚也夫盤庚之長九尺有餘大下小上白色而髯其言好仰而聲上公曰是也是怒君師不如違之遂不伐宋也又云齊景公伐宋至曲陵夢見有短大夫賔於前晏子曰君所夢何如哉公曰其賔者甚短大上小下其言甚怒好俯晏子曰如是則伊尹也伊尹甚大而短大上小下赤色而髯其言好俯而下聲公曰是矣晏子曰是怒君師不如違之遂不果伐宋右後一事見御覽三百七十八卷二説酷類蓋必一事析為二者考册府元龜亦載二事但合為一而所紀稍不同又子産浮遊事别見楊用修云汲冢璅語其文極古然多誣而不信如謂舜囚堯太甲殺伊尹其誣若此蓋伊尹在相位日被其黜僇者為之也然則何以知之曰其文不類戰國按用修謂汲冢多誣可也又謂此書乃伊尹黜僇之人所作此何異兒童之見夫周末去商逺故有此誣使當時僇於伊尹者豈得誑之至此蓋春秋人作也楊用修又引璅語伊尹與妹喜交尤謬蓋亦當得之類書小説稱徐鉉好言怪賔客之不能自通者與失意見斥絶者皆託言以求合洪邁好志怪晚歲急於成書客多取廣記中舊事改竄首尾别為名字以投之至有數卷者洪不復刪潤皆入夷堅然二子尚為人欺也蘇軾好談鬼客至使談有不能者輒云姑妄言之則又𨗳之以妄然二子竟為所欺坡特滑稽戲劇未嘗形筆端也鉉所著稽神録其中必有誑於賔客如夷堅所得者豈皆實哉洪夷堅四百二十卷不勝衆矣而王質景文又有别志二十四卷何古今怪事盡出於南渡之世也太平廣記雖五百卷然自洪荒至宋已數千年又合衆小説數百家而成而洪直以一代之事當之不亦妄哉余嘗欲取宋太平興國後及遼金元氏以迄於明凡小説中涉怪者分門析類續成廣記之書殆亦五百餘卷其誣誕瞭然洎好竒勦掇文士俳謔槩舉芟之或不致後來之誚云此書卷帙繁重尚未成編其辨駁大都略見兹集幼嘗戲輯諸小説為百家異苑今録其序云自漢人駕名東方朔作神異經而魏文列異傳繼之六朝唐宋凡小説以異名者甚衆考太平御覽廣記及曾氏陶氏諸編有述異記二卷甄異録三卷廣異記一卷旌異記十五卷古異傳三卷近異録二卷獨異志十卷纂異記一卷靈異記十卷乘異記三卷祥異記一卷續異記一卷集異記三卷博異志三卷括異志一卷紀異録一卷祖異記一卷采異記一卷托異記一卷賢異録一卷此外如異苑異聞異述異誡諸集大概近六十家而李翺卓異記陶榖清異録之類弗與焉以所記稍不同故也今世有刻夲者僅神異述異數家餘俱不行乃其事大半具諸類書鄭漁仲所謂名亡實在者也苐分門互列得一遺二雖存若亡余屏居丘壑却掃杜門無鼎臣野處之賔以遣餘日輒命穎生以類鈔合循名入事各完本書不惟前哲流風藉以不泯而遺編故帙亦因槩見大都遂統命之曰百家異苑作勞經史之暇輒一披閲當抵掌捫虱之歡昔蘇子瞻好語怪客不能則使妄言之莊周曰余姑以妄言之而汝姑妄聽之知莊氏之旨則知蘇氏之旨矣楊用修謂世但知博物志而不知有博物記記乃漢人所撰余讀太平廣記目無此書僅再生類一事稱出博物記而內言及魏郭后恐非漢人所撰意以記為志字誤而今傳茂先博物志又無此事姑識此以俟再考其説云漢末關中大亂有發前漢時宫人冢者人猶活既出容色如舊魏郭后愛念之録置宫中常在左右問漢時宫內事説之了了皆有次序郭崩哭泣過禮遂死人死而復蘇者竹書秦諜可謂絶竒然他書謂之縊非斬首也余讀諸志怪小説所載某人臨陳被殺而乘騎以歸問其衆云有首無首孰佳衆泣曰有首佳帥云汝不知無首亦佳又一人被刑斬首而復生一首視前苐稍細耳信然則秦諜之蘇不足異矣然五行記一事尤怪并録此清河崔廣宗犯法梟首家人舁其體歸每飢即畫地作飢字家人遂屑食於頸孔中飽即書止字家人等有過犯書令決之如是三四歲世情不替更生一男於一日書地云後日當死宜備凶具如其言蓋千古未聞之異於理恐必無也陳太丘絶不聞著書而意林所引抱朴子載陳仲弓異聞記云同郡人張廣遭亂有女四歲不能行棄塜中後開塜女復活問之曰見塜角有一物伸頸吞氣乃效之轉不復飢尋看乃大龜也將女還食食飲初小腹痛久乃習之按此書太平廣記及御覽俱不載蓋其亡已久然仲弓之言或當不妄因識此凡干寶所記冢中婢事皆出此後又三國吳志某人死六日復蘇穿土而出與秦諜大同稚川自有集異傳十卷亦諸家書目所無見本傳蘇長公仇池筆記一事絶類太丘所記豈亦談者欺之耶陸氏異林曰鍾繇嘗數月不朝會意性異常或問其故云嘗有好婦來美麗非凡問者曰必是鬼物可殺之婦人後往不即前繇問何以曰公有相殺意繇曰無此勤勤呼之乃入繇以刀斫之傷髀婦人即出以新綿拭血竟路明日使人尋迹之至一大塜塜中有好婦人形體如生著白練衫丹綿裲襠傷左髀以裲襠中綿拭血叔父清河太守説清河陸雲也按此書蓋吳人士龍猶子撰者而諸家絶無此目僅見三國志鍾繇傳注中因録此列異傳三卷通志稱魏文撰而通考及宋志書目皆無之蓋自宋已亡矣惟裴松之所引一事附蔣濟傳注中魏文與濟同時當是濟自語魏文者今録此云蔣濟婦夢見亡兒曰死生異路我今在地下為泰山伍伯憔悴困辱不可復言今太廟西謳士孫阿見召為泰山令願母白侯屬阿令轉我得樂處母驚悟白濟曰夢耳不足怪也明日復夢曰我來迎新君止在廟下未發暫得來歸新君明日日中當發不復得歸永辭於此侯氣強難感悟故訴於母願重啓侯何惜不一驗之遂道阿形狀甚悉天明母重啓濟濟乃遣人詣太廟下推問孫阿形狀證驗悉如兒言濟涕泣曰幾負吾兒於是乃見孫阿具語其事阿不懼當死而喜得為泰山令惟恐濟言不信也曰若如足下言阿之願也不知賢子欲得何職濟曰隨地下樂者與之阿曰輒當奉教乃厚賞遣還濟欲速知其驗從領軍門至廟下十步安一人以傳阿消息辰時傳阿心痛巳時傳阿劇日中傳阿亡後月餘兒復來語母曰已轉為録事矣博異志稱谷神子纂而無名姓或曰名還古此通考朝氏説今刻此書於谷神子下注此三字蓋本朝氏説非本書舊文也序稱有所指託故匿其姓名今刻夲才十事起敬元頴上馬侍中余讀之詞頗雅馴蓋亦晚唐稍能文者視牛氏元怪等録覺勝之然語意無所刺譏於序文殊不合後讀廣記御覽諸書乃知刻本鈔集所遺甚衆僅得此書之半耳第其所謂指託者尚未得之當續考陳氏但言名還古竟亡其姓唐有詩人鄭還古嘗為殷七七作傳其人正晚唐而殷傳文與事皆類是書蓋其作也集異記河東薛用弱撰中載王之渙酒樓事大非實録且昌齡適集中絶少與之渙倡酬詩又蕭穎士遇二少年謂似鄱陽忠烈王穎士實八世孫聞言大駭後會盱眙長勘發冢盜乃知二少年實發鄱陽冢忠烈貌如生因知穎士狀類此理或然而原化記稱穎士遇老翁逆旅中謂嘗為蕭八代祖書佐見穎士貌酷肖不覺咨嘆則集異所載誠有之而原化因附會以為神仙第茂挺身遇此事不自紀而人紀之何耶白行簡三夢記云天后時劉幽求為朝邑承掌奉使歸未及家十餘里適有佛堂院落出其側寺中歌笑歡洽寺垣短缺尺得睹其中劉俯身窺之見十數人兒女雜坐羅列盤饌環繞而共食之見其妻在坐中語笑劉初愕然不測其故久之且思其不當至此復不能捨之又熟視容止言笑無異將就察之寺門閉不得入劉擲瓦擊之中其罍諸人迸走散因忽不見劉踰垣直入與從行者視殿廡皆無人寺扃如故劉訝益甚遂馳歸比至其家妻方寢聞劉至及敘寒暄訖妻笑曰向夢中與數十人同遊一寺皆不相識會食訖殿庭有人自外以瓦礫投之杯盤狼籍因而遂覺劉亦具陳其見與夢符合不爽毫髮云右載陶氏説郛太平廣記夢類數事皆類此此蓋實録餘悉祖此假託也其第二夢記元白梁州詩云花時同醉破春愁笑折花枝當酒籌忽憶故人天際去計程今日到梁州與二公自紀悉同故知劉夢亦實事也其第三夢女巫事亦竒稽神録云漳州蘇猛子病狂請醫陳寨寨至蘇氏子見之戟手大罵寨曰此病入心矣因立壇於堂中戒人無得竊視至夜取蘇氏子劈為兩懸堂之東壁其心懸北簷下寨方在堂中作法所懸之心遂為犬食寨驚懼持刀宛轉於地出門而去主人謂其作法也食頃持心而入內於病者之腹披髮叱之其腹遂合蘇氏子遂悟連呼遞鋪家人莫測乃其曰有驛吏手持公文死道傍蓋寨取驛吏之心而活蘇氏也右徐氏謬談多若此夫古有刳腹滌腸者然腹剖腸見本不至死史傳中如賈復彭雋輩往往皆然而俞跗華他又神藥以傅之故非虗妄若劈之為二而猶能活則宇宙之中斷無此事也宋人小説載鉉好語怪賔客率詭撰以欺之此事亦收廣記中使景盧賔客復掇以欺洪豈不更入夷堅哉漫書此博觀者一笑諾臯記載景乙妻久病見夫回遽言半身被砍去速逐之乙趨園見一物如嬰兒持竹筐見已驚走乙就視妻半身在焉比返見妻髮際至胸有釁如脂膜然病遂已按此蓋徐氏賔客掇酉陽以欺鉉耳酉陽雜俎支諾臯一事云貞元中望花驛西有百姓王申手植榆於路成林構第屋數椽夏月常饋漿於行人有兒年十三每令伺客忽一日白其父路有女子求水因令呼入女少年衣碧襦白幅巾自言家在此南十餘里夫死無兒今服􅎭矣將還馬嵬訪親求食言語明悟舉止可愛王申乃留飯之謂曰今日暮夜可宿此女亦欣然從之其妻遂納之後堂呼之為妹倩其成衣數事針縷細密殆非人工王申大驚異妻尤愛之乃戲曰妹無他親能為我家作新婦乎女笑曰身既無托願執井竈王申即日賃衣貰酒為兒婦其夕暑熱戒其夫近多盜不可闢門即舉巨椽捍而寢及夜半王申妻夢其子披髮訴曰被食將盡矣妻驚欲看其子王申怒曰渠得好新婦喜極囈言耳妻復寢復夢如初申與妻燃燈呼其子及新婦悉不復應扣户户牢如鍵乃壞門闔才開有物圓目鑿齒體面藍色衝人而去其子唯餘腦骨及髮而已按張鷟朝野僉載一事正同推以為周大足時泰州事在貞元前蓋好事者詭撰姓名以欺段耳夷堅續志云醴泉尉崔汾居長安崇賢里夏夜乘涼於庭月色方午風過覺有異香頃聞南垣土動簌簌崔生意蛇鼠也忽覩一道士大言曰大好月色崔驚懼遽走道士緩步庭中年可四十丰儀清古良久妓女十餘排大門入綃紅翹翠豔冶絶世列坐月下崔生疑其狐媚以枕投門闔警之道士小顧怒曰我以此差靜復貪月色初無延佇之禮敢爾粗率厲聲曰此處有地界無歘有二人長才三尺巨首儋耳唯伏其前道士頥指崔生曰此人有何親屬入隂籍可領來一餉間崔生父母及兄悉至衛者數十捽曵批之道士叱曰我在此敢縱子無禮乎父母泣曰幽明隔絶誨責不及道士叱遣之復顧二鬼捉此癡人來二鬼跳及門以赤物如彈丸遙投崔生口中乃細赤綆也遂鈎出於庭中又詬辱之崔驚失音不得自理其妓羅拜曰彼凡人因訝仙官無故而至非有大過道士怒解拂衣由大門而去按此事續志所載余嘗疑其文不類宋末而酷類酉陽雜俎及近讀廣記乃知即雜俎事夷堅掇之耳王長公贈方景武上帝由來有戲臣亦用雜俎崔曙事觀此二地界三尺則不特帝臣侏儒也張睢陽保障之功日揭萬古獨守城食三萬人君子不能無疑昌黎辨之甚力後世談者如捫蝨新話等書猶數數焉近閲撫青雜説得六合縣隂兵事為之擊節大快千載之疑一朝冰釋而世或寡知者因節録之紹興辛巳敵南侵有何兼資者奉主將命將小隊遊奕至六合縣見大軍自西北來不類官兵又不類敵人須臾號令下寨召兼資入凡五門比至中軍一人廟坐冠服如天神一人面貌英毅鬚髯皆指天一人東向貌亦俊爽兼資再拜問其姓名面貌英毅者曰吾張巡也指東向者曰此許逺也兼資少聞張許事因再拜頂禮曰某曾讀唐書見二大王忠義大節今日乃得瞻風采然信史所載豈皆實乎巡曰史有何疑兼資因舉食三萬人事巡曰有之而實不然也所食者皆已死之人耳兼資又舉殺愛妾事巡曰亦非殺也吾妾見孤城危迫欲自殺以殉許奴亦以憂悸暴死遂烹以享士蓋用術以堅軍士之心耳又見雷萬春面止一瘢謂止中一箭理亦近之雖神怪之談君子所不道而此足以破千古之惑不可棄也論衡辨夔一足然莊周載夔憐蚿山海經載黃帝以夔革冒鼓聲聞五百里皆以為一足余嘗以莊周山海附會然古鐘鼎往往有夔龍之形則獸自有名夔者也論衡又辨汲井得人事然酉陽雜俎載獨孤叔牙嘗令家人汲水重不可轉數人助出之乃人也戴席帽攀欄大笑卻墜井中真有人矣井中遇人事甚夥獨此事於原説吻合總之不若景陽宫井為實也識此一笑吾意夔一足實因莊周趻踔之説訛為后夔好事者撰為仲尼之語以闢之而好辨者又引好事之談以證之皆夢中説夢也雜俎井中得人事或因昔人之辨更撰此以實之此非廣讀稗官不能得其要領也元和初有一士人失姓字因醉卧廳中及醒見古屛上婦人等悉於牀前踏歌歌曰長安女兒踏春陽無處春陽不斷腸舞袖弓腰渾忘却蛾睂空帶九秋霜其中雙鬟者問曰如何是弓腰歌者笑曰汝不見我作弓腰乎乃反首髻及地腰勢如規焉士人驚懼因叱之忽然上屏亦無其他按博異記邢鳳傳有此事其詩正同但言得之夢中耳然則元和士人即鳳也或博異志因雜俎此事而駕名於鳳亦未可知大抵稗官曲説附會百端其情變不可窮詰也博異作羅幃空度九秋霜當以雜俎為勝石鼎聨句詩明是退之腳手蓋亦毛穎革華遺意至軒轅切韓彌明彰愈又其不必言者及閲兩山墨談以某處有軒轅彌明廟為疑此極可大笑世間叢祠井社如石郎木居士之類前代毫無出處尚遍天下況彌明韓公有詩後人因立為廟復何所疑都緣不解韓公詩體被其簸弄若真知詩人一見便當了然余因此知許由善卷諸墓一切不足憑信每笑昌黎用爾許心力作此詩千年後不遇識者幾被軒轅氏奪去也唐人小説如栁毅傳書洞庭事極鄙誕不根文士亟當唾去而詩人往往好用之夫詩中用事本不論虗實然此事特誑而不情造言者至此亦橫議可誅者也何仲默每戒人用唐宋事而有舊井潮深栁毅祠之句亦大鹵莽今特拈出為學詩之鑒黎惟敬本學仲默詩而與余遊西山玉龍洞有封書誰識洞庭君之句暗用栁毅而不露而語獨竒俊得詩家三昧總之不如不用為善然二君用事偶經意不經意耳若因此妄生分别相癡人前説夢也六朝宋虞之有妬記一卷至唐不傳而宋王某補之今所補者又不存矣余生平二親極念而不幸際敬通之厄居常扼腕弗堪每欲叢録古今史傳中事迹以補二書之亡而未暇近讀夷堅志妬忌門一事絶竒因録之於左方郭二雅妻陸氏秀州海鹽人平時端靖有志操紹興二十八年六月十五日呼其子昭戒之曰吾數日後當死切無即斂丁寧數四昭憂之尚未敢盡信及期無疾而逝心猶微溫奄奄有出入息十日復生曰姑蘇某龍王嬖一妾遭夫人妬忌以箠死鞠訊天獄纍年不能決上帝命我詰其情一問而得之泰山牘以上信宿當就刑是時必暴風雨至七月五日平江大風駕潮漂溺數百里田廬皆被其害云據右所載事則不特人類為然即異類且有之然龍妾以非命亡而帝為正獄致刑今之殘虐姬媵俾弗聊生者茍逭陽誅隂謫寧可免也且一龍之妬生既甘心其妾垂死正刑而濵海田廬數百里復受其害妬婦之惡詎勝道哉庸書志後以戒世之甘妬忌者宋何先異聞載碧蘭堂一女子詩云水天日暮風無力斷雲影裏蘆花色折得荷花水上遊兩鬢蕭蕭玉叉直語亦頗工而不甚傳因録此蘆花字與荷花相犯當是抄録之誤今説郛殊無善本余嘗得一部於王長公處多長公手所改定者惜此未經刋削云異聞又載周某入兜離國事當是傳寫唐人南柯及兜玄國二則耳唐人記返魂事有絶相類者如齊推女及鄭亞妻必有一訛又太平廣記神仙類田先生即救齊女者而所記又不同大率皆烏有耳凡變異之談盛於六朝然多是傳録舛訛未必盡幻設語至唐人乃作意好竒假小説以寄筆端如毛穎南柯之類尚可若東陽夜怪録稱成自虗元怪録元無有皆但可付之一笑其文氣亦卑下亡足論宋人所記乃多有近實者而文彩無足觀本朝新餘等話本出名流以皆幻設而時益以俚俗又在前數種下惟廣記所録唐人閨閣事咸綽有情致詩詞亦大率可喜少室山房筆叢卷二十
