body:
  text: 少室山房筆叢卷二十七明胡應麟撰玉壺遐覽二宛委餘編所錄古帝王賢哲没為明神及生有所自者暇讀二典洎雜史小説家言復得若干條輒以弇州遺意補錄於左謬悠荒忽之譚誠達者所不道而弔詭之士不可不知也盤古氏元始天尊應世也以一萬八千年為一甲子見真元賦一云老君中三皇時化身號盤古先生真仙通鑑祝融氏為火帝君南岳路史五龍氏乗雲登仙見荒史及水經太昊伏羲氏應聲大士化身也見藏經及巵言一云寶厯菩薩下生世間是曰伏羲造天地經女媧氏吉祥菩薩下生也造天地經伏羲女弟曰女媧一曰女希路史補天斷鰲淮南顯迹唐世酉陽雜俎炎帝神農氏為北太帝君主天下鬼神酉陽雜俎黄帝有熊氏得道上昇為太乙君仙鑑其神為軒轅之宿荒史子𤣥囂為北方水神次子昌意得道居弱水又禺彊亦居北方為水神黄帝裔也山海經帝堯陶唐氏長女娥皇為湘君次女英為湘夫人楚詞帝舜有虞氏得道居九疑山太平廣記載帝舜以道徳三經及註景靈經授女真王妙想於九疑之山大禹先得道壽三百六十嵗為九疑飛仙堯時治水後復為神曰神禹禹子夏后啓為東明公珥蛇乗龍上三嬪於天見山海經及仙鑑商高宗相傅説為列星周文王為西明公周文公為北帝師周召公為南明公季札為北明公酉陽雜俎及真誥等書孔子為水精子繼周為素王緯書一曰元宫上仙酉陽雜俎一曰太極上真公治九疑山一曰廣桑山真君太平廣記一曰儒童菩薩下生世間造天地經一曰浄光童子化身顔子為月明儒童俱清浄法行經一曰明晨侍郎後為三天司直已見巵言後夏馥亦為明晨侍郎見仙鑑一曰與卜商皆修文郎見太平廣記後樂子長亦為此官見仙鑑仲由在唐為韓滉太平廣記施存在漢為壺公施存亦仲尼門人事見真誥及巵言然術覽兩引壺公姓謝名元未知孰是釋迦為三十三天仙延賔宫主酉陽雜俎又為忍辱仙人一曰老君乗日精入浄妙夫人孕為釋迦見化胡經一曰闗喜乗白象入摩耶夫人胎為釋迦道經道家稱老子化身名號尤衆參㑹衆説而備錄於後老子初三皇時化身號萬法天師中三皇時化身號盤古先生亦曰有古大先生後天皇伏羲時化身號鬱華子地皇神農時化身號大成子人皇軒轅帝時化身號廣成子少皥時化身號隨應子顓頊時號赤精子帝嚳時號錄圖子帝堯時號務成子帝舜時號尹壽子夏禹時號真行子商湯時號錫則子文王時號燮邑子武王時號育成子成王時號經成子周王時號郭叔子漢時為河上公右見真仙通鑑及道經一云老子上三皇時為𤣥中法師下三皇時為金闕帝君伏羲時為鬱華子神農時為九靈老子祝融時為廣壽子黄帝時為廣成子顓頊時為赤精子帝嚳時為錄圖子堯時為務成子舜時為尹壽子夏禹時為真行子殷湯時為錫則子文王時為文邑先生一云守藏史或云在越為范蠡在齊為鴟夷子在呉為陶朱公右雜見太平廣記抱朴子等與前説稍不同又造天地經云摩訶迦葉往為老子清浄法行經亦云老子名耳字伯陽一名雅字伯宗一名志字伯光一名石字孟公一名重字子文一名定字元陽一名元字伯始一名顯字元生一名徳字伯丈𤣥妙篇云初生時名𤣥錄周武王時為守藏史遷柱下史至第五帝昭王二十三年過函谷闗度闗令尹喜後二十五年降於蜀青羊肆㑹尹喜同度流沙胡域至穆王時復還中夏第十四帝平王時復出闗開化蘇鄰諸國復還中夏二十七帝敬王十七年戊戌孔子問道於老君迺有猶龍之歎第三十五帝烈王二年丁未過秦秦獻公問以厯數遂出散闗至顯王八年庚申東還至第三十八帝赧王九年乙夘復出散闗飛昇崑崙據此則過函闗與出散闗自是二事考尹喜傳悉同葢過函闗乃傳道尹喜出散闗乃化服胡王過函闗者僅一而出散闗者三然過函闗見史記其説要為有徴出散闗事漢前羣籍無載者必後世道流増益之以求勝釋門耳世多混二事為一詩家尤易混淆故詳錄之以備參考老君母𤣥妙玉女亦尹氏化胡經稱老子投浄妙夫人體為釋迦則𤣥妙浄妙皆老子母也巵言所錄鬼神仙逸名姓未盡者補列下方浮屠氏可考者别見天翁姓張名堅一姓劉後為太山太守雜俎太乙君名臘天秩萬二千石河伯姓吕名夷一曰冰夷一曰馮遲一曰馮修一曰無夷竈神名壤子俱見諾臯記已入巵言者不錄匡君名續字君平一字子孝又字公季又有匡俗字子希非匡君大茅君名盈字叔申中茅君名固字季偉與後漢茅容字同小茅君名衷字思和衷一作震茅君祖名濛字初成武夷君姓王名子騫一説云魏王名子騫未詳孰是又曰彭祖氏二子長曰武次曰夷合為武夷君一曰道君第七弟子名屬仁治武夷山名控鶴仙人竝見仙鑑尹喜字公文蕭史行第三孝弟明王名𢎞康字伯中洪崖先生即黄帝臣伶倫涓子名蜀梁一作濁梁方回一作雷鬼谷子姓王名詡一名利一號𤣥微子東方朔一姓金吳剛字質一作罡竝見名疑赤將子輿姓蔣曰蔣先生紫陽真人姓周名義山婉盆子姓施名存即壺公見真誥羨門子一曰衍門司馬季主男名法育女名濟華竝仙淳于叔通一名斟字叔顯玉子姓章名震于吉一名室梓童神姓張名亞子灌口二郎姓李見朱子語類末白鹿先生姓李名元洪崖子姓張名藴字藏真蜀才姓范名長生李少君字雲翼戴孟本姓燕名濟字仲微改姓名字成子帛舉字子高唐公昉一名房李八百名脫日行八百里又問其年曰八百嵗故名八百仙鑑云不知其名此見廣記仙類何紫霄字仙良一云姓鄧清平吉姓衛名平許劌字道翔小名玉斧李含光本姓𢎞蘭公名期許真君僕許大改姓午復改姓干終南處士姓王名守一鍾離權改名覺字寂道一字雲房號和谷子一曰號雲房吕洞賔本名紹先洞賔弟子盧生名英名疑藥王姓韋名古麒麟客姓王名瓊韓湘字清夫一字伯渚作北渚非李珏後改名寛張志和本名龜齡侯道華上昇太上賜姓李名内芝混成子姓劉名𤣥和殷七七名文祥又名道全名疑作荃羅公逺一名思逺黙希子姓徐名靈府廣成先生姓劉名元靖東瀛子姓杜名光庭亦號廣成神和子姓屈突名無為字無不為薩真人名守堅海蟾子姓劉名操字宗成徐神翁名守信重陽子姓王名哲本名中孚海璚子姓白名玉蟾羅赤脚名宴女仙姓名巵言所未錄者及小有異同者西王母姓楊一曰緱氏一曰侯氏一曰焉氏名回一曰婉妗第三女曰碧霞元君本居西嶽今為泰山神聖母第四女名林字容真號南極夫人又紫𤣥夫人王母第十三女名媚蘭號雲林夫人第二十女名玉清號紫微夫人一云名青娥字愈意第二十三女名瑤一云名瑤姬號雲華夫人太平廣記有傳云居巫山今詩家所謂神女也王母小女名琬字羅敷號太真夫人亦曰東嶽夫人上元夫人名阿環見太平廣記漢武内傳答王母書中名疑謂侍女名阿環恐有訛誤靈照夫人李氏老君之姑中侯夫人王氏子喬之妹嫦娥字純狐一曰鬱儀竈神蘇吉利妻王氏名博頰一曰竈君夫人姓王字卿忌女六人皆名祭河伯夫人亦曰姓馮名夷織女星侍兒姓梁名玉清太白上公妻名女媊陽翟夫人姓塗山即啟母也少室山少姨即塗山妹姓同太𤣥仙女姓西靈名子都見司馬季主傳𤣥妙玉女姓尹氏老君母也一曰無上元君九華安妃上真元君女也名鬱賔字靈蕭南嶽夫人姓魏名華存字賢安號紫虛元君旴母姓許氏旴烈之母也左華九成夫人姓范名定英右嬪元姬姓趙名約羅北寒玉女姓宋名聮娟東華玉女姓燕名景珠林云玉女姓賈名屈庭飛𤣥玉女姓鮮名子華毛女名玉姜一云魚氏姊妹二人一名道超一名道逺秦時隠武夷山巵言止引前説葢列女傳所載隱華陰山者後説出仙鑑以所隱地生毛竹故名為毛女女几姓陳氏麻姑姓王氏即方平之妹見仙鑑與神仙傳王方平降蔡經家所述小異又宋寧宗勑封麻姑虚寂沖應真人是女仙亦有真人之號也東華玉妃姓淳名文期見仙鑑女真張微子傳即青童帝君妹也劉仙姑名懿靖𤣥天二女一名旋波一名捉淡捉淡一名瑤光洛神宓妃也一曰伏羲女太𤣥女姓顓頊名和智瓊神女姓成公蕚綠華姓楊一曰羅氏名郁明香元君李氏名真多即八百妺樊夫人劉綱之妻名雲翹妹為裴航妻名雲英東陵聖母姓杜廣記仙鑑等俱作適杜氏諶母許真君師名嬰一云孾花姑姓王名靈微何仙姑姓趙名何一名和名疑武真人名元照見夷堅志清真左夫人姓郭名雲葢右夫人姓楊名玉華許穆夫人陶成女名科斗馬鈺妻孫氏名不二彭耜妻潘氏名蕋珠右雜見廣記御覽真誥仙鑑等國朝曇陽子王氏名燾真外謝自然等名姓顯然者及名姓不及攷者俱不錄仙道姓名有特異者類此條乞食公者五岳真人馮延壽也見列仙傳宋來子下湖浮先生姓施名存一號婉盆子即壺公也見真誥東方朔本姓張氏父名夷字少平一曰姓金氏見名疑朔母田氏生朔三日母亡鄰母拾得之時東方始明故姓名曰東方朔太平廣記侯道華將飛昇老君遣真人韓衆下迎賜姓李名内芝審爾則仙家亦賜姓若帝王之為者竒事也王梵志不知名字王徳和者見林禽樹有癭大如斗破之中得小兒養至七嵗能言自名曰林木梵天姓王氏後改名見廣記又羅公逺被殺後易姓名為維厶還本舊名姓而去首也宋世有木先生名廣莫宣和帝以其道得林靈素之半故易姓曰木本姓雍仙鑑白玉蟾本姓葛除去草頭以謝天地父母除去勾曲以謝兄弟妻子以中曰字加撇為姓江湖紀聞王害風王重陽蹤跡詭異若病風者人以名之本傳吕純陽幻名昌虚中囘道人吕元圭守谷客無心昌老無上宫主回客人漢武外傳女仙名有石公子范成君仙鑑有稱號詭異而率莫知其姓名者或得姓不得名者他非此類者不錄倒景君無常先生竝漢武傳無為子仙鑑黄帝傳中偃松子名疑了然子名疑赤須子秦穆公主魚吏祝雞翁山圖溪父修羊公騎龍鳴稷丘君服閭子龍威丈人犢子以上竝列仙傳飛黄子仙鑑谷希子毓陽子見姜伯真傳白羊公長上公長桑公子上黄先生以上竝列仙傳慧車子淳于斟傳負局先生仙鑑几八兄廣記騾鞭客見𤣥怪錄無英君周義山傳掩耳道士常掩耳走故名上帝戲臣長五尺濶三尺雜俎婆娑寐唐太宗時人見胡氏管見偃月子仙鑑陰隱客太平廣記落魄仙栁條青仙鑑吉留馨感庭秋二人俱無姓名一唱吉留馨一唱感庭秋故名劉無名劉平阿仙鑑趙聖人彭釘筋三人俱見廣記言亊中也天自在無姓名常談天也見廣記三朶花頭常戴花三朶見蘇子瞻詩註灰袋費雞師葫蘆生竝見雜俎僕僕先生自言姓僕名僕因目為僕僕先生見廣記摸先生無姓名人有疾以手摸之輒愈號摸先生陳花子常賣花於市竝見真仙通鑑何蓑衣獃道僧二人俱見桯史一人衣蓑衣一似僧又似道而獃故各以為號混沌道士仙鑑趙麻衣趙縮手行則縮兩手於胷前見仙鑑國朝有鐵冠道人周顛仙郎瑛云鐵冠姓張名景和并識此俟考仙傳所載有名流人所共悉而不名其得仙者漫爾筆之其荒誕不必深論其昭灼口耳若東方曼倩李長源輩亦不錄其有沒而為神者類别則中王倪得道長生至堯舜時務光自沈復見商武丁世太公望棺中止玉鈐六篇范蠡易號陶朱後復之蘭陵賣藥得仙於北邙山墨翟遇仙長生漢武世尚存介子推逃晉後賣扇東海邊楚狂接輿在蜀峨睂山東園公唐時尚存命洪崖合神丹用里先生得道為華子期師司馬季主并男女皆得道居委羽山漢武帝得道尸解以棺中箱杖鬻市人韓崇入大霍山尸解馮良奕世居鹿跡洞中郎宗服胡麻得道居華山張魯辭侯爵白日乗龍昇天夏馥從赤須先生得道龍伯高從刁道林受道得仙仙鑑龍述是也姚俊為北海司命劉翊為右理司監劉寛遇青谷先生授杖解法得仙欒巴自殺乗風入林慮山中李少君誅後人見之東海上自漢武而下其人竝見漢書而不云得仙樊英滅蜀中火災後漢書載此然同時郭憲欒巴亦然恐有訛者郗鑒得道居名山唐時尚存有段碧者見之見太平廣記中姚泓失國入山得道遍體生長毛亦見廣記仙鑑蕭子雲師杜元老授職為元洲長史八十二口洞仙徐之才以陰功得道見女徐仙姑傳李衛公大厯尚存廣記仙類馬周為素靈宫仙官謫降李紳姓名預載仙籙中同上顔真卿歸葬惟空棺賈耽以神解稱異人吳道元躍入畫中盧鈞吞金丹得道王叡卒後人見之成都陳陶夫婦竝得仙姚平仲騎青騾入終南蘇養直遇羅浮黄真人羽化以上雜見御覽廣記仙鑑酉陽夷堅等書外盧把李林甫等削不載女仙則鉤弋夫人改塟棺中惟絲履一雙見廣記與史傳互異王衍女進賢為愍懷太子妃并婢六出遭掠赴水遇韓西華救度竝得仙韓太華乃韓安國妹李廣利妻竇武妹瓊英黄瓊女景華竝得道居易遷宫以上竝見真誥唐𤣥宗三女玉真大公主次公主幼真三公主竝從胡天師慧超得仙見仙鑑胡慧超傳玉真長公主即張果傳欲降為果妻者也右皆正史不載而雜見傳記者他如魏太武為太平真君見寇謙之傳中唐𤣥宗為太陽朱宫仙人楊貴妃為太上侍女見楊通幽傳中唐憲宗為海島仙人見伊祁𤣥覽傳宋徽宗為東華帝君徽宗后為紫虚真君見林靈素傳中此類皆方士幻惑之説視諸埜史傳聞又不侔故略之道經所載𤣥天五城之上僊聖階秩高下森如信若所言其莅事舉職勞不啻於人間王元澤所謂千嵗何益白石先生寧為地仙不樂飛昇有以也顧其説不可具聞其名號時時散見諸傳記中暇讀大洞諸經外旁及稚川貞白及唐宋小説家言得名號可紀者數十百餘彚為一帙世有好譚天者將挈以贈焉太極真人赤松子見三洞珠囊又杜沖又淮南王又西梁子文見周義山傳徐來勤見葛𤣥傳無上真人尹喜見太平廣記諸仙傳下同太和真人尹軌及由世逺又王君清虛真人王褒又小有真人亦褒大羅真人葛𤣥為太羅前身桐栢真人王子喬又李奉仙青葢真人高世韓少室真人劉干壽太元真人茅盈太清真人彭清宋倫太微真人尹澄秦隴真人周亮以下並仙鑑靖明真人匡續西城真人王方平司命真人路大安句曲真人茅固𤣥洲真人姚坦中岳真人高丘子王仲甫王𤣥甫蘇林西岳真人馮長小有真人王瓊見𤣥怪錄麒麟客傳紫府真人韓琦見宛委餘編太梁真人魏顯仁闕冢真人王道寧岷山真人陰友宗陸渾真人郭幼度崇山真人范伯華鬱絶真人裴𤣥仁以上並見真仙通鑑清逸真人李白見宛委餘編華陽真人王𤣥甫見仙鑑太虚真人赤松子見魏夫人傳九疑真人韓偉逺見御覽引三洞珠囊清寧真人裴𤣥仁見三洞珠囊紫陽真人周義山張伯端𤣥一真人范伯慈以下竝見仙鑑九皇真人張伯端黄庭真人王探東極真人王太虛南岳真人陳子微潜山真人鮑靚兼領上清真人司馬承禎見謝自然傳又李少君趙覽伯元張仲逸竝見仙鑑又許諡見御五嶽真人馮延壽見列仙宋來子傳清城真人洪崖先生見仙鑑本傳南極大明公匡續太極右仙公葛𤣥太極左仙公谷希子上清仙公許劌又涓子為北海公見御覽蓬萊右仙公貿保安九𤣥左仙公封瑋玉真上公崔子文紫陽左仙公石路成見王母傳九疑山侯張上貴岱宗神侯鮑元節又陶侃為西河侯巵言太極仙侯張奉見御覽水府仙官郭璞東源伯張石生見仙鑑下竝同少室仙伯王逺知又呉涵虚華山仙伯秦叔隠青城仙伯洪崖子見弇州文集潜山真伯趙祖陽見仙鑑海伯屈原見巵言蓬萊大仙伯茅盈見仙傳拾遺五真記監海伯温嶠見巵言太極高仙伯延葢公見王母傳八元仙伯柯元首見御覽嵩山伯陶𢎞景見廣記某傳中理禁伯張𤣥賔又赤松子為昆林仙伯太極左仙卿黄觀子葉法善太極上卿馬成子中元仙卿羨門子𤣥洲上卿尹喜西岳仙卿李翼上清左卿許成已上竝見仙鑑東岳上卿茅盈見神仙傳𤣥真大卿瑕丘仲見仙鑑太極仙卿墨翟見巵言蓬萊左卿葉叔茂見仙鑑太清左卿黄觀子見御覽東府左卿白石生同上東華上佐楊義見仙鑑陽晨大夫石叔門見御覽英文臺侍郎金可記見仙傳拾遺昆丘侍郎鮑靚見廣記九華侍郎馬成子見仙鑑下同明晨侍郎夏馥又周暢見數玉華侍郎方某及莫某三人見夷堅志碧落侍郎沈羲見仙鑑周爰支傳門下侍中張良又劉楨徐榦王粲竝見巵言又王𨗳為尚書令王嘉徐庶何晏殷浩俱侍郎太極韋編郎莊周見酉陽雜俎左𤣥執葢郎封瑋見御覽玉臺執葢郎郭四朝又茅衷見封瑋傳太上侍經仙郎王思真見仙鑑仙臺郎侯道華見廣記修文郎樂子長卜子夏顔淵蔡邕見巵言典柄執法郎淳于叔通見御覽都禁郎賈誼見巵言又李明期為玉晨元郎北天修門郎紀瞻虞譚同見巵言執葢郎虞和見巵言又正一上元郎王忠左理中監韓崇見仙鑑下同右理中監劉翊童初監范幼安東華上清監李白碧虚上監董奉蓬萊都水監桓闓左副監謝鯤見巵言又張叔隱為右仙鑑太陽都錄大監魏徴亦見巵言蓬萊仙監陶𢎞景巵言作蓬萊都水大監丘監王弼見宛委餘編保命丞茅衷見仙鑑下同三官保命司茅衷又樂長冶為保命丞南岳司命李奉仙九宫右司保展土公見列仙傳都錄司命郭璞見巵言下同鬼官司命周顗又姚俊為北河司命岷峨主司杜光庭見仙傳拾遺地下曹司沈文通見仙鑑下同送迎使者徐福見沈羲傳繡衣使者孟六竒又冷廣子期竝見御覽地下主者鮑靚見神仙傳太清宫主者虞善翔見仙鑑下同南門亭長郄鑒見巵言下同北斗天門亭長沈文通北極判官鄒宿見仙鑑泰山司馬賈誼見巵言下同雷部掌事劉景文紫府押衙蘇軾太𤣥博士莊周見巵言蓮花博士楊廷秀見詩人王屑𤣥洲長史蕭子雲見仙鑑又杜預蔡謨俱為長史見宛委餘編又管條條為左官御史見御覽五雲書閣吏陳幼霞見容齊隨筆神霄散吏林靈素見本傳文星典吏杜甫見巵言高明大使許遜見本傳又為九天遊奕使中央鬼帝嵇康見巵言下同北方鬼帝揚雄又張衡閻浮提王寇準蔡襄遮須國王曹植赤龍神王伊用昌見仙鑑五方天帝君簡肅正見魏夫人傳西極總真君王逺見御覽傳授部東華青童君景林真同上唐世君司馬生見沈義傳葉君王喬見後漢書東海青童君延陵暘見漢武内傳王屋山君龎籍見巵言方丈宫主九源丈人見列仙傳蓬萊長生主白樂天見仙鑑海山院主白樂天見廣記華陽洞主東方朔見巵言芙蓉城主石曼卿亦見巵言靈芝館仙官王安國見侯鯖錄太上仙官東方朔見王母傳素靈宫仙官馬周見廣記六押大都統馬總杜佑三天大法師馬成子竝見巵言泰山老師崔曙見酉陽雜俎太乙師鬼谷子見巵言恒嶽仙人田吾道榮見仙鑑下同大乙仙人王向見仙鑑控鶴仙人武夷君傳及山志墜地仙人同上林屋仙人王瑋𤣥見仙鑑下同柏樹仙童許遜見本傳九華大仙田先生見廣記赤脚大仙宋仁宗見野史斥仙人項蔓都見仙鑑謫仙人李白見本集又賈眈見廣記仙類嵗星精東方朔見傳東海蟾精徐知常見林靈素傳混沌初分白蝙蝠精張果凡稱先生者率當時及後世尊稱稱子者率自稱故皆不錄凡真人係世主所封者不錄凡巵言所列有官號而無職司者不錄錄其當時受封號於太上者或前身為某仙官者許旌陽得道贈逺祖由玉虚僕射曽祖琰太微兵衛大夫先祖玉太極把業錄籍典者父肅中嶽仙官賜所居宅曰仙曹左府右皆天帝所令今人但知旌陽拔宅事不知許武仲逃堯後復有此贈未審天上玉虚僕射較地下九州長何似耳許旌陽拔宅昇天後齊有張司空名㞯遇葛稚川飲仙酒舉族八十二口白日上昇許惟一僕并妻為地仙張亦遺一女使盧瓊為土地道家好傅㑹乃爾又蕭子雲八十口同居洞中尤竒僻也太真科曰玉皇諸錄有百八道君羣仙隨業以補其職三善道者聖真仙也上品曰聖中品曰真下品曰仙三清之間各有正位聖登玉清真登上清仙登太清玉清有大省宫殿皇帝王公卿大夫吏民率以聖呼之如聖皇聖帝之類是也男女貴賤各有次第上清有𤣥都玉京七寶紫微率以真呼之太清有太極宫殿率以仙呼之其上清太清品位列男女次第之統數與玉清同麟按公卿大夫皆三代以還品秩唐虞尚未聞然則無始之前羣仙位號究竟何稱乎即以此稱果出三代則人間仰法天上乎抑天上下效人間乎凡道書可笑類如此昔人以赤明龍漢及詩詞體格逐代更變為疑不知兹類之荒唐有彌甚者漫舉例之登真隱訣曰三清九宫竝有僚屬例左勝於右其高等稱曰道君次真人真公真卿中有御史玉郎諸小號官位甚多也女真則稱元君夫人仙之大小男女皆取治所以為著號外又有仙伯仙丞仙監仙郎等右所列御史丞監諸郎屬又漢魏以下官稱矣少室山房筆叢卷二十七
