body:
  text: 少室山房筆叢卷十四明胡應麟撰四部正訛上凡贋書之作情狀至繁約而言之殆十數卷有偽作於前代而世率知之者風后之握竒岐伯之素問是也有偽作於近代而世反惑之者卜商之易傳毛漸之連山是也有掇古人之事而偽者仲尼傾蓋而有子華柱史出關而有尹喜是也有挾古人之文而偽者伍員著書而有越絶賈誼賦鵩而有鶡冠是也有傳古人之名而偽者尹負鼎而湯液聞戚飯牛而相經著是也有蹈古書之名而偽者汲冢發而師春補檮杌紀而楚史傳是也有憚於自名而偽者魏泰筆録之類是也有恥於自名而偽者和氏香奩之類是也有襲取於人而偽者法盛晉書之類是也有假重於人而偽者子瞻杜解之類是也有惡其人偽以禍之者僧孺行紀之類是也有惡其人偽以誣之者聖俞碧雲之類是也有本非偽人託之而偽者隂符不言三皇而李荃稱黃帝之類是也有書本偽人補之而益偽者乾坤鑿度及諸緯書之類是也又有偽而非偽者洞靈真經本王士元所補而以偽亢倉西京雜記本葛稚川所傳而以偽劉歆之類是也又有非偽而實偽者化書本談峭所著而宋齊丘竊而序傳之莊注本向秀所作而郭子玄取而點定之類是也二説尚難信談事僅羽流所述向子期與嵇阮諸文士友而絶不為言姑據前人載此又有當時知其偽而後世弗傳者劉炫魯史之類是也又有當時記其偽而後人弗悟者司馬濳虛之類是也濳虛司馬公屬草木成後人贋補行世見朱紫陽語録黃東發日鈔世以數學無辨其非是者又有本無撰人後人因近似而偽託者山海稱大禹之類是也又有本有撰人後人因亡逸而偽題者正訓稱陸機之類是也右諸偽書外又有此十餘種世或以非偽而信之或槩以偽而疑之皆弗深考故也余故詳為别白俾撰者弗湮其實非撰者弗蒙其聲於經籍或有補云連山易十卷見唐藝文志按班氏六經首周易凡夏商之易絶不聞隋牛𢎞購求宇內遺書至三十七萬卷魏玄成等修隋史晉梁以降亡逸篇名無不具載皆不聞所謂連山者而至唐始出可乎北史劉炫傳隋文搜訪圗籍炫因偽造連山及魯史記上之馬端臨據此以為炫作或有然者蓋炫後事發除名故隋志不録而其書尚傳於後開元中盛集羣書仍入禁中耳鄭漁仲謂此書當時不存已無可考今亦未能必其炫也歸藏今亦不傳故二書惟論其大槩不能致詳歸藏易十三卷晉太尉參軍薛貞唐司馬膺各有注按七略無歸藏晉中經簿始有此書隋志因之至宋僅存初經齊母本著三篇鄭漁仲以為其文質其義古後學以其不文則疑而棄之連山所以亡者要當復過於此噫連山夏易也歸藏商易也禹貢之文千古敘事宗焉商書簡潔而明肅或有過於周者孰謂夏殷之文不郁郁也隋志稱此書惟載卜筮不類聖人之旨蓋唐世固疑其偽若鄭以晚出為辨則馬端臨之説盡之矣薛貞晉人載於隋志鄭以為隋人亦誤五經易最多依託以卜筮易於傳訛也子夏易十卷陳振孫云漢志無卜氏易至隋志始有子夏易二卷其為依託甚明且隋唐時已殘缺宋安得有十卷其經文彖象爻辭俱用王弼本又陸德明所引隋子夏易語今本十卷中皆無之豈直非漢世書併非隋唐之舊矣余按子夏易載通考者今亦不傳據陳氏所論推之當是漢末人依託至隋殘缺唐宋人復因隋目取王氏本偽撰此書正猶乾坤鑿度本漢世偽撰至隋唐亡逸宋人復偽撰以行偽之中又有偽者也朝景迂以此書張弧撰按弧唐大理評事今有素履子傳於世朝豈誤記此耶周易乾鑿度二卷又乾坤鑿度二卷今合為一實二書也乾坤鑿度稱黃帝撰而乾鑿度皆假孔子為言其偽固無容辨説然亦非鑿度本書也按諸緯漢藝文志絶不經見隋志始備詳之蓋哀平末其端已兆光武赤伏定基魏晉以還禪受亡不援藉符命自隋文禁絶其目猶數十家宋世但七緯傳説者咸以好事掇拾類書補綴而成非漢魏之舊今七緯又僅鑿度傳余讀之信矣王子充叢録所見正同則元末已亡久也是書余尚疑為近人掇拾者讀黃氏日鈔詳載其言政與今傳本合乃信其為宋世書乾鑿度曰求卦主嵗術曰常以太嵗紀嵗七十六為一紀二十紀為一部首即置積部首嵗數加所入紀嵗數以三十二除之餘不足者以乾坤始數二卦而得一嵗未算即主嵗之卦也按此條見後漢黃琬傳注中蓋非宋人偽撰者要之亦魏晉之文也又乾坤鑿度云有太易有太初有太始有太素太易者未見氣也太初者氣之始也太始者形之始也太素者質之始也氣形質具而未離故曰渾淪渾淪者言萬物相渾成而未相離視之不見聽之不聞故曰易也易變而為一一變而為七七變而為九九者氣變之究也乃復變而為一一者形變之始清輕者上為天濁重者下為地右俱鑿度中孔子所云實全寫列子天瑞一節稍增損數字遂不成語言又列子重濁者下為地之后有沖和氣者為人故天地含精萬物化生三語意乃完足今剗去後三語而以物有始有壯有究故三畫成乾接之文義頓斷缺可笑蓋元包洞極之類猶是稍能文者所為此特荒陋俚儒偽撰耳然三墳又出此下矣讖緯之説蓋起於河洛圗書當西漢末符命盛行俗儒增益舛訛日繁其學自隋文二主禁絶世不復傳稍可見者惟類書一二援引及諸家書目具名而已而往往紀載不一因參考異同盡録以資博雅且備知書亡已久即好事家藏祕本間見皆偽中之偽無萬一足徵也易則稽覽圗乾鑿度坤靈圗通卦驗是類謀辨終備乾坤鑿度京房易鈔乾元敘制書則尚書緯尚書中候璇璣鈐考靈曜帝命驗運期授詩則含神霧推度災紀歷樞禮則含文嘉稽命徵斗威儀禮記默房樂則動聲儀稽耀嘉叶圗徵春秋則元命包演孔圗文耀均運斗樞威精符合誠圗考異郵保乾圗漢含孳佐助期握誠圗濳潭巴説題辭論語則論語摘輔象撰考讖孝經則孝經緯孝經雜緯孝經內事古祕援神勾命訣援神契元命包左右握左右契雌雄圗分野圗弟子圗口授圗應瑞圗太平御覽又有書帝驗期禮稽命曜春秋命厯序孝經威嬉拒等然隋世所存僅十之三馬氏通考止易緯數種朝陳俱斥為偽書今惟乾坤鑿度行世蓋易緯又幾盡矣緯書太平御覽又有易卦統通圗尚書鉤命訣禮記稽命曜春秋命厯序又河圗括地象河圗稽命曜河圗挺輔佐河圗帝通紀河圗録運法河圗真鉤河圗著命河圗矩起河圗天靈河圗祕徵河圗玉板洛書録運法洛書稽命曜等尋其命名亦易緯之類第御覽所引用亦甚希而諸史藝文志馬鄭經籍略并其名皆無之蓋自唐已亡髙士廉等編文思博要或掇拾於宋齊諸類書中御覽又得之博要諸書中決非宋初所有也乾坤鑿度所載緯書太古文目有元皇介次萬形經次乾文緯次乾鑿度坤鑿度次考靈經次制靈圗次河圗八文次希夷名次含文嘉次稽命圗次墳文次八文次元命包共一十四緯今見於類書者惟含文嘉元命包乾坤二鑿度而已垂皇策乾文緯乾坤二鑿度説易者也含文嘉則禮而元命包春秋孝經皆有之不知何者在先而衛元嵩易元包則又因是命名者也今乾坤鑿度全書存其理欲深而甚淺其文欲怪而甚庸其他雜見類書者往往不相逺也坤鑿度又有地靈母經含靈孕見注易靈緯經又洛書有靈凖聽又地形經又制靈經甚矣其名之衆也蓋此又宋世偽撰乾坤鑿度者依倣御覽所存諸目創立新題故尤可笑近關中胡氏墅談首集諸緯書名僅十二三烏傷王氏叢録直據隋志及通考亦不能詳余故備録之以資好事噫昔之偽撰者彼既已濫用其心而余又窮搜其目得無以五十步笑百步哉曾鞏氏曰欲使天下之毋惑其説莫如大明其説之非而放之余之意其亦猶是已夫緯書名義率不可通曉今據乾坤鑿度録其一二有注釋者於左自餘可以例推昔人云以艱深之詞文淺易之説但覩其名無事開卷矣有撰人者并附乾坤鑿度聖人鑿開天路顯彰化源也庖犧著鉤命訣天地失序必有沮泄用隂陽鉤治之也女媧著乾鑿度聖人順乾道浩大以天門為名也坤鑿度太古變乾之後次鑿坤度作為是書地靈母經女媧著易靈緯炎帝黃帝著又黃帝作易八墳世率以讖緯並論二書雖相表裏而實不同緯之名所以配經故自六經語孝而外無復别出河圗洛書等緯皆易也讖之依附六經者但論語有讖八卷餘不槩見以為僅此一種偶閲隋經籍志注附見十餘家乃知凡讖皆託古聖賢以名其書與緯體制迥别蓋其説尤誕妄故隋禁之後永絶類書亦無從援引而唐宋諸藏書家絶口不談以世所少知附其目於此孔老讖十二卷老子河洛讖一卷尹公讖四卷劉向讖一卷雜讖書二十九卷堯戒舜禹一卷孔子王明鏡一卷郭文金雄記一卷王子年歌一卷嵩山道士歌一卷又有以緯候並稱者今惟尚書中候見目中他不可考云茅山志引河圗要元篇云勾金之壇其間有陵兵病不起洪波不登又曰乃有地脈土良水清勾曲之山金壇之陵可以度世上升曲成要元篇蓋漢世讖書後漢書志注不載其目僅見此焉在楊氏談苑醍醐所記以用修語余未敢深信然他無可考姑録此以廣異聞三墳之偽前人辨之審矣鄭漁仲以為三皇太古書而尊信為實然甚矣鄭之疏略也余讀之蓋諸贋書中至淺陋者世以隋購三墳劉炫偽造連山等百餘篇上之即此書然炫在隋號大儒其學博其業精其造連山雖偽妄必有過人者今三墳之首所稱太始太極太易太初太素皆勦合乾坤鑿度之文而稍增飾之而乾坤鑿度則又全録沖虛天瑞之語者也至其所列連山歸藏乾坤等象布置錯綜僅同兒戲其引物連類取義稱名合於羲農之世者十無三四亡論六代以前即真出於炫豈淺陋至是極哉且伏羲為天皇似矣神農而曰人皇軒轅而曰地皇是故為異説而罔顧其理之弗根也先時者殺不及時者殺夏后所引是矣而以出軒轅是妄意其時而弗知其命之弗順也又其所言二十二易草木等語皆庸人孺子所縮朒而不肯言者是書蓋即序者毛漸所為余故劇論為光伯解紛若三皇之説世自漁仲外亡信者葉夢得馬端臨已極譏鄭之好怪吾何暇為辨哉按隋世牛𢎞主收書即炫偽撰𢎞等詎可盡欺也天皇氏策辭云咨豫上相共工我惟老極無為子惟扶我正道咨告於民俾知甲厯日月嵗時自兹始無或不記子其勿怠共工曰工居君臣之位無有勞君其念哉皇曰下相皇桓我惟老極無為子惟扶我正道撫愛下民同力咨告於民俾知甲厯日月嵗時自兹始無或不記子其勿怠桓曰桓居君臣之位無有勞君其念哉皇曰栗陸子居我水龍之位主養草木開道泉源無時或失子其勿怠陸曰竭力於民君其念哉皇曰大庭主我屋室視民之未居者喻之借力同構其居無或寒凍庭曰順民之辭皇曰隂康子居水土俾民居處無或漂流勤於道達於下康曰順君之辭皇曰渾沌子居我降龍之位惟主於民皇曰昆連子主我刀斧無俾野獸餓虎之類傷殘生民無俾同類大力之徒驅逐微弱子其伏之連曰專主兵事君無念哉皇曰四方之君咸順我辭則世無害惟愛於民則位不危皇曰子無懷安惟安於民民安子安民危子危子其念哉按三墳此章全剽舜典而辭意淺陋殆類村學究語詎曰庖犧之代預規虞世之文哉王長公讀三墳書云伏羲畫連山而有民兵器隂兵妖陽兵譴兵陽陳至策辭而曰主我屋室主我刀斧神農歸藏而曰殺藏墓此皆不知其時而妄為説者也余執此更推之連山猶或可解至歸藏乾坤強半笑資因備録後後之論三墳者觀此足矣歸藏卦爻曰歸動乘舟神農之世未有舟楫也曰歸動乘軒神農之世未有軒蓋也曰藏止重門神農之世未有屋室也曰殺動干戈神農之世未有戈矛也曰殺長戰曰殺止亂而不知征伐兵爭實肇於黃帝曰生動勳陽傳云聖人以行慶錫曰止殺寬宥而不知賞慶赦宥實始於唐虞他若所謂歸殺降生藏害皆剌謬之妄談所謂長歸從師長藏從夫皆經典之剩語曰地氣曰水氣曰火氣曰風氣則釋門之四大而曰殺生無忍曰動止戒又釋子委談也曰金氣曰木氣曰水氣曰火氣則術士之五行而曰生殺相尅曰金氣殺又術家淺數也凡歸藏中爻象類若此至坤乾天地圓兵等象尤堪捧腹資鄭漁仲以該洽自信胡漫然弗考哉坤乾卦象曰雲天成隂曰雲地髙林曰山地險徑曰氣地下濕曰山日沈西曰天日昭明曰川日流光曰日月代明曰川月東浮曰日山危峰曰月山曲池曰山雲疊峰曰山氣籠煙曰川氣浮光曰雲氣流霞曰月天夜明曰川山島曰雲山岫曰氣山嵒曰日川湖曰雲川溪曰氣川泉曰山川澗曰月川湖右所云地皇氏封象大類今世村學孰師教小兒蒙求總龜又似初習聲偶者詩學大成中字面夫髙林險徑危峰曲池島岫煙霞川嵒溪澗皆漢唐六代詞人語亡論三皇即六籍四詩固不盡見而昭明代明流光浮光成隂下濕沈西東浮等語或勦諸經典或取諸閭閻蓋亡一字類三代以上者故余嘗謂偽書之陋無陋於三墳也皇曰岐伯天師云云先時者殺不及時者殺二語與夏書合夫夏書誓衆出師言固應爾岐伯燮理隂陽而首戒以殺何也蓋偽者以黃帝首伐蚩尤故剽夏書二語以實之又於序中特援為證而不知適以愈彰其偽心勞日拙誠然哉孔穎達論古文尚書云孔君作傳值巫蠱不行以終前漢諸儒知孔本五十八篇遂有張霸之徒偽作舜典洎九共九篇大禹謨益稷五子之歌胤征湯誥咸有一德典寶伊訓肆命原命武成旅獒冏命二十四篇除九共九篇共十六卷蓋亦略見百篇之序故以伏生二十八篇者復出舜典益稷盤庚二篇康王之誥及泰誓共三十四篇而偽作此二十四篇十六卷以求合於孔氏五十八篇四十六卷之數也劉向班固劉歆賈逵馬融鄭玄皆不見真古文而誤以此為古文之書服虔杜預亦不之見至晉王肅始似竊見而晉書又云鄭沖以古文授蘇愈愈授梁栁栁內兄皇甫謐得之而栁又以授臧曹曹始授梅賾賾乃奏上其書而施行焉漢書所引泰誓云立功立事惟以永年疑即武帝之世所得者律厯志所引伊訓畢命字畫有與古文異同者疑出伏生口傳其引武成則伏生無此篇必張霸偽作者也按張霸偽尚書今不傳而其目備見於此因録之然安國序世亦頗疑非西京文序云諸篇目外霸傳又有百兩篇録於後張霸傳云孝景帝時魯共王壞孔子教授堂以為殿得百篇尚書於牆壁中武帝使者取視莫能讀者遂袐於中外不得見至孝成皇帝時徵為古文尚書學東海張霸按百篇之序空造百兩之篇獻之成帝帝出祕書百篇以挍之皆不相應於是下霸於吏吏白霸罪當至死成帝髙其才而不誅亦惜其文而不滅故百兩之篇傳在世間傳見之久人遂謂尚書本有百兩篇矣按孔穎達但言霸作偽書不及詳其始末今據後漢書録於此與孔説亦小不同漢張霸隋劉炫皆篤學之士也漢成徵古尚書而霸偽造舜典等百餘篇上之隋文求古周易而炫偽造連山等百餘篇上之其後皆事發霸幾死而炫抵罪極相類可笑然漢成卒以此竒霸釋其罪且不廢其經而隋世不聞宥炫蓋隋文方沾沾綜核不能格外行事固也二子誣矯聖真誠足誅第皆經術大儒其所撰造要非唐宋以後所及惜今遂無一傳者世第知炫造易而霸事不甚傳因録此為偽作之戒二子著述之勤亦因槩覩云元命包四卷後周衛元嵩述本緯書春秋孝經各有元命包故好事勦為此書而附諸大易云耳其文率學太玄用字竒僻過之而厥義則甚淺序稱楊元素由閣本録行張升者以授楊楫王長公謂即楊撰或即張升余讀之絶歎長公之言燭鑒千載然其文頗雅馴字雖竒而旨不晦殆非升楫所辦當出楊元素輩或唐文士撰述也其數即火珠林與京房易懸合火珠林蓋宋時用以卜筮者云唐藝文志有元命包十卷撰人注者皆同此書恐不得為偽此書崇文目稱唐衛元嵩通志通考並因之按元嵩後周人所撰述有齊三教論七卷見通志又隋志釋氏類稱蜀郡沙門衛元嵩上書言僧徒猥濫周武帝下詔一切廢毁即其人也而王堯臣總目以為唐人考唐世諸紀傳絶無名姓同者其誤瞭然蓋因傳注出蘇元明李江蘇李皆唐人以意傅合耳此書楊楫本序以元嵩獻策後周賜爵蜀郡公武帝尊禮不敢臣之頗與隋志合必元嵩先為沙門後還俗上書請汰僧徒故周武亟暴顯之以風天下不然將束縛之不暇而尊禮乎哉序稱元嵩有傳考北史無之楊氏之誤也關朗易傳一卷唐趙蕤注朱紫陽曰偽書也按朗稱魏孝文時人王仲淹祖同州刺史彥師事之嘗為彥筮得夬之革遂決百年中當有達人出修洙泗之教中厯數周齊陳隋事無不懸合而其意實寓河汾非唐初福畤輩拮據陳迹以耀其先則宋阮逸偽撰以證佐文中者書之得失固不足深論也或以即注者趙蕤按蕤有長短經十卷北夢瑣言云蕤梓州鹽亭人博學韜鈐長於經世夫婦俱隱不應徵召論王霸機權正變作為此經則蕤當是中唐前後人然新舊唐書並無關氏易傳而僅見於馬鄭諸家則此書非𬎼可見而阮逸之偽無疑按通考逸又有易筌六卷每爻必以古事系之陳振孫誚其牽合蓋逸之作偽無往不然也續按李白嘗師事趙蕤蕤當是開元前人見唐詩紀事麻衣心法一卷稱麻衣道者以授陳希夷余讀之每字四為句句四為章章四十二下為注解皆淺俚質略大類宋世丹汞之書朱紫陽謂戴師愈作託名麻衣余觀其末有李潛序絶肖書中所云蓋皆戴所作也而當時儒者若張廣漢輩亦頗信之余竊所未喻矣王氏元經十五卷稱王通撰薛收注宋世已艱得其本意今藏書家不復有之據通考朝陳所論經傳皆阮逸也其書始晉太熙終陳亡陳振孫謂唐神堯諱淵其祖景皇諱虎故晉書戴淵石虎皆以字行薛收唐人於傳稱戴若思石季龍宜也元經作於隋世乃亦云若思逸之心勞日拙蓋不能自掩矣右陳氏論甚精然不特經不當稱即傳稱季龍若思亦足占其偽也何以故薛收河汾高弟文皇并天下收與天策之選不數歲而卒當時偕諸學士運籌帷幄固無暇於著述藉令果傳元經當在河汾授受之際此時唐尚未興何緣預知其諱而改之耶亦有古書本不諱後人避本朝之諱而改者如山海經啓皆為開之類此又各當求其故不可執泥一端若元經之偽則此足以盡槩之矣阮逸字天隱胡安定瑗門士也嘗為府司理與瑗共定雅樂附見宋史瑗傳蓋亦宋初文學之士今閲子明傳等作其綴屬有足觀者而獨以偽書聞於後人惜哉術胡可弗慎也楊用修談苑醍醐云湖廣一統志載劉有年於永樂中上儀禮逸經十有八篇若然則儀禮之亡者全矣不知有年何從得之意者聖經在世如日月終不可掩耶然一時廟堂諸公不聞表章傳布之請今求之內閣亦不見其書出非其時此書之不幸也世人大言動笑漢唐漢唐求逸書賞之以官購之以金焉有見此竒書而付之漠然者乎按儀禮篇亡者自漢已無從物色寧有厯唐至宋復出於今之理必劉氏連山魯史故事偽作欺世用修好竒而信之非也余家藏有元吳幼清儀禮逸經八篇傳十篇經則取諸大小戴及鄭氏注傳則吳氏本紫陽遺意而纂次之其書名篇數與劉所上正合豈即此書也耶少室山房筆叢卷十四
