body:
  text: 少室山房筆叢卷一眀胡應麟撰經籍㑹通一墳籍之始肇自羲黃盛于周漢衍于梁晉極于隋唐一燼于秦再厄于莽三灾于繹四蕩于巢宋氏旁求力倍功半元人不緝事軼言湮聚散廢興槩可見矣述源流第一六經刪修尼父授受孔門卷軸篇章類崇簡要三墳邱索湮沒不傳以大易尚書較之其體制居可識也蓋古文峻潔迥異浮靡聖筆淵𤣥亡資藻飾故卷之不盈篋笥而擴之函冒乾坤春秋而降諸子百家興而道術離楚漢以還騷人才士作而文學盛此其盈縮之大都也然泰山封禪文字萬家合雒禪通沿洄十紀槩徴此例則古人文籍不必盡減今時顧世類弗傳者良由洪荒始判楮墨未遑竹簡韋編既非易致靈文祕檢又率難窺重以祖龍烈焰煨燼之中僅存一線漢世諸儒稍加掇拾劉氏七略遂至三萬餘卷考諸班氏藝文西京制作才十二三耳世以皋䕫稷契何書可讀然乎否耶厯朝諸史志藝文者五家前漢也舊唐也新唐也隋也宋也班氏規模七略劉昫沿襲隋書新唐損益舊唐而宋史所因則崇文四庫等目也中壘父子奕葉青緗紀例編摩故應邃密第遺書絶寡考訂靡從隋志簡編亦多散佚而類次可觀論辨多美舊唐之録本朝大為踈略新書間增所缺頗自精詳歐陽宋志紊亂錯雜元人製作亡足深譏大率史氏精神全寓紀傳論序次之表志之流便落二義至于經籍尤匪所先且人靡博極業謝専門聊具故事而已自餘正史之外奉命纂修類例足徴卷軸可考若劉歆之略荀朂之部王儉之志孝緒之録並軼不傳宋自慶厯淳熙嘉定諸目外薦紳文士宋尤李葉並富青緗今惟文簡目存亦多闕漏鄭氏藝文一略該括甚巨剖核彌精良堪省閲第通志前朝失標本代有無多寡混為一途番陽通考以四部分門實因舊史而支流𣲖别條理井然且究極㫖歸推眀得失百代墳籍燎如指掌倘更因當時所有創及亡篇咸著品題稍存故實則庶幾盡善矣歷朝墳籍畜聚之多亡如隋世篇目之盛僅見唐時按向歆七略卷三萬餘班氏東京僅覩其半莽卓之亂尺簡不存晉荀朂李充洊加鳩集宋元嘉中謝靈運挍讐至六萬卷齊王儉王亮謝朏梁殷鈞任昉阮孝緒等繼造目録率不過三萬卷蓋宋初祕閣所藏重復相糅靈運概加裒録諸人頗事芟除雖其數僅半于前或其實反增于舊隋文父子篤尚斯文訪輯搜求不遺餘力名山奧壁捆載盈庭嘉則殿書遂至三十七萬餘卷書契以來特為浩瀚尋其正本亦止三萬七千隋志近九萬卷至開元中纍葉承平異書間出一時纂集及唐學者自著八萬餘卷古今藏書莫盛于此趙宋諸帝雅意文墨慶厯間崇文總目所載三萬餘卷纍朝增益卷不盈萬宣和北狩散亡略盡至淳熙嘉定間書目乃得五萬餘卷蓋厯代帝王圖籍興廢聚散之由大都具矣夫以萬乘南面之尊石渠東觀之富通都大邑之購求故家野老之獻納而古今輯録不過如此蓋後人述作日益繁興則前代流傳寖微寖滅增減乘除適得此數理勢之自然也舊唐書經籍志序云貞觀中令狐德棻魏徴相次為祕書監上言經籍亡逸請行購募并奏引學士校定羣書大備開元三年散騎常侍禇無量馬懷素侍宴言及經籍𤣥宗曰內庫皆是太宗髙宗先代舊書常令宫人主掌所有殘缺未遑補緝篇卷錯亂難于檢閲卿試為朕整比之至七年詔公卿士庶之家所有異書官借繕寫及四部書成上令百官入乾元殿東廊觀之無不駭其廣九年十一月殷踐猷王愜韋述余欽毋煚劉彥貞王灣劉仲等重修成羣書四部録二百卷右散騎常侍元行冲奏上之自後毋煚又略為四十卷名為古今書録大凡五萬一千八百五十二卷祿山之亂兩都覆沒乾元舊籍亡散殆盡肅宗代宗崇重儒術屢詔購募文宗時鄭覃侍講禁中以經籍道喪屢以為言詔令祕閣搜訪遺文四部書至五萬六千四百七十二卷及廣眀初黃巢干紀尺簡無存昭宗即位志𢎞文雅收合餘燼尚二萬餘遷都洛陽遂靡孑遺右劉昫所紀唐經籍事頗詳以端臨通考不載節録于此龍城録云開元文籍最盛至七萬卷當時司典籍者學士四十七人張說鄭覃裴煜之侯行果康子𤣥皆與焉太宗初即位即置𢎞文館聚書二十餘萬卷選天下文學之士虞世南褚亮姚思廉歐陽詢蔡允恭蕭德言等以本官兼學士更日宿直至夜分乃罷又取三品以上子孫充𢎞文館學生據是時尚未改武德年號也太宗甫定內難即留意經籍如此而馬氏通考獨逸茲事故詳載之按𢎞文館書至二十萬卷則自隋三十七萬外僅再覩耳唐藝文志序稱武德中收隋遺書僅八萬餘卷蓋一時裒益之書校其正本當兵火劻勷之後决不能過三萬也此條載資治通鑑陸氏所序通考亦不收蓋但據經籍考也文皇初年亦似留意經籍貞觀中魏徴虞世南顔師古繼為祕監請購天下書選五品以上子孫工書者繕寫藏于內庫俾宫人掌之以文皇總之于上虞魏董之于下應者宜響然迄貞觀中未聞增益諸臣亦絶無目録之修何也蓋太宗所騁志文詞所鍾嗜翰墨于經籍蓋浮慕焉未必如隋宋之竭力搜訪也故貞觀中百事超越前代此反愧焉文思博要至千二百卷歐虞又各自有類書而祕府二王之迹獨冠千古當時君臣所用力者可見矣續考新書元行冲傳虞魏等竟編緝未成顯慶中諸員役並罷去云舊唐書志後序云三代之書經秦殆盡漢武帝河間王始重儒術于灰燼之餘拾纂亡散篇卷僅而復存劉歆七略在漢藝文志者才三萬三千九百卷後漢蘭臺石室東觀南宫諸儒撰集部帙漸增董卓遷都載舟西上因罹寇盜沈之河存者數船而已及魏武父子採掇遺亡至晉總括羣書才二萬七千九百四十五卷及永嘉之亂洛都覆沒靡有孑遺江表所存官書凡三千一十四卷至宋謝靈運造四部書目録凡四千五百八十二卷其後王儉復造書目凡一萬八千一十卷齊宋兵火延燒祕閣書籍煨燼梁元帝克平侯景收公私經籍歸于江陵凡七萬餘卷蓋佛老之書雜于其間及周師入郢咸自焚蕩周武保定之中才盈萬卷平齊所得數止五千及隋氏平陳南北一統袐書監牛𢎞奏請搜訪遺逸著定書目凡三萬餘卷按此序記纍世藏書卷軸多與隋書不同概當從此為正通考于諸史藝文序目纂輯靡遺獨此不録蓋舊唐書或宋少傳端臨所未覩也通考諸部之首亦但録漢隋新唐俱不及舊唐雲間陸子淵家多藏書所著别集中有統論一則云自古典籍興廢隋牛𢎞謂仲尼之後凡有五厄大約謂秦火為一厄王莽之亂為一厄漢末為一厄永嘉南渡為一厄周師入郢為一厄雖然經史具存與孔壁汲冡之復出見于劉向父子之所輯略者為書凡三萬三千九十卷孔氏之舊蓋未嘗亡也至隋嘉則殿乃有書三十七萬卷可謂富矣栁顧言等之所校定才七萬七千餘卷則是重復猥雜張其數耳七略之外所增才倍之而諸史羣撰具焉南朝盛時梁武之世公私典籍七萬餘卷尚有重本則傳世之書惟存舊數而已散亡之極猶不失萬卷唐世分為四庫開元著録者五萬三千九百一十五卷魏晉所增與釋老之編雜出其間亦不過三萬餘卷而唐之學者自為之書又二萬八千四百六十九卷自是日有所益矣安史亂後備加搜採而四庫之書復完黃巢之禍兩京蕩然宋建隆初三館有書萬二千餘卷自後削平諸國盡收圖籍重以購募太平興國初六庫書籍正副本凡八萬卷固半實爾慶厯崇文總目之書三萬六百六十九卷較之七略顧有不及參互乘除所亡益者何等書耶洪容齊謂御覽引用一千六百九十種書十亡八九而姚鉉所類文集亦多不存因以為歎然經史子集之舊宋亦未嘗闕焉宣和訪求一日之內三詔並下四方竒書由此間出見于著録者溢出二萬五千二百五十四卷以充館閣髙宗渡江書籍散逸加意訪求淳熙間類次見書凡四萬四千四百八十六卷其數雖過于崇文而新籍兼之至于紹定之灾而書復闕矣右子淵所紀古今書籍梗槩頗為簡眀大都本馬氏通考所載而節略之然隋書三十七萬栁顧言等除去猥復止得三萬七千見通考甚詳而此以為七萬餘卷梁任昉阮孝緒等目録大約不過三萬雖云釋典在外要不過二萬餘元帝收集煨燼乃得七萬未必無重復也唐志開元書著録者五萬三千九百一十五卷唐學者自為二萬八千四百六十九卷共八萬餘陸所言釋老之編雜出者三萬餘迄不詳何所指考新舊唐書咸不合宋嘉定中續得一萬八千餘卷陸亦未及載也漫識其後牛𢎞所論五厄皆六代前事隋開皇之盛極矣未幾皆燼于廣陵唐開元之盛極矣俄頃悉灰于安史肅代二宗洊加鳩集黃巢之亂復致蕩然宋世圖史一盛于慶厯再盛于宣和而金人之禍成矣三盛于淳熙四盛于嘉定而元季之師至矣然則書自六朝之後復有五厄大業一也天寶二也廣眀三也靖康四也紹定五也通前為十厄矣廣陵事見通考葉少藴所引杜寶大業幸江都記此外他無所考篤而論之則古今書籍盛聚之時大厄之㑹各有八焉春秋也西漢也蕭梁也隋文也開元也太和也慶厯也淳熙也皆盛聚之時也祖龍也新莽也蕭繹也隋煬也安史也黃巢也金人也元季也皆大厄之㑹也東京之季纂輯無聞班志率西漢東京甚希他無校集者魏晉之間採托未備卓曜諸凶摧頽餘燼于聚于厄俱未足云夫古今墳籍之厄秦固誅首莽即次之蓋秦所焚率三代上書西漢稍稍鳩集莽又繼之故靡尺簡也唐之厄厄于叛賊宋之厄厄于播遷彼非有意于焚兵燹所經玉石俱燬况書宜火物也獨湘東以文士甘心焉罪浮政矣煬雖雅尚卒以不道禍延薄乎云爾大抵厯朝墳籍自唐以前槩見隋志宋興而後通考為詳第其卷帙之數往往異同緣諸家輯録或但紀當時或通志一代或因仍重復或節略猥凡故劉班接迹繁簡頓殊王謝並興多寡懸絶即博洽之流勤于論核而疑似之迹未易精詳今紬繹羣言旁參各代推尋事勢考定異同録其灼然者于左西漢三萬三千九十卷劉歆七略總目舊唐書九十作九百非是據班志所省十家三百餘篇而所增又數十篇僅得後數與此不合然他無可考東漢一萬三千二百六十九卷班固藝文志本劉氏七略入劉向揚雄等儒術三家此據原注然尚有杜林并蹴鞠二三家省伊尹墨子兵類十家亦據原注然所省又有劉向太史公及淮南王數家東漢無增者晉二萬九千九百四十五卷荀朂四部總目書不存見隋志序舊唐書作二萬七千九百四十五卷東晉三千一十四卷李充校定止此惠懷之亂故也東晉孝武增益三萬餘卷徐廣校定見崇文總目序宋萬四千五百八十二卷謝靈運所校隋志以為六萬按六代間書尚難得晉渡江才得三千孝武時三萬恐亦重復宋初何遽能爾當以舊唐書為正阮氏七録數同齊萬五千七十四卷至王儉校修隋志作一萬五千七百四卷阮作宋元徽目與舊書齊目正同齊永眀增益一萬八千一十卷謝朏王亮修諸家皆同梁二萬三千一百六卷任昉部集凡釋氏書不與梁晉通增集三萬餘卷阮孝緒七録總目蓋梁世薦紳家藏併在其中祕書則或因任昉之舊然釋道二典並存其間則所增亦才數千而梁世之書盡此矣此據隋志按阮本録四萬四千五百二十六卷釋道與焉然亦非七萬也見𢎞眀集隋初一萬五千餘卷見牛𢎞進書表此時合正副本僅三萬餘湘東煨燼所存并平陳所得也隋大業中三萬七千餘卷栁𧦬等校定總三十七萬卷正本進御僅此然隋志總目八萬九千餘卷蓋栁氏校定之後或有所增或唐諸人據前代舊目芟除猥雜㑹為此編也諸史藝文皆草草惟隋志盛欲備一家言追劉王阮氏諸書序意可見大都唐開元中八萬二千三百八十四卷新唐書序總舊唐書止五萬六千四百七十六卷蓋釋道二家不與及唐人自著不全入也唐開成中五萬六千四百七十六卷舊唐志序所載是時搜録未必如前之盛蓋釋道本朝具録矣宋慶厯中三萬六百六十九卷王堯臣崇文總目後屢增至四萬餘卷宋淳熙中四萬四千四百八十六卷陳騤等四庫書目後屢增益至五萬九千餘卷考諸史藝文志往往與當時書目相左隋三萬七千而志八萬九千六百六十六卷唐八萬二千而舊唐後序十二萬五千九百六卷宋崇文目四萬中興目五萬而史十一萬九千九百七十二卷蓋史或㑹萃一代志但紀録一時故不無異同而宋史則深可疑也前代書但計卷帙重復未分者隋嘉則殿三十七萬唐𢎞文館二十萬開元中一十二萬唐武德初宋興國初各八萬梁湘東王所收者七萬宋謝康樂所校者六萬薦紳先生惟葉少藴稱十萬餘則皆為實録矣古今書籍人知其厄于火而不知其厄于水者二焉隋嘉則殿書冦亂亡軼武德初尚八萬卷王世充平命司農少卿宋遵貴以舟載之行經砥柱漂沒風浪十僅二三見隋志及舊唐書經籍志后序俱云存者無幾新唐志以盡亡其書蓋信筆不考之過也次則漢蘭臺石室諸書董卓遷都載舟西上因罹寇盜沈溺河中僅數船存此一事他書不載獨舊唐經籍志後序記此考光武遷都書籍二千餘兩諸家以為三倍于前固非實録而時無纂輯尺簡不傳惜哉凡前代書籍之厄史皆備書獨隋世篇籍最盛而諸志不言所終考隋世諸書咸在東都煬幸廣陵東都守禦獨完自王世充降唐唐盡收其圖史僅八萬卷中間未嘗被火向之藏蓄之盛竟何在耶惟杜寶大業江都記云隋書籍三十七萬悉焚于廣陵當是實録蓋隋煬酷嗜經典既欲徙都廣陵必盡載諸書自從洛陽八萬意當時副本耳宋書籍紹定間復災所存者尚衆德祐航海蒙古之難又蕩然矣觀此則圖籍廢興大槩關係國家氣運豈小小哉世共傳劉氏七略王儉七志阮孝緒七録荀謝任殷四部外諸史藝文所載又有晉義熙已來新舊目録三卷梁天監六年四部書目四卷梁東宫四部目録四卷梁文德殿四部目録四卷陳天嘉六年夀安殿四部目録四卷陳德教殿四部目録四卷陳承香殿五經史記目録二卷隋開皇四年四部目録四卷開皇八年四部目録四卷開皇二十年書目四卷香廚四部目録四卷隋大業正御書目録九卷唐羣書四録二百卷古今書目四十卷唐集賢書目一卷唐四庫搜訪圖書目一卷開元四庫書目四十卷唐祕閣書目四卷僞蜀王建書目一卷紫微樓書目一卷崇文總目六十六卷祕閣四庫書目十卷史館書目二卷太學書目一卷據此則前代目録甚多不止盛唐一二今並不傳然前史所載惟謝王任阮諸録尚存全數其餘多寡槩不可得詳矣前代懸購遺書咸著條目隋有闕書目唐有訪書録宋有求書録異時人主留意若此隋文父子所以能致三十七萬于一時者蓋民間獻書無所不納也書目第記書名卷軸槩不能廣唐羣書四録乃至二百餘卷何以浩繁若此蓋各書之下必有論列若歆向所編者宋王堯臣總目六十六卷亦然然但經史二部子集則闕如也董逌廣川書跋則又特主說經而已自餘諸家僅存卷數尤氏書目則并卷數不存文簡在宋頗負博洽稱疏略乃爾或陶氏說郛所節也唐毋煚有古今書録四十卷又節略羣書四録而成即體製居然可見惜並不存鄭略有劉歆七略七卷又七略别録二十卷豈七卷者目别録乃論列與纍朝中祕所畜外薦紳文獻名藏書家代有其人漢則劉向桓談晉則張華束晳齊則王儉陸澄梁則任昉沈約唐則李泌蘇辨皆灼灼者自餘尚衆而世不甚稱宋則李淑宋綬尤袤董逌葉夢得朝公武等大率人間所藏卷軸不過三萬若任昉四萬極矣宋又有濡須秦氏莆田鄭氏漳南吳氏荆州田氏並著目録盛于前朝蓋由印本易得故儲畜者多其數故不能溢也通志有吳兢西齊杜信東齊等目則唐世非無編録但不存爾通志又蔣彧目録都氏目録各一卷亦當唐人又李正議沈少卿吳良嗣李衛公歐陽參政俱有目録則皆宋人也葉少藴云本朝公卿名藏書家如宋宣獻李邯鄲四方士民如亳州祁氏饒州吳氏荆州田氏等吾皆見其目多止四萬餘卷其間頗有不必觀者惟宋宣獻家擇之甚精止二萬許卷而校讐詳審皆勝諸家吾舊所藏僅與宋氏等而宋氏好書人所未見者吾不能盡得也按葉所紀諸家俱有書目行世載文獻通考今並不存觀此梗槩可見其論諸家所藏多猥雜不務銓擇切中厯朝館閣之病不特宋世而已餘語咸實録録之揮麈録云承平士大夫藏書如南都戚氏厯陽沈氏廬山李氏九江陳氏鄱陽吳氏俱有名當世今皆散逸近所至郡府多藏文籍且易得本傳録仕宦稍顯者家必有書數千卷然多失于讐校也按此則葉氏論列外又有此五家宋時文獻之盛乃爾揮麈録又云葉少藴少年貴盛平生好收書逾十萬卷置霅川山居建書樓以處之極為華煥丁卯年其宅與書俱蕩一燎李泰發家舊有萬餘卷亦以是嵗火豈厄運所遘耶廬山李氏即子瞻作記者藏書僅九千卷則餘所列未必皆書家倚頓惟葉語可憑唐馮贄雲仙散録序稱家藏九世之書二十餘萬卷按唐時雕本甚稀故蘇辨家藏二萬侔于祕閣開元之盛僅八萬卷文皇二十萬卷自是重復然唐時即重復之書亦不易得贄何人乃能有此世稱雲仙多誕此開卷一大噱也宋元世欲致此即不為難然必不計重復乃可若正本雖三萬而下可易得乎唐世士民藏書迄無過三萬者玉堂逢辰録云祥符八年四月榮王宫火一日二夜所焚屋宇二千餘間三館圖籍一時俱盡大風或飄至汴水之南惟演獻禮賢宅以處諸王陳振孫曰唐末五代書籍之僅存者又厄于此火可為太息也魏了翁跋遂初堂書目云江元叔合江南吳越之藏凡數萬卷為藏僕竊去市人裂之以藉物其入于安陸張氏者傳之未幾一篋之畜僅供一炊王文康李文正廬山劉莊輿南陽井氏皆藏書者俱未久而失之宋宣獻兼有畢文簡楊文莊二家之書不減中祕而元符中蕩為煙埃朝文元纍世所藏自中原無事時已有火厄至政和甲午之災尺素不存斯理也殆有不可曉者按此記宋世諸藏書家尤詳而皆不能久有良足慨也齊東野語云世間凡萬物未有聚而不散者而書為甚隋牛𢎞疏請開獻書之路極論廢興述五厄之說則書之厄也久矣今姑托其槩言之梁元帝江陵蓄古今圖書十四萬卷隋嘉則殿書三十七萬卷唐惟貞觀開元最勝兩都各聚書四部至七萬卷宋宣和殿太清樓龍圖閣御府所儲尤盛于前代今可考者崇文總目四十六類三萬六百六十九卷史館一萬五千餘卷豫不能具數南渡以來復加集録館閣書目五十二類四萬四千四百八十六卷續目一萬四千九百餘卷是皆藏于官府耳若士大夫之家所藏在前世如張華載書三十車杜兼聚書萬卷韋述蓄書二萬卷鄴侯插架三萬卷金樓子聚書八萬卷唐吳兢西齊一萬三千四百餘卷宋承平時如南都戚氏厯陽沈氏廬山李氏九江陳氏鄱陽吳氏王文康李文正宋宣獻朝以道劉莊輿皆號藏書之富邯鄲李淑五十七類二萬三千一百八十餘卷田鎬三萬卷昭德朝氏二萬四千五百卷南都王仲至四萬三千餘卷而類書浩博若太平御覽之類復不與焉次如曽南豐及李氏山房亦皆一二萬卷然鮮有不厄于兵火者至若吾鄉故家如石林葉氏賀氏皆號藏書之多至十萬卷其後齊齊倪氏月河莫氏竹齊沈氏程氏賀氏皆號藏書之家各不下數萬餘卷亦皆散失無餘近年惟直齊陳氏書最多蓋嘗仕于莆傳録夾漈鄭氏方氏林氏吳氏舊書至五萬一千一百八十餘卷且倣讀書志作解題極其精詳近亦散失至如秀巖東忩鳯山三李髙氏牟氏皆蜀人號為史家所藏僻書尤多今亦已無餘矣吾家三世積纍先君子酷嗜至鬻負郭之田以供筆札之用冥搜極討不憚勞費凡有書四萬二千餘卷及三代以來金石之刻一千五百餘種度置書種志雅二堂日事校讐居然籯金之富余小子遭時多故不善保藏善和之書一旦掃地因考今昔有感斯文為之流涕因書以識吾過且以示子孫云右周密所紀宋諸藏書家最為詳盡續考得之因全録以見宋世民間文獻逺過漢唐總之板本易得故也昭德朝氏直齊陳氏即通考所引二家而不及載其總目僅此足徴云豫章漫抄云元至正初史館遣屬官馳驛求書東南異書頗出時有蜀帥紐鄰之孫盡出其家資遍逰江南四五年間得書三十萬卷遡峽歸蜀可謂富矣今江西與江南號稱文獻故邦豫來訪之藏書甚少間有一二往往新自北方載至亦無甚竒書而浙中猶為彼善若吾吳中則有羣集有精美者矣按此及端臨通考序則元世亦嘗屢有求書之詔第一代典籍邈然無聞何也子淵謂越中視江右差善蓋子淵于越中未嘗久寓且世變陵谷或當時頗異于今故耳若精美則今猶最吳中也其謂江右書皆自北方㩦至都下昔固多書矣陶宗儀說郛録雜談數百家今傳僅十二三則宋世書勝國尚多于今然古書出于今者元未必盡有也隋文父子以天下之力收書僅三十七萬遂冠古今元邊帥子罄一家之産驟得三十萬卷亦宇宙竒事然但欲其多而不計重復則在今甚不難顧正本不知幾何耳古今書籍統計一代前後之藏往往無過十萬統計一朝公私之蓄往往不能十萬所謂天之生財止有此數也況元時板本尚希又非文眀之世紐氏子三十萬卷芟其重復政恐不能三萬耳按唐以前藏書之籍惟史志中得諸祕閣者可徴自餘民間薦紳所儲槩不可考如漢梁子初楊子林手録萬卷梁任昉四萬唐蘇辨二萬李泌三萬梁楊二氏並見桓談新論今載困學紀聞紀聞又云鄴侯之書乃其父所蓄非泌始有之皆僅存總目獨阮孝緒之四萬類例足徴然非必家藏也宋世藏書家至衆目率不存尤延之遂初堂目今傳余閲之亦多不備推之宋葉諸家當亦爾爾惟朝陳二氏最有條理可觀陳所藏至五萬餘足為宋世藏書第一家據野語乃宦中盡得五姓之書故能至是豈易易哉濮安懿王之子宗綽蓄書七萬卷始與英宗偕學于邸每得異書必轉以相付宗綽家本有嶽陽記者皆所賜也此國史本傳所載宣和中其子淮安郡王仲糜進目録三卷忠宣公在燕得其中帙云除監本外寫本印本書籍計二萬二千八百三十六卷觀一帙之目如是所謂七萬卷者為不誣矣三館祕府所未有也盛哉右見洪景盧隨筆第宋世三館所藏不過四萬以上況英宗時尚在宋初其時板本未盛即重復通計亦未能遽至此隨筆所計謬無疑輟耕録云莊蓼塘住松江府上海縣青龍鎮嘗為宋祕書小史其家蓄書數萬卷且多手鈔者經史子集山經地志醫卜方伎稗官小說靡所不具書目以甲乙分十門蓼塘既沒子孫不知保惜或為蟲鼠蝕囓或為鄰識盜竊或供飲博之需或應糊覆之用編帙散亂所存無幾至正六年朝廷開局修宋遼金三史詔求遺書有以書獻者豫一官江南藏書多者止三家莊其一也繼命某學士一人選取其家其家恐兵遁圖䜟干犯禁條悉付祝融氏及收拾燼餘存者又無幾矣其孫羣玉悉載入京覬領恩澤宿留日久仍布衣歸書之不幸如此按元世諸藏書家傳記罕載據陶所稱江南藏書三家其二不著姓氏惜亡從考其何人然莊氏既沒後人隨復失之古今藏書同一慨也馬端臨文獻通考經籍類甚詳核必富于家藏廷鸞傳末不著端臨固以其入元故乃元史亦不為立傳以若人撰述之勤有功千古泯沒若斯良可扼腕然此書自足永久何藉史臣也凡書籍時代近者勢易流傳而人多棄擲時代逺者迹多湮沒而世率珍藏然夷考昔人書目參以余所校讐往往漢多于周唐多于漢而宋多于唐何耶周尚韋編漢始側理唐猶傳録宋則印摹難易之辨也其詳具末卷中少室山房筆叢卷一
