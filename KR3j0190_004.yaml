body:
  text: 少室山房筆叢卷四明胡應麟撰經籍會通四古今墳籍梗槩略陳然率綜核陳編未遑近迹余九齡入燕往來吳越重三十載涉歷賔遊脞言鄙事時有足存輒綴大都附於簡末後之博雅徵求故實萬一在焉述見聞第四宋世書千卷不能當唐世百唐世書千卷不能當六朝十六朝書千卷不能當三代一難易之辨也然今世書萬卷亦不能當宋千魏晉以還藏書家至寡讀南北史但數千卷率載其人傳中至唐書所載稍稍萬卷以上而數萬者尚希宋世驟盛葉石林輩辨山之藏遂至十萬蓋雕本始唐中葉至宋盛行薦紳士民有力之家但篤好則無不可致往往宋世書十卷其直僅可當六朝一至功力難易則六朝之一足以當宋世百矣終宋世書目無十萬者葉嘗自言備見諸家皆不過四萬而甚多猥雜惟宋宣獻獨精其難者已不能盡致則辨山之藏亦僅可三四萬餘皆重復或猥雜也今欲購書又差易於宋何也經則一十三家注疏遞梓於諸方史則二十一代類頒於太學合之便可三千餘卷宋初諸大類書合之又可三千餘卷南渡類書十餘合之又可三千餘卷唐及勝國并附則不啻萬卷矣釋藏金陵道藏句曲捐數百金即吾家物稍益神仙小説諸家合之又不下萬卷矣然猶非今所急也今文人所急者先秦諸書詩流所急者盛唐諸書舉子所急者宋世諸書大約數百家𢎞雅之流稍加博焉録經之閏者史之支者子之脞者集之副者又無慮數百家悉世所恆有好而且力則無弗至也然而未也過此則絶不易言矣山巖屋壁之藏牧豎之所間值丹鉛星厯之譜方技之所共珍晉梁隱怪之談好事之所掇拾唐宋浮沈之業遺裔之所世藏往往鈔録傳摹人所吝惜間有刻本率寡完篇摧殘市肆蠧嚙民家展轉流亡十九煨燼又如朝署典章都邑簿記地多遐僻用絶迂繁仕宦僅攜商賈希鬻諸家悉備此可缺如又如畸流洽客領異拔新時出一編人所未覩非其知昵餉遺何繇凡此數端皆極難致必多方篤好庶幾逢之不然資巨程陶權壓梁竇他可力強此未易云今宦塗率以書為贄惟上之人好焉則諸經史類書卷帙叢重者不逾時集矣朝貴達官多有數萬以上者往往猥復相糅芟之不能萬餘精綾錦標連窗委棟朝夕以享羣鼠而異書祕本百無二三蓋殘編短帙筐篚所遺羔鴈弗列位高責冗者又無暇掇拾之名常有餘而實遠不副也牛𢎞之主購書勤矣力矣鄭樵之論求書備矣精矣隋之書籍所以盛絶古今竒章力也漁仲求書之説窮極苦心計鄭藏書必富而通志所載今古混淆靡從考核甚為惜之余自髫歲夙嬰書癖稍長從家大人宦遊諸省遍歷燕吳齊趙魯衛之墟補綴拮據垂三十載近輯山房書目前諸書外自餘所獲才二萬餘大率窮搜委巷廣乞名流録之故家求諸絶域中間解衣縮食衡慮困心體膚筋骨靡所不憊收集僅兹至釋道二藏竟以非力所及未能致也今海內書凡聚之地有四燕市也金陵也閶闔也臨安也閩楚滇黔則余間得其梓秦晉川洛則余時友其人旁諏閲歷大槩非四方比矣兩都吳越皆余足迹所歷其賈人世業者往往識其姓名聊紀梗槩於後燕中刻本自希然海內舟車輻輳筐篚走趨巨賈所攜故家之蓄錯出其間故特盛於他處第其直至重諸方所集者每一當吳中二道遠故也輦下所雕者每一當越中三紙貴故也越中刻本亦希而其地適東南之會文獻之衷三吳七閩典籍萃焉諸賈多武林龍丘巧於壟斷每瞷故家有儲蓄而子姓不才者以術鉤致或就其家獵取之此蓋海內皆然楚蜀交廣便道所攜間得新異關洛燕秦仕宦橐裝所挾往往寄鬻市中省試之歲甚可觀也吳會金陵擅名文獻刻本至多巨帙類書咸會萃焉海內商賈所資二方十七閩中十三燕越弗與也然自本方所梓外他省至者絶寡雖連楹麗棟搜其竒祕百不二三蓋書之所出而非所聚也至薦紳博雅勝士韻流好古之稱藉藉海內其藏蓄當甲諸方矣几燕中書肆多在大明門之右及禮部門之外及拱宸門之西每會試舉子則書肆列於場前每花朝後三日則移於燈市每朔望并下浣五日則徙於城隍廟中燈市極東城隍廟極西皆日中貿易所也燈市歲三日城隍廟月三日至期百貨萃焉書其一也凡徙非徙其肆也輦肆中所有稅地張幕列架而書置焉若綦繡錯也日昃復輦歸肆中惟會試則稅民舍於場前月餘試畢歸地可羅雀矣凡武林書肆多在鎮海樓之外及湧金門之內及弼教坊清河坊皆四達衢也省試則間徙於貢院前花朝後數日則徙於天竺大士誕辰也上已後月餘則徙於嶽墳遊人漸衆也梵書多鬻於昭慶寺書賈皆僧也自餘委巷之中奇書祕簡往往遇之然不常有也凡金陵書肆多在三山街及太學前凡姑蘇書肆多在閶門內外及吳縣前書多精整然率其地梓也余二方皆未嘗久寓故不能舉其詳他如廣陵晉陵延陵檇李吳興皆間值一二歙中則余未至也凡刻之地有三吳也越也閩也蜀本宋最稱善近世甚希燕粵秦楚今皆有刻類自可觀而不若三方之盛其精吳為最其多閩為最越皆次之其直重吳為最其直輕閩為最越皆次之凡印書永豐綿紙上常山柬紙次之順昌書紙又次之福建竹紙為下綿貴其白且堅柬貴其潤且厚順昌堅不如錦厚不如柬直以價廉取稱閩中紙短窄黧脆刻又舛訛品最下而直最廉余筐篋所收什九此物即稍有力者弗屑也近閩中則不然以素所造法演而精之其厚不異於常而其堅數倍於昔其邊幅寬廣亦遠勝之價直既廉而卷軸輕省海內利之順昌廢不售矣餘他省各有産紙余弗能備知大率閩越燕吳所用刷書不出此數者燕中自有一種紙理粗龎質擁腫而最弱久則魚爛尤在順昌下惟燕中刷書則用之惟滇中紙最堅家君宦滇得張愈光楊用修等集其堅乃與絹素敵而色理疏慢蒼雜遠不如越中高麗繭絶佳純白滑膩如舒雪如勻粉如鋪玉惟印記用之凡書之直之等差視其本視其刻視其紙視其裝視其刷視其緩急視其有無本視其鈔刻鈔視其訛正刻視其精粗紙視其美惡裝視其工拙印視其初終緩急視其時又視其用遠近視其代又視其方合此七者參伍而錯綜之天下之書之直之等定矣凡本刻者十不當鈔一鈔者十不當宋一三者之中自相較則又以精粗久近紙之美惡用之緩急為差凡刻閩中十不當越中七越中七不當吳中五吳中五不當燕中三此以地論即吳越閩書之至燕者非燕中刻也燕中三不當內府一五者之中自相較則又以其紙其印其裝為差凡印有朱者有墨者有靛者有雙印者有單印者雙印與朱必貴重用之凡板漶滅則以初印之本為優凡裝有綾者有錦者有絹者有護以函者有標以號者吳裝最善他處無及焉閩多不裝有裝印紙刻絶精而十不當凡本一者則不適於用或用而不適於時也有摧殘斷裂而直倍於全者有模糊漶滅而價增於善者必代之所無與地之遠也夫不適於時者遇遇則重不適於用而精焉亦遇也噫葉少蘊云唐以前凡書籍皆寫本未有摹印之法人以藏書為貴人不多有而藏書者精於讎對故往往皆有善本學者以傳録之艱故其誦讀亦精詳五代時馮道始奏請官鏤板印行國朝淳化中復以史記前後漢付有司摹印自是書籍刋鏤者益多士大夫不復以藏書為意學者易於得書其誦讀亦因滅裂然板本初不是正不無訛誤世既一以板本為正而藏本日亡其訛謬者遂不可正甚可惜也此論宋世誠然在今則甚相反蓋當代板本盛行刻者工直重巨必精加讎挍始付梓人即未必皆善尚得十之六七而鈔録之本往往非讀者所急好事家以備多聞束之高閣而已以故謬誤相仍大非刻本之比凡書市之中無刻本則鈔本價十倍刻本一出則鈔本咸廢不售矣今書貴宋本以無訛字故觀葉氏論則宋之刻本患正在此或今之刻本當又訛於宋耶余所見宋本訛者不少以非所習不論葉又云天下印書以杭為上蜀次之閩最下余所見當今刻本蘇常為上金陵次之杭又次之近湖刻歙刻驟精遂與蘇常爭價蜀本行世甚寡閩本最下諸方與宋世同葉以閩本多用柔木故易就而不精今杭本雕刻時義亦用白楊木他方或以烏桕板皆易就之故也葉少蘊云世言雕板始自馮道此不然但監本始馮道耳柳玭訓序言其在蜀時嘗閲書肆所鬻字書小學率雕本則唐固有之陸子淵豫章漫抄引揮麈録云毋昭裔貧時嘗借文選不得發憤云異日若貴當板鏤之以遺學者後至宰相遂踐其言子淵以為與馮道不知孰先要之皆出柳玭後也載閲陸河汾燕間録云隋文帝開皇十三年十二月八日敕廢像遺經悉令雕板此印書之始據斯説則印書實自隋朝始又在柳玭先不特先馮道毋昭裔也第尚有可疑者隋世既有雕本矣唐文皇胡不擴其遺制廣刻諸書復盡選五品以上子弟入𢎞文館鈔書何耶余意隋世所雕特浮屠經像蓋六朝崇奉釋教致然未及槩雕他籍也唐至中葉以後始漸以其法雕刻諸書至五代而行至宋而盛於今而極矣活板始宋畢升以藥泥為之見沈氏筆談十八卷甚詳遍綜前論則雕本肇自隋時行於唐世擴於五代精於宋人此余參酌諸家確然可信者也然宋盛時刻本尚希蘇長公李氏山房記謂國初薦紳即史漢二書無刻本揮麈録謂當時仕宦多傳録諸書他可見矣今世欲急於印行者有活字然自宋已兆端筆談云板印書籍唐人尚未盛為之自馮瀛王始印五經已後典籍皆為板本慶厯中有布衣畢升又為活板其法用膠泥刻字薄如錢唇每字為一印火燒令堅先設一鐵板其上以松脂蠟和紙灰之類冒之欲印則以一鐵範置鐵板上乃密布字印滿鐵範為一板待就火煬之藥稍鎔則以一平板按其面則字平如砥若止印三二本未為簡易若印數十百千本則極為神速常作二鐵板一板印刷一板巳自布字此印者才畢則第二板已具更互用之瞬息可就每一字皆有數印如之也等字每字有二十餘印以備一板內有重復者不用則以紙貼之每韻為一貼木格貯之有竒字素無備者旋刻之以草火燒瞬息可成不以木為之者木理有疏密沾水則高下不平兼與藥相粘不可取不若播土用訖再火令藥鎔以手拂之其印自落絶不沾汚升死後藥印為其羣從所得至寶藏之右俱筆談所載今無以藥泥為之者惟用木稱活字云今人事事不如古固也亦有事什而功百者書籍是已三代漆文竹簡冗重艱難不可名狀秦漢以還浸知鈔録楮墨之功簡約輕省數倍前矣然自漢至唐猶用卷軸卷必重裝一紙表裡常兼數番且每讀一卷或每檢一事紬閲展舒甚為煩數收集整比彌費辛勤至唐末宋初鈔録一變而為印摹卷軸一變而為書册易成難毁節費便藏四善具焉遡而上之至於漆書竹簡不但什百而且千萬矣士生三代後此類未為不厚幸也又前代篆隸與今楷書工亦有難易也洪景盧云國初承五季亂離之後所在書籍印板至少宜其焚蕩了無孑遺然太平興國中編次御覽引用一千六百九十種其綱目並載於首卷而雜書古詩賦又不能具録以今考之無傳者十之七八矣此論未然太平御覽蓋因襲唐諸類書文思博要三教珠英等仍其前引書目非必宋初盡存也亦有宋世不存而近時往往迭出者又以鈔拾類書得之此皆余所自驗故知之最真洪以博洽名而早列清華或未曉此曲折諸家亦鮮論及漫爾識之博洽必資記誦記誦必藉詩書然率有富於青緗而貧於問學勤於訪輯而怠於鑽研者好事家如宋秦田等氏弗論唐李鄴侯何如人天才絶世插架三萬而史無稱不若賈耽輩之多識也揚雄杜甫詩賦咸徵博極而不聞畜書雄猶挍讎天祿甫僻居草堂拾橡栗何書可讀當是幼時父祖遺編長笥胸腹耳至家無尺楮藉他人書史成名者甚衆挾纍世之藏而弗能讀散為烏有者又比比皆然可嘆也若劉氏父子張陸諸人庶幾兼之矣畫家有賞鑒有好事藏書亦有二家列架連窗牙標錦軸務為觀美觸手如新好事家類也枕席經史沈湎青緗却掃閉關蠧魚歲月賞鑒家類也至收羅宋刻一卷數金列於圖繪者雅尚可耳豈所謂藏書哉陸文裕深著史通會要辨論甚該獨謂經籍不必志於義未盡經籍朝廷之大典纍朝人主無不究心豈容無志但作史者當專記本朝所有前人亡逸則宜闕之四代史俱有志餘不然者六朝五季偏閏劻勷野史稗官恣為誕妄不事詩書故應爾爾可為法哉鄭漁仲曰古之書籍有上世所無而出於今民間者古文尚書音唐世與宋朝並無今出於漳州之吳氏陸機正訓隋唐二志並無而今出於荆州之田氏三墳自是一種古書至熙豐間始出於野堂村校按漳州吳氏書目算術一家有數件古書皆三館四庫所無者臣已收入求書類矣又師春二卷甘氏星經二卷漢官典儀十卷京房易抄一卷今世之所傳者皆出吳氏應知古書散落人間者不勝計求之未至耳按漁仲之言其意甚美然三墳自是毛漸偽作師春是宋人集左傳卜筮事為之甘氏星經要亦天官家後人所補正訓自是辛德源作宋人因其自補之而謬題以陸機蓋藏書者好事之過務多得以侈異聞而偽者得乘隙欺之不可不辨漁仲論求書之道有八一即類以求二旁類以求三因地以求四因家以求五曰求之公六曰求之私七因人以求八因代以求可謂曲盡求書之道非沈湎典籍者不能知然可藉以求唐宋以下之書秦漢而上亦難致也今唐人書亦難得宋元差足訪求中和堂隨筆云隋煬帝命虞世南等四十人選文章自楚辭迄大業共五千卷此恐未然自六朝文選靡過五百卷者非必當時選擇之嚴實以文字尚希故也至唐許敬宗文館詞林一千卷可謂古今極盛宋文苑英華加以唐一代文亦不能過千卷隋煬以前何得如許之多唐類書惟孟利貞碧玉芳林四千五十卷類書事迹本繁非文章比然余猶疑非一人所辦舊唐孟書止四百五十卷蓋鄭氏通志之誤今世南所選不見諸藝文志中大率紀載之訛也胡鴻臚侍墅談云近代士大夫積書之富莫過於尤延之嗜書之篤亦莫過於尤延之嘗謂飢讀之以當肉寒讀之以當裘孤寂而讀之以當朋友幽憂而讀之以當金石琴瑟余博雅雖遠不及延之而亦酷有嗜書之癖三世之積書頗不少辛未之夏不戒於火皆為煨燼迄今勤搜遍括尚未半於舊藏關中非無積書之家往往束置庋閣以飽蠧魚既不假人又不觸目至畀之竈下以代蒸薪余每自恨蠧魚之不若也鴻臚關中人此論積書莫過尤延之蓋尚循世俗之見而所自稱嗜書之篤至發嘆蠧魚亦足占雅尚矣且吾家故事也因録於此云司馬溫公獨樂園之讀書堂文史萬餘卷率公晨夕所翻閲者雖纍數十年皆完好若未觸手嘗謂其子公休曰賈豎藏貨貝儒家惟此耳然當知寶惜吾每歲以上伏及重陽間視天氣清明日即設几案於當日所側羣書其上以曝其腦所以年月雖深終不損動至於啓卷必先視几案潔淨藉以茵褥然後端坐看之或欲行看即承以方版未嘗敢空手捧之非惟手汗漬及亦慮觸動其腦每至看竟一版即側右手大指面襯其沿而覆以次指面撚而挾過故得不至揉熟其紙每見汝輩多以指爪撮起甚非吾意今浮屠老氏猶知尊敬其書豈以吾儒反不如乎汝當謹志之趙子昻書跋曰聚書藏書良匪易事善觀書者澄神端慮淨几焚香勿捲腦勿折角勿以爪侵字勿以唾揭幅勿以作枕勿以夾刺隨損隨修隨開隨掩後之得吾書者并奉贈此法右二公之言真謂先得我心非良工勝流未易識也因並録此以貽世之同余好者涑水語見梁溪漫志趙語蓋祖述之見楊用修集中國初之博學者無如宋文憲且該通內典自云青羅山房有書萬餘卷蓋勝國兵火致書故不易也文憲於諸史百家靡不淹貫至蟲魚草木脞説稗官似不甚究心昔茂先景純並以名世此學恐未可全棄也成𢎞間館閣巨公頗尚該洽北地諸君嗣起一切掃除詩文之盛光絶前後而博雅之風稍稍淪謝矣中間惟王子衡核經術何子元治子史楊用修特號多聞云多宋元祕籍第不知他書若何陸子淵最為好古江東藏書目類例可見惜卷軸無從考也嘉隆間馮汝言輯詩紀甚精詳時李伯華號畜書人有談者馮笑曰是嘗假吾書八部今未歸也陳晦伯亦嘉隆間人所為正楊殊博核可觀王長公小酉館在弇州園涼風堂後藏書凡三萬卷二典不與搆藏經閣貯焉爾雅樓庋宋刻書皆絶精余每讀九友歌輒泠然作天際真人想次公亦多宋梓一日燕汪司馬盡出堂中并諸古帖畫卷列左右坐客應接不暇司馬謂此山隂道上行也司馬公尤好古彚刻墳雅諸書今盛傳於世云鄴下宗正灌父最蓄書饒著述賔客傾四方嘗餉余祕籍數種并五言八韻寄余余時尚十五六今草載餘愧不能萬一副也頃聞已逝因録其詩志余感云北郡詞林冠申楊藝苑英斯人誰繼美之子獨成名氣掇香山秀才如瀔水清鏗然同謝眺邈矣續商彭綺麗風應逺沈冥思更精建安那用數大歷詎堪評著作千秋事流傳四海情吾慙下里調焉敢應同聲黎惟敬博雅好古嘗罄祕書俸入刻劉夢得集中多是正較他傳本為精余有元人陳君采柳文肅二集黎過瀫水並㩦去約刻成寄余余以二集刻本漶滅因舉贈俾完此舉不三載惟敬下世遂并二書失之龍丘童子鳴家藏書二萬五千卷余嘗得其目頗多祕帙而猥雜亦十三四至諸大類書則盡缺焉蓋當時未有雕本而鈔帙固非韋布所辦且亦不易遇也里中友人祝鳴臯束髮與余同志書無弗窺每燕中朔望日拉余往書市競録所無賣文錢悉輸賈人諸子啼號凍餒罔顧惜年僅四十而夭每念輒損神也右四君俱余生平同志余筐策所藏往往與互易者今相率遊岱故稍記其略以識余懷自餘交親中雅尚甚衆幸俱匕箸未敢槩及云國朝開基紹統大綱萬目靡不度越前朝至表章六籍統一聖真則巍然上揖夏商埒周而四漢唐以降無足云也惟是儲畜一端前代英君哲弼往往係心似亦右文之世不容後者國初髙皇帝首命頒刻六經繼之文皇帝躬修永樂大典草創之晨勤思載籍尚爾矧今日綦隆之極耶近年楚試發策以搜集遺書為問一時雅士多韙其言竊惟我國家奠定山河肇建區宇文明之象際地極天中祕所蓄簡編固應倍蓰往昔重以纍朝史局鴻巨肩摩詎乏劉班王魏等輩而藝文一録尚似缺如是真有待於今日也况今雕本盛行異書迭出較之漢唐難易萬萬相懸誠略倣前史求書遺意稍示向方事半昔人功必百之俟以三年之力盡括四海之藏然後大出石渠東觀纍葉祕書分命儒臣編摩論次勒成一代𢎞文之典俾百世後知皇朝儲蓄之富冠古絶今實宇宙之極觀生人之殊際也時不可失芹曝之念恆眷眷於斯云歐陽永叔集古録序云物常聚於所好而常得於有力之強有力而不好好之而無力雖近且易有不能致之象犀虎豹蠻夷山海殺人之獸然其齒角皮革可聚而有也玉出崑崙流沙萬里之外經十餘譯乃至乎中國珠出南海常生深淵採者腰絙而入水形色非人往往不出則下飽蛟魚金礦於山鑿深而穴遠篝火餱糧而後進其崖崩窟塞則遂葬於中者率常數十百人其遠且難而又多死禍常如此然而金玉珠璣世常兼聚而有也凡物好之而有力則無不至也湯盤孔鼎岐陽之鼓岱山鄒嶧會稽之刻石與夫漢魏以來聖君賢士桓碑彝器銘詩序記下至古文籀篆分隸諸家之字書皆三代以來至寶怪奇偉麗工妙可喜之物其去人不遠其取之無禍然而風霜兵火湮沒磨滅散棄於山崖墟莽之間未嘗收拾者由世之好者少也幸而有好之者又其力或不足故僅得其一二而不能使其聚也夫力莫如好好莫如一豫性顓而嗜古凡世人之所貪者皆無欲於其間故得一其所好於斯好之已篤則力雖未足猶能致之故上自周穆王以來下更秦漢隋唐五代外至四海九州名山大澤窮崖絶谷荒林破冢神仙鬼物詭怪所傳莫不皆有以為集古録以謂轉寫失真故因其石本軸而藏之有卷帙次第而無時世之先後蓋其取多而未已故隨其所得而録之又以謂聚多而終必散乃撮其大要别為目録因并載夫可與史傳正其闕謬者以傳後學庶益於多聞或譏豫曰物多則其勢難聚久而無不散何必區區於是哉豫對曰足吾所好玩而老焉可也象犀金玉之聚其能果不散乎豫固未能以此而易彼也蘇子瞻李氏山房記略曰象犀珠玉怪珍之物有悅於人之耳目而不適於用金石草木絲麻五榖六材有適於用而用之則弊取之則竭悅於人之耳目而適於用用之而不弊取之而不竭者惟書乎自孔子聖人其學必始於觀書當是時惟周之柱下史聃為多書韓宣子適魯然後見易象與春秋季札聘於上國然後得聞詩風雅頌而楚獨有左史倚相能讀三墳五典八索九丘士之生於是時得見六經者蓋無幾其學可謂難矣而皆習於禮樂深於道德非後世君子所及自秦漢以來作者益衆紙與字畫日趨於簡便而書益多世莫不有然學者益以茍簡何哉余猶及見老儒先生自言其少時欲求史記漢書而不可得幸而得之皆手自書日夜誦讀惟恐不及近歲市人轉相摹刻諸子百家之書日傳萬紙學者之於書多且易致如此其文詞學術當倍蓰於昔人而後生科舉之士皆束書不觀遊談無根此又何也余友李公擇讀書於廬山白石菴之僧舍藏書凡九千餘卷既以涉其流探其源採剝其華實而咀嚼其膏味以發於文詞見於行事聞名於當世矣而書固自如也余既衰且病無所用於世而廬山固所願遊而不得者蓋將老焉盡發公擇之藏拾其餘棄以自補庶有益乎公擇求余文以為記乃為一言使來者知昔之君子見書之難而今學者有書而不讀為可惜也右歐蘇二文皆關涉經籍故録之永叔謂好而能一則力雖不足猶能致之余竊有深味焉而猶惜公之不以金石之好聚於墳典也子瞻所論較之今則書愈易求而讀者愈寡矣李易安金石録後序云豫以建中辛巳歸趙氏時德甫在太學每月朔望謁告出質衣取半千錢步入相國寺市碑文果實歸相對展玩咀嚼後二年從官便有窮盡天下古文竒字之志傳寫未見書買名人書畫古竒器有持徐熙牡丹圖求錢二十萬留宿計無所得卷還之夫婦相向惋悵者數日及連守兩郡竭俸入以事鉛槧每獲一書即日勘挍裝輯得名畫彝器亦摩玩舒卷指摘疵病盡一燭為率故紙札精緻字畫全整冠於諸家每飯罷坐歸來堂烹茶指堆積書史言某事在某書某卷第幾葉第幾行以中否勝負為飲茶先後中則舉杯大笑或至茶覆懷中不得飲而起凡書史百家字不刓缺本不誤者輒市之儲作副本靖康丙午京師失守既長物不能盡載乃先棄書之重大者畫之多幅者器之無款識者已又棄書之監本者畫之平常者器之重大者所載尚十五車連艫渡淮江八月德甫以病不起時六宫往江西豫遣二吏部所存書一萬卷金石刻二千先往洪州至冬金陷洪所謂連艫渡江者又散為雲煙矣獨餘輕小卷軸寫本李杜韓柳集世説鹽鐵論石刻數十幅洎鼎鼐十數巋然獨存庚戌春官軍收叛卒悉取去入李將軍家巋然者十失五六猶有五七簏挈家寓越城一夕為盜穴壁負五簏去盡為吳説運吏賤價得之僅存不成部帙殘書册數種忽閲此書如見故人因記始末焉時紹興四年也右李氏夫婦雅尚具見篇中始余以明誠所癖金石而已讀此乃知其於書無弗聚而亦無弗讀也亡軼之餘尚存萬卷則當其盛時又何如耶李於文稍愧雅馴第其好而能專專而能博博而能讀殆有過於歐蘇兩公所謂者因頗采托其語著於篇胡應麟曰夫書好而弗力猶亡好也故録廬陵集古序夫書聚而弗讀猶無聚也故録睂山藏書記夫書好而聚聚而必散勢也曲士諱之達人齊之益愈見聚者之弗可亡讀也故録易安金石志終焉少室山房筆叢卷四
