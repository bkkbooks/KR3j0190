body:
  text: 少室山房筆叢卷五明胡應麟撰史書占畢一內篇尚書春秋聖人之史也檀弓左傳賢人之史也史記漢書文人之史也後漢宋書亂人之史也三國元魏小人之史也趙宋遼金北人之史也舉其人而史之得失文之髙下瞭然矣尚書史之善善者也春秋史之惡惡者也尚書弗誅桀紂乎然以明放伐也猶之乎善善也春秋弗進桓文乎然以防亂賊也猶之乎惡惡也劉知幾以馬班為善善南董為惡惡細矣三皇以前無良史乎而孔甲之盤盂紀於班氏焉惜哉乎其弗傳也七國以前皆良史乎而史墨之邪詞紀於左氏焉惜哉乎其遂傳也左傳史記漢書後漢三國其文之以代降也若厯階而下也晉魏齊梁靡冗不稱史矣而有李延夀之六朝焉唐宋遼金僻濫不稱史矣而有歐陽氏之五代焉李唐之初也歐宋之盛也然而非曄夀比也才學識三長足盡史乎未也有公心焉直筆焉五者兼之仲尼是也董狐南史制作亡徴維公與直庶幾盡矣秦漢而下三長不乏二善靡聞左馬恢恢差無異説班書陳志金粟交關沈傳裴略家門互易史乎史乎直則公公則直胡以别也而或有不盡符焉張湯杜周之酷附見他傳公矣而筆不能無曲也裴松沈璞之文相訐一時直矣而心不能無私也夫直有未盡則心雖公猶私也公有未盡則筆雖直猶曲也其聖人乎彼子西不害其為公禮昭公無損其為直甚矣史之不易也寸管之搜羅宇宙備焉非以萬人之識為一人之識不可也隻詞之褒貶天壤流焉非以萬人之衷為一人之衷不可也史百代者搜羅放軼難矣而其實易也史一代者耳目見聞易矣而其實難也豫奪褒貶之權異也陳范有史才而無史學沈魏贏史學而乏史才左馬班氏足稱具美其識雖互有是非然創始之難百倍因也故匪後人之所及也尚書秦誓録自新也而以為周厯之終是尚書者讖緯之靡也春秋獲麟傷吾道也而以為素王之瑞是春秋者符籙之首也説經者胡可以弗慎也春秋以字為褒貶者也左傳以詞為褒貶者也馬班以事為褒貶者也以事者繁於詞文人能之以詞者顯於字君子能之以字者微而彰簡而核非大聖大賢弗能也故左之後有荀袁班之後有曄夀春秋之後微紫陽其孰纘之謂國語出於左氏胡以徴也丘明作傳之後文或餘於紀載也字或溢於編摩也附經弗燕郢乎入傳弗贅疣乎故别創篇名也翼春秋為內傳稱國語為外傳猶之子內篇外篇也文內集外集也內外傳或矛盾焉兩存之以備考也或致疑焉非也國䇿之文粗國語之文細國語之氣薾國䇿之氣雄國語左氏末弩乎國䇿馬氏先鞭乎汲冢四書皆史也紀年春秋也周書尚書也穆天子起居注也盛姬録逸事家也山海經稱禹益實周末都邑簿也其文皆以法勝也史惡繁而尚簡素矣曷謂繁叢脞冗闒之謂也非文多之謂也曷謂簡峻潔謹嚴之謂也非文寡之謂也故文之繁簡可以定史之優劣而尚有不必然也較卷軸之重輕計年代之近逺繆乎論哉子長敘事喜馳騁故其詞蕪蔓者多謂繁於孟堅可也然而勝孟堅者以其馳騁也孟堅敘事尚剪裁故其詞蕪蔓者寡謂簡於子長可也然而遜子長者以其剪裁也執前説可與概諸史之是非通後説可與較二史之優劣讀之閎肆沈雄浩乎司馬之氣矣而左規右矩一字增損末由也繹之精嚴簡奧淵乎左氏之法矣而長谷大川萬怪惶惑叵測也而其義律之乎春秋其旨合之乎尚書弗少悖也史之至也司馬班氏人自為史其史也史百代而有餘司馬班氏合而為史其史也史一代而不足則史非専不可也馬氏不啻談遷也世為太史矣遷而始成而猶少孫補也班氏不啻彪固也半因太史矣固而始成而猶大家續也則史非久不可也晉梁陳齊周隋六史皆唐人撰也梁陳姚察北齊李百藥周令狐德棻學一家也文一手也中獨晉隋群彥所修而晉史大為猥雜隋史差自精詳以委任異宜才用乖協故也李延夀南北諸史出而沈約魏收不行歐陽氏新唐五代成而劉昫盧遜咸廢延夀刪沈魏之繁者也歐陽振劉盧之弱者也大概彼善於此亦因襲易為功也舊唐書無論大義乖刺其辭過俚而不文也其體過冗而靡節也新書雖晦澀務竒二病則庶乎免也事增文減作史名言豈容以書廢哉謂後漢書之文不若三國志之質也是不知質勝則野之説者也謂新唐書之簡不若舊唐書之贍也是不知贍而不穢之説者也然後漢非真能文者真能文者左氏也新唐非真能簡者真能簡者檀弓也簡之勝繁以簡之得者論也繁之遜簡以繁之失者論也要各有攸當焉繁之得者遇簡之得者則簡勝簡之失者遇繁之得者則繁勝執是以論繁簡庶幾乎合作則簡者約而該繁者贍而整不合作則繁者猥而冗簡者澀而枯檀弓左傳繁與簡俱得者也故左傳髙而檀弓獨勝也舊唐新書繁與簡俱失者也故新書僻而舊唐弗如也昔人謂史記不如左傳左傳不如檀弓似也而以一事之繁簡定三氏之等差則非也夫文固有簡者不必工而繁者不必拙夫工與拙可以較等差而較之乎一事吾猶弗敢也矧一事之繁簡也舉其全挈其大齊其本揣其末可與言古人矣檀弓之于左傳意勝也左傳之於史記法勝也史記之於漢書氣勝也漢書之於後漢實勝也後漢之于三國華勝也三國之於六朝朴勝也則檀弓史記無法左傳漢書弗文乎非是之謂也衛青李廣均武夫也廣事終身如覩而青寥寥也曹沫荆軻同刺客也軻事千載若新而沫寥寥也以敘有詳略也然則史固貴繁也曰簡哉而繁有當也亦觀太史之敘倉公乎連篇纍牘靡弗厭焉相如竊女曼倩滑稽雖其文瓌偉可喜而大體不無戾也詩人多窮信矣史氏多厄何也世以髙明鬼瞰褒貶天刑夫天網恢矣而史佐其漏鬼責眇矣而史暴其微幽贊參兩功則大矣而胡以罪也必以紀載失實賞罰徇私胡以弗盲陳夀腐魏收而族許敬宗哉是必有其故矣夫詩潛天地通神明文之精莫加焉夫史贊兩儀苞三極文之巨莫並焉掇其精則神以太過而竭故詩人多窮且多夭肩其重則任以太過而顛故史氏多厄且多刑夫詩以一字千秋者也史以千秋一字者也其達踰王公而夀計元會矣能亡窮且厄耶左丘廢史遷辱班掾縲中郎獄陳夀放范曄戮魏收剖崔浩族甚矣唐以前史氏之厄也退之避而弗承其有餘畏哉而不知後之為唐為宋者若劉若宋若二歐陽顯特甚矣唐而前之為史者其人輕而其史重宋而下之為史者其人重而其史輕其人輕也而史重則輕者因以重其人重也而史輕則重者因以輕然以左遷生唐宋亦不能為春秋史記也而唐宋史大弗類則以時乏左丘馬遷故也史之體製遷實創之而其義例纎悉班始備也然雄偉跌宕之氣衰焉子長列傳一人始末或述其名或稱其字或兼其姓或舉其官既匪春秋之義奚取左氏之規也孟堅概自篇端總其姓字後但著名遂為定體百世咸遵此類頗衆舉例其餘大概作者在前易於損益故也史記如亷藺竇田刺客貨殖數人合傳亦史變體班始人自為傳後世因之夫史之論贊而豈茍哉終身履厯百世勸懲係焉子長諸傳不盡廢此義也至稱羽重瞳紀信營墓無關大體頗近稗官矣自漢而後厯代史臣一規班氏詎皆聾瞶要在適衷近時貴重子長不求大體専搜奧僻詡為神竒恐太史有靈不當一笑也史漢二書魏晉以還紛無定説為班左袒蓋十七焉唐自韓桞始一頌子長孟堅稍詘至宋鄭漁仲劉會孟又抑揚過甚不足憑也明諸論隲差得其衷班馬之書晉隋以前習其義者不啻百家而於詞忽焉唐宋以後習其詞者亦且百家而於義疏焉故史漢之學盛於六代之前而其文貴於六代之後蓋至明而極矣六代至唐為班氏學至衆著述傳者殆數十家史記次之唐以前作史者専精於史以文為史之餘波唐以後能文者泛濫於文以史為文之一體惟賦與詩亦然故賦迄於左思史窮於陳夀皆漢之餘也故曹劉李杜韓桞氏出而宇宙耳目又一觀矣唐以前史之人一而其業精故史無弗成而無弗善唐以後史之人二而其任重故史有弗善而無弗成唐之時史之人雜而其秩輕其責小而其謗巨故作者不必成成者不必善劉知幾之啓蕭相韓吏部之答桞州噫可想矣文之難在賦似矣而出於魏收之口則私也史之難在志似矣而出於鄭樵之口則私也收以賦恫喝溫邢然以左馬較相如則文有不必賦樵以志揶揄陳范然以曄夀方沈約則史有不必志而收之能賦樵之能志與否吾未暇辨也夫遷之賦不見於藝文志曄之志不曰以法未終乎要不必以此論也漢藝文志遷有賦八篇専任易功乎吾於司馬氏史徴焉兼收易業乎吾於司馬氏史徴焉後世不然兼其人專其臆兼其任專其筆故班范而後蔑矣孟堅武仲有伯仲之稱而班以漢書崛然與司馬爭雄晉唐之際幾左席焉傳沒沒於崔蔡之間而莫能自異也顔謝文章日揭江左范之譽聞蓋逺非儔而後漢一書逾夀接固延之靈運遂為詞人昔人謂詩有别才吾亦謂史有别才也以昌黎毛頴之筆而馳驟古人奚患其不史也而順宗録有取舍之譏曹王碑多軋茁之調桞以史筆推韓與書翊戴至矣而韓弗任也段秀實傳一臠足珍他絶不覩李習之翺鋭以史自居第唐一代詎止髙楊兩女子哉宋王曽蘇氏重名居館職徒成故事隆平集今傳非荀袁匹也史有别才厯較唐宋諸子益信矣用顔師古等於紀傳用李淳風等於表志唐任人可法者也而不必盡論其書也歐陽疏於事而表志子京僻於文而紀傳宋任人可監者也而不必盡論其書也斯各任之凖也夫李延夀嘗與修諸史矣胡以弗南北若也夫歐陽修嘗與修唐書矣胡以弗五代如也斯獨任之衡也孔甲黃帝史也尹佚成王史也劉歆七略班志藝文昭昭載焉而劉知幾以孔甲為夏尹佚為商得無勦夏帝之名傅有熊之佐乎尹佚曰周人也又成世也即史佚無可疑者劉既誤於先而復稱於後遂使二孔甲合而為一一史佚分而為二皆不考之故也陳夀三國志魏吳蜀也而唐丘悅三國典略則後周北齊南梁為三國也歐陽修五代史梁唐晉漢周也而唐張詢古五代新説則梁陳北齊後周及隋為五代也按五代之名實起太宗命諸臣修梁陳至隋五史故當時謂之五代而晉書以御撰不與也楊用修以唐末五代當之固陋晦伯止言詢古新説亦未盡也裴松之之注三國也劉孝標之注世説也遍記雜談旁收博采逮今藉以傳焉非直有功二氏亦大有造諸家乎若其綜核精嚴繳駁平允允哉史之忠臣古之益友也劉孝標有續世説十卷劉義慶有小説十卷惜哉其俱弗傳也藉傳晉梁雅詞今尚盈耳哉臨川書諸目俱稱世説今題世説新語係語於説胡贅也世説之名起於劉向義慶書出向已弗傳然皆劉氏也孝標之注會孟之評劉氏三絶乎劉知幾之論史也晳於史矣吾於其論史而知其弗能史也其文近淺猥而逺馴雅其識精瑣屑而迷逺大其衷饒訐迫而乏端平善乎子京曰呵古則工而自為則拙也甚矣唐人之陋也劉知幾史通稱舜囚堯禹放舜啓誅益太甲殺伊尹文丁殺季厯成湯偽讓仲尼飾智矜愚斯數言者戰國有之然識者亡弗謂虛也胡子玄驟以為實也至謂舜禹湯文同於操懿裕衍而尚書春秋之妄過於沈約王沈斯名教之首誅矣史通之為書其文劉協也而藻繪弗如其識王充也而輕訐殆過其所指摘雖多中昔人然第文義之粗體例之末而自以窮王道掞人倫括萬殊吞千有然哉史通之所謂惑若赤眉積甲史氏彌文文鴦飛瓦委巷鄙説皆非所惑者也至竹書殺尹汲冢放堯則當惑而不惑史通之所謂疑若克明峻德帝典所傳比屋可封盛世之象皆亡可疑者也而山海詭詞論衡邪説則當疑而弗疑余謂劉有史學無史筆有史才亡史識也唐桞璨有史通析微十卷專駁子玄之謬宋世尚存今無刻本劉書必與此並行庶無害名教不爾恐所益微所損大也何法盛盜之魁也許敬宗姦之首也世知郭象之剽莊而不知法盛之剽晉世知魏收之穢魏而不知敬宗之穢唐所以然者法盛書不盛行於後而敬宗書已夙毁於前也桞宗元愛國語愛其文也非國語非其義也義詭僻則非文傑異則愛弗相掩也好而知惡宗元於國語有焉論者以桞操戈入室弗察者又羣然和之然則文之工者傷理倍道皆弗論乎虞槃作非非國語余欲作非非非國語為桞解嘲第未見本書孟堅之推太史至矣其駁太史公矣前人製作瑜而掩之私也瑕而匿之亦私也孟堅法太史者也謂有競心吾弗敢信也聖公藉新市之兵盆子憑赤眉之衆其烏合同也聖公稱尊流汗浹背盆子建號宛縮欲啼其負乘同也光武之臣聖公亦髙祖之君義帝蔚宗後漢黜聖公同盆子起光武首東京孟堅之旨協矣子玄以為聖公不當降光武不當先悖矣乎史遷列羽紀也班氏列羽傳也各有當焉遷通史前代雖秦楚弗容貶也班獨史當代雖唐虞不得詳也讀沈約魏收諸史而知李延夀之史之得也其浮詞簡也讀范曄陳夀二史而知李延夀之史之失也其瑣説詳也晉史之文猥而雜宋梁陳之史猥而浮宋遼金之史猥而陋古今具史才而能旁及諸體者班氏乎賦與雜文靡弗善也乃詩亦有之左馬卿雲兼撮其勝矣曄夀自史外著作亡聞沈魏著作間覩而史非其任永叔之於班也桓司馬於劉司空乎退之之避史筆也桞州諍之是矣然其時故有説焉淮西碑則以為失實而踣而段文昌改撰之順宗録則以為不稱而廢而韋處厚續撰之毛頴傳足繼太史乃當時誚其滑稽裴晉公書後世訾其紕繆使退之而任史其禍變當有甚此者桞徒責韓而莫能自奮其時故不易也唐文章近史者三焉退之毛頴之於太史也子厚逸事之於孟堅也紫薇燕將之於國䇿也宋而下蔑聞矣唐之才弗任史矣而不史者故不乏也顔師古之於漢也精矣司馬貞之於史也核矣劉知幾之通辨矣魏玄成之志該矣而亦皆不能無憾也紀傳之史創於司馬氏而成於班氏也編年之史備於司馬氏而精於朱氏也司馬班氏出而漢以後之為紀傳者靡矣司馬朱氏出而宋以前之為編年者廢矣李仁父之長編纘涑水者也吕伯恭之大事翼紫陽者也廬陵氏之五代眉山氏之古史孫之翰范祖禹之鑑與論宋視唐雖才情弗逮而製作頗有餘也胡康侯之傳春秋也胡明仲之續諸史也宋人敘事逺非漢埒而其論事核於唐觀綱目於既成亡足異也夷考厥初難言哉夫陳夀魏收不足言王仲淹續春秋而帝元魏司馬氏修通鑑而帝曹魏彼皆何人也黜曹氏於盜黜元氏於夷黜武曌書帝房州自餘大義數十炳如日星其有迂回難合瑣屑眇關者讀者求其變略其粗可也毋詞費哉溫公之於唐末也敘裘甫之平則全采王式家傳敘髙駢之惑則全録羅隱廣陵較之通鑑體製迥不侔也且求之當日事情頗不合也謂家乘貢諛野史修郤誠然然溫公弗及詳亦以流言故也文士筆讒夫舌武夫兵真三端哉文公綱目書揚子雲責之備也恕狄仁傑原其心也仲尼謂臧孫不仁三不智三然春秋世逺出文仲下者夫子亟稱也而以文仲之賢而弗為少諱弗幾乎刻乎噫未可以淺近論也丘文莊之續史綱也紫陽之法有所局焉未竟者引而伸之矣有所蓄焉未發者曲而體之矣其矛盾之小者其符節之大者也故吾常謂春秋之後有朱氏而綱目之後有丘氏也陸文裕之輯史通也因劉氏者十七續劉氏者十三繁者削之謬者刋之俚者文之真子玄藎臣哉自司馬之為通鑑也漢唐而上昭昭焉自通鑑之止司馬也宋元而下泯泯焉間有續者數家而弗能詳也夫皇朝綱目續矣而兹猶缺也若之何可後也獻吉之論史欲概蔚宗而下而筆且削焉元美之論史欲挈子長而上而刪且潤焉識則偉矣亘千年而下而有若人乎吾弗敢知也即有若人而亡夭於年乎毋困於日乎亡見忌於造化乎鬼神乎吾弗敢必也噫少室山房筆叢卷五
