body:
  text: 少室山房筆叢卷十八明胡應麟撰三墳補逸下穆天子傳紀年璅語逸周書皆汲冢皆竹書皆古文也世以汲冢冠周書竹書冠紀年古文冠璅語而穆天子第仍初出之稱者互見之文耳晉史汲郡人發魏襄王冢得竹書數十車皆古文束晳校定以今文寫之即諸書並同可見後人以周書上不應有重出字故以汲冢冠之而竹書冠於紀年二書互見已備而穆天子傳本四字題名故直仍其舊耳璅語冠以古文見太平廣記或仍舉汲冢冠之而師春亦題汲冢蓋俱可互稱世率未精其故而諸書名紛拏舛忤特詳之李太白逺别離云或言堯幽囚舜野死九疑聨綿皆相似君失臣兮龍為魚權歸臣兮鼠變虎等語人多不甚領會實本劉知幾史通引用璅語事皆紀年周書中所不道者余辨見此前後及他書中備詳世或以伊尹事訛為紀年又或因竹書字訛為周書愈失實矣楊用修周書後序云據束晳荀朂傳武帝紀汲冢書七十五卷其目並無所謂周書者蓋此書即漢藝文志逸周書宋初諸臣編太平御覽求汲冢七十五篇而不得遂以此七十篇充之用修持論似中有獨見而實非也今周書名七十篇實十卷耳晉以前所謂篇多如後世之所謂卷則今周書十卷不過當時十篇晳傳璅語等目之後稱又雜書十九篇記周食田法周書論楚事穆王美人盛姬事考穆王傳末卷敘盛姬事與王會等章大類蓋即此十九篇中十篇何以云無周書之目也用修序引晳傳止録雜書十九篇之文而下周食田法一十八字悉刪去之遂以此書非出汲冢大可笑也又杜預序止稱七十五卷而不言篇則周書十卷復何疑哉漢藝文志史記百三十篇即今百三十卷此篇與卷同也尚書四十六卷實五十七篇此篇統於卷也衛恆四體序云太康元年得汲冢書十餘萬言其一卷論楚事者最工始余以十九篇周書字為證尚微以句讀為疑及閲此乃知論楚事自為一書與上周書字絶不相蒙余意始洞然自信又晳傳止言篇而此云楚事一卷益證篇與卷文義相通而余説不妄也汲冢周書所載克殷度邑等篇采於史遷時訓明堂等篇録於禮記蓋或仲尼刪削之餘戰國文士綴輯遺亡益以縱橫大武武稱之屬誇誕世俘王會之屬而成此書漢藝文志七十一篇注引劉向云今存者四十五篇則當時脫軼幾半若子長所采蓋存於四十五篇之中者而其餘篇至汲冢之發而復完也徐氏楊氏以書不當係汲冢固失考李燾以此書漢世已入中祕其後稍隱晉時盜發始出雖頗得之而不知此書出於漢世至汲冢而復完必余説庶幾盡也然則此書係汲冢亦可不係汲冢亦可而謂非出於汲冢則好竒之過矣王厚伯王會補傳亦謂此書非至汲冢始出然不云非出汲冢自用修刪去原文始有此言按逸周書共七十篇漢時僅存四十五篇今周書十卷其七十篇之目並存而缺程寤秦隂九政九開劉法文開保開八繁箕子耆德月令十一篇之文所存五十九篇并後序一篇共六十篇蓋亦非完書也漢書藝文志逸周書七十一篇今目共七十篇宋人謂缺其一不知并後序一篇正七十一篇則汲冢所出當為漢世所存無疑矣劉大謨云若度訓命訓常訓文酌允文大武等解而盡謂之周書可乎若和寤克寤商誓度邑時訓明堂等解而盡謂之非周書可乎六經而下求其文字近古而有裨於性命道德文武政教者恐無以踰於此此序亦頗盡周書得失因節録之周書卷首十數篇後序皆以為文王作而本解絶無明據且語與書體不倫蓋戰國纂集此書者所作攙入之冠於篇首也至大武武稱等解尤為乖謬近於孫吳變詐矣考周書終太子晉實當靈王之世其為周末䇿士之言毋惑也至大匡以後章首率有序詞氣儼與誥誓相侔間小弗純或出後人參雜非春秋下所能也大匡解有二其第十一篇後序以為穆王按周書七十篇自文王始至太子晉終穆王止祭公史記二篇見第九卷此書在武王先當是文王無疑其第三十二篇亦云大匡則武王之作也小明武解通篇皆韻語文多竒古然不類書體類戰國諸子書大明武解亦多韻語凡下字皆叶户韻克殷解史記全録所稱武王手太白以麾諸侯諸侯畢拜遂揖之商庶百姓咸俟於郊羣賔僉進曰上天降休再拜稽首武王答拜蓋諸侯畢拜之時武王方在師旅未暇答拜至入商郊羣賔僉進稽首武王乃答拜汲冢之文自明其答拜者蓋前諸侯及商臣皆在其中史記但言商人再拜注遂謂武王不應止揖諸侯而答拜商人蓋史記固訛注者亦失考也汲冢世俘解讀者咸疑詭誕蓋以孟氏所取武成不過二三䇿而血流漂杵且以為疑何至如汲冢之甚乃余即證以孟氏而知逸書所云不全妄也孟稱周公相武王誅紂伐奄滅國者五十驅虎豹犀象而逺之世俘所謂武王遂征四方凡懟國九十有九則滅國五十之説也其過於孟氏僅半然未嘗曰盡滅固庶幾近之矣所謂禽虎二十有二犀十有二及麋鹿三千五百之類則驅虎豹犀象之説也蓋商囿之畜武王狩獵以祀宗廟餘則驅而逺之矣以商紂之囿而獲麋鹿數千詎云多耶至俘馘億萬有餘則戰國張大之辭不必辨也文傳解引夏針云小人無兼年之食遇天飢妻子非其有也大夫無兼年之食遇天飢臣妾輿馬非其有也注以夏禹之針未必然夏一代之典今所存尚書者僅數篇商周之際必存者尚多至仲尼之世蓋寥寥無幾矣周書多論紀綱制度敘事之文極少克殷數篇外惟王會職方二解皆典則有法而王會雜以怪誕之文職方敘規嚴整過王會其規模體制足可置之夏商也王會怪鳥竒獸多出入山海經其稱區陽以鱉封鱉封者若彘前後有首孔氏無注王伯厚補云盛𢎞之記武陵郡西有獸如鹿前後有頭常以一頭食一頭行然不言名鱉封考以山海經第七卷并封在巫咸東其狀如彘前後皆有首蓋即此物也祭公解稱祭文公病穆王訪之作此書按紀年祭文公穆王草一年薨書當於是歲作史記解左史戎夫作竹書穆二十四年王命戎夫左史作記章首所稱皮氏乃夏諸侯滅於殷者太史公書名先見於此史記解云信不行義不立則哲士凌君政禁而生亂皮氏以亡孔氏注云禁信義則亂生非也言信義不立則姦雄之士得乘間以操國柄君不忿而欲禁之姦雄必起而為亂國之所由亡也哲士猶言智士即狙詐之謂凡戰國先秦稱賢人君子非必皆盛美之詞也紀年慎靚王八年秦公孫爰帥師伐我皮氏翟章帥衆救皮氏圍疾西風又九年書城皮氏皆魏事也此皮氏或即古皮氏國名國亡而以為郡邑苐地名多相類未可知也王伯厚云周書史記篇穆王召左史戎夫於遂事之要戒言皮氏華氏夏后殷商有虞氏平林質沙三苖扈氏義渠平州林氏曲集有巢有鄶共工上衡氏南氏有果氏畢程氏陽氏榖平阪泉縣宗玄都西夏績陽有洛之亡國名多傳記所不載可以補史氏之缺文困學紀聞阪泉氏用兵無已誅戰不休徙居至於獨鹿諸侯叛之阪泉蚩尤也孔氏不注獨鹿即涿鹿也楊用修跋汲冢史記解云穆王命史臣戎夫歷陳古之亡國二十八君以為覆轍而鑒戒之朔望以聞又作甫刑之書以恤民聽祈招之詩而返國可謂改過不吝冥豫有渝矣亦賢矣哉司馬遷周紀不著其事兹特表出之又論無極云汲冢周書曰正人莫如有極道天莫如無極道言也正人有極謂會其有極歸其有極也道天無極謂生物不測悠久無疆也此語甚玄奧當表出之然則無極之云不始周子矣洪景盧容齊二筆云汲冢周書王會篇所紀四夷國名頗古奧獸畜亦竒崛以肅真為稷真獩人為穢人樂浪之夷為良夷姑蔑為姑妹東甌為且甌渠搜為渠叟髙句麗為髙夷唐太宗時逺方諸國來朝貢者甚衆服裝詭異顏師古請圗以示後作王會圗蓋取諸此漢書所引天豫不取反受其咎毋為權首將受其咎以為逸周書今本無之然則非全書也按洪説王長公周書論取之苐以俘商寶玉億有百萬為王會篇中語則非蓋世俘解中語也和寤解云王乃厲翼於尹氏八士唯固允讓武寤解云尹氏八士太師三公克殷解云乃命南宫伯達遷九鼎三巫乃命南宫忽散鹿臺之財巨橋之粟則八士正武王之世與十亂先後造周者其姓尹氏其官或太師或三公或南宫克殷在武末年謂成王時尚近之而曰宣王者不足信也芮良夫解通章俱格言軌論而詞氣絶類成宣間非戰國時人筆也序稱芮伯納王於善暨執政小臣咸省厥躬作為此書按紀年厲王八年初監謗芮伯良夫戒百官於朝書詞所云民至億兆后一而已寡不敵衆后其危哉又云賢智箝口小人鼓舌為王之患其惟國人皆與監謗意合所謂爾執政小子惟以貪諛為事不勤德以備難茍安爵以毁成下民胥怨於足靡措正指榮夷公輩至瞶禍玩災未知王之所定等語隱然若預知流彘之事者國語但稱良夫諫厲王用榮夷公而監謗獨載召公之語非竹書紀此幾不知所謂矣玉珮解及第十卷三解亦俱不稱誰作文類戰國子書太子晉事甚詭誕蓋戰國人以晉早慧而夭為此説以神之其文雜以俳謔金氏以為淺野不馴然詞氣類戰國非漢以後作也後之言神仙者復以上賔之説展轉傅合而浮丘廣成夤緣而入不可勝紀矣國語記晉諫靈王壅榖洛誠絶世之識使得位中興之績詎數周宣而竟夭此天之弗造周也叔向諷平公反侵地而師曠以策止之果爾瞽人亦可誅哉殷祝解孔朝注謂不然其説誠迂然亦有所本竹書紀桀放後二十年乃死於亭山湯禁民歌舞蓋猶以故君禮之也其讓於諸侯或有然者豈遽自即天位哉度邑篇史記但取一二簡餘俱不同夷羊在牧徐廣注夷羊怪物也按竹書紂四十八年夷羊見蓋羵羊商羊之類史記訛為麋鹿在牧楊用修遂以鹿臺等事實之殊自可笑竹書甚明而注史記者皆不引疏略甚矣陳晦伯正楊據發鹿臺之財等語以闢用修然亦不引竹書夫紀年周書同出汲冢二事絶可互證而沈約孔朝注俱弗及他書尚何怪哉以上周書穆天子傳諸家皆稱六卷余讀之前五卷皆紀穆王行遊第六卷獨敘王葬盛姬事文實出一人手而體製不類為疑及讀束晳傳載穆天子傳五篇而盛姬自為一篇乃知本非一書以穆王附合耳穆王欲肆其心使天下皆有車轍馬迹致徐夷作亂幾失成周然太子晉稱周無道者四君曰夷厲幽宣而弗及穆何也考之汲冢諸書穆王覩周制之衰則詢祭祖求讜言感克艱之訓則命戎夫作史記歌黃竹之詩以恤徒御納祈招之諫以戒淫心其樂善喜聞恆如弗及享國百年卒以令終宜也穆天子傳序所稱穆王遊行天下惟七萃之士從焉非如秦漢之君千乘萬騎空國而出其見西王母登崑崙涉玄圃皆以極其遊觀之迹非如秦漢之君封泰山禪梁父期羡門安期之屬求仙藥以冀長生也自始皇武帝好言神仙一時術流方士張大其説文士又從和之遂以穆王為厲階戎首而不知穆天子傳所記山川草木鳥獸皆耳目所有如山海經怪誕之文百無一二也今稍列其大者於篇穆天子傳文絶類山海經而事實大不同自景純取山海經以注穆天子而穆天子傳殘缺不易讀好古之士率先熟山海經胸中驟讀穆天子而景純之注又分列其下故祇以為同而弗以為異試尋其本文核之則二書之旨有天壤之懸者矣山海經稱西王母豹尾虎齒當與人類殊别考穆天子傳云天子賔於西王母觴於瑶池之上西王母為天子謡天子執白圭玄璧及獻錦組百純組三百西王母再拜受之則西王母服食語言絶與常人無異並無所謂豹尾虎齒之象也山海經偏好語怪所記人物率禽獸其形以駭庸俗獨王母幸免深文然猶異之以虎齒益之以豹尾甚矣其無稽也竹書紀虞舜九年西王母來朝獻白玉環玦則西王母不始見於周時莊列俱言西王母亦不言其詭形惟司馬相如大人賦有豹尾虎齒之説蓋據山海經耳乃山海經則何所據哉因讀穆天子傳漫識此為西華解嘲倘大荒之外果有其人當命三鳥使邀不佞閬風之頂浮大白三百賞余知言也列子周穆一段化人外全節此傳之文莊言西王母坐乎少廣此後世長生之説所本與壬申天子西征甲戌至赤烏氏赤烏之人獻酒食馬牛羊穄麥天子乃賜赤烏之人黃金貝帶赤烏之人獻好女於天子列為嬖人辛巳入於曹奴曹奴之人戲觴天子於洋水之上天子乃賜曹奴之人黃金貝帶戲乃膜拜而受丁酉天子西征至於􅜑韓氏􅜑韓之人無鳬乃獻良馬牛羊穄麥天子乃賜之黃金銀罌貝帶無鳬乃膜拜而受甲子天子賔於西王母好獻錦綺百純組三百純西王母再拜受之觀此文前後序西王母事與赤烏諸人無大異余嘗疑為異域君長也離騷南華並有河伯之文然皆寓言也山海經以竹書所謂河伯當之於是馮夷易曰氷夷博物志又以人首魚身擬之遂益誕謾無稽據竹書河伯自為諸侯而馮夷為諸侯姓名余别有辨而傳載河宗伯夭尤詳蓋穆王登舂山觀崑崙玄圃皆伯夭為之前𨗳又乘穆王副車馳驅千里使其果人首魚身穆王將畏避不暇而能與之同載極西土而後返耶傳稱伯夭為河伯之孫蓋馮夷之後世為諸侯以職河任者於離騷南華之河伯迥不侔也穆天子作無夷則竹書馮當如字山海經作氷夷蓋誤以馮作憑音也天子之馬走千里天子之狗走百里鸛雞飛八百里野馬走五百里卭卭距虛走百里餘狻猊麋鹿等缺文不載傳載天子犬馬鳥獸不過如此不惟視山海之怪迥不相倫即如王會所記九尾之狐兩首之彘比翼之鳥亦絶未見孰謂穆天子傳怪誕哉天子之犬走百里執虎豹景純但注云筋力猛壯余考周書王會渠搜以䶂犬䶂犬者露犬也能飛食虎豹孔朝注渠搜西戎别名是時天子方西征至於伯夭之邦蓋即此犬也黑水之阿爰有野麥爰有答堇西膜之所謂木禾嘉榖生之草木碩美天子於是取嘉禾以歸樹於中國珠澤之藪爰有萑葦莞蒲茅萯蒹葽右傳所紀草木或中國所有或中國所無然皆五榖百卉之類非如若木扶桑蟠桃仙樹之屬也仙樹見酉陽雜俎天子之珤玉果璇珠燭銀黃金之膏爰有采石之山重氏之所守曰枝斯璿瑰􅀈瑶琅玕玲玗琪尾右傳所紀寶玉竒石雖其名字瓌異然亦非所謂怪若醒酒石如意珠也辛酉天子升於崑崙之丘以觀黃帝之宫癸亥天子具蠲齋牲牷以禋崑崙之丘甲子天子北征舍於珠澤以釣於流水珠澤之藪方三十里按傳紀崑崙珠澤如此初不言其髙廣幾何止言黃帝之宫並無所謂絳闕瓊樓者自淮南子謂崑崙去地一萬一千里旁有四百四十門神仙家又以絳闕瓊樓傅之而崑崙遂為怪誕之祖不知穆天子所紀崑崙不過衡岱屬耳何詭異之有哉丁卯天子北升於舂山之上以望四野是惟天下之髙山也舂山之澤清水出泉溫和無風先王所謂縣圃百獸之所聚也飛鳥之所棲也爰有獸食虎豹如麋爰有赤豹白虎熊羆豺狼野馬野牛山羊野豕爰有青雕白鳥執犬羊食豕鹿天子五日觀於舂山之上乃為銘迹於縣圃以詔來世按舂山之名後世不甚傳而縣圃神仙家所盛依託以為數倍崑崙據此先王所謂縣圃之文不過如秦漢所謂上林長楊所記鳥獸雖衆皆人世所嘗有求如山海經九首八足食人之怪固無一也則二書詎可同日語哉舂山山海經作鍾山見景純注傳本五卷前四卷敘穆王自宗周瀍水以西至於陽紆之山歷西夏珠余以至崑崙之丘皆並河以行而河宗伯夭為之前𨗳至於崑崙而止實後世河源之説也又自舂山以西至赤烏氏自羣玉之山至西王母之邦雖中有東南北之文皆就西方言之則穆王所歷名山絶境靡非西方也北苐載曠原之野飛鳥解羽而東南絶不言蓋東南皆海穆王乘八駿日行千里勢固不得極東南之境也第五卷所紀遊行皆中國四封非大荒之外也諸侯載於傳許男祭公霍侯其詩則黃竹黃澤而逢公之筮止藪澤蒼蒼五句餘缺文不可讀而兩與隱士井公博亦竒事也周天子好文者蓋亡過穆王東夏之吟僅二十餘字而敦大鴻逺居然萬乘氣象自虞氏卿雲之後未見有若斯者也縣圃弇山皆勒銘記惜其文遂弗傳至讀書菞丘暴書羽林雅事翛然可想三代前風流髙韻似少其倫徒以好逰世列於秦皇漢武而盧敖尚平顧以此取後世稱富貴貧賤其重誠各有在哉賔退録云穆天子傳八駿之名一曰赤驥二曰盜驪三曰白義四曰踰輪五曰山子六曰渠黃七曰驊驑八曰騄耳王子年拾遺記載穆王御八龍之駿一名絶地二名翻羽三名奔霄四名超影五名踰輝六名飛光七名騰霧八名挾翼二説不同未知何書為當按趙與時以二説互異為疑非也傳中八駿之名已見引於列子况拾遺記王嘉所載皆一時私意詭撰曷足徵哉穆天子傳八駿名義同字異者驊騮作騮赤驥作赤􅀢白義作白􅀈蓋亦注者因上一字會意解之非本識其字也傳四卷云癸酉天子命駕八駿之乘右服騮而左騄耳右驂赤􅀢而左白􅀈天子主車造父為御為右次車之乘右服渠黃而左踰輪右盜驪而左山子柏夭主車參百為御奔戎為右天子乃遂東南翔行馳驅千里云云按此文則八駿或駕二車不專為天子乘而其日行千里蓋亦有時而然非每日必行千里也李商隱詩八駿日行三萬里乃詩人信筆之語不足證也天子自西王母之山還歸丌世民作憂以吟曰比徂西土爰居其野虎豹為羣於與烏通鵲與處嘉命不遷我惟帝天子大命而不可稱顧世民之恩流涕卉殞吹笙鼓簧中心翔翔世民之子惟天之望此亦周詩詞義頗古而雜有書體不若白雲在天二章玄逺簡奧意中間必有脫誤按景純山海經注引白雲二章俱合而此章獨云徂彼西土爰居其所虎豹為羣鳥鵲與處嘉命不遷我惟帝女彼何世民又將去豫吹笙鼓簧下三句同此或景純以其脫誤稍為穩括故不甚類也辛卯天子北征癸巳至於羣玉之山山阿平無險四轍中繩先王之所謂䇿府郭注云古帝以為藏書之府所謂藏之名山者也按圗經云穆王藏異書於大酉小酉二山而本傳不載豈即此地與秦漢間稱玉多以雙淳于髠白璧十雙張良獻項王白璧一雙此類甚衆然穆天子傳癸巳升於羣玉之山天子乃載玉萬隻注隻玉為玨見左氏傳則玉亦可言隻也又天子嘉之賜以珮玉一隻柏夭稽首再拜送天子至於剻人苐他書少用此字以上穆天子傳六卷載淑人盛姬葬哭事非穆天子本書後人以其文出一手且穆王事故附之據録姬盛柏之子也從王東征於澤中得寒疾死乃殯於榖丘之廟以伊扈為喪宗叔㛗為喪主大陳哭葬之禮蓋後世所未有也盛姬以殤卒又妃妾之屬而穆王為之極哀盡慕亦過於用情矣其文疑於太侈然晉史所載西涼吕纂寵姬死纂至為行斬衰之服其既殯猶出諸棺與同寢且合焉宇宙之異顧有若此甚者則穆王之事又特其小小耳兹篇獨寡脫簡而文極贍縟有法可觀三代前敘事之詳無若此者然頗為小説濫觴矣穆天子傳二卷天子飲於溫山考鳥郭注引紀年云穆王見西王母止之曰有鳥􅀈人今紀年無此語且與竹書文體大不同又王長公謂景純注弇山為弇兹非是余意此注大率非景純筆也又注六師之人至於曠原引紀年云王北征流沙積羽千里按此語乃沈約引他書為注者景純在沈前何從見之益知此注之偽不待言也然沈注余亦疑偽而孔朝注周書尤淺陋余嘗疑三注皆偽也景純本傳有穆天子注蓋元注已亡後人補之不然胡視山海經霄壤也黃伯思跋汲冢師春云按晉太康二年汲郡民不凖盜發魏襄王冢得古竹書凡七十五篇晉征南將軍杜預云别有一􅗡純集左氏傳卜筮事上下次第及其文義皆與左傳同名曰師春師春似是鈔集人名也今觀中祕所藏師春乃與預説全異預云純集卜筮事而此乃記諸國世次及十二公嵗星所在并律呂諡法等末乃書易象變卦又非專載左氏傳卜筮事繇是知此非預所見師春之全也然預記汲冢他書中有易隂陽説而無彖繫又有紀年記三代并晉魏事疑今師春蓋後人雜鈔紀年篇耳然預云紀年起自夏商周而此自唐虞以降皆録之預云紀年皆三代王事無諸國别而此皆有諸國預云紀年特記晉國起殤叔次文侯昭侯而此記晉國世次自唐叔始是三者又與紀年異矣及觀其紀歲星事有杜征南洞曉隂陽之語繇是知此書亦西晉人集録而未必盡出汲冢也以上俱黃跋師春語與通考陳氏説同然紀年即今冠以竹書者而黃以師春當之亦大鹵莽也陳氏説并録下方端臨通考有汲冢師春一卷陳氏曰晉汲郡魏安釐王冢所得古簡杜預得其紀年知其魏國史記以考證春秋别有一卷純集疏左氏傳卜筮事上下次第及其文義皆與左傳同名曰師春似是抄集者人名也今此書首敘周及諸國世系又論分野律呂為圖又雜録諡法卦變與杜預所言純集卜筮者不同似非當時本書也汲冢三書大率衰周之撰周書有太子晉解紀年終愼靚王惟穆天子當是東遷前作列禦冦嘗引可知春秋戰國殉葬之風大行秦穆公號賢主而殺三良餘可概已至始皇穿冢驪山珠璣寶玉窮極人代唐太宗獨以蘭亭髙出千古矣然孰與魏襄王之竹簡也襄王即孟子所謂不似人君者而冢中獨竹簡數十車古器一二他服玩琛怪無聞焉即世傳三書無論如大易繫辭或燼於秦火而出於冢中則襄王竹簡豈不與孔壁同功哉當戰國紛爭雅尚有如若人誠未易者乃世率置之弗道故余為一言於篇末云耳王伯厚困學紀聞引皇覽冢墓記云漢明帝時公卿大夫諸儒八十餘人論五經誤失符節令宋元上言秦昭王與呂不韋好書皆以書葬王至尊不韋久貴冢皆以黃腸題湊處地髙燥未壞臣願發昭王不韋冢視未燒詩書伯厚誚漢儒欲發冢以求詩書其陋至此余謂使漢之人主能用此言發二冢以求遺經而改葬之俾先王典籍日揭於煨燼之後奚而弗可當時二冢必存無恙故以為言亦可見先秦之世有以書為殉者至晉而襄冢竹書竟出惜不能用云少室山房筆叢卷十八
