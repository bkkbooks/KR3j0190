body:
  text: 少室山房筆叢卷三十二明胡應麟撰雙樹幻鈔下世尊初生行七步一手指天一手指地曰天上天下惟吾獨尊老君初生亦行九步曰天上天下惟道為尊王長公巵言並載之以為不應相類至此余謂朱紫陽所云佛家偷得道家好處道家只偷得佛家不好處如自家寶藏被人偷去却去他牆角邊拾些破瓶破罐來用甚好笑旨哉紫陽之言凡老莊精竒玄妙處皆為釋氏得之而後之黃冠第模倣其勝大渺茫之説不知此類於理道何與漫舉一則餘可推六祖風幡語世所盛傳然西土已有之十八祖伽耶舍多侍師伽難提尊者次聞風吹殿鈴聲師問曰鈴鳴耶風鳴耶祖答非風鈴我心鳴耳六祖豈拾前人唾涕者非一時偶合則記者必有一訛耶魚朝恩於代宗前問慧忠國師曰何者是無明無明從何而起忠曰佛法衰相今現帝曰何也忠曰奴也解問佛法豈非衰相今現朝恩色大怒忠曰即此是無明無明從此起按此在黑風吹船飄落鬼國之前大慧正法眼藏序南渡吳丞相潛作録其説於左云此事亘古亘今漫天漫地端視側視直視橫視開視闔視明視暗視無不視亦無所視亦無無不視無所視直敢道謂正即離謂法即塵謂眼即鑿謂藏即塞是故這四箇字直須撇向大洋海裏方免擔枷帶索受人圈䙡然雖如此初機鈍根也要得一則半則翻言漢語覷來覷去綻些光景此時正好拚命捨身單鎗直進如老鼠入牛角挨牆摸壁更無去處正迷悶中猛忽地頭破額裂通身流汗得箇休歇方知法眼慧眼天眼佛眼只是一雙凡眼到這裏説道學人事畢也且未在云云右序文最警醒可以為初機悟入津筏讀傳燈諸録者不可不知因節略其説録諸右方趙令襟居士謁圓悟就其爐錘悟不少假公固請悟曰此事要得相應直須死一番始得余不解禪理但此是詩家無上妙詮余夙所證驗者即此占禪理之不誣第近時釋門淡泊無復可與講明唐宋間名宿幾於絶響亦盛衰之數也斷際禪師云是丈夫漢看箇公案僧問趙州狗子還有佛性也無州云無但去二六時中看箇無字晝參夜參行住坐卧著衣喫飯處心心相顧猛著精神守箇無字日久月深打成一片忽然心花頓發悟佛祖之機便不被天下老和尚舌頭暪也按此則可為參學規繩見宛陵録中所載徑山亦屢舉此示人第黃蘗與趙州同出南泉門蘗後嗣百丈開法視趙州較先達何得提彼言句示人恐學人誤録徑山語也徑山禪師云僧問狗子還有佛性否趙州云無此一字乃是摧許多惡知惡覺底器仗也不得作有無會不得作道理會不得向意根下思量不得向揚睂瞬目處探根不得向語路上作活計不得揚在無事甲裏不得向舉起處承當不得向文字中引證但向十二時中四威儀內時提撕時舉覺誠如此做工夫看一月十日便自見得也此節可與上條參看大慧語録中開示諸學者如陳季任劉彥修張暘叔汪聖錫宋直閣諸書動引此則因緣故知前件非黃蘗語無疑也臨濟三次問黃蘗三度被打竟因蘗指往大愚處得悟然臨濟終嗣黃蘗洞山極力問大溈大溈不答竟因大溈指往雲巖處有省然洞山終嗣雲巖二宗機緣始末甚同而所嗣異者蓋黃蘗宗旨當興於臨濟洞山門風合續於青原緣力所臻不可強也睦州為黃蘗第一座而黃蘗宗旨大興於臨濟又臨濟在黃蘗會中不知名睦州令問佛法大意且密啓黃蘗指見大愚遂𢎞臨濟之風雲門亦從睦州悟入州指見雪峰峰授以心印遂闡雲門之派二宗至今為海內瞻仰其始皆睦州啓發成就亦由文殊為七佛𨗳師信異人也雪峰巖頭同參德山巖頭竒逸種種而後嗣寂寥雪峰悟入全藉巖頭而一傳為雲門又再傳為法眼德山之派藉以大振亦緣力所就如人之有子無子非德業淺深故也百丈南泉亦然雲門法眼洞山並見過於師洞山之曹山溈山之仰山皆見與師齊故曰曹洞曰溈仰臨濟雲門法眼嗣者差不逮故止從師稱耶法眼懸記天台似以位遞言經典之盛至六朝極矣其時沙門若支遁慧逺之在南道安羅什之在北皆當時之才士也而一時文章豪雋又從羽翼其間故能傳播若此佛法且然儒者乃以為末技而欲廢之世知詩律盛於開元而不知禪教之盛實自南嶽青原兆基考之二大士正與李杜二公並世嗣是列為五宗千支萬委莫不由之韓栁二公亦當與大寂石頭同時大顛即石頭高足也世但知文章盛於元和而不知爾時江西湖南二教周遍寰宇唐世人才之衆乃爾宋時詩文固不及唐然禪門亦止臨濟一宗較之唐世終有未及處余嘗疑漢儒訓經宋儒明道各極宗趣代有名家獨唐儒者不競乃釋門熾盛至是焉能兩大哉唐之禪教自六祖卓錫曹溪一傳而為青原南嶽再傳而為江西湖南又散而為五宗至五季而雲門法眼遷化自後禪學相承不立宗旨其盛衰乃與唐終始而唐之天下亦分而為五代以終若合符節乃爾異哉禪機中有絶類詩句者類集左方凡緇流題咏槩不録長御白片車六祖春來草自青明瓉重疊關山路雲門猿抱子歸青嶂裏鳥銜花落碧巖前夾山長空不礙白雲飛石頭雲在青天水在瓶藥山參差松竹煙籠薄重疊林巒月上遲常察羣峰穿海去滴水下巖來辭確後夜猿啼在亂峰道恆秋庭肅肅風颾颾寒星列空蟾魄高遇臻日照寒光淡山搖翠色新充符浪激似銀山傳楚山寒花發遲永安長年一衲衣法瓊風送水聲來枕畔月移花影到牀前智洪山花開似錦澗水湛如藍同上雲嶺峰前月智逺雪瀾宜近火崇福智乘船渡五湖洛浦秋風入古松秋月生寒水從悅斷雲猶挂樹稍頭佛慈朔風吹綻蠟梅花法泰星月繞簷楹大通春至百花開黃鶯啼栁上無名氏霧捲雲收山嶽靜海天空濶一輪寒紹悟雲遮海門樹雲豁金風昨夜起遍地是黃花崇福燈秋風黃葉亂逺岫白雲歸廣燈芭蕉葉上三更雨慧光花落春風靜普照秋風起庭梧慈覺孤峰無宿客梵餘松檜森森密惠崇長嘯一聲天地秋臨濟雲鎖萬重山萬壽春風掃殘雪王隨幾番雲色出峰頂一派泉聲落檻前常察枯木倚寒巖菴主穿林宿鳥驚琅琊手攜書劒謁明君同上一般秀色匡山裏芭蕉從歸青嶂裏不出白雲來登觀鶯囀千聲花滿地客遊三月草侵天同上逺洞散寒雲幽窗度殘月雙峰寒林無宿客大海聽龍吟隱章鷺鷥飛入蘆花藂海印寒松連翠竹秋水對紅蓮顯端柴門草自深洞淵片雲橫谷口文悅檻外竹搖風驚起幽人睡大陽客路如天逺侯門似海深普徹若是陶淵明攢睂便歸去同上本是瀟湘一釣客師子春風觸目百花開同上夜來風色緊孤客已先寒真如萬里望鄉關符曉無事日高眠智圓孤舟載明月文慧漁人偏愛宿蘆花同上嵗晚未歸客西風門外寒大溈一葉飄空便見秋周登帶雨一枝花落盡不煩公子倚闌干道川鷓鴣啼處百花新良作一裘才挂體本寂玉殿苔生後同上壁上畫枯松北院通那箇臺無月誰家樹不春淨果山峻水流急三冬發異花奉璘洞深雲出晚澗曲水流遲百丈起雪覆孤峰白洞山身是菩提樹心如明鏡臺時時勤拂拭勿使惹塵埃神秀春山疊亂青春水漾虛碧寥寥天地問獨立望何極雪竇黃葉落時聞搗衣開先照竹榻和衣半夜眠齊嶽白犬銜書至青猿洗鉢回寶掌亭臺瀾夜雨樓閣靜時鐘承天確斗轉星移天欲曉雪竇持送客郵亭外羅山細雨灑簾前碧山昨夜三更月到窗趙州乍見垂楊緑今逢落葉黃慧覺牡丹花下睡貓兒曇潁無雲生嶺上有月落波心翠巖長江行不盡帝里到何時石霜昨日作嬰孩今朝年已老浮生夢幻身人命夕難保同上白雲流水空徘徊黃龍山僧一衲衣聖壽堅東菴每見西菴雪下澗長流上澗泉靈澄但尋荒草際莫問白雲深佛慧門掩落花春鳥啼際可不知誰住西巖寺每日鐘聲送夕陽志璿相逢秋色裏共話月明中慧圭青山依舊白雲中開福萬里無雲月上時夏英公清風與明月野老笑相親全舉舉手攀南斗回身禮北辰智慧濃煎睡後茶子儀夜禪孤月冷晨起白雲高法華舉一鉢千家飯孤身萬里遊布袋和尚家住孤峰頂祖覺樓閣凌雲勢全舉夜夜有猿啼惠宗天垂華蓋重重異地湧金蓮葉葉新獻藴始嗟黃葉落又見栁條新廣德延白雲峰下猿啼早袁州仰千山添翠色崇教能滿船空載月漁父宿蘆花道偕繩牀風雨爛方丈草來侵同上大地雪漫漫春來特地寒報恩正值秋風來入户一聲砧杵落誰家惟然輕煙籠皓月薄霧鎖寒巖慧秀隔岸野花香清了蘆花兩岸雪江水一天秋慧悟半夜嶺頭風月靜一聲高樹老猿啼嗣宗雨過山堂秋夜靜法智朔風凜凜掃寒林慧輝破衲蒙頭萬事休同上卧聽涼風生竹林同上碧巖深處卧煙蘿道勤石角穿雲路攜笻意若何潭州雲蓋門前緑樹無啼鳥庭下蒼苔有落花聊與東風論箇事十分春色在誰家酒仙黃葉飄飄滿庭際一聲砧杵落誰家真歇寶劒未出匣神光射斗牛雪竇隻履已歸西國逺北山空有老猿啼惠宗秋山落木猿晝啼中峰少林峰頂月同上三月懶遊花下路一家愁閉雨中門風吹常憶江南三月裏鷓鴣啼處百花香同上塞北千人帳江南萬斛船歸首一片白雲橫谷口幾多歸鳥盡迷巢元安南渡後禪機多用陳語不備録吾郡雙林大士偈有物先天地無形本寂寥能為萬象主不逐四時雕大士梁時人其詩已純入唐格宏壯整嚴如此惜為談理者據之又心玉銘古朴顯贍不作西域方言不落南朝綺習必當時一才士也寒山詩云誰家一女子雜珮何珊珊鸚鵡花間㺯琵琶月下彈長歌三日響短舞萬人看云云黎惟敬劇喜時為余誦之法眼咏牡丹云擁毳對芳藂由來趣不同髮從今日白花是去年紅豔色隨朝露馨香逐曉風何須待零落然後始知空其格調雖不脫晚唐居然一作家門户也先是嘗目為宗門遊夏蓋才而涉學者一池荷葉衣無盡數畝松花食有餘剛被世人知住處又移茅屋入深居千峰頂上一間屋老僧半間雲半間昨夜雲隨風雨去歸來始覺老僧間千尺絲綸直下垂一機才動萬波隨夜靜水寒魚不食滿船空載月明歸孤猿叫落中峰月野客吟殘半夜燈此境此時誰得意白雲深處坐禪僧右數詩皆見詩話世所傳誦讀傳燈諸録乃知俱禪流偈語也吾郡自雙林善慧大士與達磨祖師並顯梁武之世嗣是禪門高躅代不乏人玄䇿禪師親見六祖妙闡法心天皇悟嗣法石頭與藥山分座贊元以大士裔孫三嵗出家王文公不可一世獨欽仰宗風先緒不墮俱胝得天龍一指受用終身至截童子指頭使之立悟尤見機用之妙也貫休號禪月大師吾邑人以詩名晚唐五代間姓薑氏字德隱人所共知然傳燈録又有薑氏子出家名有規亦婺州人則吾郡有二名僧一能詩一悟道皆薑氏可謂竒矣有規禪師見五燈會元十七卷雲門派也懷志菴主婺州吳氏子有偈云萬機休盡付癡憨蹤迹時容野鹿參不脫麻衣拳作枕幾生夢在緑蘿庵師一禪師馬氏子詩云夜來月色十分好今日秋山分外青雙溪即首座詩一從近日生涯拙百鳥銜花去不來虎丘元淨禪師雙溪人嗣招覺勤德用禪師戴氏子嗣雲居悟婺州人玄妙禪師婺州王氏子又止觀教師有東陽小威傳燈所録燒菴婆供一菴主常令一十七八女子送食一日令女子將菴主抱定曰正恁麼時如何答曰枯木倚寒巖三冬無暖氣婆聞之云我二十年止供養得箇俗漢遂遣出燒却菴按此菴主不以可欲亂心在儒家庶幾栁下遺風而禪門以為俗漢故知此理當别論也趙州見一尼來參州以手掐之尼曰尚有這箇在州曰却是你有這箇在此非釋門中儀律禪者當幾顯用則不拘知此見燒菴老嫗亦具少知識曽氏類説引他書一則云末山尼開堂説法鄧隱峰懷白刃夜脅之尼畏死從命次日鄧衷其衵服以示人大衆立散按灌溪臨濟宗支嘗為末山執役至三載豈應至此即有之灌溪他日將愧匿不暇乃自謂於末山處得半杓至今常飽不飢且以配臨濟大師前言何耶此必僧徒忌者之口欲以毁末山之開堂并發明鄧隱峰之亡賴耳凡僧例不稱姓而鄧獨以姓稱且臨終倒植而化其妹亦尼誶之曰兄生不循規律死更熒惑於人因倐然仆地云二人皆見五燈會元洪覺範林間録五燈會元多采之然其中率不可信如謂杜祁公張文定同居睢陽之類前人辨駁已明余近得就李新刻本讀其卒章又載杜公呼文定字為安道安道乃方平字非文定也則此事之誣灼然然亦非無因者蓋本捫蝨新話而潤飾之今並載二則於左金湯編又謂此乃方平語然林間亦不應稱文定佛祖通載亦稱是文定語金湯編蓋因林間訛也捫蝨新話云世傳王荆公嘗問張文定公曰孔子去世百年生孟子亞聖後絶無人何也文定公曰豈無又有過孔子上者公曰誰文定曰江南馬大師汾陽無業禪師雪峰巖頭丹霞雲門是也公暫聞意不甚解乃問曰何謂也文定曰儒門淡薄收拾不住皆歸釋氏耳荆公欣然歎服後語張天覺天覺撫几歎曰達人之論也余疑此説如張無盡戲撰以愚㺯儒家者亦文定好佛致之林間録曰祁公與文定致政居雒陽祁公徑正每笑安道佞佛有朱承事以醫遊二老間一日祁公呼朱切脈朱辭以看楞嚴久之乃至祁公責之曰聖人微言無出孔孟何楞嚴為朱曰以某觀之此經似過孔孟矣公取閲大驚曰世間何從有此云云道家有老子西升經云老子入天竺化胡成佛故一名化胡經浮屠教每以為病六代諸人論辨極繁見𢎞明集中所載厯唐至宋竟莫能決迄於勝國世方崇奉釋教又以帝師主之遂焚此經浮屠有為下火文者極鄙陋而佛祖通載著之殊可笑也少室山房筆叢卷三十二
