body:
  text: 少室山房筆叢卷三十一明胡應麟撰雙樹幻鈔中三世諸佛者過去見在未來過去曰莊嚴劫見在曰賢劫未來曰星宿劫莊嚴劫第一尊曰華光佛末後尊曰毗舍浮佛賢劫第一尊曰俱留孫佛末後尊曰婁至佛星宿劫第一尊曰日光佛末後尊曰須彌相佛凡過去見在未來每劫千佛今釋迦文當第九減劫於賢劫為第四尊彌勒當第十減劫於賢劫為第五尊一大劫者成住壞空凡四種為一大劫成而即住住而續壞壞而復空譬如浮梁二十年造成二十年度人又二十年弊壞方盡又二十年無橋惟水空劫十方惟水共成住壞空八十轆轤劫總一十三萬四千四百萬年為始終極數所謂一大劫也一云劫有六種一中劫又名引劫二成劫三住劫四壞劫五空劫六大劫與前名異實同中劫者即轆轤劫初閻浮提人壽八萬四千嵗身長八丈凡過百年命減一年身減一寸過千年命減十年身減一尺減至十嵗身長一尺則減劫之極也自爾復入增劫凡過百年命增一年身增一寸如是增至八萬四千嵗身增八丈則增劫之極也如是一減一增共計一千六百八十萬年名一轆轤劫積二十轆轤共三萬三千六百萬年為一成劫婆娑世界自成劫後交住劫已經八減八增八轆轤今當第九減劫有四佛出世初減人年六萬嵗時俱留孫佛出世次減人年四萬嵗時俱那含牟尼佛出世次減人年二萬嵗時迦葉波佛出世次減人年一百嵗時釋迦文佛出世從住劫至釋迦文已一萬四千二百七十九萬三千年又自釋迦文減至南宋紹興二千一百年人壽減二十一年身減二尺一寸今人只可六尺壽八十也此去更過七千年人壽十嵗身長一尺至此減劫之極也過爾復入第九增劫如前過一百年人命增一年身增一寸漸增至二萬嵗時鐵輪王出四萬嵗時銅輪王出六萬嵗時銀輪王出八萬四千嵗時金輪王出至此增劫之極也過爾復入第十減劫減至八萬嵗時彌勒下生從紹興去彌勒更八百八十萬七千年是時百億閻浮真金為地平如掌粳稻自生男女五百嵗方婚嫁彌勒初會度人九十六億第二㑹度人九十四億第三㑹度人九十一億爾後度人無數彌勒滅後尚有九百九十五佛相繼出後十一轆轤劫中如是千尊出盡二十轆轤已滿則壞劫到來漸成空劫大災之後復入成劫如前劫風鼓揚劫水水生厚沫化作三禪天等迤邐下至人間大地依前造化星宿劫天地亦有千佛出世云云右見莊椿論中然則釋迦乃第九減劫末尊而彌勒則第十減劫首尊也前說考諸家引載并經典所論悉同然尚有可疑處凡劫每一增減為一轆轤二十轆轤為一中劫每一減劫祇四佛出世而增劫乃四輪王則第十減劫當亦如之何得後十一轆轤劫中頓出九百九十五佛耶且釋迦文出第九減劫中前已八增八減此八減劫中亦當有諸佛出世今祇斷自俱留孫為第一尊至彌勒為第五尊而九百九十五佛皆出彌勒後則第八減劫以前諸佛又在一千數外而賢劫中不止千佛耶此類俱覺盾矛當續考之三千大千世界者一日月周行四天下光明所照是為一世界外有鐵圍山繞之如此者十鐵圍山為一小千世界數小千復至一千外中鐵圍山繞之為一中千世界數中千復至一千外大鐵圍山繞之為三千大千世界此見彰所知論與藝苑巵言丘陵學山所引差不同巵言說本阿含經及俱舍偈三十三天者一名忉利天蓋三十二天中之一俗說以為諸天總有三十三處可笑也亦名帝釋天上有焰摩天兜率陀天化樂天他化自在天梵衆天梵輔天大梵天少光天無量光天光音天少淨天遍淨天無量淨天福生天福壽天廣果天無煩天無熱天善見天善現天色究竟天無想天空無邊天色無處天無所有天非想非非想天以上共二十六天俱在三十三天上其下又有四天王天日月星宿天持鬘天常憍天堅首天共三十二天焰摩天一名離諍天光音天一名極光天見大藏中及楞嚴因本阿舍等經日月星宿下四天見婆娑論應真録云忉利天統東方八天其名住峰天住山頂天善見城天鉢私天俱吒天雜殿天歡喜天光明天又統南方八天其名曰波利樹天險岸天摩尼藏天雜顯岸天旋行天金殿天鬘影處天柔軟地天又統西八天其名曰雜莊嚴天如意地天微細行天歌音樂天咸德輪天月行天閻摩羅天速行天又統北八天其名曰影照天智慧星天衆分天住輪天上行天威德顔天威德輪天清淨天總之為三十三天據此以為忉利所統别有三十二天合忉利為三十三天與諸經多不合恐未可據道家亦有東西南北三十三天見度人經七寶山者佉提羅迦山高四萬二千由旬次伊沙陀羅山高二萬一千由旬次遊犍陀羅山高一萬二千由旬次善見山高六千由旬次馬半頭山高三千由旬次尼民陀羅山高一千二百由旬次􅀈那耶迦山高六百由旬以上廣如高七寶所成其須彌山佉提羅迦山二山之間闊八萬四千由旬周匝無量有優鉢羅花鉢頭摩花拘牟陀花奔茶利迦花等遍覆水上外有七海有三十重林詳大藏因本經須彌山者秦言妙高見維摩詰經注道經曰人鳥山又曰𤣥圃山大地金根山本無妙𤣥山元氣寶洞山神𤣥七轉觀天山佛經又曰鐵圍山蓋此山佛經之名有三彰所知論亦稱妙高道經之名有五總之中國所謂崑崙也凡二典所言天上海外諸大神山惟此最為近實故釋道皆爭據之道經言昆侖人鳥經曰須彌山廣三百六十億萬里因本經曰須彌山入海中出水上各八萬四千由旬其體平正下根連大金輪至上以漸寬廣端直不曲最勝可觀四寶合成金銀琉璃頗黎是也山頂四面有峰挺出曲臨海上各高七百由旬金銀琉璃頗黎真珠車渠瑪瑙七寶合成日天宫殿繞須彌半常行不息南閻浮提日正中時東拂提婆日始沒西瞿陀尼日將初出北鬱單越正當夜半六月北行於一日中漸移北向六俱盧奢六月南行亦一日中漸移南向六俱盧奢阿舍經云日天子城郭縱廣五十一由旬月天子城郭縱廣五十由旬最大星縱廣一由旬最小星縱廣二百步彰所知論云日輪火珠所成月輪水珠所成一云須彌山四角各秀一峰高四由旬半廣百二十五由旬周圍五百由旬有藥義神於中心住是山頂上三十三天中央城曰善見純金所成高一由旬半面各二千五百由旬周萬由旬其城體金俱用百一雜寶嚴飾其地柔軟如兜羅綿是城四面有一萬六千寶柱寶桴寶椽寶簷四面四門又有千數闕一小門四大衢道有諸小衢其四門側五百天子皆服堅鎧守護是門城中有帝釋殿曰最勝處亦曰殊勝殿其狀四方高四百由旬半面各二百五十由旬周千由旬右見彰所知論與前稍不同即淮南閬風之㫖也善見東北有如意樹名波利闍多亦名圓生樹根深五十由旬高百由旬枝條傍布五十由旬能施欲樂下有磐石曰呵㗚摩麗歌色白如㲲面各五十由旬周三百由旬按此與扶桑若木意同善見西南諸天集處名善法堂周九百由旬其狀圓相是堂中央有帝釋座純金所成其座周圍有三十二輔臣之座咸皆布列三十三天向上度八萬由旬於空界中依風而住諸寶所成三十三天別有善見名又非此也四大洲者南閻浮提洲縱廣七千由旬北廣南狹如車廂人面如之壽百嵗東拂於逮洲縱廣九千由旬圓如滿月人面如之壽三百嵗西瞿耶尼洲縱廣八千由旬彎如半月人面如之夀二百嵗北鬱單越洲縱廣十千由旬四方正等人面如之壽千嵗寶山在大雪山北上有阿耨達池東從牛口流出殑伽河入東南海南從象口流出信度河入西南海西從馬口出縛芻河入西北海北從師子口出從多河入東北海潜流地下出積石為中國河源按河源出鄂端諾爾阿耨達池即星宿海也浮屠氏言此非誕矣須彌山即崑崙史遷所謂日月所相隱避為光明其高廣誠有未易測者但未必如彼所云淮南子謂曽城閬風高數十萬丈傍開四百四十餘門浮屠所叙述須彌及三十三天宫闕酷類又如意樹等亦扶桑若木之文也四大洲則因鄒衍推廣之余嘗謂浮屠氏精微處多本莊列廣大處多出山海淮南至於因果罪福則其自成一家之說前所未有而後之道流反竊之云浮屠數法巨細久近窮極渺茫而其名義亦多與中夏迥别非精核其家言者未易通曉今槩録於左方亦博綜之一事也最極微細者曰極微塵亦名鄰虛塵不能析釋七鄰虛為一極微七極微為一微塵七微塵為一透金塵七透金塵為一透水塵七透水塵為一毛塵七毛塵為一羊毛塵七羊毛塵為一牛毛塵七牛毛塵為一遊隙塵七遊隙塵為一蟣量七蟣量為一蝨量七蝨量為一麥量七麥量為一指節三節為一指二十四指橫布為一肘四肘為一弓五百弓量成一俱盧舍八俱盧舍成一由旬又一說小異見後六尺為步二尺為肘四肘為弓二弓為一丈六尺二百一十六丈為一里五里為一俱盧舍八俱盧舍為一由旬由旬一名緰繕那又名由延見大藏一覽注中俱盧舍一名俱盧奢見因本經一俱盧舍五里則一由旬為四十里而因本經注一俱盧奢六里名義俱小舛俟續考之今中國算數微塵渺漠之名或出此云古黃帝算法總有二十三數謂一二三四五六七八九十百千萬億兆京垓秭壤溝澗正載從萬已上有三等數法其下者十十變之中者百百變之上者倍倍變之今華嚴經阿僧秖品用中上數法初數便云一百洛義洛義此云萬為一俱胝此云億俱胝俱胝為一阿庾多此云兆阿庾多阿庾多為一那由他此云京直至不可說總一百二十八數則非世間之籌數也何以云阿僧祇阿者秦言無僧祇者秦言數凡梵書稱阿僧祇即華言無數也按算法有十載日拯乃止此尚遺之右大藏一覽所引華嚴經數法注以俱胝為億阿庾多為兆誤也十萬曰億百萬曰兆則百洛義為一俱胝即兆也俱胝俱胝猶云百萬百萬也則為阿庾多矣阿庾多阿庾多則四用百萬字乃能盡之然後為那由他緣此二句義頗隱奧故注者誤以中國數法推之不知本文云中者百百變之上者倍倍變之百洛義所謂百百變也俱胝俱胝所謂倍倍變也上二俱胝字虛下二俱胝字實也阿庾多阿庾多放此阿僧祇則無復數矣夢溪筆談算其局數至用萬字四十餘意亦同此時最少者名為剎那百二十剎那為一怛剎那六十怛剎那為一羅婆三十羅婆為一牟呼粟多三十牟呼粟多為一書晝夜三十晝夜即為一月十二月為嵗以華言時刻推之則一牟呼粟多半刻也一婆羅一分有半也積怛剎那六十為一婆羅積剎那百二十為一怛剎那則半刻中已經剎那二萬餘矣又一剎那為九百生滅九十剎那為一念見仁王經又三十臘縳為一牟呼粟多見婆娑論注云臘縳即婆羅異名也牟呼粟多一名牟休多注云須臾也見大藏一細之極極而至於微塵巨之極極而至於由旬暫之極極而至於剎那久之極極而至於塵劫皆極兩端言之中庸以兩言蔽之曰語大天下莫能載焉語小天下莫能破焉又蔽之一言曰君子之道費而隱噫千經萬論言名理者不能外矣莊列書所言蟭螟蠻觸鵾鵬之類亦是此意但異教拈得來便茫渺怪竒吾儒只據眼前道理而至理自不能外所以萬世無弊也大藏經四千五十餘卷而諸家書目所載僅百數十種蓋唱偈疏懺等於文義相逺不得盡收也然以西天經總較之直百之一耳因録此廣異聞不必論其有無涅槃經四千八百卷四十卷在唐菩薩經一部二千一百卷三十六卷在唐虛空藏經一部四百卷二卷在唐首楞嚴經一部一百一十卷三卷在唐恩意經大集一部五十卷四卷在唐決宏經一部一百四十卷四卷在唐寶藏經一部一百四十卷二卷在唐華嚴經一部二萬三千卷八十一卷在唐李真經一部九十卷三卷在唐大般若經一部一千六百卷六卷在唐金光明品經一部一千卷十卷在唐未曽有經一部一千五百卷五十卷在唐維摩經一部一百七十卷三卷在唐三論别經一部二百七十卷十二卷在唐金剛經一部一百卷一卷在唐正法輪經一部一百二十卷二卷在唐佛本行經一部一千八百卷六十卷在唐五龍經一部三十二卷二卷在唐菩薩戒經一部一百一十六卷十六卷在唐大集經一部一千二百卷三卷在唐摩詰經一部三百五十卷四十卷在唐法華經一部一百卷十卷在唐瑜伽經一部一百卷三卷在唐寶常經一部一千卷七十卷在唐西天論經一部三千三百卷三卷在唐僧祇經一部五百七十卷十卷在唐西天佛國雜經一部九千五百卷三十卷在唐起信論經一部二千卷五十卷在唐大智度經一部一百八十卷十卷在唐寶藏經一部四千五百二十卷一百四十卷在唐本閣經一部八百五十卷二十卷在唐正律文經一部二千卷十卷在唐因名論經一部二千二百卷五十卷在唐唯識論經一部一百卷十卷在唐具舍論經一部二千卷十卷在唐隋志共一千九百五十部六千九百五十八卷唐開元藏目五千四十八卷貞元增益二百七十卷宋纍朝增益又七百餘卷今藏大抵仍開元舊數蓋其間亦不無存沒也通志所收僅一千七百餘卷不皆藏中者牟子理惑論稱佛所著經凡十有二部合八億四千萬卷大卷萬言已下小卷千言已上云云按漢世惟四十二章經至中國安得品目之多至此此必魏晉之談然則大藏經目之繁侈其說固有自來矣牟子稱漢牟融當是六朝人託名僞作詳四部正訛凡浮屠之說類涉誇大者率中華之人演譯之最先四十二章平實彰顯及心經等總之談理何嘗有一切靡文金剛圓覺不失淵眇維摩楞嚴等漸入浩繁至法華華嚴諸品而極蓋其精微處固佛本真其浮誕不根悉後世增益也少室山房筆叢卷三十一
